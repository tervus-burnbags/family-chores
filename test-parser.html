<!DOCTYPE html>
<html>
<head><title>Parser Tests</title></head>
<body>
<pre id="output"></pre>
<script>
// ---- Copied from index.html: parser functions ----
const FILLER_WORDS = ['um', 'uh', 'like', 'so', 'well'];
const QUESTION_WORDS = ['how', 'what', 'whats', "what's", 'status', 'score', 'balance', 'owe', 'doing', 'points'];
const YES_WORDS = ['yes', 'y', 'yeah', 'yep', 'sure', 'ok', 'okay'];
const NO_WORDS = ['no', 'n', 'nope', 'cancel', 'stop'];
const KID_ALIASES = {
  alex: ['alex'],
  louisa: ['louisa', 'lou'],
  both: ['both', 'both kids', 'the kids', 'everyone']
};

const CHORES = {
  feed_dog_am: { label: 'Feed dog (AM)', points: 1, kids: ['alex', 'louisa'], keywords: ['fed the dog this morning', 'fed dog', 'dog food morning'] },
  feed_dog_pm: { label: 'Feed dog (PM)', points: 1, kids: ['alex', 'louisa'], keywords: ['fed the dog tonight', 'fed dog pm', 'dog food evening'] },
  refill_dog_water: { label: 'Refill dog water', points: 1, kids: ['alex', 'louisa'], keywords: ['refill water', 'dog water', 'filled water bowl'] },
  make_bed: { label: 'Make bed', points: 1, kids: ['alex', 'louisa'], keywords: ['made bed', 'make bed', 'made their bed', 'beds'] },
  put_away_laundry: { label: 'Put away clean laundry', points: 1, kids: ['alex'], keywords: ['put away laundry', 'put away clothes', 'laundry away'] },
  put_away_clothes: { label: 'Put away clothes', points: 1, kids: ['louisa'], keywords: ['put away clothes', 'clothes away'] },
  wipe_bathroom: { label: 'Wipe bathroom counter', points: 1, kids: ['alex'], keywords: ['wipe bathroom', 'bathroom counter', 'cleaned bathroom'] },
  wipe_surfaces: { label: 'Wipe surfaces', points: 2, kids: ['alex', 'louisa'], keywords: ['wiped surfaces', 'wipe surfaces', 'wiped table', 'wiped counter', 'cleaned surfaces', 'wiped tower'] },
  help_pack_lunch: { label: 'Help pack lunch', points: 2, kids: ['alex'], keywords: ['pack lunch', 'packed lunch', 'lunch for tomorrow'] },
  fold_laundry: { label: 'Fold laundry', points: 2, kids: ['alex'], keywords: ['fold laundry', 'folded laundry', 'folded towels', 'folded clothes'] },
  match_socks: { label: 'Match socks', points: 2, kids: ['louisa'], keywords: ['match socks', 'matched socks', 'sock matching'] },
  fold_washcloths: { label: 'Fold washcloths', points: 2, kids: ['louisa'], keywords: ['fold washcloths', 'folded washcloths'] },
  bins_in: { label: 'Bring bins back in', points: 2, kids: ['alex', 'louisa'], keywords: ['bins in', 'bring bins', 'bins back', 'brought bins in', 'garbage in', 'recycling in'] },
  bins_curb: { label: 'Bins to curb', points: 3, kids: ['alex', 'louisa'], keywords: ['bins to curb', 'bins out', 'took bins out', 'trash out', 'garbage out', 'recycling out', 'took out trash'] },
  water_plants: { label: 'Water plants', points: 3, kids: ['alex', 'louisa'], keywords: ['water plants', 'watered plants', 'watered the plants'] }
};

const currentConfig = { kids: {
  alex: { name: 'Alex', born: '2019-02-15', payTiers: [{minPts:12,pay:3},{minPts:22,pay:7}], monthlyBonus:{threshold:100,bonus:6} },
  louisa: { name: 'Louisa', born: '2021-07-02', payTiers: [{minPts:8,pay:2},{minPts:12,pay:4}], monthlyBonus:{threshold:60,bonus:4} }
}, chores: CHORES };

function normalizeText(text) {
  let normalized = String(text || '').toLowerCase();
  FILLER_WORDS.forEach((word) => { normalized = normalized.replace(new RegExp('\\b' + word + '\\b', 'g'), ' '); });
  return normalized.replace(/[^a-z0-9$\s']/g, ' ').replace(/\s+/g, ' ').trim();
}
function splitClauses(text) { return String(text || '').split(/\b(?:and|also|plus)\b/g).map(p => p.trim()).filter(Boolean); }
function extractKidIds(text) {
  const normalized = normalizeText(text);
  if (KID_ALIASES.both.some(a => normalized.includes(a))) return ['alex', 'louisa'];
  const ids = [];
  if (KID_ALIASES.alex.some(a => normalized.includes(a))) ids.push('alex');
  if (KID_ALIASES.louisa.some(a => normalized.includes(a))) ids.push('louisa');
  return Array.from(new Set(ids));
}
function detectDateContext(text) { const d = new Date(); if (normalizeText(text).includes('yesterday')) d.setDate(d.getDate()-1); return d; }
function choreEntries() { return Object.entries(currentConfig.chores || CHORES); }
function scoreChore(text, chore) {
  const tokens = new Set(normalizeText(text).split(' ').filter(Boolean));
  let best = 0;
  (chore.keywords || []).forEach(phrase => {
    const pt = normalizeText(phrase).split(' ').filter(Boolean);
    if (!pt.length) return;
    let matched = 0;
    pt.forEach(t => { if (tokens.has(t)) matched++; });
    best = Math.max(best, matched / pt.length);
  });
  return best;
}
function inferChore(text) {
  const normalized = normalizeText(text);
  const hour = new Date().getHours();
  const isMorning = normalized.includes('morning') || normalized.includes('am') || (!normalized.includes('tonight') && !normalized.includes('evening') && !normalized.includes('pm') && hour < 12);
  const isEvening = normalized.includes('tonight') || normalized.includes('evening') || normalized.includes('pm') || (!normalized.includes('morning') && !normalized.includes('am') && hour >= 12);
  let best = null;
  choreEntries().forEach(([choreId, chore]) => {
    let score = scoreChore(text, chore);
    if (choreId === 'feed_dog_am' && isMorning) score += 0.2;
    if (choreId === 'feed_dog_pm' && isEvening) score += 0.2;
    if (!best || score > best.score) best = { choreId, chore, score };
  });
  return best;
}
function parseAmount(text) { const m = normalizeText(text).match(/\$?\s*(\d+(?:\.\d{1,2})?)/); return m ? Number(m[1]) : null; }
function parsePoints(text) { const m = normalizeText(text).match(/(\d+)\s*points?/); return m ? Number(m[1]) : null; }
function extractAdhocLabel(text, kids) {
  let label = normalizeText(text);
  kids.forEach(kidId => { label = label.replace(new RegExp('\\b' + (currentConfig.kids[kidId].name || kidId).toLowerCase() + '\\b', 'g'), ' '); });
  label = label.replace(/\b(gets?|earns?|earned|did|new chore|something new|something extra|give|him|her|points?)\b/g, ' ');
  label = label.replace(/\d+/g, ' ').replace(/\s+/g, ' ').trim();
  return label || 'Ad hoc chore';
}
function isQuestion(text) {
  const normalized = normalizeText(text);
  return QUESTION_WORDS.some(w => normalized.includes(w)) || /\?$/.test(String(text || '').trim());
}
function parseIntent(text) {
  const normalized = normalizeText(text);
  const kids = extractKidIds(text);
  if (YES_WORDS.includes(normalized)) return { intent: 'confirm_yes' };
  if (NO_WORDS.includes(normalized)) return { intent: 'confirm_no' };
  if (/\bundo\b|take that back/.test(normalized)) return { intent: 'undo' };
  if (/\b(paid back|settle|settled)\b/.test(normalized) && kids.length >= 2) return { intent: 'settle_debt', kids };
  const debtVerbMatch = normalized.match(/\b(owes|borrowed|lent)\b/);
  if (debtVerbMatch && kids.length >= 2) return { intent: 'record_debt', kids, amount: parseAmount(text), verb: debtVerbMatch[1] };
  if (/\b(paid|gave|pay)\b/.test(normalized) && kids.length) return { intent: 'record_payment', kids: [kids[0]], amount: parseAmount(text) };
  if (/\b(change|make|update|should be)\b/.test(normalized)) {
    const match = inferChore(text);
    return { intent: 'change_points', choreId: match && match.choreId, choreLabel: match && match.chore && match.chore.label, points: parsePoints(text), confidence: match ? match.score : 0 };
  }
  if (/\bpoints?\b/.test(normalized) && parsePoints(text) !== null && kids.length) {
    const choreMatch = inferChore(text);
    if (!choreMatch || choreMatch.score < 0.3) {
      if (/\b(new chore|something new|something extra)\b/.test(normalized)) {
        return { intent: 'adhoc', kids, points: parsePoints(text), choreLabel: extractAdhocLabel(text, kids) };
      }
      return { intent: 'freepoints', kids, points: parsePoints(text) };
    }
  }
  if (isQuestion(text)) return { intent: 'check_status', kids };
  const clauses = splitClauses(text);
  const actions = [];
  for (const clause of clauses) {
    const clauseKids = extractKidIds(clause).length ? extractKidIds(clause) : kids;
    if (!clauseKids.length) return { intent: 'missing_kid' };
    const match = inferChore(clause);
    if (match && match.score >= 0.5) {
      actions.push({ intent: 'log_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0) });
      continue;
    }
    if (match && match.score >= 0.3) {
      return { intent: 'confirm_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0) };
    }
  }
  if (actions.length) return { intent: 'log_chore', multi: actions };
  if (kids.length && parsePoints(text) !== null) return { intent: 'adhoc', kids, points: parsePoints(text), choreLabel: extractAdhocLabel(text, kids) };
  if (!kids.length) return { intent: 'missing_kid' };
  return { intent: 'no_match' };
}

// ---- Tests ----
const tests = [
  // Chore logging
  { input: "Alex fed the dog", expect: "log_chore or confirm_chore, kid=alex, chore=feed_dog" },
  { input: "Louisa made her bed", expect: "log_chore, kid=louisa, chore=make_bed" },
  { input: "Both kids made their beds", expect: "log_chore, kids=[alex,louisa], chore=make_bed" },
  { input: "Alex wiped the table", expect: "log or confirm, chore=wipe_surfaces" },
  { input: "Louisa matched socks", expect: "log_chore, chore=match_socks" },
  { input: "Alex took the bins out", expect: "log_chore, chore=bins_curb" },
  { input: "Alex watered the plants", expect: "log_chore, chore=water_plants" },
  { input: "Louisa folded washcloths", expect: "log_chore, chore=fold_washcloths" },
  { input: "Alex packed lunch", expect: "log_chore, chore=help_pack_lunch" },

  // Multi-chore
  { input: "Alex made his bed and fed the dog", expect: "log_chore multi, bed + dog" },
  { input: "Louisa wiped surfaces and matched socks", expect: "log_chore multi, surfaces + socks" },

  // Free points
  { input: "Alex gets 3 points", expect: "freepoints, kid=alex, pts=3" },
  { input: "Give Louisa 2 points", expect: "freepoints, kid=louisa, pts=2" },
  { input: "3 points for Alex", expect: "freepoints, kid=alex, pts=3" },
  { input: "add 5 points to alex", expect: "freepoints, kid=alex, pts=5" },

  // Ad-hoc
  { input: "Alex did a new chore, organized bookshelf, 2 points", expect: "adhoc, kid=alex, pts=2" },
  { input: "Louisa did something new, swept porch, 1 point", expect: "adhoc, kid=louisa, pts=1" },

  // Change points
  { input: "Change feed dog to 2 points", expect: "change_points, chore=feed_dog, pts=2" },
  { input: "Make wiping surfaces 3 points", expect: "change_points, chore=wipe_surfaces, pts=3" },

  // Status
  { input: "How's Alex doing this week?", expect: "check_status, kid=alex" },
  { input: "What are the points?", expect: "check_status" },
  { input: "How much do I owe?", expect: "check_status" },

  // Payments
  { input: "I paid Alex $6", expect: "record_payment, kid=alex, amount=6" },
  { input: "Gave Louisa $4", expect: "record_payment, kid=louisa, amount=4" },

  // Debts
  { input: "Louisa owes Alex $2", expect: "record_debt, from=louisa, to=alex, amount=2" },
  { input: "Louisa borrowed $3 from Alex", expect: "record_debt, amount=3" },

  // Settle
  { input: "Louisa paid Alex back", expect: "settle_debt" },

  // Undo
  { input: "Undo", expect: "undo" },
  { input: "Take that back", expect: "undo" },

  // Confirm
  { input: "Yes", expect: "confirm_yes" },
  { input: "No", expect: "confirm_no" },

  // Missing kid
  { input: "fed the dog", expect: "missing_kid" },
  { input: "made the bed", expect: "missing_kid" },

  // No match
  { input: "hello there", expect: "no_match or missing_kid" },
];

let output = '';
let pass = 0;
let fail = 0;
tests.forEach(t => {
  const result = parseIntent(t.input);
  const summary = JSON.stringify(result);
  const line = `INPUT: "${t.input}"\n  EXPECT: ${t.expect}\n  GOT:    ${summary}\n`;
  output += line + '\n';
});

document.getElementById('output').textContent = output;
</script>
</body>
</html>
