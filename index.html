      function formatWeekRange(date) {
        var base = new Date(date);
        var day = base.getDay();
        var diffToMonday = (day + 6) % 7;
        var monday = new Date(base);
        monday.setDate(base.getDate() - diffToMonday);
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        var fmt = function (value) {
          return value.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        };
        return fmt(monday) + ' - ' + fmt(sunday);
      }

      function thresholdInfo(kid, points) {
        var tiers = (kid.payTiers || []).slice().sort(function (a, b) { return a.minPts - b.minPts; });
        var topTier = tiers[tiers.length - 1] || { minPts: Math.max(points, 1), pay: 0 };
        var nextTier = tiers.find(function (tier) { return points < tier.minPts; });
        if (nextTier) {
          return { mode: 'tier', next: nextTier, targetPoints: Math.max(nextTier.minPts, 1), width: Math.min(100, Math.round((points / Math.max(nextTier.minPts, 1)) * 100)) };
        }
        var weeklyBonus = kid.weeklyBonus || {};
        var extraPts = Math.max(1, Number(weeklyBonus.extraPts || 10));
        var bonusPoints = Math.max(0, points - Number(topTier.minPts || 0));
        var targetBonusPoints = (Math.floor(bonusPoints / extraPts) + 1) * extraPts;
        return { mode: 'bonus', next: { minPts: Number(topTier.minPts || 0) + targetBonusPoints, pay: topTier.pay || 0 }, targetPoints: targetBonusPoints, bonusPoints: bonusPoints, width: Math.min(100, Math.round((bonusPoints / targetBonusPoints) * 100)) };
      }

      function getWeeklyPayBreakdown(kid, weeklyPoints, calculatePay) {
        var safeKid = kid || {};
        var tiers = (safeKid.payTiers || []).slice().sort(function (a, b) { return a.minPts - b.minPts; });
        var tierPay = Number((calculatePay || function () { return 0; })(tiers, weeklyPoints) || 0);
        var topMinPts = tiers.length ? Number(tiers[tiers.length - 1].minPts || 0) : 0;
        var weeklyBonus = safeKid.weeklyBonus || { extraPts: 10, bonus: 2 };
        var extraPts = Math.max(1, Number(weeklyBonus.extraPts || 10));
        var bonusAmount = Number(weeklyBonus.bonus || 2);
        var extraPoints = Math.max(0, Number(weeklyPoints || 0) - topMinPts);
        var bonus = Math.floor(extraPoints / extraPts) * bonusAmount;
        return {
          tierPay: tierPay,
          topMinPts: topMinPts,
          extraPts: extraPts,
          bonusAmount: bonusAmount,
          extraPoints: extraPoints,
          bonus: Number(bonus.toFixed(2)),
          totalPay: Number((tierPay + bonus).toFixed(2))
        };
      }

          return Object.assign({ id: id }, data[id]);

      var weeklyPayRunning = false;
      async function maybeRunWeeklyPay() {
        if (weeklyPayRunning) return;
        weeklyPayRunning = true;
        try {
          var phase = runtime();
          if (!phase || !phase.familyId || !phase.configLoaded) return;
          var now = new Date();
          var currentWeek = phase.toIsoWeek(now);
          var previous = new Date(now);
          previous.setDate(previous.getDate() - 7);
          var previousWeek = phase.toIsoWeek(previous);
          var metaRef = phase.dbRef('meta/lastWeeklyPayWeek');
          var metaSnap = await metaRef.get();
          if (metaSnap.exists() && metaSnap.val() === currentWeek) return;
          var payments = await phase.getAllPayments();
          var entries = await phase.getAllLogEntries();
          var kidIds = Object.keys(phase.currentConfig.kids || {});
          var paidCount = 0;
          var paidNames = [];
          for (var i = 0; i < kidIds.length; i += 1) {
            var kidId = kidIds[i];
            var weeklyPoints = entries.filter(function (entry) { return entry.kid === kidId && entry.week === previousWeek; }).reduce(function (sum, entry) { return sum + Number(entry.points || 0); }, 0);
            var kid = (phase.currentConfig.kids[kidId] || {});
            var payInfo = getWeeklyPayBreakdown(kid, weeklyPoints, phase.calculateWeeklyPay);
            var bonus = payInfo.bonus;
            var note = 'Auto weekly pay for ' + previousWeek + (bonus > 0 ? ' (includes $' + bonus.toFixed(2) + ' bonus)' : '');
            if (payments.some(function (payment) {
              return payment.kid === kidId &&
                payment.type === 'weekly' &&
                String(payment.note || '').indexOf('Auto weekly pay for ' + previousWeek) === 0;
            })) continue;
            var amount = payInfo.totalPay;
            if (amount > 0) {
              var paymentEntry = { kid: kidId, amount: Number(amount.toFixed(2)), type: 'weekly', timestamp: Date.now(), date: phase.toDateString(now), note: note, balanceDelta: Number(amount.toFixed(2)) };
              var ref = phase.dbRef('payments').push();
              await ref.set(paymentEntry);
              await phase.adjustBalance(kidId, paymentEntry.balanceDelta);
              paidCount += 1;
              paidNames.push(kid.name || kidId);
            }
          }
          await metaRef.set(currentWeek);
          if (paidCount > 0 && typeof phase.showToast === 'function') {
            phase.showToast('Weekly pay processed for ' + paidNames.join(' & ') + '.');
          }
        } finally {
          weeklyPayRunning = false;
        }
      }
      window.maybeRunWeeklyPay = maybeRunWeeklyPay;

          var kidId = button.dataset.kid;
          var amountText = await window.appPrompt('Payment amount for ' + (((phase.currentConfig.kids || {})[kidId] || {}).name || kidId) + '?', 'Amount', '10', {
            inputType: 'number'
          });
          var amount = amountText === null ? null : Number(amountText);
          if (!amount || Number.isNaN(amount) || amount <= 0) return;
          phase.writePayment(kidId, amount, 'manual', 'Manual pay from bank card').then(function () {
            phase.showToast('Payment recorded.', { kid: kidId });
            return window.openCardForKid(kidId);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Payment failed.', { type: 'error' });
          });
          return;
        }
        if (action === 'kid-spent') {
          var spendKidId = button.dataset.kid;
          var spendText = await window.appPrompt((((phase.currentConfig.kids || {})[spendKidId] || {}).name || spendKidId) + ' spent how much?', 'Amount', '10', {
            inputType: 'number'
          });
          var spendAmount = spendText === null ? null : Number(spendText);
          if (!spendAmount || Number.isNaN(spendAmount) || spendAmount <= 0) return;
          var noteText = await window.appPrompt('What was it for?', 'Optional note', '') || '';
          phase.writePayment(spendKidId, spendAmount, 'spend', noteText || 'Card spend').then(function () {
            phase.showToast('Spend recorded.', { kid: spendKidId });
            return window.openCardForKid(spendKidId);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Failed to record spend.', { type: 'error' });
