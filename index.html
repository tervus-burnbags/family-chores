<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Family Chores</title>
  <meta name="theme-color" content="#4a90d9">
  <meta name="description" content="Voice-first family chore tracker PWA.">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-alt: #edf4ff;
      --line: #d7e0ee;
      --text: #1f2937;
      --muted: #64748b;
      --alex: #4a90d9;
      --louisa: #8a5bd1;
      --danger: #d64545;
      --shadow: 0 18px 44px rgba(39, 58, 87, 0.12);
      --radius: 20px;
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 144, 217, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(138, 91, 209, 0.14), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(100%, 560px);
      min-height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 12px;
      overflow-x: hidden;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(215, 224, 238, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    .brand small {
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      min-width: var(--tap);
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 14px;
      background: var(--panel-alt);
      color: var(--text);
      cursor: pointer;
    }

    .icon-btn:hover {
      background: rgba(74, 144, 217, 0.15);
    }

    .icon-btn:active {
      transform: scale(0.93);
    }

    .icon-btn {
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .drawer {
      display: none;
      padding: 14px 16px;
    }

    .drawer.open {
      display: block;
      animation: drawerIn 0.25s ease-out;
    }

    @keyframes drawerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .drawer-grid {
      display: grid;
      gap: 12px;
    }

    .stat-card {
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(237, 244, 255, 0.9));
      border: 1px solid var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      word-break: break-word;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(39, 58, 87, 0.1);
    }

    .stat-card h2,
    .stat-card h3,
    .stat-card p {
      margin: 0;
    }

    .stat-card h2,
    .stat-card h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .stat-card p {
      color: var(--muted);
      line-height: 1.4;
    }

    .messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      min-height: 320px;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-break: break-word;
      animation: msgIn 0.3s ease-out both;
    }

    .message.system {
      align-self: flex-start;
      background: linear-gradient(135deg, #eef5ff 0%, #f0f0ff 100%);
      border: 1px solid #d5e4fb;
      border-bottom-left-radius: 6px;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(74, 144, 217, 0.15), rgba(138, 91, 209, 0.18));
      border: 1px solid rgba(111, 135, 195, 0.22);
      border-bottom-right-radius: 6px;
    }

    .message-meta {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .composer input {
      min-height: var(--tap);
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer input:focus {
      outline: none;
      border-color: var(--alex);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    .composer button {
      width: var(--tap);
      min-height: var(--tap);
      padding: 0;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .composer button:active {
      transform: scale(0.92);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
    }

    .send-btn:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.4);
    }

    .mic-btn {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .mic-btn:hover {
      background: rgba(138, 91, 209, 0.22);
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(214, 69, 69, 0); }
    }

    .mic-btn.listening {
      background: var(--danger);
      color: #fff;
      animation: micPulse 1.2s ease-in-out infinite;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .card-btn.alex {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .card-btn.louisa {
      background: linear-gradient(135deg, var(--louisa), #6b3fa0);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .kid-card {
      position: relative;
      padding: 28px 24px 22px;
      border-radius: 18px;
      color: #fff;
      overflow: hidden;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .kid-card.alex {
      background: linear-gradient(135deg, #4a90d9 0%, #2563a8 50%, #1e4f8a 100%);
      box-shadow: 0 12px 32px rgba(74, 144, 217, 0.35);
    }

    .kid-card.louisa {
      background: linear-gradient(135deg, #8a5bd1 0%, #6b3fa0 50%, #532d80 100%);
      box-shadow: 0 12px 32px rgba(138, 91, 209, 0.35);
    }

    .kid-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .kid-card::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -10%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.75;
    }

    .card-chip {
      width: 36px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e8d5a0, #c9a84c);
      opacity: 0.85;
    }

    .card-balance {
      position: relative;
      z-index: 1;
      margin: 16px 0 8px;
    }

    .card-balance-amount {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card-balance-label {
      font-size: 0.78rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-pts {
      font-size: 0.82rem;
      opacity: 0.8;
      text-align: right;
    }

    .card-statement {
      margin-top: 14px;
    }

    .card-statement h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0 0 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stmt-list {
      display: grid;
      gap: 0;
    }

    .stmt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid var(--line);
      font-size: 0.88rem;
    }

    .stmt-row:last-child {
      border-bottom: 0;
    }

    .stmt-desc {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stmt-note {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .stmt-amount {
      font-weight: 700;
      white-space: nowrap;
    }

    .stmt-amount.credit {
      color: #16a34a;
    }

    .stmt-amount.debit {
      color: var(--danger);
    }

    .stmt-empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 12px 0;
    }

    .quick-points {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .qp-row {
      display: flex;
      gap: 8px;
    }

    .qp-kid, .qp-pts {
      flex: 1;
      min-height: 44px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }

    .qp-kid:active, .qp-pts:active {
      transform: scale(0.94);
    }

    .qp-kid.alex { color: var(--alex); }
    .qp-kid.louisa { color: var(--louisa); }
    .qp-kid.both { color: var(--muted); }

    .qp-kid.active.alex { background: var(--alex); color: #fff; border-color: var(--alex); }
    .qp-kid.active.louisa { background: var(--louisa); color: #fff; border-color: var(--louisa); }
    .qp-kid.active.both { background: var(--muted); color: #fff; border-color: var(--muted); }

    .qp-pts {
      background: var(--panel-alt);
      color: var(--text);
      border-color: transparent;
    }


    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f1f5f9;
      color: var(--muted);
    }

    .badge.alex {
      background: rgba(74, 144, 217, 0.14);
      color: var(--alex);
    }

    .badge.louisa {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(4px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: min(100%, 440px);
      padding: 20px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.28);
      display: grid;
      gap: 14px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.25s ease;
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2,
    .modal p {
      margin: 0;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.45;
    }

    .modal-actions {
      display: grid;
      gap: 10px;
    }

    .modal-actions button,
    .modal-actions input {
      min-height: var(--tap);
      border-radius: 14px;
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.25);
    }

    .primary:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.35);
    }

    .primary:active {
      transform: scale(0.97);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .secondary:hover {
      background: var(--panel-alt);
    }

    .secondary:active {
      transform: scale(0.97);
    }

    .family-join {
      display: grid;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid #e8eef7;
    }

    .family-join input {
      padding: 0 14px;
      border: 1px solid var(--line);
    }

    .status {
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .app {
        min-height: calc(100vh - 20px);
      }

      .composer {
        grid-template-columns: 1fr auto auto;
      }

      .message {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel header" aria-label="App header">
      <div class="brand">
        <h1>Family Chores</h1>
        <small id="familyLabel">Connecting to Firebase...</small>
      </div>
      <div class="header-actions">
        <button class="icon-btn card-btn alex" id="cardAlex" type="button" data-card-kid="alex" aria-label="Alex's card">A</button>
        <button class="icon-btn card-btn louisa" id="cardLouisa" type="button" data-card-kid="louisa" aria-label="Louisa's card">L</button>
        <button class="icon-btn" id="scoreboardToggle" type="button" aria-label="Toggle scoreboard">Score</button>
        <button class="icon-btn" id="settingsToggle" type="button" aria-label="Open settings">Settings</button>
      </div>
    </section>

    <section class="panel drawer" id="cardDrawer" aria-label="Kid card view">
      <div id="cardContent"></div>
    </section>

    <section class="panel drawer" id="scoreboardDrawer" aria-label="Scoreboard panel">
      <div class="drawer-grid"></div>
    </section>

    <section class="panel drawer" id="settingsDrawer" aria-label="Settings panel">
      <div class="drawer-grid"></div>
    </section>

    <section class="panel messages" id="messages" aria-live="polite" aria-label="Chat history"></section>

    <div class="panel quick-points" id="quickPoints">
      <div class="qp-row">
        <button type="button" class="qp-kid alex active" data-qp-kid="alex">Alex</button>
        <button type="button" class="qp-kid louisa" data-qp-kid="louisa">Louisa</button>
        <button type="button" class="qp-kid both" data-qp-kid="both">Both</button>
      </div>
      <div class="qp-row">
        <button type="button" class="qp-pts" data-qp-pts="1">+1</button>
        <button type="button" class="qp-pts" data-qp-pts="2">+2</button>
        <button type="button" class="qp-pts" data-qp-pts="3">+3</button>
        <button type="button" class="qp-pts" data-qp-pts="4">+4</button>
      </div>
    </div>

    <form class="panel composer" id="composer">
      <label class="visually-hidden" for="messageInput">Type a chore update</label>
      <input id="messageInput" type="text" placeholder="Type or speak..." autocomplete="off">
      <button class="send-btn" type="submit">Send</button>
      <button class="mic-btn" type="button" id="micButton" aria-label="Voice input">Mic</button>
    </form>
  </main>

  <div class="overlay" id="familyModal" role="dialog" aria-modal="true" aria-labelledby="familyModalTitle">
    <div class="modal">
      <h2 id="familyModalTitle">Set up your family</h2>
      <p>Create a new family code or join an existing one to sync chores across devices.</p>
      <div class="modal-actions">
        <button class="primary" id="createFamilyButton" type="button">Create New Family</button>
      </div>
      <div class="family-join">
        <input id="joinFamilyInput" type="text" maxlength="8" placeholder="Enter 8-character code" autocomplete="off">
        <button class="secondary" id="joinFamilyButton" type="button">Join Family</button>
      </div>
      <div class="status" id="familyModalStatus"></div>
    </div>
  </div>

      function normalizeText(text) {

          const bonusChunks = Math.floor(extraPoints / (wb.extraPts || 10));
          const weeklyBonus = bonusChunks * (wb.bonus || 2);
          const threshold = thresholdInfo(phase, kidId, weeklyPoints);
          return { kidId, weeklyPoints, weeklyPay, weeklyBonus, bonusChunks, extraPoints, topMinPts, wb, threshold, owed: Number(((balances[kidId] && balances[kidId].owed) || 0)) };
        });
        const debtRows = debts.filter((debt) => !debt.settled);
        elements.scoreboardDrawer.innerHTML = [
          '<div class="drawer-grid">',
          '<article class="stat-card">',
          '<h2>This Week (' + formatWeekRange(now) + ')</h2>',
          kidRows.map((row) => '<div class="score-row"><div class="score-top"><div><div class="score-name">' + phase.currentConfig.kids[row.kidId].name + '</div><div class="score-pay">' + row.weeklyPoints + 'pts | ' + phase.dollars(row.weeklyPay) + ' earned</div></div><div class="score-next">next: ' + row.threshold.next.minPts + 'pts</div></div><div class="progress ' + row.kidId + '"><span style="width:' + row.threshold.width + '%"></span></div><div class="score-pay">bonus: ' + phase.dollars(row.wb.bonus || 2) + ' per ' + (row.wb.extraPts || 10) + 'pts over ' + row.topMinPts + ' — ' + (row.weeklyBonus > 0 ? phase.dollars(row.weeklyBonus) + ' earned!' : 'none yet') + '</div></div>').join(''),
          '</article>',
          '<article class="stat-card">',
          '<p class="score-section-title">Balances</p>',
          '<div class="score-actions">',
          kidRows.map((row) => '<div class="score-action"><span>' + phase.currentConfig.kids[row.kidId].name + ': ' + (row.owed >= 0 ? 'you owe ' + phase.dollars(row.owed) : 'owes you ' + phase.dollars(Math.abs(row.owed))) + '</span><button type="button" data-score-action="pay-balance" data-kid="' + row.kidId + '">Pay</button><button type="button" data-score-action="kid-spent" data-kid="' + row.kidId + '">Spent</button><button type="button" data-score-action="gave-cash" data-kid="' + row.kidId + '">Gave Cash</button></div>').join(''),
          debtRows.length ? debtRows.map((debt) => '<div class="score-action"><span>' + phase.currentConfig.kids[debt.from].name + ' owes ' + phase.currentConfig.kids[debt.to].name + ': ' + phase.dollars(debt.amount) + '</span><button type="button" data-score-action="settle-debt" data-from="' + debt.from + '" data-to="' + debt.to + '">Settle</button></div>').join('') : '<div class="score-empty">No active debts.</div>',
          '</div>',
          '</article>',
          '</div>'
        ].join('');
      }

      async function maybeRunWeeklyPay() {
        const phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) {
          return;
        }
        const now = new Date();
        const currentWeek = phase.toIsoWeek(now);
        const previous = previousWeek(now, phase);
        const metaRef = phase.database.ref('families/' + phase.familyId + '/meta/lastWeeklyPayWeek');
        const metaSnap = await metaRef.get();
        const lastWeek = metaSnap.exists() ? metaSnap.val() : null;
        if (lastWeek === currentWeek) {
          return;
        }
        const paymentsSnap = await phase.database.ref('families/' + phase.familyId + '/payments').orderByChild('type').equalTo('weekly').get();
        const existingPayments = paymentsSnap.exists() ? Object.values(paymentsSnap.val()) : [];
        const entries = await phase.getAllLogEntries();
        for (const kidId of Object.keys(phase.currentConfig.kids || KIDS)) {
          const alreadyPaid = existingPayments.some((payment) => payment.kid === kidId && payment.note === ('Auto weekly pay for ' + previous));
          if (alreadyPaid) {
            continue;
          }
          const weeklyPoints = entries.filter((entry) => entry.kid === kidId && entry.week === previous).reduce((sum, entry) => sum + Number(entry.points || 0), 0);
          const amount = phase.calculateWeeklyPay(phase.currentConfig.kids[kidId].payTiers, weeklyPoints);
          if (amount > 0) {
            const paymentEntry = { kid: kidId, amount: Number(amount.toFixed(2)), type: 'weekly', timestamp: Date.now(), date: phase.toDateString(now), note: 'Auto weekly pay for ' + previous };
            const ref = phase.database.ref('families/' + phase.familyId + '/payments').push();
            await ref.set(paymentEntry);
            await phase.adjustBalance(kidId, amount);
          }
        }
        await metaRef.set(currentWeek);
      }

      function maybeShowBirthdayPrompt() {
        const phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) {
          return;
        }
        const today = new Date();
        const month = today.getMonth() + 1;
        const day = today.getDate();
        Object.values(phase.currentConfig.kids || KIDS).forEach((kid) => {
          const born = new Date(kid.born);
          if (born.getMonth() + 1 === month && born.getDate() === day) {
            phase.addMessage('system', kid.name + ' has a birthday today. Want to update pay tiers in settings?');
          }
        });
      }

      window.refreshPhase4 = refreshPhase4;
      async function refreshPhase4() {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) {
          document.getElementById('scoreboardDrawer').querySelector('.drawer-grid').innerHTML = '<article class="stat-card"><p>Loading...</p></article>';
          await new Promise(function (resolve) {
            var poll = setInterval(function () {
              phase = runtime();
              if (phase && phase.familyId && phase.configLoaded) { clearInterval(poll); resolve(); }
            }, 300);
          });
        }
        await maybeRunWeeklyPay();
        await renderScoreboardPanel();
      }

      window.renderCardView = async function renderCardView(kidId) {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) {
          document.getElementById('cardContent').innerHTML = '<p style="color:var(--muted)">Loading...</p>';
          await new Promise(function (resolve) {
            var poll = setInterval(function () {
              phase = runtime();
              if (phase && phase.familyId && phase.configLoaded) {
                clearInterval(poll);
                resolve();
              }
            }, 300);
          });
        }
        try {
        const kid = phase.currentConfig.kids[kidId];
        const balances = await phase.getBalances();
        const owed = Number(((balances[kidId] && balances[kidId].owed) || 0));
        const entries = await phase.getAllLogEntries();
        const now = new Date();
        const currentWeek = phase.toIsoWeek(now);
        const weeklyPoints = entries.filter((e) => e.kid === kidId && e.week === currentWeek).reduce((sum, e) => sum + Number(e.points || 0), 0);
        var txns = [];
        try {
          const paySnap = await phase.database.ref('families/' + phase.familyId + '/payments').get();
          if (paySnap.exists()) {
            paySnap.forEach((child) => {
              var val = child.val();
              if (val.kid === kidId) txns.push(val);
            });
          }
        } catch (e) { console.error('Card payments fetch error:', e); }
        txns = txns.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).slice(0, 20);
        // Also include chore log entries as credits
        var recentLogs = entries.filter((e) => e.kid === kidId).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)).slice(0, 20);
        // Merge and sort all transactions
        var allTxns = [];
        recentLogs.forEach((e) => {
          allTxns.push({ type: 'chore', label: e.choreLabel || 'Chore', points: e.points, date: e.date, timestamp: e.timestamp || 0 });
        });
        txns.forEach((t) => {
          allTxns.push({ type: t.type || 'payment', label: t.note || t.type || 'Payment', amount: t.amount, date: t.date, timestamp: t.timestamp || 0 });
        });
        allTxns.sort((a, b) => b.timestamp - a.timestamp);
        allTxns = allTxns.slice(0, 25);

        var balanceLabel = owed >= 0 ? 'Available Balance' : 'Amount Owed';
        var balanceDisplay = owed >= 0 ? phase.dollars(owed) : '-' + phase.dollars(Math.abs(owed));

        var stmtRows = allTxns.map((t) => {
          if (t.type === 'chore') {
            return '<div class="stmt-row"><div class="stmt-desc"><span>' + t.label + '</span><span class="stmt-note">' + (t.date || '') + ' &middot; +' + t.points + 'pts</span></div><span class="stmt-amount credit">earned</span></div>';
          }
          var label = t.type === 'spend' ? 'Purchase' : t.type === 'cash' ? 'Cash given' : t.type === 'weekly' ? 'Weekly pay' : 'Payment';
          var note = t.label && t.label !== t.type ? t.label : '';
          return '<div class="stmt-row"><div class="stmt-desc"><span>' + label + (note ? ': ' + note : '') + '</span><span class="stmt-note">' + (t.date || '') + '</span></div><span class="stmt-amount debit">-' + phase.dollars(t.amount) + '</span></div>';
        }).join('');

        document.getElementById('cardContent').innerHTML =
          '<div class="kid-card ' + kidId + '">' +
            '<div class="card-top">' +
              '<div class="card-label">Family Chores Card</div>' +
              '<div class="card-chip"></div>' +
            '</div>' +
            '<div class="card-balance">' +
              '<div class="card-balance-amount">' + balanceDisplay + '</div>' +
              '<div class="card-balance-label">' + balanceLabel + '</div>' +
            '</div>' +
            '<div class="card-bottom">' +
              '<div class="card-name">' + kid.name + '</div>' +
              '<div class="card-pts">' + weeklyPoints + ' pts<br>this week</div>' +
            '</div>' +
          '</div>' +
          '<div class="card-statement">' +
            '<h3>Recent Activity</h3>' +
            (stmtRows || '<p class="stmt-empty">No activity yet.</p>') +
          '</div>';
        } catch (err) {
          console.error('Card render error:', err);
          document.getElementById('cardContent').innerHTML = '<p style="color:var(--danger)">Error loading card. Check console.</p>';
        }
      };

      elements.scoreboardDrawer.addEventListener('click', (event) => {
        const phase = runtime();
        const button = event.target.closest('button[data-score-action]');
        if (!button || !phase) {
          return;
        }
        const action = button.dataset.scoreAction;
        if (action === 'pay-balance') {
          const kidId = button.dataset.kid;
          const amountText = window.prompt('Payment amount for ' + phase.currentConfig.kids[kidId].name + '?');
          const amount = amountText === null ? null : Number(amountText);
          if (!amount || Number.isNaN(amount) || amount <= 0) {
            return;
          }
          phase.writePayment(kidId, amount, 'manual', 'Manual pay from scoreboard').then((balance) => {
            phase.addMessage('system', 'Recorded payment for ' + phase.currentConfig.kids[kidId].name + ': ' + phase.dollars(amount) + '. Balance is now ' + phase.dollars(balance) + '.');
            refreshPhase4().catch((error) => console.error(error));
          }).catch((error) => {
            console.error(error);
            phase.addMessage('system', 'Payment failed.', error.message);
          });
          return;
        }
        if (action === 'kid-spent') {
          const kidId = button.dataset.kid;
          const amountText = window.prompt(phase.currentConfig.kids[kidId].name + ' spent how much?');
          const amount = amountText === null ? null : Number(amountText);
          if (!amount || Number.isNaN(amount) || amount <= 0) return;
          const noteText = window.prompt('What was it for?', '') || '';
          phase.adjustBalance(kidId, -amount).then((balance) => {
            const entry = { kid: kidId, amount: Number(amount.toFixed(2)), type: 'spend', timestamp: Date.now(), date: phase.toDateString(new Date()), note: noteText };
            phase.database.ref('families/' + phase.familyId + '/payments').push().set(entry);
            phase.addMessage('system', phase.currentConfig.kids[kidId].name + ' spent ' + phase.dollars(amount) + (noteText ? ' on ' + noteText : '') + '. Balance: ' + (balance >= 0 ? phase.dollars(balance) + ' owed to them.' : 'they owe you ' + phase.dollars(Math.abs(balance)) + '.'));
            refreshPhase4().catch((error) => console.error(error));
          }).catch((error) => { console.error(error); phase.addMessage('system', 'Failed to record spend.', error.message); });
          return;
        }
        if (action === 'gave-cash') {
          const kidId = button.dataset.kid;
          const amountText = window.prompt('How much cash did you give ' + phase.currentConfig.kids[kidId].name + '?');
          const amount = amountText === null ? null : Number(amountText);
          if (!amount || Number.isNaN(amount) || amount <= 0) return;
          phase.adjustBalance(kidId, -amount).then((balance) => {
            const entry = { kid: kidId, amount: Number(amount.toFixed(2)), type: 'cash', timestamp: Date.now(), date: phase.toDateString(new Date()), note: 'Gave cash' };
            phase.database.ref('families/' + phase.familyId + '/payments').push().set(entry);
            phase.addMessage('system', 'Gave ' + phase.currentConfig.kids[kidId].name + ' ' + phase.dollars(amount) + ' cash. Balance: ' + (balance >= 0 ? phase.dollars(balance) + ' owed to them.' : 'they owe you ' + phase.dollars(Math.abs(balance)) + '.'));
            refreshPhase4().catch((error) => console.error(error));
          }).catch((error) => { console.error(error); phase.addMessage('system', 'Failed to record cash.', error.message); });
          return;
        }
        if (action === 'settle-debt') {
          const from = button.dataset.from;
          const to = button.dataset.to;
          phase.settleDebt([from, to]).then((debt) => {
            if (debt) {
              phase.addMessage('system', 'Settled debt: ' + phase.currentConfig.kids[from].name + ' to ' + phase.currentConfig.kids[to].name + ' for ' + phase.dollars(debt.amount) + '.');
              refreshPhase4().catch((error) => console.error(error));
            }
          }).catch((error) => {
            console.error(error);
            phase.addMessage('system', 'Debt settlement failed.', error.message);
          });
        }
      });


      const phase4Warmup = setInterval(() => {
        const phase = runtime();
        if (phase && phase.database && phase.familyId && phase.configLoaded) {
          refreshPhase4().then(() => maybeShowBirthdayPrompt()).catch((error) => console.error(error));
          clearInterval(phase4Warmup);
        }
      }, 500);
    })();
  </script>

  <script>
    (function () {
      const historyState = { kid: 'all', date: '' };
      let greeted = false;

      function phase() {
        return window.phaseRuntime;
      }

      function ensurePhase5Styles() {
        if (document.getElementById('phase5Styles')) {
          return;
        }
        const style = document.createElement('style');
        style.id = 'phase5Styles';
        style.textContent = '.status-dot{width:10px;height:10px;border-radius:999px;background:#94a3b8;display:inline-block}.status-dot.online{background:#22c55e}.settings-grid{display:grid;gap:12px}.settings-list{display:grid;gap:8px}.settings-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fff}.settings-row span:first-child{flex:1;min-width:80px}.settings-row input,.settings-row select{min-height:38px;padding:0 10px;border:1px solid var(--line);border-radius:10px;width:70px;flex-shrink:0}.settings-row button,.settings-btn{min-height:38px;padding:0 12px;border:0;border-radius:10px;background:var(--alex);color:#fff;cursor:pointer;flex-shrink:0}.settings-chip-row{display:flex;flex-wrap:wrap;gap:8px}.settings-chip{min-height:34px;padding:0 12px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer}.settings-chip.active{background:var(--alex);border-color:var(--alex);color:#fff}.history-list{display:grid;gap:8px;max-height:240px;overflow:auto}.history-item{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden;word-break:break-word}.settings-note{font-size:.85rem;color:var(--muted)}';
        document.head.appendChild(style);
      }

      function ensureOnlineIndicator() {
        if (document.getElementById('onlineDot')) {
          return;
        }
        const dot = document.createElement('span');
        dot.id = 'onlineDot';
        dot.className = 'status-dot';
        elements.familyLabel.parentNode.insertBefore(dot, elements.familyLabel);
        dot.style.marginRight = '8px';
        updateOnlineIndicator();
      }

      function updateOnlineIndicator() {
        const dot = document.getElementById('onlineDot');
        if (!dot) return;
        dot.classList.toggle('online', navigator.onLine);
      }

      function greetingForNow() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Good morning!';
        if (hour < 18) return 'Good afternoon!';
        return 'Good evening!';
      }

      function safeName(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      async function keepPathsSynced() {
        const app = phase();
        if (!app || !app.familyId || !app.database) return;
        ['config', 'log', 'payments', 'balances', 'debts', 'meta'].forEach((part) => {
          const ref = app.database.ref('families/' + app.familyId + '/' + part);
          if (typeof ref.keepSynced === 'function') {
            ref.keepSynced(true);
          }
        });
      }

      function renderPayTierEditor(kidId, kid) {
        return '<div class="stat-card"><h3>' + safeName(kid.name) + ' pay tiers</h3><div class="settings-list">' +
          (kid.payTiers || []).map((tier, index) => '<div class="settings-row"><input type="number" min="1" value="' + tier.minPts + '" data-setting="pay-tier-pts" data-kid="' + kidId + '" data-index="' + index + '" style="width:60px"><span class="settings-note">pts =</span><input type="number" min="0" value="' + tier.pay + '" data-setting="pay-tier" data-kid="' + kidId + '" data-index="' + index + '"><span class="settings-note">$</span></div>').join('') +
          '<div class="settings-row"><span>Bonus: $</span><input type="number" min="0" value="' + ((kid.weeklyBonus || { bonus: 2 }).bonus) + '" data-setting="bonus-pay" data-kid="' + kidId + '"><span class="settings-note">per every</span><input type="number" min="1" value="' + ((kid.weeklyBonus || { extraPts: 10 }).extraPts) + '" data-setting="bonus-pts" data-kid="' + kidId + '"><span class="settings-note">pts above goal</span></div>' +
          '</div></div>';
      }

      async function renderHistory() {
        const app = phase();
        if (!app || !app.familyId || !app.configLoaded) {
          return '<div class="history-list"><div class="history-item">Connect to a family first.</div></div>';
        }
        const entries = (await app.getAllLogEntries()).sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));
        const filtered = entries.filter((entry) => (historyState.kid === 'all' || entry.kid === historyState.kid) && (!historyState.date || entry.date === historyState.date)).slice(0, 40);
        if (!filtered.length) {
          return '<div class="history-list"><div class="history-item">No matching history.</div></div>';
        }
        return '<div class="history-list">' + filtered.map((entry) => '<div class="history-item" style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><strong>' + safeName((app.currentConfig.kids[entry.kid] || {}).name || entry.kid) + '</strong> - ' + safeName(entry.choreLabel) + ' (' + entry.points + 'pts)<div class="settings-note">' + safeName(entry.date) + '</div></div><button type="button" data-setting-action="delete-log" data-log-id="' + entry.id + '" style="min-width:38px;min-height:38px;border:0;border-radius:10px;background:var(--danger);color:#fff;cursor:pointer;font-size:.85rem">X</button></div>').join('') + '</div>';
      }

      async function renderTransactions() {
        const app = phase();
        if (!app || !app.familyId || !app.configLoaded) {
          return '<div class="history-list"><div class="history-item">Connect to a family first.</div></div>';
        }
        const payments = (await app.getAllPayments()).sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));
        const filtered = payments.filter((p) => (historyState.kid === 'all' || p.kid === historyState.kid) && (!historyState.date || p.date === historyState.date)).slice(0, 40);
        if (!filtered.length) {
          return '<div class="history-list"><div class="history-item">No transactions yet.</div></div>';
        }
        return '<div class="history-list">' + filtered.map(function (p) {
          var label = p.type === 'spend' ? 'Purchase' : p.type === 'cash' ? 'Cash given' : p.type === 'weekly' ? 'Weekly pay' : p.type === 'owed' ? 'Owes parent' : 'Payment';
          var note = p.note && p.note !== label ? ': ' + safeName(p.note) : '';
          return '<div class="history-item" style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><strong>' + safeName((app.currentConfig.kids[p.kid] || {}).name || p.kid) + '</strong> - ' + label + note + ' (' + app.dollars(p.amount) + ')<div class="settings-note">' + safeName(p.date || '') + '</div></div><button type="button" data-setting-action="delete-payment" data-payment-id="' + p.id + '" data-payment-kid="' + p.kid + '" data-payment-amount="' + p.amount + '" style="min-width:38px;min-height:38px;border:0;border-radius:10px;background:var(--danger);color:#fff;cursor:pointer;font-size:.85rem">X</button></div>';
        }).join('') + '</div>';
      }

      window.renderSettingsPanel = renderSettingsPanel;
      async function renderSettingsPanel() {
        var app = phase();
        if (!app || !app.familyId || !app.configLoaded) {
          elements.settingsDrawer.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading...</p></article></div>';
          await new Promise(function (resolve) {
            var poll = setInterval(function () {
              app = phase();
              if (app && app.familyId && app.configLoaded) { clearInterval(poll); resolve(); }
            }, 300);
          });
        }
        ensurePhase5Styles();
        const kids = app.currentConfig.kids || KIDS;
        const chores = app.currentConfig.chores || CHORES;
        const historyMarkup = await renderHistory();
        const txnMarkup = await renderTransactions();
        elements.settingsDrawer.innerHTML = [
          '<div class="settings-grid">',
          '<article class="stat-card"><h3>Family</h3><p class="settings-note">Family code: ' + safeName(app.familyId) + '</p><button type="button" class="settings-btn" data-setting-action="copy-family">Copy link</button></article>',
          '<article class="stat-card"><h3>Chores</h3><div class="settings-list">',
          Object.entries(chores).map(([choreId, chore]) => '<div class="settings-row"><span>' + safeName(chore.label) + '</span><input type="number" min="0" value="' + Number(chore.points || 0) + '" data-setting="chore-points" data-chore="' + choreId + '"><button type="button" data-setting-action="remove-chore" data-chore="' + choreId + '">Remove</button></div>').join(''),
          '</div><button type="button" class="settings-btn" data-setting-action="add-chore">Add chore</button></article>',
          Object.entries(kids).map(([kidId, kid]) => renderPayTierEditor(kidId, kid)).join(''),
          '<article class="stat-card"><h3>History</h3><div class="settings-chip-row"><button type="button" class="settings-chip ' + (historyState.kid === 'all' ? 'active' : '') + '" data-history-kid="all">All</button><button type="button" class="settings-chip ' + (historyState.kid === 'alex' ? 'active' : '') + '" data-history-kid="alex">Alex</button><button type="button" class="settings-chip ' + (historyState.kid === 'louisa' ? 'active' : '') + '" data-history-kid="louisa">Louisa</button></div><div class="settings-row"><span>Date</span><input type="date" value="' + safeName(historyState.date) + '" data-setting="history-date"><span class="settings-note">Filter</span></div>' + historyMarkup + '</article>',
          '<article class="stat-card"><h3>Transactions</h3>' + txnMarkup + '</article>',
          '</div>'
        ].join('');
      }

      async function updatePayTier(kidId, index, pay) {
        const app = phase();
        const payTiers = (app.currentConfig.kids[kidId].payTiers || []).slice();
        payTiers[index] = { ...payTiers[index], pay };
        await app.database.ref('families/' + app.familyId + '/config/kids/' + kidId + '/payTiers').set(payTiers);
        app.currentConfig.kids[kidId].payTiers = payTiers;
      }

      async function updatePayTierPts(kidId, index, minPts) {
        const app = phase();
        const payTiers = (app.currentConfig.kids[kidId].payTiers || []).slice();
        payTiers[index] = { ...payTiers[index], minPts };
        await app.database.ref('families/' + app.familyId + '/config/kids/' + kidId + '/payTiers').set(payTiers);
        app.currentConfig.kids[kidId].payTiers = payTiers;
      }

      async function updateWeeklyBonus(kidId, field, value) {
        const app = phase();
        if (!app.currentConfig.kids[kidId].weeklyBonus) {
          app.currentConfig.kids[kidId].weeklyBonus = { extraPts: 10, bonus: 2 };
        }
        app.currentConfig.kids[kidId].weeklyBonus[field] = value;
        await app.database.ref('families/' + app.familyId + '/config/kids/' + kidId + '/weeklyBonus/' + field).set(value);
      }

      async function addChoreViaPrompt() {
        const app = phase();
        const label = window.prompt('New chore name?');
        if (!label) return;
        const points = Number(window.prompt('Points for ' + label + '?', '1'));
        if (!points || Number.isNaN(points)) return;
        const key = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || ('chore_' + Date.now());
        const chore = { label, points, kids: ['alex', 'louisa'], keywords: [label.toLowerCase()] };
        await app.database.ref('families/' + app.familyId + '/config/chores/' + key).set(chore);
        app.currentConfig.chores[key] = chore;
        await renderSettingsPanel();
      }

      async function removeChore(choreId) {
        const app = phase();
        if (!window.confirm('Remove this chore?')) return;
        await app.database.ref('families/' + app.familyId + '/config/chores/' + choreId).remove();
        delete app.currentConfig.chores[choreId];
        await renderSettingsPanel();
      }

      elements.settingsDrawer.addEventListener('change', (event) => {
        const target = event.target;
        const app = phase();
        if (!app) return;
        if (target.dataset.setting === 'chore-points') {
          const points = Number(target.value);
          if (Number.isNaN(points)) return;
          app.updateChorePoints(target.dataset.chore, points).then(() => renderSettingsPanel()).catch((error) => console.error(error));
          return;
        }
        if (target.dataset.setting === 'pay-tier-pts') {
          const minPts = Number(target.value);
          if (Number.isNaN(minPts) || minPts < 1) return;
          updatePayTierPts(target.dataset.kid, Number(target.dataset.index), minPts).then(() => renderSettingsPanel()).catch((error) => console.error(error));
          return;
        }
        if (target.dataset.setting === 'pay-tier') {
          const pay = Number(target.value);
          if (Number.isNaN(pay)) return;
          updatePayTier(target.dataset.kid, Number(target.dataset.index), pay).then(() => renderSettingsPanel()).catch((error) => console.error(error));
          return;
        }
        if (target.dataset.setting === 'bonus-pay') {
          const bonus = Number(target.value);
          if (Number.isNaN(bonus) || bonus < 0) return;
          updateWeeklyBonus(target.dataset.kid, 'bonus', bonus).then(() => renderSettingsPanel()).catch((error) => console.error(error));
          return;
        }
        if (target.dataset.setting === 'bonus-pts') {
          const extraPts = Number(target.value);
          if (Number.isNaN(extraPts) || extraPts < 1) return;
          updateWeeklyBonus(target.dataset.kid, 'extraPts', extraPts).then(() => renderSettingsPanel()).catch((error) => console.error(error));
          return;
        }
        if (target.dataset.setting === 'history-date') {
          historyState.date = target.value;
          renderSettingsPanel().catch((error) => console.error(error));
        }
      });

      elements.settingsDrawer.addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;
        const action = button.dataset.settingAction;
        if (button.dataset.historyKid) {
          historyState.kid = button.dataset.historyKid;
          renderSettingsPanel().catch((error) => console.error(error));
          return;
        }
        if (action === 'copy-family') {
          const app = phase();
          navigator.clipboard.writeText(location.href.replace(/#.*$/, '') + '?family=' + app.familyId).then(() => {
            app.addMessage('system', 'Copied the family link.');
          }).catch((error) => console.error(error));
          return;
        }
        if (action === 'add-chore') {
          addChoreViaPrompt().catch((error) => console.error(error));
          return;
        }
        if (action === 'remove-chore') {
          removeChore(button.dataset.chore).catch((error) => console.error(error));
          return;
        }
        if (action === 'delete-log') {
          const app = phase();
          const logId = button.dataset.logId;
          if (!app || !logId) return;
          app.database.ref('families/' + app.familyId + '/log/' + logId).remove().then(() => {
            app.addMessage('system', 'Deleted log entry.');
            renderSettingsPanel().catch((error) => console.error(error));
          }).catch((error) => { console.error(error); app.addMessage('system', 'Failed to delete.', error.message); });
        }
        if (action === 'delete-payment') {
          const app = phase();
          const paymentId = button.dataset.paymentId;
          const paymentKid = button.dataset.paymentKid;
          const paymentAmount = Number(button.dataset.paymentAmount || 0);
          if (!app || !paymentId) return;
          app.database.ref('families/' + app.familyId + '/payments/' + paymentId).remove().then(() => {
            return app.adjustBalance(paymentKid, paymentAmount);
          }).then(() => {
            app.addMessage('system', 'Deleted transaction and reversed ' + app.dollars(paymentAmount) + '.');
            renderSettingsPanel().catch((error) => console.error(error));
          }).catch((error) => { console.error(error); app.addMessage('system', 'Failed to delete transaction.', error.message); });
        }
      });


      window.addEventListener('online', updateOnlineIndicator);
      window.addEventListener('offline', updateOnlineIndicator);

      const phase5Warmup = setInterval(() => {
        const app = phase();
        if (app && app.database) {
          ensureOnlineIndicator();
          updateOnlineIndicator();
        }
        if (app && app.database && app.familyId && app.configLoaded) {
          keepPathsSynced().catch((error) => console.error(error));
          renderSettingsPanel().catch((error) => console.error(error));
          if (!greeted) {
            app.addMessage('system', greetingForNow() + ' What chores have been done today?');
            greeted = true;
          }
          clearInterval(phase5Warmup);
        }
      }, 500);
    })();
  </script>
</body>
</html>
