    </div>


    <form class="panel composer" id="composer">
      <label class="visually-hidden" for="messageInput">Type a chore update</label>
      <input id="messageInput" type="text" placeholder="Type or speak..." autocomplete="off">
      <button class="send-btn" type="submit">Send</button>
      <button class="mic-btn" type="button" id="micButton" aria-label="Voice input">Mic</button>
    </form>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar" id="tabBar">
      <a class="tab active" href="#bulletin" data-tab="bulletin">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="tab-label">Home</span>
      </a>
      <a class="tab" href="#chores" data-tab="chores">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span>
        <span class="tab-label">Chores</span>
      </a>
      <a class="tab" href="#lists" data-tab="lists">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
        <span class="tab-label">Lists</span>
      </a>
      <a class="tab" href="#bank" data-tab="bank">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span>
        <span class="tab-label">Bank</span>

    function keepPathsSynced(nextFamilyId) {
      if (!database || !nextFamilyId || syncedPathState.familyId === nextFamilyId) {
        return;
      }

      syncedPathState.teardown.forEach(function (release) {
        try {
          release();
        } catch (error) {
          console.warn('Failed to release synced path listener.', error);
        }
      });
      syncedPathState.teardown = [];
      syncedPathState.familyId = nextFamilyId;

      ['config', 'balances', 'bulletin/notes'].forEach(function (path) {
        var ref = database.ref('families/' + nextFamilyId + '/' + path);

        // Realtime Database web does not consistently expose keepSynced, so
        // keep a live listener attached as a compatible fallback.
        if (typeof ref.keepSynced === 'function') {
          ref.keepSynced(true);
          syncedPathState.teardown.push(function () {
            ref.keepSynced(false);
          });
          return;
        }

        var noop = function () {};
        ref.on('value', noop);
        syncedPathState.teardown.push(function () {
          ref.off('value', noop);
        });
      });
    }

    function addMessage(role, text, meta, actions) {
      const message = document.createElement('article');
      message.className = 'message ' + role;
      message.innerHTML = '<div>' + escapeHtml(text) + '</div>';
      if (meta) {
        const metaNode = document.createElement('div');
        metaNode.className = 'message-meta';
        metaNode.textContent = meta;
        message.appendChild(metaNode);
      }
      if (Array.isArray(actions) && actions.length) {
        const row = document.createElement('div');
        row.className = 'badge-row';
        actions.forEach((action) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'icon-btn';
          button.dataset.action = action.action;
          if (action.value) {
            button.dataset.value = action.value;
          }
          button.textContent = action.label;
          row.appendChild(button);
        });
        message.appendChild(row);
      }
      if (elements.messages) {
        elements.messages.appendChild(message);
        elements.messages.scrollTop = elements.messages.scrollHeight;
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    window.escapeHtml = escapeHtml;

    function setModalStatus(text, isError) {
      elements.familyModalStatus.textContent = text || '';

      elements.familyModal.classList.remove('open');

    function generateFamilyCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 8; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    async function createFamily() {
      setModalStatus('Creating family...', false);
      let nextFamilyId = generateFamilyCode();
      let existing = await database.ref('families/' + nextFamilyId + '/config').get();
      while (existing.exists()) {
        nextFamilyId = generateFamilyCode();
        existing = await database.ref('families/' + nextFamilyId + '/config').get();
      }

      if (typeof window.seedFamilyV2 === 'function') {
        await window.seedFamilyV2(nextFamilyId);
      } else {
        await database.ref('families/' + nextFamilyId + '/config').set(buildDefaultConfig());
      }
      localStorage.setItem(STORAGE_KEY, nextFamilyId);
      familyId = nextFamilyId;
      if (typeof window.loadFamilyConfigV2 === 'function') {
        await window.loadFamilyConfigV2();
      }
      closeModal();
      updateFamilyLabel();
    }

    async function joinFamily() {
      const code = elements.joinFamilyInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      elements.joinFamilyInput.value = code;
      if (code.length !== 8) {
        setModalStatus('Enter the 8-character family code.', true);
        return;
      }

      setModalStatus('Joining family...', false);
      const snapshot = await database.ref('families/' + code + '/config').get();
      if (!snapshot.exists()) {
        setModalStatus('Family code not found. Check the code and try again.', true);
        return;
      }

      localStorage.setItem(STORAGE_KEY, code);
      familyId = code;
      if (typeof window.loadFamilyConfigV2 === 'function') {
        await window.loadFamilyConfigV2();
      }
      closeModal();
      updateFamilyLabel();
    }

    async function copyFamilyLink() {
      const shareUrl = getFamilyShareUrl();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(shareUrl);
        return;
      }
      const input = document.createElement('textarea');
      input.value = shareUrl;
      input.setAttribute('readonly', 'readonly');
      input.style.position = 'absolute';
      input.style.left = '-9999px';
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
    }

    function setupRouter() {
      var views = {
        bulletin: document.getElementById('viewBulletin'),
        chores: document.getElementById('viewChores'),
        fun: document.getElementById('viewFun'),
        lists: document.getElementById('viewLists'),
        bank: document.getElementById('viewBank')

      var tabs = elements.tabBar.querySelectorAll('.tab');

      function switchView(name) {
        if (!views[name]) name = 'bulletin';
        appShellState.settingsPanelOpen = false;
        appShellState.currentView = name;
        cleanupViewListeners();
        if (elements.messageInput) {
          var placeholders = {
            chores: '"Alex brushed teeth" or "3 points for Louisa"',
            bank: '"Paid Alex $5", "Louisa spent $3", or "Alex $2"',
            lists: '"Add milk to grocery" or "Create shopping list"',
            bulletin: '"Pin: picture day Tuesday"'
          };
          elements.messageInput.placeholder = placeholders[name] || 'Say something...';
        }
        if (elements.composer) {
          elements.composer.style.display = name === 'fun' ? 'none' : '';
        }
        renderHeaderSettingsPanel();
        Object.keys(views).forEach(function (key) {
          views[key].classList.toggle('active', key === name);
        });
        tabs.forEach(function (tab) {
          tab.classList.toggle('active', tab.dataset.tab === name);
        });
        if (name === 'bulletin' && typeof window.renderBulletin === 'function') {
          window.renderBulletin().catch(function (e) { console.error(e); });
        }
        if (name === 'fun' && typeof window.renderFun === 'function') {
          window.renderFun().catch(function (e) { console.error(e); });
        }
        if (name === 'bank') {
          var selectedKid = document.getElementById('bankKidPicker').querySelector('.active');
          var kidId = selectedKid ? selectedKid.dataset.bankKid : 'alex';
          if (typeof window.renderCardView === 'function') {
            window.renderCardView(kidId).catch(function (e) { console.error(e); });
          }
          if (typeof window.refreshPhase4 === 'function') {
            window.refreshPhase4().catch(function (e) { console.error(e); });
          }
        }
        if (name === 'chores' && typeof window.renderChoreProgress === 'function') {
          window.renderChoreProgress().catch(function (e) { console.error(e); });
        }
        if (name === 'lists' && typeof window.renderListsHome === 'function') {
          window.renderListsHome();
        }
      }

      window.addEventListener('hashchange', function () {
        switchView(location.hash.replace('#', '') || 'bulletin');
      });

      elements.tabBar.addEventListener('click', function (e) {
        var tab = e.target.closest('.tab');
        if (!tab) return;
        e.preventDefault();
        var name = tab.dataset.tab;
        if (name === 'fun' && appShellState.currentView === 'fun') {
          if (typeof window.returnToFunHome === 'function' && window.returnToFunHome()) {
            return;
          }
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        if (name === 'lists' && appShellState.currentView === 'lists') {
          if (typeof window.returnToListsHome === 'function' && window.returnToListsHome()) {
            return;
          }
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        location.hash = '#' + name;
      });

      elements.headerSettingsButton.addEventListener('click', function () {
        appShellState.settingsPanelOpen = !appShellState.settingsPanelOpen;
        renderHeaderSettingsPanel();
      });

      // Bank kid picker
      document.getElementById('bankKidPicker').addEventListener('click', function (e) {
        var btn = e.target.closest('[data-bank-kid]');
        if (!btn) return;
        document.getElementById('bankKidPicker').querySelectorAll('.qp-kid').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var kidId = btn.dataset.bankKid;
        if (typeof window.renderCardView === 'function') {
          window.renderCardView(kidId).catch(function (e) { console.error(e); });
        }
      });

      // Initialize from hash
      var initial = location.hash.replace('#', '') || 'bulletin';
      switchView(initial);

      window.switchView = switchView;
    }

    async function initFirebase() {
      if (typeof firebaseConfig !== 'object') {
        throw new Error('firebase-config.js is missing a valid firebaseConfig object.');
      }

      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      database = firebase.database();
      updateFamilyLabel();

      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          return;
        }
        currentUser = user;
        updateFamilyLabel();
        const searchParams = new URLSearchParams(window.location.search);
        const familyFromUrl = (searchParams.get('family') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
        familyId = familyFromUrl || localStorage.getItem(STORAGE_KEY);
        if (familyFromUrl) {
          localStorage.setItem(STORAGE_KEY, familyFromUrl);
        }
        if (familyId) {
          const configSnapshot = await database.ref('families/' + familyId + '/config').get();
          if (!configSnapshot.exists()) {
            localStorage.removeItem(STORAGE_KEY);
            familyId = null;
            updateFamilyLabel();
            openModal();
            setModalStatus('Saved family code was not found. Create a new family or join again.', true);
            return;
          }
          if (typeof window.loadFamilyConfigV2 === 'function') {
            await window.loadFamilyConfigV2();
          }
          updateFamilyLabel();
        } else {
          openModal();
        }
      });

      await auth.signInAnonymously();
      if (familyId && typeof window.loadFamilyConfigV2 === 'function') {
        await window.loadFamilyConfigV2();
      }
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch((error) => {
            console.error('Service worker registration failed:', error);
          });
        });
      }
    }

    function bindFamilyActions() {
      elements.createFamilyButton.addEventListener('click', () => {
        createFamily().catch((error) => {
          console.error(error);
          setModalStatus('Unable to create a family right now.', true);
        });
      });

      elements.joinFamilyButton.addEventListener('click', () => {
        joinFamily().catch((error) => {
          console.error(error);
          setModalStatus('Unable to join the family right now.', true);
        });
      });

      elements.joinFamilyInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          elements.joinFamilyButton.click();
        }
      });

      document.addEventListener('click', (event) => {
        const actionButton = event.target.closest('[data-family-action]');
        if (!actionButton) return;
        const action = actionButton.dataset.familyAction;
        if (action === 'manage') {
          appShellState.settingsPanelOpen = false;
          renderHeaderSettingsPanel();
          openModal();
          return;
        }
        if (action === 'copy') {
          copyFamilyLink().then(() => {
            if (window.phaseRuntime && typeof window.phaseRuntime.showToast === 'function') {
              window.phaseRuntime.showToast('Copied family link.');
            }
          }).catch((error) => {

          phraseTokens.forEach((token) => {

        }
        if (/\b(paid|gave|pay|got|received|earned|found)\b/.test(normalized) && kids.length) {
          return { intent: 'record_payment', kids: [kids[0]], amount: parseAmount(originalText) };
        }
        if (kids.length === 1 && parseAmount(originalText) !== null && /\$/.test(originalText)) {
          return { intent: 'bank_ambiguous', kids: [kids[0]], amount: parseAmount(originalText), note: originalText };
        }
        return null;
      }

      function parseNoteIntent(normalized, originalText) {
        var noteMatch = originalText.match(/^(?:pin|pin:|note|add note|post note|bulletin note|remember)\s*:?\s+(.+)$/i);
        if (noteMatch) {
          var noteText = noteMatch[1].trim();
          if (!noteText) return null;
          return {
            intent: 'log_note',
            noteText: noteText,
            color: /\balex\b/i.test(noteText) ? 'alex' : /\b(?:louisa|lou)\b/i.test(noteText) ? 'louisa' : 'neutral'
          };
        }
        var removeMatch = originalText.match(/^(?:remove|delete|clear)\s+note\s+(.+)$/i);
        if (removeMatch) {
          return { intent: 'remove_note', noteText: removeMatch[1].trim() };
        }
        return null;
      }

      function parseIntent(text, currentTab) {
        const normalized = normalizeText(text);
        const kids = extractKidIds(text);
        var activeTab = currentTab || 'bulletin';
        if (YES_WORDS.includes(normalized)) return { intent: 'confirm_yes' };
        if (NO_WORDS.includes(normalized)) return { intent: 'confirm_no' };
        if (/\bundo\b|take that back/.test(normalized)) return { intent: 'undo' };
        if (activeTab === 'lists') {
          var currentListIntent = parseListIntent(normalized, text);
          if (currentListIntent) return currentListIntent;
        }
        if (activeTab === 'bank') {
          var currentBankIntent = parseBankIntent(normalized, text, kids);
          if (currentBankIntent) return currentBankIntent;
        }
        if (activeTab === 'bulletin') {
          var currentNoteIntent = parseNoteIntent(normalized, text);
          if (currentNoteIntent) return currentNoteIntent;
        }
        if (activeTab === 'chores' || activeTab === 'bulletin') {
          if (kids.length && parsePoints(text) !== null && /\b(remove|subtract|take away|deduct|lose|lost|spent|paid)\b/.test(normalized)) {
            return { intent: 'freepoints', kids, points: -parsePoints(text) };
          }
          if (kids.length && parsePoints(text) !== null && /\b(gets?|earns?|earned|give|add|award)\b/.test(normalized)) {
            return { intent: 'freepoints', kids, points: parsePoints(text) };
          }
          if (/\bpoints?\s+for\b/.test(normalized) && kids.length && parsePoints(text) !== null) {
            return { intent: 'freepoints', kids, points: parsePoints(text) };
          }
          if (/\b(change|update|should be)\b/.test(normalized) || (/\bmake\b/.test(normalized) && /\bpoints?\b/.test(normalized) && parsePoints(text) !== null)) {
            const choreText = text.replace(/\b(change|make|update|should be)\b/gi, ' ').trim();
            const match = inferChore(choreText);
            return { intent: 'change_points', choreId: match && match.choreId, choreLabel: match && match.chore && match.chore.label, points: parsePoints(text), confidence: match ? match.score : 0 };
          }
          if (/\bpoints?\b/.test(normalized) && parsePoints(text) !== null && kids.length) {
            var explicitPts = parsePoints(text);
            var choreMatch = inferChore(text);
            if (/\b(new chore|something new|something extra)\b/.test(normalized)) {
              return { intent: 'adhoc', kids, points: explicitPts, choreLabel: extractAdhocLabel(text, kids) };
            }
            if (/\b(remove|subtract|take away|deduct|lose|lost|spent|paid)\b/.test(normalized)) {
              return { intent: 'freepoints', kids, points: -explicitPts };
            }
            if (choreMatch && choreMatch.score >= 0.5) {
              return { intent: 'log_chore', kids, choreId: choreMatch.choreId, choreLabel: choreMatch.chore.label, points: explicitPts };
            }
            if (choreMatch && choreMatch.score >= 0.3) {
              return { intent: 'confirm_chore', kids, choreId: choreMatch.choreId, choreLabel: choreMatch.chore.label, points: explicitPts };
            }
            return { intent: 'freepoints', kids, points: explicitPts };
          }
          const clauses = splitClauses(text);
          const actions = [];
          for (const clause of clauses) {
            const clauseKids = extractKidIds(clause).length ? extractKidIds(clause) : kids;
            if (!clauseKids.length) return { intent: 'missing_kid' };
            const match = inferChore(clause);
            if (match && match.score >= 0.5) {
              actions.push({ intent: 'log_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(clause) });
              continue;
            }
            if (match && match.score >= 0.3) {
              return { intent: 'confirm_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(clause) };
            }
          }
          if (actions.length) return { intent: 'log_chore', multi: actions };
          if (kids.length && parsePoints(text) !== null) return { intent: 'adhoc', kids, points: parsePoints(text), choreLabel: extractAdhocLabel(text, kids) };
        }
        if (isQuestion(text)) return { intent: 'check_status', kids };
        if (activeTab === 'lists' && normalized.length > 0 && normalized.length < 100 && window.familyLists && typeof window.familyLists.getCurrentListContext === 'function') {
          var currentList = window.familyLists.getCurrentListContext();
          if (currentList && currentList.name) {
            return { intent: 'add_to_list', listName: currentList.name, itemText: text.trim() };
          }
        }
        if (activeTab === 'bulletin' && normalized.length > 0 && normalized.length < 250) {
          return { intent: 'log_note', noteText: text.trim(), color: 'neutral' };
        }
        if (!kids.length) return { intent: 'missing_kid' };
        return { intent: 'no_match' };
      }

      async function getLogEntriesByDate(dateStr) {
        const snapshot = await dbRef('log').orderByChild('date').equalTo(dateStr).get();
        if (!snapshot.exists()) return [];
        var data = snapshot.val();
        return Object.keys(data).map(function (id) {
          return Object.assign({ id: id }, data[id]);
        });
      }

      async function getAllLogEntries() {
        const snapshot = await dbRef('log').get();
        if (!snapshot.exists()) return [];
        var data = snapshot.val();
        return Object.keys(data).map(function (id) {
          return Object.assign({ id: id }, data[id]);
        });
      }

      async function getAllPayments() {
        const snapshot = await dbRef('payments').get();
        if (!snapshot.exists()) return [];
        var data = snapshot.val();
        return Object.keys(data).map(function (id) {
          return Object.assign({ id: id }, data[id]);
        });
      }

      async function getBalances() {
        const snapshot = await dbRef('balances').get();
        return snapshot.exists() ? snapshot.val() : { alex: { owed: 0 }, louisa: { owed: 0 } };
      }

      async function setOwed(kidId, amount) {
        await dbRef('balances/' + kidId + '/owed').set(Number(amount.toFixed(2)));
      }

      async function adjustBalance(kidId, delta) {
        const balances = await getBalances();
        const current = Number(((balances[kidId] && balances[kidId].owed) || 0));
        const next = Number((current + delta).toFixed(2));
        await setOwed(kidId, next);
        return next;
      }

      function paymentBalanceDelta(payment) {
        if (payment && typeof payment.balanceDelta === 'number') {
          return Number(payment.balanceDelta || 0);
        }
        const amount = Number((payment && payment.amount) || 0);
        if (!payment) return 0;
        if (payment.type === 'credit' || payment.type === 'weekly') return amount;
        return -amount;
      }

      async function findDuplicate(kidId, choreId, dateStr) {
        const entries = await getLogEntriesByDate(dateStr);
        return entries.find((entry) => entry.kid === kidId && entry.choreId === choreId) || null;
      }

      async function saveLogEntries(entries) {
        const saved = [];
        for (const entry of entries) {
          const ref = dbRef('log').push();
          await ref.set(entry);
          saved.push(Object.assign({ id: ref.key }, entry));
        }
        lastUndoAction = { type: 'log', entries: saved };
        dispatchHubEvent('hub:log-changed');
        return saved;
      }

      async function writePayment(kidId, amount, type, note) {
        const entry = { kid: kidId, amount: Number(amount.toFixed(2)), type, timestamp: Date.now(), date: toDateString(new Date()), note: note || '', balanceDelta: Number((-Number(amount.toFixed(2))).toFixed(2)) };
        const ref = dbRef('payments').push();
        await ref.set(entry);
        const nextBalance = await adjustBalance(kidId, entry.balanceDelta);
        lastUndoAction = { type: 'payment', paymentId: ref.key, kidId, amount: entry.amount, balanceDelta: entry.balanceDelta };
        return nextBalance;
      }

      async function deleteLogEntry(logId) {
        if (!logId) return false;
        const snapshot = await dbRef('log/' + logId).get();
        if (!snapshot.exists()) return false;
        const entry = snapshot.val();
        await dbRef('log/' + logId).remove();
        lastUndoAction = { type: 'log_delete', entries: [Object.assign({ id: logId }, entry)] };
        dispatchHubEvent('hub:log-changed');
        if (appShellState.currentView === 'chores' && typeof window.renderChoreProgress === 'function') {
          window.renderChoreProgress().catch(function (error) { console.error(error); });
        }
        if (appShellState.currentView === 'bank' && typeof window.renderBankSettings === 'function') {
          window.renderBankSettings().catch(function (error) { console.error(error); });
        }
        return true;
      }

      async function deletePaymentEntry(paymentId, kidId) {
        if (!paymentId) return false;
        const snapshot = await dbRef('payments/' + paymentId).get();
        if (!snapshot.exists()) return false;
        const entry = snapshot.val();
        const entryKid = kidId || entry.kid;
        const entryType = entry.type || 'payment';
        if ((entryType === 'weekly' || entryType === 'credit') && !await appConfirm('Delete protected transaction?', 'Delete this ' + entryType + ' entry and reverse its balance impact?', true)) {
          return false;
        }
        const balanceDelta = Number(paymentBalanceDelta(entry) || 0);
        await dbRef('payments/' + paymentId).remove();
        await adjustBalance(entryKid, Number((-balanceDelta).toFixed(2)));
        lastUndoAction = {
          type: 'payment_delete',
          paymentId: paymentId,
          kidId: entryKid,
          balanceDelta: balanceDelta,
          entry: Object.assign({ id: paymentId }, entry)
        };
        if (appShellState.currentView === 'bank') {
          if (typeof window.renderCardView === 'function') {
            window.renderCardView(entryKid).catch(function (error) { console.error(error); });
          }
          if (typeof window.renderBankSettings === 'function') {
            window.renderBankSettings().catch(function (error) { console.error(error); });
          }
        }
        return true;
      }

      async function writeDebt(from, to, amount) {
        const entry = { from, to, amount: Number(amount.toFixed(2)), reason: 'Recorded from chat', timestamp: Date.now(), settled: false };
        const ref = dbRef('debts').push();
        await ref.set(entry);
        lastUndoAction = { type: 'debt', debtId: ref.key };
      }

      async function settleDebt(kids) {
        const snapshot = await dbRef('debts').get();
        if (!snapshot.exists()) return null;
        const data = snapshot.val();
        const debtId = Object.keys(data).find((id) => {
          var debt = data[id];
          return debt && !debt.settled && kids.includes(debt.from) && kids.includes(debt.to);
        });
        if (!debtId) return null;
        const debt = data[debtId];
        await dbRef('debts/' + debtId + '/settled').set(true);
        lastUndoAction = { type: 'settle_debt', debtId };
        return debt;
      }

      async function updateChorePoints(choreId, points) {
        const previous = Number(currentConfig.chores[choreId].points || 0);
        await dbRef('config/chores/' + choreId + '/points').set(points);
        currentConfig.chores[choreId].points = points;
        lastUndoAction = { type: 'change_points', choreId, previous };
        dispatchHubEvent('hub:config-changed');
      }

      async function undoLastAction() {
        if (!lastUndoAction) {
          addMessage('system', 'Nothing to undo yet.');
          showToast('Nothing to undo yet.');
          return;
        }
        if (lastUndoAction.type === 'log') {
          for (const entry of lastUndoAction.entries) {
            await dbRef('log/' + entry.id).remove();
          }
          addMessage('system', 'Removed the most recent log entry.');
          showToast('Removed the most recent log entry.');
        } else if (lastUndoAction.type === 'log_delete') {
          for (const entry of lastUndoAction.entries) {
            const restored = Object.assign({}, entry);
            delete restored.id;
            await dbRef('log/' + entry.id).set(restored);
          }
          dispatchHubEvent('hub:log-changed');
          if (appShellState.currentView === 'chores' && typeof window.renderChoreProgress === 'function') {
            window.renderChoreProgress().catch(function (error) { console.error(error); });
          }
          if (appShellState.currentView === 'bank' && typeof window.renderBankSettings === 'function') {
            window.renderBankSettings().catch(function (error) { console.error(error); });
          }
          addMessage('system', 'Restored the deleted log entry.');
          showToast('Entry restored.');
        } else if (lastUndoAction.type === 'payment') {
          await dbRef('payments/' + lastUndoAction.paymentId).remove();
          const undoDelta = Number((-(lastUndoAction.balanceDelta != null ? lastUndoAction.balanceDelta : lastUndoAction.amount)).toFixed(2));
          await adjustBalance(lastUndoAction.kidId, undoDelta);
          addMessage('system', 'Removed the most recent payment.');
          showToast('Removed the most recent payment.');
        } else if (lastUndoAction.type === 'payment_delete') {
          await dbRef('payments/' + lastUndoAction.paymentId).set(lastUndoAction.entry);
          await adjustBalance(lastUndoAction.kidId, Number(lastUndoAction.balanceDelta || 0));
          if (appShellState.currentView === 'bank') {
            if (typeof window.renderCardView === 'function') {
              window.renderCardView(lastUndoAction.kidId).catch(function (error) { console.error(error); });
            }
            if (typeof window.renderBankSettings === 'function') {
              window.renderBankSettings().catch(function (error) { console.error(error); });
            }
          }
          addMessage('system', 'Restored the deleted transaction.');
          showToast('Transaction restored.');
        } else if (lastUndoAction.type === 'debt') {
          await dbRef('debts/' + lastUndoAction.debtId).remove();
          addMessage('system', 'Removed the most recent debt record.');
          showToast('Removed the most recent debt record.');
        } else if (lastUndoAction.type === 'settle_debt') {
          await dbRef('debts/' + lastUndoAction.debtId + '/settled').set(false);
          addMessage('system', 'Reopened the settled debt.');
          showToast('Reopened the settled debt.');
        } else if (lastUndoAction.type === 'change_points') {
          await dbRef('config/chores/' + lastUndoAction.choreId + '/points').set(lastUndoAction.previous);
          currentConfig.chores[lastUndoAction.choreId].points = lastUndoAction.previous;
          addMessage('system', 'Restored the previous point value.');
          showToast('Restored the previous point value.');
        } else if (lastUndoAction.type === 'list_delete') {
          await dbRef('lists/' + lastUndoAction.listId + '/items/' + lastUndoAction.itemId).set(lastUndoAction.itemData);
          addMessage('system', 'Restored the deleted list item.');
          showToast('Item restored.');
        }
        lastUndoAction = null;
      }

      async function renderStatus(kids) {
        const entries = await getAllLogEntries();
        const balances = await getBalances();
        const week = toIsoWeek(new Date());
        const targetKids = kids.length ? kids : Object.keys(currentConfig.kids || KIDS);
        const lines = targetKids.map((kidId) => {
          const points = entries.filter((entry) => entry.kid === kidId && entry.week === week).reduce((sum, entry) => sum + Number(entry.points || 0), 0);
          const pay = calculateWeeklyPay(currentConfig.kids[kidId].payTiers, points);
          const owed = Number(((balances[kidId] && balances[kidId].owed) || 0));
          return currentConfig.kids[kidId].name + ': ' + points + 'pts, ' + dollars(pay) + ' earned, ' + (owed >= 0 ? dollars(owed) + ' owed to them' : 'owes you ' + dollars(Math.abs(owed)));
        });
        const message = lines.join(' | ');
        addMessage('system', message);
        showToast(message, { duration: 7000 });
      }

      async function executeLogAction(action, options) {
        const entries = [];
        const date = action.dateContext || new Date();
        const dateStr = toDateString(date);
        const week = toIsoWeek(date);
        for (const kidId of action.kids) {
          if (!options || !options.skipDuplicateCheck) {
            const duplicate = await findDuplicate(kidId, action.choreId, dateStr);
            if (duplicate) {
              pendingAction = { type: 'duplicate', action };
              const prompt = currentConfig.kids[kidId].name + ' already logged ' + action.choreLabel + ' today. Log again?';
              addMessage('system', prompt);
              showToast(prompt, { duration: 10000 });
              return;
            }
          }
          entries.push({ kid: kidId, choreId: action.choreId, choreLabel: action.choreLabel, points: action.points, timestamp: Date.now(), date: dateStr, week, note: action.note || '' });
        }
        const saved = await saveLogEntries(entries);
        const message = 'Got it! ' + saved.map((entry) => currentConfig.kids[entry.kid].name + ' - ' + entry.choreLabel + ' ' + entry.points + 'pt').join(' | ') + '. Use Undo if needed.';
        addMessage('system', message);
        showToast(message, { onUndo: () => undoLastAction() });
      }

      var VIEW_INTENTS = {
        chores: ['log_chore', 'confirm_chore', 'freepoints', 'adhoc', 'change_points'],
        bank: ['record_payment', 'kid_spent', 'parent_owes_kid', 'kid_owes_parent', 'record_debt', 'settle_debt', 'bank_ambiguous'],
        lists: ['create_list', 'add_to_list', 'check_off_list'],
        bulletin: ['log_note', 'remove_note']
      };

      var GLOBAL_INTENTS = ['undo', 'confirm_yes', 'confirm_no', 'check_status', 'no_match', 'missing_kid'];

      var VIEW_LABELS = {
        chores: 'Chores',
        bank: 'Bank',
        lists: 'Lists',
        bulletin: 'Home'
      };

      async function executeIntent(result) {
        if (!familyId || !configLoaded) {
          showToast('Connect to a family first.', { type: 'error' });
          return;
        }

        var currentView = appShellState.currentView || 'bulletin';
        if (GLOBAL_INTENTS.indexOf(result.intent) === -1) {
          var allowedView = null;
          Object.keys(VIEW_INTENTS).forEach(function (viewName) {
            if (VIEW_INTENTS[viewName].indexOf(result.intent) !== -1) {
              allowedView = viewName;
            }
          });
          if (allowedView && allowedView !== currentView) {
            showToast('Switch to ' + (VIEW_LABELS[allowedView] || allowedView) + ' for that.', { type: 'error' });
            return;
          }
        }

        if (result.intent === 'confirm_yes') {
          if (!pendingAction) {
            showToast('Nothing to confirm.');
            return;
          }
          const pending = pendingAction;
          pendingAction = null;
          if (pending.type === 'duplicate' || pending.type === 'confirm_chore') {
            await executeLogAction(pending.action, { skipDuplicateCheck: true });
          }
          return;
        }

        if (result.intent === 'confirm_no') {
          pendingAction = null;
          showToast('Cancelled.');
          return;
        }

        if (result.intent === 'undo') return undoLastAction();

        if (result.intent === 'missing_kid') {
          showToast('Which kid? (Alex, Louisa, or both)', {
            duration: 8000
          });
          return;
        }

        if (result.intent === 'no_match') {
          showToast("I didn't catch that. Try again?", { type: 'error' });
          return;
        }

        if (result.intent === 'check_status') return renderStatus(result.kids || []);

        if (result.intent === 'record_payment') {
          if (result.amount === null) {
            showToast('How much was the payment?');
            return;
          }
          const kidId = result.kids[0];
          const balance = await writePayment(kidId, result.amount, 'manual', 'Recorded from chat');
          showToast('Paid ' + currentConfig.kids[kidId].name + ' ' + dollars(result.amount) + '. Balance: ' + dollars(balance), { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'bank_ambiguous') {
          var ambiguousKidId = result.kids[0];
          var ambiguousKidName = ((currentConfig.kids || {})[ambiguousKidId] || {}).name || ambiguousKidId;
          var ambiguousAmount = Number(result.amount || 0);
          var choice = await appPrompt(ambiguousKidName + ' ' + dollars(ambiguousAmount), 'Type earned or spent', 'earned', {
            confirmLabel: 'Record'
          });
          if (choice == null) {
            showToast('Cancelled.');
            return;
          }
          var normalizedChoice = normalizeText(choice);
          if (normalizedChoice.indexOf('spen') >= 0) {
            var spentBalance = await writePayment(ambiguousKidId, ambiguousAmount, 'spend', 'Spent ' + dollars(ambiguousAmount));
            showToast('Recorded ' + dollars(ambiguousAmount) + ' spent by ' + ambiguousKidName + '. Balance: ' + dollars(spentBalance), { kid: ambiguousKidId, onUndo: () => undoLastAction() });
            return;
          }
          if (normalizedChoice.indexOf('earn') >= 0 || normalizedChoice.indexOf('got') >= 0 || normalizedChoice.indexOf('receiv') >= 0) {
            var earnedBalance = await writePayment(ambiguousKidId, ambiguousAmount, 'manual', 'Earned ' + dollars(ambiguousAmount));
            showToast('Recorded ' + dollars(ambiguousAmount) + ' earned for ' + ambiguousKidName + '. Balance: ' + dollars(earnedBalance), { kid: ambiguousKidId, onUndo: () => undoLastAction() });
            return;
          }
          showToast('Type "earned" or "spent".', { type: 'error' });
          return;
        }

        if (result.intent === 'kid_spent') {
          if (result.amount === null) {
            showToast('How much did they spend?');
            return;
          }
          const kidId = result.kids[0];
          const spendNote = (result.note || '').replace(/\b(spent|bought|purchased)\b/gi, '').replace(/\$?\d+(\.\d+)?/g, '').trim() || 'Purchase';
          const balance = await writePayment(kidId, result.amount, 'spend', spendNote);
          showToast(currentConfig.kids[kidId].name + ' spent ' + dollars(result.amount) + ' on ' + spendNote, { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'parent_owes_kid' || result.intent === 'kid_owes_parent') {
          if (result.amount === null) {
            showToast('How much?');
            return;
          }
          const kidId = result.kids[0];
          const isParentOwes = result.intent === 'parent_owes_kid';
          const balance = await adjustBalance(kidId, isParentOwes ? result.amount : -result.amount);
          const entry = {
            kid: kidId,
            amount: Number(result.amount.toFixed(2)),
            type: isParentOwes ? 'credit' : 'owed',
            timestamp: Date.now(),
            date: toDateString(new Date()),
            note: isParentOwes ? 'Parent owes' : 'Owes parent',
            balanceDelta: isParentOwes ? result.amount : -result.amount
          };
          const ref = dbRef('payments').push();
          await ref.set(entry);
          lastUndoAction = { type: 'payment', paymentId: ref.key, kidId, amount: entry.amount, balanceDelta: entry.balanceDelta };
          showToast(isParentOwes ? 'You now owe ' + currentConfig.kids[kidId].name + ' ' + dollars(result.amount) : currentConfig.kids[kidId].name + ' now owes you ' + dollars(result.amount), { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'record_debt') {
          if (result.amount === null) {
            showToast('How much is owed?');
            return;
          }
          const fromKid = result.verb === 'lent' ? result.kids[1] : result.kids[0];
          const toKid = result.verb === 'lent' ? result.kids[0] : result.kids[1];
          await writeDebt(fromKid, toKid, result.amount);
          showToast(currentConfig.kids[fromKid].name + ' owes ' + currentConfig.kids[toKid].name + ' ' + dollars(result.amount), { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'settle_debt') {
          const debt = await settleDebt(result.kids);
          if (!debt) {
            showToast('No active debt found between them.', { type: 'error' });
            return;
          }
          showToast('Settled debt: ' + dollars(debt.amount), { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'change_points') {
          if (!result.choreId || result.points === null) {
            showToast('Which chore and how many points?');
            return;
          }
          await updateChorePoints(result.choreId, result.points);
          showToast('Updated ' + result.choreLabel + ' to ' + result.points + 'pts', { onUndo: () => undoLastAction() });
          return;

      function checkTTTWinner(board) {
        var lines = [
          [0, 1, 2], [3, 4, 5], [6, 7, 8],
          [0, 3, 6], [1, 4, 7], [2, 5, 8],
          [0, 4, 8], [2, 4, 6]
        ];
        for (var i = 0; i < lines.length; i += 1) {
          var a = lines[i][0];
          var b = lines[i][1];
          var c = lines[i][2];
          if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return { winner: board[a], line: lines[i] };
          }
        }
        if (board.every(function (cell) { return cell !== null; })) return { winner: 'draw', line: null };
        return null;
      }

      function playTTT(index) {
        if (state.tttWinner || state.tttBoard[index]) return;
        state.tttBoard[index] = state.tttTurn;
        var result = checkTTTWinner(state.tttBoard);
        if (result) {
          state.tttWinner = result.winner;
          state.tttWinningLine = result.line || [];
          if (result.winner === 'X' || result.winner === 'O') {

      function checkC4Winner(board) {
        var dirs = [
          [0, 1], [1, 0], [1, 1], [1, -1]
        ];
        for (var row = 0; row < 6; row += 1) {
          for (var col = 0; col < 7; col += 1) {
            var cell = board[row][col];
            if (!cell) continue;
            for (var i = 0; i < dirs.length; i += 1) {
              var cells = [[row, col]];
              for (var step = 1; step < 4; step += 1) {
                var nextRow = row + (dirs[i][0] * step);
                var nextCol = col + (dirs[i][1] * step);
                if (nextRow < 0 || nextRow >= 6 || nextCol < 0 || nextCol >= 7 || board[nextRow][nextCol] !== cell) break;
                cells.push([nextRow, nextCol]);
              }
              if (cells.length === 4) {
                return { winner: cell, cells: cells };
              }
            }
          }
        }
        var filled = true;
        for (var r = 0; r < 6; r += 1) {
          for (var c = 0; c < 7; c += 1) {
            if (!board[r][c]) filled = false;
          }
        }
        return filled ? { winner: 'draw', cells: [] } : null;
      }

      function dropC4Piece(col) {
        for (var row = 5; row >= 0; row -= 1) {
          if (!state.c4Board[row][col]) {
            state.c4Board[row][col] = state.c4Turn;
            return { row: row, col: col };
          }
        }
        return null;
      }

      function playConnectFour(col) {
        if (state.c4Winner) return;
        var placed = dropC4Piece(col);
        if (!placed) return;
        var result = checkC4Winner(state.c4Board);
        if (result) {
          state.c4Winner = result.winner;
          state.c4WinningCells = result.cells || [];
          if (result.winner === 'red' || result.winner === 'yellow') {
            state.c4Scores[result.winner] += 1;
            writeGameScores('c4Scores', state.c4Scores);
          }
          return;
        }
        state.c4Turn = state.c4Turn === 'red' ? 'yellow' : 'red';
      }

      function startBattleship() {
        state.bsBoards = createEmptyBSBoards();
        state.bsPhase = 'setup-1';
        state.bsTurn = 'alex';
        state.bsOrientation = 'horizontal';
        state.bsShipIndex = 0;
        state.bsMessage = '';
        state.bsWinner = null;
      }

      function currentBSPlayer() {
        if (state.bsPhase === 'setup-1' || state.bsPhase === 'handoff-setup-1') return 'alex';
        if (state.bsPhase === 'setup-2' || state.bsPhase === 'handoff-setup-2') return 'louisa';
        return state.bsTurn;
      }

      function otherBSPlayer(player) {
        return player === 'alex' ? 'louisa' : 'alex';
      }

      function shipCells(row, col, size, orientation) {
        var cells = [];
        for (var i = 0; i < size; i += 1) {
          cells.push([
            row + (orientation === 'vertical' ? i : 0),
            col + (orientation === 'horizontal' ? i : 0)
          ]);
        }
        return cells;
      }

      function canPlaceBSShip(player, row, col) {
        var ship = BATTLESHIP_SHIPS[state.bsShipIndex];
        if (!ship) return false;
        var cells = shipCells(row, col, ship.size, state.bsOrientation);
        for (var i = 0; i < cells.length; i += 1) {
          var cell = cells[i];
          if (cell[0] < 0 || cell[0] >= 8 || cell[1] < 0 || cell[1] >= 8) return false;
          var overlap = state.bsBoards[player].ships.some(function (entry) {
            return entry.cells.some(function (pos) { return pos[0] === cell[0] && pos[1] === cell[1]; });
          });
          if (overlap) return false;
        }
        return true;
      }

      function placeBSShip(row, col) {
        var player = currentBSPlayer();
        var ship = BATTLESHIP_SHIPS[state.bsShipIndex];
        if (!ship || !canPlaceBSShip(player, row, col)) return false;
        state.bsBoards[player].ships.push({
          name: ship.name,
          size: ship.size,
          cells: shipCells(row, col, ship.size, state.bsOrientation),
          sunk: false
        });
        state.bsShipIndex += 1;
        if (state.bsShipIndex >= BATTLESHIP_SHIPS.length) {
          if (state.bsPhase === 'setup-1') {
            state.bsPhase = 'handoff-setup-2';
            state.bsShipIndex = 0;
          } else {
            state.bsPhase = 'handoff-play';
            state.bsTurn = 'alex';
            state.bsShipIndex = 0;
          }
        }
        return true;
      }

      function readyBattleship() {
        if (state.bsPhase === 'handoff-setup-2') {
          state.bsPhase = 'setup-2';
          state.bsOrientation = 'horizontal';
          state.bsMessage = '';
          return;
        }
        if (state.bsPhase === 'handoff-play') {
          state.bsPhase = 'play';
          return;
        }
        if (state.bsPhase === 'gameover') {
          startBattleship();
        }
      }

      function attackAlreadyMade(player, row, col) {
        return state.bsBoards[player].attacks.some(function (entry) { return entry.r === row && entry.c === col; });
      }

      function recomputeSunkShips(player) {
        var attacks = state.bsBoards[otherBSPlayer(player)].attacks;
        state.bsBoards[player].ships.forEach(function (ship) {
          ship.sunk = ship.cells.every(function (cell) {
            return attacks.some(function (attack) { return attack.hit && attack.r === cell[0] && attack.c === cell[1]; });
          });
        });
      }

      function fireBattleship(row, col) {
        if (state.bsPhase !== 'play') return false;
        var attacker = state.bsTurn;
        var defender = otherBSPlayer(attacker);
        if (attackAlreadyMade(attacker, row, col)) return false;
        var hitShip = null;
        state.bsBoards[defender].ships.forEach(function (ship) {
          if (!hitShip && ship.cells.some(function (cell) { return cell[0] === row && cell[1] === col; })) {
            hitShip = ship;
          }
        });
        state.bsBoards[attacker].attacks.push({ r: row, c: col, hit: Boolean(hitShip) });
        recomputeSunkShips(defender);
        if (hitShip && hitShip.sunk) {
          state.bsMessage = hitShip.name + ' sunk!';
        } else {
          state.bsMessage = hitShip ? 'Hit!' : 'Miss!';
        }
        var allSunk = state.bsBoards[defender].ships.length && state.bsBoards[defender].ships.every(function (ship) { return ship.sunk; });
        if (allSunk) {
          state.bsPhase = 'gameover';
          state.bsWinner = attacker;
          return true;
        }
        state.bsTurn = defender;
        state.bsPhase = 'handoff-play';
        return true;
      }

      async function getNotes() {
        var phase = runtime();
        var ref = bulletinNotesRef(phase);
        if (!ref) return [];
        var snapshot = await ref.get();
        if (!snapshot.exists()) return [];
        var data = snapshot.val();
        return Object.keys(data).map(function (id) {
          var value = data[id] || {};
          return {
            id: id,
            text: String(value.text || '').trim(),
            timestamp: Number(value.timestamp || 0),
            color: value.color || 'neutral'
          };
        }).filter(function (note) {
          return Boolean(note.text);
        }).sort(function (a, b) {
          return b.timestamp - a.timestamp;
        });
      }

      function formatTimestamp(timestamp) {
        if (!timestamp) return 'Just now';
        return new Date(timestamp).toLocaleString(undefined, {
          month: 'short',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit'
        });
      }

      function getBulletinGreeting(date) {
        var hour = date.getHours();
        if (hour < 12) return 'Good morning, family!';
        if (hour < 18) return 'Good afternoon, family!';
        return 'Good evening, family!';
      }

      function formatBulletinDate(date) {
        return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      }

      function getWeeklyStats(phase, date) {
        return phase.getAllLogEntries().then(function (entries) {
          var week = phase.toIsoWeek(date);
          return Object.keys((phase.currentConfig && phase.currentConfig.kids) || {}).map(function (kidId) {
            var kid = phase.currentConfig.kids[kidId] || { name: kidId };
            var points = entries.filter(function (entry) {
              return entry.kid === kidId && entry.week === week;
            }).reduce(function (sum, entry) {
              return sum + Number(entry.points || 0);
            }, 0);
            return { id: kidId, name: kid.name || kidId, points: points };
          });
        });
      }

      function getNoteRotation(note, index) {
        var seed = Number(note && note.timestamp ? note.timestamp : index + 1);
        return ((seed + index * 17) % 7) - 3;
      }

      function normalizeCalendarEvents(payload) {
        var events = payload && Array.isArray(payload.events) ? payload.events : [];
        return events.map(function (event) {
          return {
            title: String(event && event.title ? event.title : 'Untitled event'),
            start: String(event && event.start ? event.start : ''),
            end: String(event && event.end ? event.end : ''),
            kids: Array.isArray(event && event.members) ? event.members.filter(Boolean) : Array.isArray(event && event.kids) ? event.kids.filter(Boolean) : [],
            allDay: Boolean(event && event.allDay)
          };
        }).filter(function (event) {
          return Boolean(event.start);
        }).sort(function (a, b) {
          return new Date(a.start).getTime() - new Date(b.start).getTime();
        });
      }

      function invalidateCalendarCache() {
        calendarCache.familyId = null;
        calendarCache.url = '';
        calendarCache.fetchedAt = 0;
        calendarCache.events = null;
        calendarCache.pending = null;
        calendarCache.error = '';
      }

      function fetchCalendarEvents(phase, options) {
        var url = String(phase && phase.currentConfig && phase.currentConfig.calendarUrl || '').trim();
        if (!url) {
          return Promise.resolve({ status: 'missing-url', events: [] });
        }

        var forceRefresh = Boolean(options && options.force);
        var sameSource = calendarCache.familyId === phase.familyId && calendarCache.url === url;
        var fresh = sameSource && calendarCache.events && (Date.now() - calendarCache.fetchedAt) < 15 * 60 * 1000;
        if (!forceRefresh && fresh) {
          return Promise.resolve({ status: 'ready', events: calendarCache.events });
        }
        if (!forceRefresh && sameSource && calendarCache.pending) {
          return calendarCache.pending;
        }

        calendarCache.familyId = phase.familyId;
        calendarCache.url = url;
        var calendarDays = Number(phase.currentConfig && phase.currentConfig.calendarDays) || 10;
        var fetchUrl = url + (url.indexOf('?') === -1 ? '?' : '&') + 'days=' + calendarDays;
        calendarCache.pending = fetch(fetchUrl, { cache: 'no-store' })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Calendar request failed with status ' + response.status + '.');
            }
            return response.json();
          })
          .then(function (payload) {
            var events = normalizeCalendarEvents(payload);
            calendarCache.events = events;
            calendarCache.fetchedAt = Date.now();
            calendarCache.error = '';
            return { status: 'ready', events: events };
          })
          .catch(function (error) {
            console.error(error);
            calendarCache.error = error.message || 'Calendar unavailable.';
            if (sameSource && calendarCache.events) {
              return { status: 'ready', events: calendarCache.events, stale: true, error: calendarCache.error };
            }
            return { status: 'error', events: [], error: calendarCache.error };
          })
          .finally(function () {
            calendarCache.pending = null;
          });

        return calendarCache.pending;
      }

      function formatCalendarDayLabel(date) {
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        var tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        if (target.getTime() === today.getTime()) return 'Today - ' + formatBulletinDate(date);
        if (target.getTime() === tomorrow.getTime()) return 'Tomorrow - ' + formatBulletinDate(date);
        return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      }

      function formatCalendarTime(event) {
        var start = new Date(event.start);
        var end = event.end ? new Date(event.end) : null;
        if (event.allDay) return 'All day';
        if (Number.isNaN(start.getTime())) return '';
        var startText = start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (!end || Number.isNaN(end.getTime())) return startText;
        return startText + ' - ' + end.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }

      async function addNote(text, color) {
        var phase = runtime();

          timestamp: Date.now(),

        };
        if (!note.text) throw new Error('Note text is required.');
        if (note.text.length > 240) {

        }
        var pushed = ref.push();

        state.composeOpen = false;
        state.draftText = '';
        await renderBulletin();
        return { id: pushed.key, text: note.text, color: note.color, timestamp: note.timestamp };
      }

      async function removeNoteById(noteId) {
        var phase = runtime();
        var ref = bulletinNotesRef(phase);
        if (!ref || !noteId) return null;
        var noteList = await getNotes();
        var match = noteList.find(function (note) { return note.id === noteId; }) || null;
        await ref.child(noteId).remove();
        await renderBulletin();
        return match;
      }

      async function removeNoteByText(text) {
        var target = normalizeNoteText(text);
        if (!target) return null;
        var noteList = await getNotes();
        var match = noteList.find(function (note) {
          var normalized = normalizeNoteText(note.text);
          return normalized === target || normalized.indexOf(target) !== -1 || target.indexOf(normalized) !== -1;
        });
        if (!match) return null;
        await removeNoteById(match.id);
        return match;
      }

          letterGrid = '<div class="hangman-letters">';
          for (var i = 0; i < 26; i += 1) {
            var letter = String.fromCharCode(65 + i);
            var used = hs.guessedLetters.indexOf(letter) >= 0;
            var inWord = String(entry.word || '').indexOf(letter) >= 0;
            var cls = 'hangman-letter';
            if (used) cls += inWord ? ' correct' : ' wrong';
            letterGrid += '<button type="button" class="' + cls + '" data-hangman-letter="' + letter + '"' + (used ? ' disabled' : '') + '>' + letter + '</button>';
          }
          letterGrid += '</div>';
        }
        var resultMsg = '';
        if (won) resultMsg = '<div class="hangman-result won">🎉 You got it!</div>';
        if (lost) resultMsg = '<div class="hangman-result lost">The word was: <strong>' + escapeBulletinHtml(entry.word) + '</strong></div>';
        container.innerHTML = '<div class="fun-shell">' +
          '<div class="fun-activity-head">' +
            '<button type="button" class="fun-back-btn" data-fun-open="home">← Back</button>' +
            '<h2>🎯 Hangman</h2>' +
            '<span class="hangman-wrong-count">' + hs.wrongCount + '/' + HANGMAN_MAX_WRONG + '</span>' +
          '</div>' +
          '<article class="fun-card">' +
            renderHangmanFigure(hs.wrongCount) +
            '<div class="hangman-category">Category: ' + escapeBulletinHtml(entry.category) + '</div>' +
            '<div class="hangman-word">' + getHangmanDisplay() + '</div>' +
            resultMsg +
            letterGrid +
            (gameOver ? '<div class="fun-actions" style="justify-content:center"><button type="button" class="fun-btn" id="funHangmanStartBtn">Play Again</button></div>' : '') +
          '</article>' +
        '</div>';

      function renderWyrActivity(container) {
        var entry = WOULD_YOU_RATHER[state.wyrIndex % WOULD_YOU_RATHER.length];
        container.innerHTML = '<div class="fun-shell">' +
          '<div class="fun-activity-head">' +
            '<button type="button" class="fun-back-btn" data-fun-open="home">← Back</button>' +
            '<h2>🤔 Would You Rather</h2>' +
          '</div>' +
          '<article class="fun-card">' +
            '<div class="wyr-prompt">Would you rather...</div>' +
            '<div class="wyr-options">' +
              '<button type="button" class="wyr-option wyr-a">' + escapeBulletinHtml(entry.a) + '</button>' +
              '<div class="wyr-or">OR</div>' +
              '<button type="button" class="wyr-option wyr-b">' + escapeBulletinHtml(entry.b) + '</button>' +
            '</div>' +
            '<div class="fun-actions" style="justify-content:center;padding-top:4px"><button type="button" class="fun-btn" id="funWyrNextBtn">Next Question</button></div>' +
          '</article>' +
        '</div>';
      }

      function renderTriviaActivity(container) {
        var question = KID_TRIVIA[state.triviaIndex % KID_TRIVIA.length];
        var answered = state.triviaAnswered;
        var selected = state.triviaSelectedChoice;
        var correct = Number(question.answer);
        var choicesHtml = question.choices.map(function (choice, index) {
          var cls = 'trivia-choice';
          if (answered) {
            if (index === correct) cls += ' correct';
            else if (index === selected && selected !== correct) cls += ' wrong';
            else cls += ' dimmed';
          }
          return '<button type="button" class="' + cls + '" data-trivia-choice="' + index + '"' + (answered ? ' disabled' : '') + '>' + escapeBulletinHtml(choice) + '</button>';
        }).join('');
        container.innerHTML = '<div class="fun-shell">' +
          '<div class="fun-activity-head">' +
            '<button type="button" class="fun-back-btn" data-fun-open="home">← Back</button>' +
            '<h2>🧠 Trivia</h2>' +
            '<span class="trivia-score">Score: ' + state.triviaScore + '</span>' +
          '</div>' +
          '<article class="fun-card">' +
            '<div class="trivia-question">' + escapeBulletinHtml(question.question) + '</div>' +
            '<div class="trivia-choices">' + choicesHtml + '</div>' +
            (answered ? '<div class="fun-actions" style="justify-content:center"><button type="button" class="fun-btn" id="funTriviaNextBtn">Next Question</button></div>' : '') +
          '</article>' +
        '</div>';
      }

      async function renderFun() {
        var phase = runtime();
        var container = document.getElementById('funContent');
        if (!container) return;
        ensureKidFunStyles();
        loadFunState();
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<div class="fun-shell"><p class="fun-empty hub-empty">Connect to a family to unlock activities.</p></div>';
          return;
        }
        if (state.funView === 'jokes') {
          renderJokesActivity(container);
          return;
        }
        if (state.funView === 'madlibs') {
          renderMadLibsActivity(container);
          return;
        }
        if (state.funView === 'hangman') {
          renderHangmanActivity(container);
          return;
        }
        if (state.funView === 'wyr') {
          renderWyrActivity(container);
          return;
        }
        if (state.funView === 'trivia') {
          renderTriviaActivity(container);
          return;
        }
        if (state.funView === 'ttt') {
          renderTTTActivity(container);
          return;
        }
        if (state.funView === 'connect4') {
          renderConnectFourActivity(container);
          return;
        }
        if (state.funView === 'battleship') {
          renderBattleshipActivity(container);
          return;
        }
        renderFunHome(container);
      }

      async function renderBulletin() {
        var phase = runtime();
        var container = document.getElementById('bulletinContent');
        if (!container) return;
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<div class="bulletin-shell"><div class="hub-empty">Connect to a family to get started.</div></div>';
          return;
        }

        var notes = await getNotes();
        var calendarState = await fetchCalendarEvents(phase);
        var visibleNotes = notes.slice(0, 10);

        var notesMarkup = visibleNotes.length
          ? '<div class="bulletin-notes-grid">' + visibleNotes.map(function (note, index) {
              return '<article class="bulletin-note-card ' + escapeBulletinHtml(note.color || 'neutral') + '" style="transform:rotate(' + getNoteRotation(note, index) + 'deg)">' +
                '<div class="bulletin-note-text">' + escapeBulletinHtml(note.text) + '</div>' +
                '<div class="bulletin-note-foot">' +
                  '<span class="bulletin-note-meta">' + escapeBulletinHtml(formatTimestamp(note.timestamp)) + '</span>' +
                  '<button type="button" class="bulletin-note-delete" data-note-delete="' + escapeBulletinHtml(note.id) + '" aria-label="Delete note">&times;</button>' +
                '</div>' +
              '</article>';
            }).join('') + '</div>'
          : '<div class="bulletin-empty hub-empty"><div class="bulletin-empty-icon">&#128204;</div><p>Tap + to pin a note</p></div>';

        var composeMarkup = state.composeOpen
          ? '<form id="bulletinNoteForm" class="bulletin-compose">' +
              '<textarea id="bulletinNoteInput" placeholder="Picture day Tuesday..." maxlength="240">' + escapeBulletinHtml(state.draftText) + '</textarea>' +
              '<div class="bulletin-compose-row">' +
                '<select id="bulletinNoteColor">' +
                  '<option value="neutral"' + (state.draftColor === 'neutral' ? ' selected' : '') + '>Family</option>' +
                  '<option value="alex"' + (state.draftColor === 'alex' ? ' selected' : '') + '>Alex</option>' +
                  '<option value="louisa"' + (state.draftColor === 'louisa' ? ' selected' : '') + '>Louisa</option>' +
                '</select>' +
                '<button type="submit" class="bulletin-compose-pin">Pin</button>' +
                '<button type="button" class="bulletin-compose-cancel" id="bulletinCancelNoteBtn">Cancel</button>' +
              '</div>' +
            '</form>'
          : '';

        container.innerHTML =
          '<div class="bulletin-shell">' +
            '<div class="bulletin-toolbar">' +
              '<h2 class="hub-section-head">Pinned</h2>' +
              '<button type="button" class="bulletin-add-btn" id="bulletinNewNoteBtn" aria-label="New note">+</button>' +
            '</div>' +
            composeMarkup +
            notesMarkup +
            '<div class="bulletin-divider"></div>' +
            '<div class="bulletin-calendar-head"><h3 class="hub-section-head">Coming Up</h3></div>' +
            renderCalendarSection(calendarState) +
          '</div>';

        var noteInput = document.getElementById('bulletinNoteInput');
        if (noteInput && state.composeOpen) {
          noteInput.focus();
          noteInput.setSelectionRange(noteInput.value.length, noteInput.value.length);
        }
      }

      document.addEventListener('click', function (event) {
        var newBtn = event.target.closest('#bulletinNewNoteBtn');
        if (newBtn) {
          state.composeOpen = true;
          renderBulletin().catch(function (error) { console.error(error); });
          return;
        }

        var cancelBtn = event.target.closest('#bulletinCancelNoteBtn');
        if (cancelBtn) {
          state.composeOpen = false;
          state.draftText = '';
          renderBulletin().catch(function (error) { console.error(error); });
          return;
        }

        var deleteBtn = event.target.closest('[data-note-delete]');
        if (deleteBtn) {
          removeNoteById(deleteBtn.dataset.noteDelete).then(function (removed) {
            var phase = runtime();
            if (phase && phase.showToast && removed) {
              phase.showToast('Removed note: ' + removed.text);
            }
          }).catch(function (error) {
            console.error(error);
            var phase = runtime();
            if (phase && phase.showToast) {
              phase.showToast('Could not remove that note.', { type: 'error' });
            }
          });
          return;
        }

        var calendarBtn = event.target.closest('[data-calendar-action]');
        if (calendarBtn) {
          if (calendarBtn.dataset.calendarAction === 'retry') {
            invalidateCalendarCache();
            renderBulletin().catch(function (error) { console.error(error); });
            return;
          }
          if (calendarBtn.dataset.calendarAction === 'open-settings') {
            appShellState.settingsPanelOpen = true;
            renderHeaderSettingsPanel();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
          }
        }

        var funOpen = event.target.closest('[data-fun-open]');
        if (funOpen) {
          if (funOpen.dataset.funOpen === 'home') {
            state.funView = 'home';
            renderFun().catch(function (error) { console.error(error); });
            return;
          }
          openFunActivity(funOpen.dataset.funOpen);
          return;
        }

        if (event.target.closest('#funRevealJokeBtn')) {
          state.jokeRevealed = true;
          saveJokeState();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funNextJokeBtn')) {
          if (state.jokeShowStarred && state.starredJokes.length) {
            state.starredJokeViewIndex = ((state.starredJokeViewIndex || 0) + 1) % state.starredJokes.length;
            state.jokeRevealed = false;
          } else {
            nextRandomJoke();
          }
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funStarJokeBtn')) {
          toggleStarJoke();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funStarToggle')) {
          state.jokeShowStarred = !state.jokeShowStarred;
          state.starredJokeViewIndex = 0;
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibStartBtn')) {
          startMadLib();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibNextBtn')) {
          if (!advanceMadLib()) {
            var phase = runtime();
            if (phase && phase.showToast) {
              phase.showToast('Add a word before moving on.', { type: 'error' });
            }
            return;
          }
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibCycleBtn')) {
          nextMadLibTemplate();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibRestartBtn')) {
          restartMadLib();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funHangmanStartBtn')) {
          startHangman();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        var hangmanLetter = event.target.closest('[data-hangman-letter]');
        if (hangmanLetter) {
          guessHangmanLetter(hangmanLetter.dataset.hangmanLetter);
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funWyrNextBtn')) {
          state.wyrIndex = randomIndex(WOULD_YOU_RATHER.length, state.wyrIndex);
          writeFunState('wyrIndex', state.wyrIndex);
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        var triviaChoice = event.target.closest('[data-trivia-choice]');
        if (triviaChoice) {
          answerTrivia(Number(triviaChoice.dataset.triviaChoice));
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funTriviaNextBtn')) {
          nextTrivia();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        var tttCell = event.target.closest('[data-ttt-cell]');
        if (tttCell) {
          playTTT(Number(tttCell.dataset.tttCell));
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funTTTNewBtn')) {
          resetTTTBoard();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funTTTResetBtn')) {
          resetTTTScores();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        var c4Column = event.target.closest('[data-c4-col]');
        if (c4Column) {
          playConnectFour(Number(c4Column.dataset.c4Col));
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funC4NewBtn')) {
          resetConnectFourBoard();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funC4ResetBtn')) {
          resetConnectFourScores();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funBSStartBtn')) {
          startBattleship();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funBSReadyBtn')) {
          readyBattleship();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funBSRotateBtn')) {
          state.bsOrientation = state.bsOrientation === 'horizontal' ? 'vertical' : 'horizontal';
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        var bsPlace = event.target.closest('[data-bs-place]');
        if (bsPlace) {
          var placeParts = String(bsPlace.dataset.bsPlace || '').split(',');
          if (placeBSShip(Number(placeParts[0]), Number(placeParts[1]))) {
            renderFun().catch(function (error) { console.error(error); });
          }
          return;
        }

        var bsFire = event.target.closest('[data-bs-fire]');
        if (bsFire) {
          var fireParts = String(bsFire.dataset.bsFire || '').split(',');
          if (fireBattleship(Number(fireParts[0]), Number(fireParts[1]))) {
            renderFun().catch(function (error) { console.error(error); });
          }
        }
      });

      document.addEventListener('submit', function (event) {
        if (event.target.id !== 'bulletinNoteForm') return;
        event.preventDefault();
        var textInput = document.getElementById('bulletinNoteInput');
        var colorInput = document.getElementById('bulletinNoteColor');
        var text = textInput ? textInput.value.trim() : '';
        var color = colorInput ? colorInput.value : 'neutral';
        state.draftText = text;
        state.draftColor = color;
        addNote(text, color).then(function (note) {
          var phase = runtime();
          if (phase && phase.showToast) {
            phase.showToast('Pinned note: ' + note.text, { kid: note.color !== 'neutral' ? note.color : null });
          }
        }).catch(function (error) {
          console.error(error);
          var phase = runtime();
          if (phase && phase.showToast) {
            phase.showToast(error.message || 'Could not add that note.', { type: 'error' });
          }
        });
      });

      document.addEventListener('change', function (event) {
        if (event.target.id === 'bulletinNoteColor') {
          state.draftColor = event.target.value || 'neutral';
          return;
        }
        if (event.target.id === 'funMadLibAnswer') {
          updateMadLibAnswer(event.target.value || '');
        }
      });

      document.addEventListener('input', function (event) {
        if (event.target.id === 'bulletinNoteInput') {
          state.draftText = event.target.value || '';
          return;
        }
        if (event.target.id === 'funMadLibAnswer') {
          updateMadLibAnswer(event.target.value || '');
        }
      });

      window.renderFun = renderFun;
      window.returnToFunHome = returnToFunHome;
      window.renderBulletin = renderBulletin;
      document.addEventListener('hub:config-changed', function () {
        if (appShellState.currentView === 'bulletin') {
          renderBulletin().catch(function (error) { console.error(error); });
        }
      });
      window.familyBulletin = {
        addNote: addNote,
        removeNoteById: removeNoteById,
        removeNoteByText: removeNoteByText,
        getNotes: getNotes,
        invalidateCalendarCache: invalidateCalendarCache,
        renderBulletin: renderBulletin
      };

      var bulletinWarmup = setInterval(function () {
        var phase = runtime();
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          return;
        }
        clearInterval(bulletinWarmup);
        renderBulletin().catch(function (error) { console.error(error); });
      }, 400);
    })();
