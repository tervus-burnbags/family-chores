        allTxns.sort(function (a, b) { return Number(b.timestamp || 0) - Number(a.timestamp || 0); });

        var debtMarkup = relatedDebts.length ? relatedDebts.map(function (debt) {
          var otherKid = debt.from === kidId ? debt.to : debt.from;
          var otherName = ((phase.currentConfig.kids || {})[otherKid] || {}).name || otherKid;
          var direction = debt.from === kidId ? 'owes ' + otherName : 'is owed by ' + otherName;
          return '<div class="score-action"><span>' + escapeHtml((kid.name || kidId) + ' ' + direction + ' ' + phase.dollars(debt.amount)) + '</span><button type="button" data-card-action="settle-debt" data-kid="' + kidId + '" data-from="' + debt.from + '" data-to="' + debt.to + '">Settle</button></div>';
        }).join('') : '<div class="score-empty">No active debts.</div>';

        var stmtRows = allTxns.slice(0, 20).map(function (item) {
          if (item.type === 'chore') {
            return '<div class="stmt-row"><div class="stmt-desc"><span>' + escapeHtml(item.label) + '</span><span class="stmt-note">' + escapeHtml(item.date || '') + ' · +' + item.points + 'pts</span></div><span class="stmt-amount credit">earned</span></div>';
          }
          var label = item.type === 'spend' ? 'Purchase' : item.type === 'weekly' ? 'Weekly pay' : item.type === 'credit' ? 'Credit' : 'Payment';
          var delta = Number(item.balanceDelta || 0);
          return '<div class="stmt-row"><div class="stmt-desc"><span>' + escapeHtml(label + (item.label && item.label !== item.type ? ': ' + item.label : '')) + '</span><span class="stmt-note">' + escapeHtml(item.date || '') + '</span></div><span class="stmt-amount ' + (delta >= 0 ? 'credit' : 'debit') + '">' + (delta >= 0 ? '+' : '-') + phase.dollars(Math.abs(delta)) + '</span></div>';
        }).join('');

        cardContent.innerHTML = '<div class="kid-card ' + kidId + '"><div class="card-top"><div class="card-label">Family Chores Card</div><div class="card-chip"></div></div><div class="card-balance"><div class="card-balance-amount">' + (owed >= 0 ? phase.dollars(owed) : '-' + phase.dollars(Math.abs(owed))) + '</div><div class="card-balance-label">' + (owed >= 0 ? 'Available Balance' : 'Amount Owed') + '</div></div><div class="card-bottom"><div class="card-name">' + escapeHtml(kid.name || kidId) + '</div><div class="card-pts">' + weeklyPoints + ' pts<br>this week</div></div></div><div class="drawer-grid"><article class="stat-card"><h3>This Week (' + formatWeekRange(now) + ')</h3><div class="score-actions"><div class="score-top"><div><div class="score-name">' + escapeHtml(kid.name || kidId) + '</div><div class="score-pay">' + weeklyPoints + 'pts | ' + phase.dollars(weeklyPay) + ' earned</div></div><div class="score-next">' + progressLabel + '</div></div><div class="progress ' + progressClass + '"><span style="width:' + threshold.width + '%;' + progressStyle + '"></span></div><div class="score-pay">bonus: ' + phase.dollars(wb.bonus || 2) + ' per ' + (wb.extraPts || 10) + 'pts over ' + topMinPts + ' - ' + (weeklyBonus > 0 ? phase.dollars(weeklyBonus) + ' earned!' : 'none yet') + '</div></div></article><article class="stat-card"><h3>Balance</h3><div class="score-actions"><div class="score-action"><span>' + escapeHtml(owed >= 0 ? 'You owe ' + (kid.name || kidId) + ' ' + phase.dollars(owed) : (kid.name || kidId) + ' owes you ' + phase.dollars(Math.abs(owed))) + '</span><div class="list-card-actions"><button type="button" data-card-action="pay-balance" data-kid="' + kidId + '">Pay</button><button type="button" data-card-action="kid-spent" data-kid="' + kidId + '">Spent</button></div></div></div></article><article class="stat-card"><h3>Debts</h3><div class="score-actions">' + debtMarkup + '</div></article><div class="card-statement"><h3>Recent Activity</h3><div class="stmt-list">' + (stmtRows || '<p class="stmt-empty">No activity yet.</p>') + '</div></div></div>';
      };

      function handleCardAction(button) {
        var phase = runtime();
        if (!button || !phase) return;
        var action = button.dataset.cardAction;
        if (action === 'pay-balance') {
          var kidId = button.dataset.kid;
          var amountText = window.prompt('Payment amount for ' + (((phase.currentConfig.kids || {})[kidId] || {}).name || kidId) + '?');
          var amount = amountText === null ? null : Number(amountText);
          if (!amount || Number.isNaN(amount) || amount <= 0) return;
          phase.writePayment(kidId, amount, 'manual', 'Manual pay from bank card').then(function () {
            phase.showToast('Payment recorded.', { kid: kidId });
            return window.openCardForKid(kidId);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Payment failed.', { type: 'error' });
          });
          return;
        }
        if (action === 'kid-spent') {
          var spendKidId = button.dataset.kid;
          var spendText = window.prompt((((phase.currentConfig.kids || {})[spendKidId] || {}).name || spendKidId) + ' spent how much?');
          var spendAmount = spendText === null ? null : Number(spendText);
          if (!spendAmount || Number.isNaN(spendAmount) || spendAmount <= 0) return;
          var noteText = window.prompt('What was it for?', '') || '';
          phase.writePayment(spendKidId, spendAmount, 'spend', noteText || 'Card spend').then(function () {
            phase.showToast('Spend recorded.', { kid: spendKidId });
            return window.openCardForKid(spendKidId);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Failed to record spend.', { type: 'error' });
          });
          return;
        }
        if (action === 'settle-debt') {
          phase.settleDebt([button.dataset.from, button.dataset.to]).then(function (debt) {
            if (!debt) return;
            phase.showToast('Debt settled for ' + phase.dollars(debt.amount) + '.', { kid: button.dataset.kid || button.dataset.from });
            return window.openCardForKid(button.dataset.kid || button.dataset.from);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Debt settlement failed.', { type: 'error' });
          });
        }
      }

      function normalizeListName(name) {
        return String(name || '').trim().toLowerCase();
      }

      function listsRef(phase) {
        if (!phase || !phase.database || !phase.familyId) return null;
        return phase.database.ref('families/' + phase.familyId + '/lists');
      }

      function normalizeListData(snapshotValue) {
        var lists = snapshotValue || {};
        var result = {};
        Object.keys(lists).forEach(function (listId) {
          var list = lists[listId] || {};
          var items = list.items || {};
          result[listId] = {
            id: listId,
            name: String(list.name || ''),
            createdAt: Number(list.createdAt || 0),
            items: Object.keys(items).map(function (itemId) {
              var item = items[itemId] || {};
              return { id: itemId, text: String(item.text || ''), done: Boolean(item.done), timestamp: Number(item.timestamp || 0) };
            }).sort(function (a, b) {
              if (a.done !== b.done) return a.done ? 1 : -1;
              return Number(a.timestamp || 0) - Number(b.timestamp || 0);
            })
          };
        });
        return result;
      }

      function listArray() {
        return Object.keys(listState.listsById).map(function (listId) {
          return listState.listsById[listId];
        }).sort(function (a, b) {
          return Number(a.createdAt || 0) - Number(b.createdAt || 0);
        });
      }

      async function ensureDefaultLists() {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var snapshot = await ref.get();
        if (snapshot.exists()) return;
        var updates = {};
        DEFAULT_LISTS.forEach(function (list) {
          var newRef = ref.push();
          updates[newRef.key] = { name: list.name, createdAt: Date.now(), items: {} };
        });
        await ref.update(updates);
      }

      function subscribeLists() {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref || listState.familyId === phase.familyId) return;
        if (typeof listState.teardown === 'function') {
          listState.teardown();
        }
        listState.familyId = phase.familyId;
        var handler = function (snapshot) {
          listState.listsById = normalizeListData(snapshot.exists() ? snapshot.val() : {});
          if (location.hash.replace('#', '') === 'lists' && typeof window.renderListsHome === 'function') {
            window.renderListsHome();
          }
        };
        ref.on('value', handler);
        listState.teardown = function () {
          ref.off('value', handler);
        };
      }

      async function createListRecord(name, items) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var listName = String(name || '').trim();
        if (!listName) return null;
        var newRef = ref.push();
        var payload = { name: listName, createdAt: Date.now(), items: {} };
        (items || []).forEach(function (itemText, index) {
          var itemRef = ref.child(newRef.key + '/items').push();
          payload.items[itemRef.key] = { text: String(itemText || '').trim(), done: false, timestamp: Date.now() + index };
        });
        await newRef.set(payload);
        return { id: newRef.key, name: listName };
      }

      function findListByName(name) {
        var target = normalizeListName(name);
        var lists = listArray();
        for (var i = 0; i < lists.length; i += 1) {
          if (normalizeListName(lists[i].name) === target) return lists[i];
        }
        return null;
      }

      async function findListByNameFromDb(name) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var target = normalizeListName(name);
        var snapshot = await ref.get();
        if (!snapshot.exists()) return null;
        var found = null;
        snapshot.forEach(function (child) {
          if (found) return true;
          var value = child.val() || {};
          if (normalizeListName(value.name) === target) {
            found = { id: child.key, name: String(value.name || '') };
            return true;
          }
          return false;
        });
        return found;
      }

      async function createListNamed(name) {
        var existing = findListByName(name) || await findListByNameFromDb(name);
        if (existing) return existing;
        return createListRecord(name, []);
      }

      async function addItemsToNamedList(listName, itemText) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var list = findListByName(listName) || await findListByNameFromDb(listName);
        if (!list) list = await createListNamed(listName);
        var parts = String(itemText || '').split(/,|\band\b/).map(function (part) { return part.trim(); }).filter(Boolean);
        for (var i = 0; i < parts.length; i += 1) {
          await ref.child(list.id + '/items').push().set({ text: parts[i], done: false, timestamp: Date.now() + i });
        }
        return { listId: list.id, count: parts.length };
      }

      async function checkOffItemByText(listName, itemText) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var list = findListByName(listName);
        if (!list) {
          var dbList = await findListByNameFromDb(listName);
          if (dbList) {
            var listSnap = await ref.child(dbList.id).get();
            list = normalizeListData(listSnap.exists() ? { temp: listSnap.val() } : {}).temp || null;
            if (list) list.id = dbList.id;
          }
        }
        if (!list) return null;
        var target = normalizeListName(itemText);
        var item = (list.items || []).find(function (entry) { return !entry.done && normalizeListName(entry.text) === target; }) || (list.items || []).find(function (entry) { return !entry.done && normalizeListName(entry.text).indexOf(target) !== -1; });
        if (!item) return null;
        await ref.child(list.id + '/items/' + item.id + '/done').set(true);
        return { listId: list.id, itemId: item.id, text: item.text };
      }

      async function toggleListItem(listId, itemId) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var list = listState.listsById[listId];
        var item = list && (list.items || []).find(function (entry) { return entry.id === itemId; });
        if (!item) return;
        await ref.child(listId + '/items/' + itemId + '/done').set(!item.done);
      }

      async function deleteListItem(listId, itemId) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        await ref.child(listId + '/items/' + itemId).remove();
      }

      async function clearDoneItems(listId) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var list = listState.listsById[listId];
        if (!list) return;
        var updates = {};
        (list.items || []).forEach(function (item) {
          if (item.done) updates[item.id] = null;
        });
        if (Object.keys(updates).length) {
          await ref.child(listId + '/items').update(updates);
        }
      }

      async function addListItems(listId, value) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var parts = String(value || '').split(/,|\band\b/).map(function (part) { return part.trim(); }).filter(Boolean);
        for (var i = 0; i < parts.length; i += 1) {
          await ref.child(listId + '/items').push().set({ text: parts[i], done: false, timestamp: Date.now() + i });
        }
      }

      function renderListCards() {
        var lists = listArray();
        if (!lists.length) return '<div class="list-empty">No lists yet. Create one below.</div>';
        return '<div class="list-grid">' + lists.map(function (list) {
          var doneCount = (list.items || []).filter(function (item) { return item.done; }).length;
          return '<article class="list-card"><div class="list-card-top"><div><h3>' + escapeHtml(list.name) + '</h3><p>' + doneCount + ' of ' + (list.items || []).length + ' done</p></div></div><div class="list-card-actions"><button type="button" data-list-open="' + list.id + '">Open</button></div></article>';
        }).join('') + '</div>';
      }

      function renderListDetail(list) {
        var itemsMarkup = (list.items || []).length ? '<div class="list-items">' + (list.items || []).map(function (item) {
          return '<div class="list-item' + (item.done ? ' done' : '') + '"><button type="button" class="list-item-toggle' + (item.done ? ' done' : '') + '" data-list-item-toggle="' + item.id + '">' + (item.done ? '✓' : '') + '</button><div class="list-item-text">' + escapeHtml(item.text) + '</div><button type="button" class="list-item-delete secondary" data-list-item-delete="' + item.id + '">X</button></div>';
        }).join('') + '</div>' : '<div class="list-empty">No items yet. Add one below.</div>';
        return '<div class="list-detail"><div class="list-detail-head"><h3>' + escapeHtml(list.name) + '</h3><p>Shared in real time for the whole family.</p></div><div class="list-detail-actions"><button type="button" class="secondary" data-list-action="back">Back</button><button type="button" class="secondary" data-list-action="clear-done">Clear done</button></div>' + itemsMarkup + '<div class="list-item-row"><input type="text" class="list-item-input" id="listItemInput" placeholder="Add item..." autocomplete="off"><button type="button" data-list-action="add-item">Add</button></div></div>';
      }

      function renderTemplateButtons() {
        return '<div class="list-template-row">' + LIST_TEMPLATES.map(function (template) {
          return '<button type="button" class="secondary" data-list-template="' + escapeHtml(template.name) + '">' + escapeHtml(template.name) + '</button>';
        }).join('') + '</div>';
      }

      async function renderListsHomeImpl() {
        ensureBankListStyles();
        var phase = runtime();
        var container = document.getElementById('listsContent');
        if (!container) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<div class="list-shell"><div class="list-empty">Connect to a family first.</div></div>';
          return;
        }
        await ensureDefaultLists();
        subscribeLists();
        var current = listState.currentListId ? listState.listsById[listState.currentListId] : null;
        container.innerHTML = '<div class="list-shell"><section class="panel bulletin-hero"><div class="bulletin-section-head"><div><h2>Shared Lists</h2><p>Groceries, errands, and all the little things that need doing.</p></div></div><div class="list-form-row"><input type="text" id="listCreateInput" placeholder="Create a new list..." autocomplete="off"><button type="button" data-list-action="create">Create</button></div><div><p class="settings-note">Templates</p>' + renderTemplateButtons() + '</div></section><section class="panel">' + (current ? renderListDetail(current) : renderListCards()) + '</section></div>';
      }

      function bindBankAndLists() {
        if (listState.bound) return;
        listState.bound = true;
        var cardContent = document.getElementById('cardContent');
        if (cardContent) {
          cardContent.addEventListener('click', function (event) {
            var button = event.target.closest('[data-card-action]');
            if (button) handleCardAction(button);
          });
        }
        var listsContent = document.getElementById('listsContent');
        if (listsContent) {
          listsContent.addEventListener('click', function (event) {
            var target = event.target.closest('[data-list-open],[data-list-template],[data-list-item-toggle],[data-list-item-delete],[data-list-action]');
            if (!target) return;
            if (target.dataset.listOpen) {
              listState.currentListId = target.dataset.listOpen;
              renderListsHomeImpl().catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listTemplate) {
              var template = LIST_TEMPLATES.find(function (entry) { return entry.name === target.dataset.listTemplate; });
              if (!template) return;
              createListRecord(template.name, template.items).then(function (created) {
                if (created) listState.currentListId = created.id;
                return renderListsHomeImpl();
              }).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listItemToggle && listState.currentListId) {
              toggleListItem(listState.currentListId, target.dataset.listItemToggle).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listItemDelete && listState.currentListId) {
              deleteListItem(listState.currentListId, target.dataset.listItemDelete).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'back') {
              listState.currentListId = null;
              renderListsHomeImpl().catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'clear-done' && listState.currentListId) {
              clearDoneItems(listState.currentListId).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'create') {
              var createInput = document.getElementById('listCreateInput');
              var name = createInput ? String(createInput.value || '').trim() : '';
              if (!name) return;
              createListRecord(name, []).then(function (created) {
                if (createInput) createInput.value = '';
                if (created) listState.currentListId = created.id;
                return renderListsHomeImpl();
              }).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'add-item' && listState.currentListId) {
              var itemInput = document.getElementById('listItemInput');
              var value = itemInput ? String(itemInput.value || '').trim() : '';
              if (!value) return;
              addListItems(listState.currentListId, value).then(function () {
                if (itemInput) itemInput.value = '';
              }).catch(function (error) { console.error(error); });
            }
          });

          listsContent.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && event.target.id === 'listCreateInput') {
              event.preventDefault();
              var createBtn = listsContent.querySelector('[data-list-action="create"]');
              if (createBtn) createBtn.click();
            }
            if (event.key === 'Enter' && event.target.id === 'listItemInput') {
              event.preventDefault();
              var addBtn = listsContent.querySelector('[data-list-action="add-item"]');
              if (addBtn) addBtn.click();
            }
          });
        }
      }

      window.renderListsHome = function () {
        renderListsHomeImpl().catch(function (error) { console.error(error); });
      };

      window.familyLists = {
        createListNamed: createListNamed,
        addItemsToNamedList: addItemsToNamedList,
        checkOffItemByText: checkOffItemByText
      };

      bindBankAndLists();
    })();
  </script>
  <script>
    (function () {
      var historyState = {
        kid: 'all',
        date: toDateString(new Date())
      };

      function runtime() {
        return window.phaseRuntime;

      function isChoresViewActive() {
        return appShellState.currentView === 'chores' || location.hash.replace('#', '') === 'chores';
      }

      function isBankViewActive() {
        return appShellState.currentView === 'bank' || location.hash.replace('#', '') === 'bank';

      function getSettingsHost() {
        return document.getElementById('headerSettingsPanel');
      }

      function shouldRenderSettings(viewName) {
        return appShellState.settingsPanelOpen && appShellState.currentView === viewName;
      }

      function selectedChoreKids() {
        var active = document.querySelector('#quickPoints [data-qp-kid].active');
        var kid = active ? active.dataset.qpKid : 'alex';
        return kid === 'both' ? ['alex', 'louisa'] : [kid];
      }

      function selectedKidLabel(kidIds, phase) {
        return kidIds.map(function (kidId) {
          return ((phase.currentConfig.kids || {})[kidId] || {}).name || kidId;
        }).join(' and ');
      }

      function choreAppliesToSelectedKids(chore, kidIds) {
        var allowedKids = Array.isArray(chore.kids) && chore.kids.length ? chore.kids : ['alex', 'louisa'];
        return kidIds.filter(function (kidId) {
          return allowedKids.indexOf(kidId) !== -1;
        });
      }

      function summarizeWeek(entries, phase, kidIds, week) {
        return kidIds.reduce(function (summary, kidId) {
          var kid = (phase.currentConfig.kids && phase.currentConfig.kids[kidId]) || { payTiers: [] };
          var points = entries.filter(function (entry) {
            return entry.kid === kidId && entry.week === week;
          }).reduce(function (sum, entry) {
            return sum + Number(entry.points || 0);
          }, 0);
          summary.points += points;
          summary.pay += phase.calculateWeeklyPay(kid.payTiers || [], points);
          return summary;
        }, { points: 0, pay: 0 });
      }

      function uniqueDoneKids(entries) {
        return Array.from(new Set(entries.map(function (entry) { return entry.kid; })));
      }

      function choreNote(phase, applicableKids, doneKids) {
        if (!applicableKids.length) return '';
        if (applicableKids.length === 1) {
          return selectedKidLabel(applicableKids, phase) + ' only';
        }
        if (doneKids.length && doneKids.length < applicableKids.length) {
          return 'Done for ' + selectedKidLabel(doneKids, phase);
        }
        return '';
      }

      async function renderChoreProgress() {
        var phase = runtime();
        var container = document.getElementById('choreProgress');
        if (!container) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<div class="chore-board"><p class="chore-list-note">Loading today\'s chores...</p></div>';
          return;
        }
        var chores = Object.entries(phase.currentConfig.chores || {}).sort(function (a, b) {
          return String((a[1] && a[1].label) || a[0]).localeCompare(String((b[1] && b[1].label) || b[0]));
        });
        var entries = await phase.getAllLogEntries();
        var now = new Date();
        var today = phase.toDateString(now);
        var week = phase.toIsoWeek(now);
        var kids = selectedChoreKids();
        var todayEntries = entries.filter(function (entry) {
          return entry.date === today && kids.indexOf(entry.kid) !== -1;
        });
        var summary = summarizeWeek(entries, phase, kids, week);
        var checklistMarkup = chores.map(function (entry) {
          var choreId = entry[0];
          var chore = entry[1] || {};
          var applicableKids = choreAppliesToSelectedKids(chore, kids);
          if (!applicableKids.length) {
            return '';
          }
          var matches = todayEntries.filter(function (logEntry) {
            return logEntry.choreId === choreId && applicableKids.indexOf(logEntry.kid) !== -1;
          });
          var doneKids = uniqueDoneKids(matches);
          var done = applicableKids.every(function (kidId) {
            return doneKids.indexOf(kidId) !== -1;
          });
          var note = choreNote(phase, applicableKids, doneKids);
          return '<button type="button" class="chore-item' + (done ? ' done' : '') + '" data-chore-item="' + escapeHtml(choreId) + '">' +
            '<span class="chore-check" aria-hidden="true">' + (done ? '&#10003;' : '') + '</span>' +
            '<span class="chore-meta"><span class="chore-label">' + escapeHtml(chore.label || choreId) + '</span>' +
            (note ? '<span class="chore-note">' + escapeHtml(note) + '</span>' : '') +
            '</span>' +
            '<span class="chore-pts">+' + Number(chore.points || 0) + '</span>' +
          '</button>';
        }).filter(Boolean).join('');
        container.innerHTML = '<div class="chore-board">' +
          '<div class="chore-board-header"><h2>Today\'s Chores</h2><p>' + escapeHtml(selectedKidLabel(kids, phase)) + '</p></div>' +
          (checklistMarkup ? '<div class="chore-list">' + checklistMarkup + '</div>' : '<p class="chore-list-note">No chores are configured for this selection. Use the header gear to add chores.</p>') +
          '<div class="chore-summary">' + summary.points + 'pts this week &middot; ' + phase.dollars(summary.pay) + ' earned</div>' +
        '</div>';
      }

      async function toggleChoreItem(choreId) {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded || !choreId) return;
        var chore = (phase.currentConfig.chores || {})[choreId];
        if (!chore) return;
        var kids = selectedChoreKids();
        var applicableKids = choreAppliesToSelectedKids(chore, kids);
        if (!applicableKids.length) return;
        var now = new Date();
        var today = phase.toDateString(now);
        var todayEntries = (await phase.getAllLogEntries()).filter(function (entry) {
          return entry.date === today && entry.choreId === choreId && applicableKids.indexOf(entry.kid) !== -1;
        });
        var doneKids = uniqueDoneKids(todayEntries);
        var isDone = applicableKids.every(function (kidId) {
          return doneKids.indexOf(kidId) !== -1;
        });
        if (isDone) {
          if (!window.confirm('Remove this entry?')) return;
          await Promise.all(todayEntries.map(function (entry) {
            return phase.database.ref('families/' + phase.familyId + '/log/' + entry.id).remove();
          }));
          phase.showToast('Removed ' + (chore.label || 'chore') + ' for ' + selectedKidLabel(applicableKids, phase) + '.');
        } else {
          var missingKids = applicableKids.filter(function (kidId) {
            return doneKids.indexOf(kidId) === -1;
          });
          await phase.saveLogEntries(missingKids.map(function (kidId) {
            return {
              kid: kidId,
              choreId: choreId,
              choreLabel: chore.label,
              points: Number(chore.points || 0),
              timestamp: Date.now(),
              date: today,
              week: phase.toIsoWeek(now),
              note: ''
            };
          }));
          phase.showToast('Logged ' + (chore.label || 'chore') + ' for ' + selectedKidLabel(missingKids, phase) + '.', {
            kid: missingKids.length === 1 ? missingKids[0] : null,
            onUndo: function () {
              phase.undoLastAction().catch(function (error) { console.error(error); });
            }
          });
        }
        renderChoreProgress().catch(function (error) { console.error(error); });
        if (shouldRenderSettings('bank')) {
          renderBankSettings().catch(function (error) { console.error(error); });
        }
      }

      function renderPayTierEditor(kidId, kid) {
        var phase = runtime();
        var tiers = kid.payTiers || [];
        var bonus = kid.weeklyBonus || { extraPts: 10, bonus: 2 };
        return '<article class="stat-card"><h3>' + (kid.name || kidId) + ' Pay Tiers</h3>' +
          '<div class="settings-list">' +
          tiers.map(function (tier, i) {
            return '<div class="settings-row"><span>Tier ' + (i + 1) + ' (' + tier.minPts + 'pts)</span>' +
              '<input type="number" min="1" value="' + tier.minPts + '" data-bank-setting="pay-tier-pts" data-kid="' + kidId + '" data-index="' + i + '">' +
              '<input type="number" step="0.5" value="' + tier.pay + '" data-bank-setting="pay-tier" data-kid="' + kidId + '" data-index="' + i + '">' +
              '</div>';
          }).join('') +
          '<div class="settings-row"><span>Bonus (' + bonus.extraPts + 'pts)</span>' +
          '<input type="number" min="1" value="' + bonus.extraPts + '" data-bank-setting="bonus-pts" data-kid="' + kidId + '">' +
          '<input type="number" step="0.5" value="' + bonus.bonus + '" data-bank-setting="bonus-pay" data-kid="' + kidId + '">' +
          '</div>' +
          '</div></article>';
      }

      async function renderBankSettings() {
        var phase = runtime();
        var panel = getSettingsHost();
        if (!panel) return;
        if (!shouldRenderSettings('bank')) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading bank settings...</p></article></div>';
          return;
        }
        var kids = phase.currentConfig.kids || {};
        var historyMarkup = await renderHistory();
        var txnMarkup = await renderTransactions();
        
        panel.innerHTML = '<div class="settings-grid">' +
          Object.entries(kids).map(function (entry) { return renderPayTierEditor(entry[0], entry[1]); }).join('') +
          '<article class="stat-card"><h3>History</h3>' +
          '<div class="settings-chip-row">' +
          ['all', 'alex', 'louisa'].map(function (k) {
            return '<button type="button" class="settings-chip ' + (historyState.kid === k ? 'active' : '') + '" data-history-kid="' + k + '">' + (k === 'all' ? 'All' : k.charAt(0).toUpperCase() + k.slice(1)) + '</button>';
          }).join('') +
          '</div>' +
          '<div class="settings-row"><span>Date</span><input type="date" value="' + (historyState.date || '') + '" data-bank-setting="history-date"></div>' +
          historyMarkup +
          '</article>' +
          '<article class="stat-card"><h3>Transactions</h3>' + txnMarkup + '</article>' +
          '</div>';
      }

      async function renderHistory() {
        var phase = runtime();
        var date = historyState.date || toDateString(new Date());
        var entries = await phase.getAllLogEntries();
        var filtered = entries.filter(function (e) {
          return e.date === date && (historyState.kid === 'all' || e.kid === historyState.kid);
        }).sort(function (a, b) { return b.timestamp - a.timestamp; });

        if (!filtered.length) return '<p class="settings-note">No history for this date.</p>';
        return '<div class="settings-list" style="margin-top:12px">' + filtered.map(function (e) {
          var label = e.choreLabel || 'Chore';
          var note = e.note ? ' (' + e.note + ')' : '';
          var deleteButton = '<button type="button" data-bank-action="delete-log" data-log-id="' + e.id + '" title="Delete">X</button>';
          return '<div class="settings-row"><span>' + (phase.currentConfig.kids[e.kid].name || e.kid) + ': ' + label + note + ' (' + e.points + 'pts)</span>' + deleteButton + '</div>';
        }).join('') + '</div>';
      }

      async function renderTransactions() {
        var phase = runtime();
        var txns = await phase.getAllPayments();
        var filtered = txns.sort(function (a, b) { return b.timestamp - a.timestamp; }).slice(0, 15);
        if (!filtered.length) return '<p class="settings-note">No recent transactions.</p>';
        return '<div class="settings-list">' + filtered.map(function (p) {
          var label = p.type === 'spend' ? 'Spent' : p.type === 'weekly' ? 'Weekly Pay' : p.type === 'credit' ? 'Credit' : 'Payment';
          var note = p.note ? ': ' + p.note : '';
          var deleteButton = '<button type="button" data-bank-action="delete-payment" data-payment-id="' + p.id + '" data-payment-kid="' + p.kid + '" data-payment-amount="' + p.amount + '" data-payment-type="' + p.type + '" title="Delete">X</button>';
          return '<div class="settings-row"><span>' + (phase.currentConfig.kids[p.kid].name || p.kid) + ': ' + label + note + ' (' + phase.dollars(p.amount) + ')<div class="settings-note">' + (p.date || '') + '</div></span>' + deleteButton + '</div>';
        }).join('') + '</div>';
      }

      function renderChoreSettings() {
        var phase = runtime();
        var panel = getSettingsHost();
        if (!panel) return;
        if (!shouldRenderSettings('chores')) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading chore settings...</p></article></div>';
          return;
        }
        var chores = phase.currentConfig.chores || {};
        panel.innerHTML = '<div class="settings-grid">' +
          '<article class="stat-card"><h3>Chore Settings</h3><div class="settings-list">' +
          Object.keys(chores).map(function (choreId) {
            var chore = chores[choreId] || {};
            return '<div class="settings-row"><span>' + String(chore.label || choreId).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span><input type="number" min="0" value="' + Number(chore.points || 0) + '" data-chore-setting="points" data-chore="' + choreId + '"><button type="button" data-chore-action="remove" data-chore="' + choreId + '">Remove</button></div>';
          }).join('') +
          '</div><button type="button" class="settings-btn" data-chore-action="add">Add chore</button></article>' +
        '</div>';
      }

      async function addChoreViaPrompt() {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) return;
        var label = window.prompt('New chore name?');
        if (!label) return;
        var points = Number(window.prompt('Points for ' + label + '?', '1'));
        if (!points || Number.isNaN(points)) return;
        var key = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || ('chore_' + Date.now());
        var chore = { label: label, points: points, kids: ['alex', 'louisa'], keywords: [label.toLowerCase()] };
        await phase.database.ref('families/' + phase.familyId + '/config/chores/' + key).set(chore);
        phase.currentConfig.chores[key] = chore;
        renderChoreSettings();
        renderChoreProgress().catch(function (error) { console.error(error); });
      }

      async function removeChore(choreId) {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded || !choreId) return;
        if (!window.confirm('Remove this chore?')) return;
        await phase.database.ref('families/' + phase.familyId + '/config/chores/' + choreId).remove();
        delete phase.currentConfig.chores[choreId];
        renderChoreSettings();
        renderChoreProgress().catch(function (error) { console.error(error); });
      }

      function stripWeeklyCard() {
        var cardContent = document.getElementById('cardContent');
        if (!cardContent) return;
        Array.prototype.slice.call(cardContent.querySelectorAll('.stat-card')).forEach(function (card) {
          var heading = card.querySelector('h3');
          if (heading && /^This Week/.test(heading.textContent || '')) {
            card.remove();
          }
        });
      }

      function patchBankRender() {
        if (!window.renderCardView || window.renderCardView.__phase4Patched) return;
        var original = window.renderCardView;
        var wrapped = async function (kidId) {
          var result = await original(kidId);
          stripWeeklyCard();
          return result;
        };
        wrapped.__phase4Patched = true;
        window.renderCardView = wrapped;
      }

      function patchRuntimeHooks() {
        var phase = runtime();
        if (!phase || phase.__phase4Patched) return;
        var originalSaveLogEntries = phase.saveLogEntries;
        phase.saveLogEntries = async function (entries) {
          var result = await originalSaveLogEntries(entries);
          renderChoreProgress().catch(function (error) { console.error(error); });
          if (appShellState.settingsPanelOpen) {
            renderHeaderSettingsPanel();
          }
          return result;
        };
        var originalUpdateChorePoints = phase.updateChorePoints;
        phase.updateChorePoints = async function (choreId, points) {
          var result = await originalUpdateChorePoints(choreId, points);
          renderChoreProgress().catch(function (error) { console.error(error); });
          if (appShellState.settingsPanelOpen) {
            renderHeaderSettingsPanel();
          }
          return result;
        };
        phase.__phase4Patched = true;
      }

      document.addEventListener('click', function (event) {
        var choreItem = event.target.closest('[data-chore-item]');
        if (choreItem) {
          toggleChoreItem(choreItem.dataset.choreItem).catch(function (error) {
            console.error(error);
            var phase = runtime();
            if (phase && typeof phase.showToast === 'function') {
              phase.showToast('Could not update that chore.', { type: 'error' });
            }
          });
          return;
        }
        var historyKidBtn = event.target.closest('[data-history-kid]');
        if (historyKidBtn) {
          historyState.kid = historyKidBtn.dataset.historyKid;
          renderBankSettings().catch(function (error) { console.error(error); });
          return;
        }

        var bankActionBtn = event.target.closest('[data-bank-action]');
        if (bankActionBtn) {
          var action = bankActionBtn.dataset.bankAction;
          var phase = runtime();
          if (action === 'delete-log') {
            var logId = bankActionBtn.dataset.logId;
            if (!phase || !logId) return;
            phase.database.ref('families/' + phase.familyId + '/log/' + logId).remove().then(function () {
              phase.showToast('Deleted log entry.');
              renderChoreProgress().catch(function (error) { console.error(error); });
              renderBankSettings().catch(function (error) { console.error(error); });
            }).catch(function (error) { console.error(error); phase.showToast('Failed to delete.', { type: 'error' }); });
            return;
          }
          if (action === 'delete-payment') {
            var paymentId = bankActionBtn.dataset.paymentId;
            var kidId = bankActionBtn.dataset.paymentKid;
            var amount = Number(bankActionBtn.dataset.paymentAmount || 0);
            var type = bankActionBtn.dataset.paymentType || 'payment';
            if (!phase || !paymentId) return;
            phase.database.ref('families/' + phase.familyId + '/payments/' + paymentId).get().then(function (snap) {
              var p = snap.exists() ? snap.val() : null;
              return phase.database.ref('families/' + phase.familyId + '/payments/' + paymentId).remove().then(function () { return p; });
            }).then(function (p) {
              var delta = p && typeof p.balanceDelta === 'number' ? Number(p.balanceDelta) : (type === 'credit' ? amount : -amount);
              return phase.adjustBalance(kidId, Number((-delta).toFixed(2)));
            }).then(function () {
              phase.showToast('Deleted transaction and reversed ' + phase.dollars(amount) + '.');
              renderBankSettings().catch(function (error) { console.error(error); });
            }).catch(function (error) { console.error(error); phase.showToast('Failed to delete transaction.', { type: 'error' }); });
            return;
          }
        }

        var actionBtn = event.target.closest('[data-chore-action]');
        if (!actionBtn) return;
        if (actionBtn.dataset.choreAction === 'add') {
          addChoreViaPrompt().catch(function (error) { console.error(error); });
          return;
        }
        if (actionBtn.dataset.choreAction === 'remove') {
          removeChore(actionBtn.dataset.chore).catch(function (error) { console.error(error); });
        }
      });

      document.addEventListener('change', function (event) {
        var target = event.target;
        var phase = runtime();
        if (!phase) return;

        if (target.dataset.choreSetting === 'points') {
          var points = Number(target.value);
          if (Number.isNaN(points)) return;
          phase.updateChorePoints(target.dataset.chore, points).catch(function (error) { console.error(error); });
          return;
        }

        if (target.dataset.bankSetting) {
          var setting = target.dataset.bankSetting;
          var kidId = target.dataset.kid;
          var idx = Number(target.dataset.index);
          var val = Number(target.value);

          if (setting === 'pay-tier-pts') {
            if (Number.isNaN(val) || val < 1) return;
            var tiers = (phase.currentConfig.kids[kidId].payTiers || []).slice();
            tiers[idx] = { ...tiers[idx], minPts: val };
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/payTiers').set(tiers).then(function () {
              phase.currentConfig.kids[kidId].payTiers = tiers;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'pay-tier') {
            if (Number.isNaN(val)) return;
            var tiers = (phase.currentConfig.kids[kidId].payTiers || []).slice();
            tiers[idx] = { ...tiers[idx], pay: val };
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/payTiers').set(tiers).then(function () {
              phase.currentConfig.kids[kidId].payTiers = tiers;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'bonus-pts') {
            if (Number.isNaN(val) || val < 1) return;
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/weeklyBonus/extraPts').set(val).then(function () {
              if (!phase.currentConfig.kids[kidId].weeklyBonus) phase.currentConfig.kids[kidId].weeklyBonus = {};
              phase.currentConfig.kids[kidId].weeklyBonus.extraPts = val;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'bonus-pay') {
            if (Number.isNaN(val)) return;
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/weeklyBonus/bonus').set(val).then(function () {
              if (!phase.currentConfig.kids[kidId].weeklyBonus) phase.currentConfig.kids[kidId].weeklyBonus = {};
              phase.currentConfig.kids[kidId].weeklyBonus.bonus = val;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'history-date') {
            historyState.date = target.value;
            renderBankSettings().catch(function (error) { console.error(error); });
          }
        }
      });

      document.getElementById('quickPoints').addEventListener('click', function () {
        setTimeout(function () {
          renderChoreProgress().catch(function (error) { console.error(error); });
        }, 150);
      });

      window.addEventListener('hashchange', function () {
        setTimeout(function () {
          if (isChoresViewActive()) {
            renderChoreProgress().catch(function (error) { console.error(error); });
          }
          if (isBankViewActive()) {
            stripWeeklyCard();
          }
          if (appShellState.settingsPanelOpen) {
            renderHeaderSettingsPanel();
          }
        }, 50);
      });

      async function refreshPhase4() {
        stripWeeklyCard();
        if (isChoresViewActive()) {
          await renderChoreProgress();
        }
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      }

      window.renderBankSettings = renderBankSettings;
      window.renderChoreSettings = renderChoreSettings;
      window.refreshPhase4 = refreshPhase4;

      var phase4Warmup = setInterval(function () {
        var phase = runtime();
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          return;
        }
        patchRuntimeHooks();
        patchBankRender();
        clearInterval(phase4Warmup);
        stripWeeklyCard();
        renderChoreProgress().catch(function (error) { console.error(error); });
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      }, 400);
    })();
  </script>
</body>
</html>
