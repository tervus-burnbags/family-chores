        }
        if (action === 'kid-invest') {
          var investKidId = button.dataset.kid;
          var kidName = (((phase.currentConfig.kids || {})[investKidId] || {}).name || investKidId);
          var investText = await window.appPrompt('How much is ' + kidName + ' investing?', 'Amount', '5', {
            inputType: 'number'
          });
          var investAmount = investText === null ? null : Number(investText);
          if (!investAmount || Number.isNaN(investAmount) || investAmount <= 0) return;
          phase.writePayment(investKidId, investAmount, 'invest', 'Investment').then(function () {
            phase.showToast('Investment recorded.', { kid: investKidId, onUndo: function () { phase.undoLastAction().catch(function (error) { console.error(error); }); } });
            return window.openCardForKid(investKidId);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Failed to record investment.', { type: 'error' });
          });
          return;
        }
        if (action === 'settle-debt') {
          phase.settleDebt([button.dataset.from, button.dataset.to]).then(function (debt) {
            if (!debt) return;
            phase.showToast('Debt settled for ' + phase.dollars(debt.amount) + '.', { kid: button.dataset.kid || button.dataset.from });
            return window.openCardForKid(button.dataset.kid || button.dataset.from);
          }).catch(function (error) {
            console.error(error);
            phase.showToast('Debt settlement failed.', { type: 'error' });
          });
        }
      }

      function normalizeListName(name) {
        return String(name || '').trim().toLowerCase();
      }

      function listsRef(phase) {
        if (!phase || !phase.database || !phase.familyId) return null;
        return phase.dbRef('lists');
      }

      function listTemplatesRef(phase) {
        if (!phase || !phase.database || !phase.familyId) return null;
        return phase.dbRef('listTemplates');
      }

      function listTypeMeta(type) {
        return LIST_TYPES[type] || LIST_TYPES.custom;
      }

      function listTintClass(type) {
        return 'list-tint-' + (LIST_TYPES[type] ? type : 'custom');
      }

      function categoryMeta(categoryId) {
        for (var i = 0; i < GROCERY_CATEGORIES.length; i += 1) {
          if (GROCERY_CATEGORIES[i].id === categoryId) return GROCERY_CATEGORIES[i];
        }
        return GROCERY_CATEGORIES[GROCERY_CATEGORIES.length - 1];
      }

      function normalizeTemplateData(snapshotValue) {
        var templates = snapshotValue || {};
        var result = {};
        Object.keys(templates).forEach(function (templateId) {
          var template = templates[templateId] || {};
          var type = template.type || templateId;
          result[type] = {
            id: templateId,
            type: type,
            name: String(template.name || (LIST_TEMPLATES[type] && LIST_TEMPLATES[type].name) || listTypeMeta(type).label),
            items: Array.isArray(template.items) ? template.items.map(function (item) {
              return {
                text: String((item && item.text) || '').trim(),
                category: String((item && item.category) || 'other')
              };
            }).filter(function (item) { return item.text; }) : []
          };
        });
        return result;
      }

      function normalizeListData(snapshotValue) {
        var lists = snapshotValue || {};
        var result = {};
        Object.keys(lists).forEach(function (listId) {
          var list = lists[listId] || {};
          var items = list.items || {};
          var type = list.type || inferListType(list.name);
          result[listId] = {
            id: listId,
            name: String(list.name || ''),
            type: type,
            createdAt: Number(list.createdAt || 0),
            items: Object.keys(items).map(function (itemId) {
              var item = items[itemId] || {};
              var text = String(item.text || '');
              return {
                id: itemId,
                text: text,
                done: Boolean(item.done),
                order: Number(item.order || 0),
                timestamp: Number(item.timestamp || 0),
                category: String(item.category || ((type === 'grocery' || type === 'costco') ? autoCategory(text) : 'other'))
              };
            }).sort(function (a, b) {
              if (a.done !== b.done) return a.done ? 1 : -1;
              if (Number(a.order || 0) !== Number(b.order || 0)) return Number(a.order || 0) - Number(b.order || 0);
              return Number(a.timestamp || 0) - Number(b.timestamp || 0);
            }),
            updatedAt: Math.max(Number(list.createdAt || 0), Object.keys(items).reduce(function (latest, itemId) {
              return Math.max(latest, Number(((items[itemId] || {}).timestamp) || 0));
            }, 0))
          };
        });
        return result;
      }

      function listArray() {
        return Object.keys(listState.listsById).map(function (listId) {
          return listState.listsById[listId];
        }).sort(function (a, b) {
          return Number(b.updatedAt || b.createdAt || 0) - Number(a.updatedAt || a.createdAt || 0);
        });
      }

      function subscribeLists() {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref || listState.familyId === phase.familyId) return;
        if (typeof listState.teardown === 'function') {
          listState.teardown();
        }
        listState.familyId = phase.familyId;
        var handler = function (snapshot) {
          listState.listsById = normalizeListData(snapshot.exists() ? snapshot.val() : {});
          if (location.hash.replace('#', '') === 'lists' && typeof window.renderListsHome === 'function') {
            window.renderListsHome();
          }
        };
        ref.on('value', handler);
        var templateRef = listTemplatesRef(phase);
        var templateHandler = function (snapshot) {
          listState.templatesByType = normalizeTemplateData(snapshot.exists() ? snapshot.val() : {});
          if (location.hash.replace('#', '') === 'lists' && typeof window.renderListsHome === 'function') {
            window.renderListsHome();
          }
        };
        if (templateRef) templateRef.on('value', templateHandler);
        listState.teardown = function () {
          ref.off('value', handler);
          if (templateRef) templateRef.off('value', templateHandler);
        };
      }

      function templateForType(type) {
        return listState.templatesByType[type] || LIST_TEMPLATES[type] || null;
      }

      function buildItemPayload(text, listType, category, offset) {
        var safeText = String(text || '').trim();
        if (!safeText) return null;
        return {
          text: safeText,
          done: false,
          order: Number(offset || 0),
          timestamp: Date.now() + Number(offset || 0),
          category: category || (listType === 'lakehouse' ? 'pack_to' : ((listType === 'grocery' || listType === 'costco') ? autoCategory(safeText) : 'other'))
        };
      }

      async function createListRecord(name, type, items) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var listName = String(name || '').trim();
        if (!listName) return null;
        var newRef = ref.push();
        var listType = type || inferListType(listName);
        var payload = { name: listName, type: listType, createdAt: Date.now(), items: {} };
        (items || []).forEach(function (itemValue, index) {
          var itemRef = ref.child(newRef.key + '/items').push();
          var payloadItem = typeof itemValue === 'string'
            ? buildItemPayload(itemValue, listType, null, index)
            : buildItemPayload(itemValue && itemValue.text, listType, itemValue && itemValue.category, index);
          if (payloadItem) payload.items[itemRef.key] = payloadItem;
        });
        await newRef.set(payload);
        return { id: newRef.key, name: listName, type: listType };
      }

      function findListByName(name) {
        var target = normalizeListName(name);
        var lists = listArray();
        for (var i = 0; i < lists.length; i += 1) {
          if (normalizeListName(lists[i].name) === target) return lists[i];
        }
        return null;
      }

      async function findListByNameFromDb(name) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var target = normalizeListName(name);
        var snapshot = await ref.get();
        if (!snapshot.exists()) return null;
        var found = null;
        snapshot.forEach(function (child) {
          if (found) return true;
          var value = child.val() || {};
          if (normalizeListName(value.name) === target) {
            found = { id: child.key, name: String(value.name || ''), type: value.type || inferListType(value.name || '') };
            return true;
          }
          return false;
        });
        return found;
      }

      async function createListNamed(name) {
        var existing = findListByName(name) || await findListByNameFromDb(name);
        if (existing) return existing;
        return createListRecord(name, inferListType(name), []);
      }

      async function addItemsToNamedList(listName, itemText) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var list = findListByName(listName) || await findListByNameFromDb(listName);
        if (!list) list = await createListNamed(listName);
        var parts = String(itemText || '').split(/,|\band\b/).map(function (part) { return part.trim(); }).filter(Boolean);
        for (var i = 0; i < parts.length; i += 1) {
          var itemPayload = buildItemPayload(parts[i], list.type || inferListType(list.name), null, i);
          if (itemPayload) await ref.child(list.id + '/items').push().set(itemPayload);
        }
        return { listId: list.id, count: parts.length, meta: { name: list.name || listName, type: list.type || inferListType(list.name || listName) } };
      }

      async function checkOffItemByText(listName, itemText) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return null;
        var list = findListByName(listName);
        if (!list) {
          var dbList = await findListByNameFromDb(listName);
          if (dbList) {
            var listSnap = await ref.child(dbList.id).get();
            list = normalizeListData(listSnap.exists() ? { temp: listSnap.val() } : {}).temp || null;
            if (list) list.id = dbList.id;
          }
        }
        if (!list) return { status: 'missing_list' };
        var target = normalizeListName(itemText);
        var item = (list.items || []).find(function (entry) { return !entry.done && normalizeListName(entry.text) === target; }) || (list.items || []).find(function (entry) { return !entry.done && normalizeListName(entry.text).indexOf(target) !== -1; });
        if (!item) return { status: 'missing_item', list: list };
        await ref.child(list.id + '/items/' + item.id + '/done').set(true);
        return { status: 'ok', list: list, item: item };
      }

      async function toggleListItem(listId, itemId) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var list = listState.listsById[listId];
        var item = list && (list.items || []).find(function (entry) { return entry.id === itemId; });
        if (!item) return;
        await ref.child(listId + '/items/' + itemId + '/done').set(!item.done);
      }

      function nextItemOrder(list, category) {
        var items = (list && list.items) || [];
        var relevant = items.filter(function (item) {
          return !category || item.category === category;
        });
        if (!relevant.length) return 1;
        return relevant.reduce(function (maxValue, item) {
          return Math.max(maxValue, Number(item.order || 0));
        }, 0) + 1;
      }

      async function deleteListItem(listId, itemId) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var list = listState.listsById[listId];
        var item = list && (list.items || []).find(function (entry) { return entry.id === itemId; });
        if (item && phase) {
          phase.lastUndoAction = {
            type: 'list_delete',
            listId: listId,
            itemId: itemId,
            itemData: {
              text: item.text,
              done: item.done,
              order: Number(item.order || 0),
              timestamp: Number(item.timestamp || Date.now()),
              category: item.category || 'other'
            }
          };
        }
        await ref.child(listId + '/items/' + itemId).remove();
      }

      async function reorderListItems(listId, orderedItemIds, category) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var updates = {};
        var ids = (orderedItemIds || []).filter(Boolean);
        if (!ids.length) return;
        ids.forEach(function (itemId, index) {
          updates[itemId + '/order'] = index + 1;
        });
        await ref.child(listId + '/items').update(updates);
      }

      async function addListItems(listId, value, explicitCategory) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref) return;
        var list = listState.listsById[listId];
        var listType = list ? list.type : 'custom';
        var parts = String(value || '').split(/,|\band\b/).map(function (part) { return part.trim(); }).filter(Boolean);
        var categoryOrders = {};
        for (var i = 0; i < parts.length; i += 1) {
          var category = null;
          if (explicitCategory && explicitCategory !== 'auto') {
            category = explicitCategory;
          } else if (listType === 'lakehouse') {
            category = 'pack_to';
          } else if (listType === 'grocery' || listType === 'costco') {
            category = autoCategory(parts[i]);
          } else {
            category = 'other';
          }
          if (typeof categoryOrders[category] !== 'number') {
            categoryOrders[category] = nextItemOrder(list, category);
          }
          var payload = buildItemPayload(parts[i], listType, category, categoryOrders[category]);
          categoryOrders[category] += 1;
          if (payload) await ref.child(listId + '/items').push().set(payload);
        }
      }

      function findExistingListByType(type) {
        var lists = listArray();
        for (var i = 0; i < lists.length; i += 1) {
          if (lists[i].type === type) return lists[i];
        }
        return null;
      }

      async function openOrCreateTypedList(type) {
        var existing = (type === 'costco' || type === 'lakehouse') ? findExistingListByType(type) : null;
        if (existing) {
          listState.currentListId = existing.id;
          listState.settingsOpen = false;
          return existing;
        }
        var template = templateForType(type);
        var name = template ? template.name : listTypeMeta(type).label;
        if (type === 'grocery') {
          name = await window.appPrompt('Store name?', 'e.g. Harris Teeter', 'Harris Teeter') || '';
        } else if (type === 'packing') {
          name = await window.appPrompt('Trip name?', 'e.g. Spring Break 2026', 'Spring Break 2026') || '';
        } else if (type === 'todo') {
          name = await window.appPrompt('To-do list name?', 'e.g. Family To-Do', 'Family To-Do') || '';
        } else if (type === 'custom') {
          name = await window.appPrompt('List name?', 'e.g. New List', 'New List') || '';
        } else if (type === 'costco') {
          name = 'Costco';
        }
        name = String(name || '').trim();
        if (!name) return null;
        var created = await createListRecord(name, type, template ? template.items : []);
        if (created) {
          listState.currentListId = created.id;
          listState.settingsOpen = false;
        }
        return created;
      }

      function renderListQuickTiles() {
        var order = ['grocery', 'costco', 'lakehouse', 'packing', 'todo', 'custom'];
        return '<div class="list-type-grid">' + order.map(function (type) {
          var meta = listTypeMeta(type);
          return '<button type="button" class="list-type-tile ' + listTintClass(type) + '" data-list-type-open="' + type + '">' +
            '<span class="list-type-icon" style="color:' + escapeHtml(meta.color) + ';">' + meta.icon + '</span>' +
            '<span class="list-type-label">' + escapeHtml(meta.label) + '</span>' +
          '</button>';
        }).join('') + '</div>';
      }

      function visibleLists() {
        return listArray().filter(function (list) {
          return (list.items || []).length > 0;
        });
      }

      function renderListCards() {
        var lists = visibleLists();
        if (!lists.length) {
          return '';
        }
        return '<div class="list-active-grid">' + lists.map(function (list) {
          var meta = listTypeMeta(list.type);
          var doneCount = (list.items || []).filter(function (item) { return item.done; }).length;
          var total = (list.items || []).length;
          return '<button type="button" class="list-active-card" data-list-open="' + list.id + '">' +
            '<span class="list-card-badge" style="background:' + escapeHtml(meta.color) + ';">' + meta.icon + '</span>' +
            '<span class="list-card-copy"><span class="list-card-title">' + escapeHtml(list.name) + '</span><span class="list-card-meta">' + escapeHtml(meta.label) + '</span></span>' +
            '<span class="list-card-count">' + (total - doneCount) + '/' + total + '</span>' +
          '</button>';
        }).join('') + '</div>';
      }

      function listDragHandleSvg() {
        return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 7h.01M9 12h.01M9 17h.01M15 7h.01M15 12h.01M15 17h.01" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
      }

      function renderListItem(list, item) {
        return '<div class="swipe-wrapper list-item-wrapper" data-swipe-type="list-item" data-list-id="' + list.id + '" data-item-id="' + item.id + '" data-item-category="' + escapeHtml(item.category || 'other') + '">' +
          '<div class="swipe-action list-swipe-action right">' + (item.done ? 'Undo' : 'Done') + '</div>' +
          '<div class="swipe-action list-swipe-action left">Delete</div>' +
          '<div class="list-item swipe-surface' + (item.done ? ' done' : '') + '" data-swipe-surface="true">' +
          '<div class="list-item-text">' + escapeHtml(item.text) + '</div>' +
          '<button type="button" class="list-drag-handle" data-list-drag-handle="' + item.id + '" aria-label="Reorder item">' + listDragHandleSvg() + '</button>' +
        '</div></div>';
      }

      function renderGroupedItems(list) {
        var categories = list.type === 'lakehouse' ? LAKEHOUSE_CATEGORIES : GROCERY_CATEGORIES;
        var emptyCopy = list.type === 'lakehouse'
          ? 'Add an item and it will land in the lake house packing section.'
          : 'Add an item and it will snap into the right aisle.';
        var hideEmpty = list.type === 'grocery' || list.type === 'costco';
        var markup = categories.map(function (category) {
          var items = (list.items || []).filter(function (item) {
            return (item.category || 'other') === category.id;
          });
          if (!items.length && hideEmpty) return '';
          return '<section class="list-group"><div class="list-group-head"><span class="list-group-icon">' + category.icon + '</span><h4 class="list-group-title">' + escapeHtml(category.label) + '</h4></div><div class="list-items">' +
            (items.length ? items.map(function (item) { return renderListItem(list, item); }).join('') : '<div class="list-group-empty">No items yet</div>') +
          '</div></section>';
        }).filter(Boolean).join('');
        return markup || '<div class="list-empty"><div class="list-empty-title">Nothing here yet.</div><div class="list-empty-copy">' + emptyCopy + '</div></div>';
      }

      function renderFlatItems(list) {
        if (!(list.items || []).length) {
          return '<div class="list-empty"><div class="list-empty-title">Nothing here yet.</div><div class="list-empty-copy">Add an item and it will sync for the whole family.</div></div>';
        }
        return '<div class="list-flat"><div class="list-items">' + (list.items || []).map(function (item) {
          return renderListItem(list, item);
        }).join('') + '</div></div>';
      }

      function renderListDetail(list) {
        var meta = listTypeMeta(list.type);
        var doneCount = (list.items || []).filter(function (item) { return item.done; }).length;
        var total = (list.items || []).length;
        var isGrouped = list.type === 'grocery' || list.type === 'costco' || list.type === 'lakehouse';
        var categoryOptions = '';
        if (isGrouped) {
          var categories = list.type === 'lakehouse' ? LAKEHOUSE_CATEGORIES : GROCERY_CATEGORIES;
          if (list.type === 'grocery' || list.type === 'costco') {
            categoryOptions = '<option value="auto">Auto</option>';
          }
          categoryOptions += categories.map(function (category) {
            return '<option value="' + escapeHtml(category.id) + '">' + escapeHtml(category.label) + '</option>';
          }).join('');
        }
        var itemsMarkup = isGrouped ? renderGroupedItems(list) : renderFlatItems(list);
        return '<div class="list-detail-shell"><section class="list-detail-card">' +
          '<div class="list-detail-head"><div class="list-detail-accent" style="background:' + escapeHtml(meta.color) + ';"></div><div class="list-detail-title-row"><span class="list-detail-icon" style="background:' + escapeHtml(meta.color) + ';">' + meta.icon + '</span><div class="list-detail-copy"><h3 class="list-detail-title">' + escapeHtml(list.name) + '</h3><p class="list-detail-meta">' + doneCount + '/' + total + ' done · ' + escapeHtml(meta.label) + '</p></div></div>' +
          '</div>' +
          '<div class="list-add-row"><input type="text" class="list-add-input" id="listItemInput" placeholder="Add item..." autocomplete="off">' + (isGrouped ? '<select class="list-add-category" id="listItemCategory">' + categoryOptions + '</select>' : '') + '<button type="button" class="list-add-btn" data-list-action="add-item" style="background:' + escapeHtml(meta.color) + ';color:#fff;">Add</button></div>' +
          itemsMarkup +
          ((list.items || []).length ? '<div class="list-swipe-hint">Swipe right to check off, left to delete, drag the handle to reorder.</div>' : '<div class="list-swipe-hint">Add something to get this list moving.</div>') +
        '</section></div>';
      }

      async function renderListsHomeImpl() {
        ensureBankListStyles();
        bindBankAndLists();
        var phase = runtime();
        var container = document.getElementById('listsContent');
        if (!container) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<div class="lists-shell"><div class="list-empty"><div class="list-empty-title">Connect to a family first.</div><div class="list-empty-copy">Lists sync through the family code.</div></div></div>';
          return;
        }
        subscribeLists();
        var current = listState.currentListId ? listState.listsById[listState.currentListId] : null;
        if (listState.currentListId && !current) {
          listState.currentListId = null;
          listState.settingsOpen = false;
        }
        current = listState.currentListId ? listState.listsById[listState.currentListId] : null;
        var activeListsMarkup = renderListCards();
        container.innerHTML = current
          ? renderListDetail(current)
          : '<div class="lists-shell"><section class="lists-hero"><div class="lists-hero-head"><h2>Smart Family Lists</h2><p>Groceries by aisle, running Costco lists, lake house prep, trips, and everything else family life throws at you.</p></div>' + renderListQuickTiles() + '</section>' +
            (activeListsMarkup ? '<section class="lists-panel"><div class="lists-section-head"><div><h3>Your Lists</h3><p>Open a current list or start a fresh run.</p></div></div>' + activeListsMarkup + '</section>' : '') +
          '</div>';
        bindSwipeHandlers(container);
        if (appShellState.currentView === 'lists' && appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      }

      var gestureState = {
        mode: null,
        startX: 0,
        startY: 0,
        currentX: 0,
        currentY: 0,
        wrapperEl: null,
        itemEl: null,
        itemId: null,
        listId: null,
        category: null,
        activeTouchId: null,
        overItemId: null
      };

      function bindSwipeHandlers(container) {
        if (!container) return;
        var phase = runtime();
        var signal = phase && typeof phase.getViewSignal === 'function' ? phase.getViewSignal() : null;
        if (container.dataset.swipeBound === 'true' && listState.swipeSignal === signal) return;
        listState.swipeSignal = signal;
        container.dataset.swipeBound = 'true';
        function resetGestureState() {
          gestureState.mode = null;
          gestureState.wrapperEl = null;
          gestureState.itemEl = null;
          gestureState.itemId = null;
          gestureState.listId = null;
          gestureState.category = null;
          gestureState.activeTouchId = null;
          gestureState.overItemId = null;
        }

        function finishSwipe(itemEl) {
          if (!itemEl) return;
          itemEl.style.transform = '';
          itemEl.style.opacity = '';
          itemEl.classList.remove('swiping');
          itemEl.classList.remove('dragging');
          if (gestureState.wrapperEl) {
            gestureState.wrapperEl.classList.remove('dragging-active');
            gestureState.wrapperEl.classList.remove('swiping-left');
            gestureState.wrapperEl.classList.remove('swiping-right');
          }
          resetGestureState();
        }

        function runUndoToast(message) {
          var activePhase = runtime();
          if (activePhase && typeof activePhase.showToast === 'function' && typeof activePhase.undoLastAction === 'function') {
            activePhase.showToast(message, {
              onUndo: function () {
                activePhase.undoLastAction().catch(function (error) { console.error(error); });
              }
            });
          }
        }

        function handleSwipeAction(wrapper, direction) {
          var activePhase = runtime();
          var swipeType = wrapper && wrapper.dataset ? wrapper.dataset.swipeType : '';
          if (!activePhase || !wrapper || !swipeType) return Promise.resolve(false);
          if (swipeType === 'list-item') {
            if (direction === 'left') {
              return deleteListItem(wrapper.dataset.listId, wrapper.dataset.itemId).then(function () {
                runUndoToast('Deleted item.');
                return true;
              });
            }
            if (direction === 'right') {
              return toggleListItem(wrapper.dataset.listId, wrapper.dataset.itemId).then(function () { return true; });
            }
            return Promise.resolve(false);
          }
          if (direction !== 'left') {
            return Promise.resolve(false);
          }
          if (swipeType === 'chore-log' && typeof activePhase.deleteLogEntry === 'function') {
            return activePhase.deleteLogEntry(wrapper.dataset.logId).then(function (deleted) {
              if (deleted) runUndoToast('Deleted entry.');
              return deleted;
            });
          }
          if (swipeType === 'payment' && typeof activePhase.deletePaymentEntry === 'function') {
            return activePhase.deletePaymentEntry(wrapper.dataset.paymentId, wrapper.dataset.paymentKid).then(function (deleted) {
              if (deleted) runUndoToast('Deleted transaction.');
              return deleted;
            });
          }
          return Promise.resolve(false);
        }

        container.addEventListener('touchstart', function (e) {
          var touch = e.touches[0];
          if (!touch) return;
          var handle = e.target.closest('[data-list-drag-handle]');
          var wrapper = e.target.closest('.swipe-wrapper');
          if (!wrapper) return;
          var swipeType = wrapper.dataset.swipeType || '';
          var canDrag = Boolean(handle) && swipeType === 'list-item';
          var item = wrapper.querySelector('[data-swipe-surface]') || wrapper.querySelector('.list-item');
          gestureState.startX = touch.clientX;
          gestureState.startY = touch.clientY;
          gestureState.currentX = touch.clientX;
          gestureState.currentY = touch.clientY;
          gestureState.wrapperEl = wrapper;
          gestureState.itemEl = item;
          gestureState.itemId = wrapper.dataset.itemId;
          gestureState.listId = wrapper.dataset.listId;
          gestureState.category = wrapper.dataset.itemCategory || 'other';
          gestureState.activeTouchId = touch.identifier;
          gestureState.overItemId = gestureState.itemId;
          gestureState.mode = canDrag ? 'drag' : 'swipe';
          if (!item) return;
          wrapper.classList.toggle('dragging-active', canDrag);
          wrapper.classList.remove('swiping-left');
          wrapper.classList.remove('swiping-right');
          item.classList.add(canDrag ? 'dragging' : 'swiping');
        }, signal ? { passive: true, signal: signal } : { passive: true });

        container.addEventListener('touchmove', function (e) {
          if (!gestureState.itemEl) return;
          var touch = null;
          for (var i = 0; i < e.touches.length; i += 1) {
            if (e.touches[i].identifier === gestureState.activeTouchId) {
              touch = e.touches[i];
              break;
            }
          }
          if (!touch) return;
          gestureState.currentX = touch.clientX;
          gestureState.currentY = touch.clientY;
          if (gestureState.mode === 'drag') {
            e.preventDefault();
            var diffY = gestureState.currentY - gestureState.startY;
            gestureState.itemEl.style.transform = 'translateY(' + diffY + 'px) scale(1.01)';
            var overEl = document.elementFromPoint(gestureState.currentX, gestureState.currentY);
            var overWrapper = overEl && overEl.closest('.swipe-wrapper');
            var list = listState.listsById[gestureState.listId];
            if (!list || !overWrapper || overWrapper.dataset.listId !== gestureState.listId) return;
            var isGrouped = list.type === 'grocery' || list.type === 'costco' || list.type === 'lakehouse';
            if (isGrouped && overWrapper.dataset.itemCategory !== gestureState.category) return;
            if (gestureState.wrapperEl && gestureState.wrapperEl !== overWrapper) {
              var oldGhosts = container.querySelectorAll('.list-item.drag-ghost');
              Array.prototype.forEach.call(oldGhosts, function (node) { node.classList.remove('drag-ghost'); });
              var overItem = overWrapper.querySelector('.list-item');
              if (overItem) overItem.classList.add('drag-ghost');
              gestureState.overItemId = overWrapper.dataset.itemId;
            }
            return;
          }
          var diff = gestureState.currentX - gestureState.startX;
          if (Math.abs(diff) > Math.abs(gestureState.currentY - gestureState.startY)) {
            if (gestureState.wrapperEl) {
              if (diff < -10) {
                gestureState.wrapperEl.classList.add('swiping-left');
                gestureState.wrapperEl.classList.remove('swiping-right');
              } else if (diff > 10) {
                gestureState.wrapperEl.classList.add('swiping-right');
                gestureState.wrapperEl.classList.remove('swiping-left');
              } else {
                gestureState.wrapperEl.classList.remove('swiping-left');
                gestureState.wrapperEl.classList.remove('swiping-right');
              }
            }
            gestureState.itemEl.style.transform = 'translateX(' + Math.max(-120, Math.min(120, diff)) + 'px)';
            gestureState.itemEl.style.opacity = String(Math.max(0.35, 1 - (Math.abs(diff) / 260)));
          }
        }, signal ? { passive: false, signal: signal } : { passive: false });

        container.addEventListener('touchend', function () {
          if (!gestureState.itemEl) return;
          var itemEl = gestureState.itemEl;
          var listId = gestureState.listId;
          var itemId = gestureState.itemId;
          var actionWrapper = gestureState.wrapperEl;
          var diffX = gestureState.currentX - gestureState.startX;
          var mode = gestureState.mode;
          if (mode === 'drag') {
            var ghostNodes = container.querySelectorAll('.list-item.drag-ghost');
            Array.prototype.forEach.call(ghostNodes, function (node) { node.classList.remove('drag-ghost'); });
            itemEl.style.transform = '';
            itemEl.style.opacity = '';
            if (gestureState.overItemId && gestureState.overItemId !== itemId) {
              var list = listState.listsById[listId];
              if (list) {
                var items = (list.items || []).filter(function (entry) {
                  if (list.type === 'grocery' || list.type === 'costco' || list.type === 'lakehouse') {
                    return entry.category === gestureState.category;
                  }
                  return true;
                }).slice();
                var orderedIds = items.map(function (entry) { return entry.id; });
                var fromIndex = orderedIds.indexOf(itemId);
                var toIndex = orderedIds.indexOf(gestureState.overItemId);
                if (fromIndex !== -1 && toIndex !== -1) {
                  orderedIds.splice(toIndex, 0, orderedIds.splice(fromIndex, 1)[0]);
                  reorderListItems(listId, orderedIds, (list.type === 'grocery' || list.type === 'costco' || list.type === 'lakehouse') ? gestureState.category : null).catch(function (error) { console.error(error); });
                }
              }
            }
          } else if (diffX <= -80) {
            itemEl.style.transform = 'translateX(-100%)';
            itemEl.style.opacity = '0';
            setTimeout(function () {
              handleSwipeAction(actionWrapper || itemEl.closest('.swipe-wrapper'), 'left').catch(function (error) { console.error(error); });
            }, 160);
          } else if (diffX >= 80) {
            if ((actionWrapper && actionWrapper.dataset.swipeType) === 'list-item') {
              itemEl.style.transform = 'translateX(100%)';
              itemEl.style.opacity = '0';
              setTimeout(function () {
                handleSwipeAction(actionWrapper || itemEl.closest('.swipe-wrapper'), 'right').catch(function (error) { console.error(error); });
              }, 160);
            } else {
              itemEl.style.transform = '';
              itemEl.style.opacity = '';
            }
          } else {
            itemEl.style.transform = '';
            itemEl.style.opacity = '';
          }
          finishSwipe(itemEl);
        }, signal ? { signal: signal } : undefined);

        container.addEventListener('touchcancel', function () {
          if (!gestureState.itemEl) return;
          var itemEl = gestureState.itemEl;
          var ghostNodes = container.querySelectorAll('.list-item.drag-ghost');
          Array.prototype.forEach.call(ghostNodes, function (node) { node.classList.remove('drag-ghost'); });
          finishSwipe(itemEl);
        }, signal ? { signal: signal } : undefined);
      }

      window.bindSwipeHandlers = bindSwipeHandlers;

      async function saveTemplateForList(list) {
        var phase = runtime();
        var ref = listTemplatesRef(phase);
        if (!ref || !list || !LIST_TEMPLATES[list.type]) return;
        var items = (list.items || []).filter(function (item) { return !item.done; }).map(function (item) {
          return { text: item.text, category: item.category || 'other' };
        });
        await ref.child(list.type).set({ name: list.name, type: list.type, items: items });
        return items.length;
      }

      async function resetTemplateForType(type) {
        var phase = runtime();
        var ref = listTemplatesRef(phase);
        var listRef = listsRef(phase);
        if (!ref || !LIST_TEMPLATES[type]) return 0;
        await ref.child(type).remove();
        var currentListId = listState.currentListId;
        if (!currentListId || !listRef) return 0;
        var templateItems = (LIST_TEMPLATES[type].items || []).slice();
        var updates = {};
        for (var i = 0; i < templateItems.length; i += 1) {
          var pushKey = listRef.child(currentListId + '/items').push().key;
          var templateItem = templateItems[i] || {};
          updates[pushKey] = {
            text: String(templateItem.text || '').trim(),
            done: false,
            order: i + 1,
            timestamp: Date.now() + i,
            category: templateItem.category || (type === 'lakehouse' ? 'pack_to' : ((type === 'grocery' || type === 'costco') ? autoCategory(templateItem.text || '') : 'other'))
          };
        }
        await listRef.child(currentListId + '/items').set(updates);
        return templateItems.length;
      }

      async function deleteEntireList(listId) {
        var phase = runtime();
        var ref = listsRef(phase);
        if (!ref || !listId) return;
        await ref.child(listId).remove();
        listState.currentListId = null;
        listState.settingsOpen = false;
        renderListsHomeImpl().catch(function (error) { console.error(error); });
      }

      function bindBankAndLists() {
        var phase = runtime();
        var signal = phase && typeof phase.getViewSignal === 'function' ? phase.getViewSignal() : null;
        if (listState.listenerSignal === signal) return;
        listState.listenerSignal = signal;
        var cardContent = document.getElementById('cardContent');
        if (cardContent) {
          cardContent.addEventListener('click', function (event) {
            var button = event.target.closest('[data-card-action]');
            if (button) handleCardAction(button);
          }, signal ? { signal: signal } : undefined);
        }
        var listsContent = document.getElementById('listsContent');
        if (listsContent) {
          listsContent.addEventListener('click', async function (event) {
            var target = event.target.closest('[data-list-open],[data-list-type-open],[data-list-action]');
            if (!target) return;
            if (target.dataset.listOpen) {
              listState.currentListId = target.dataset.listOpen;
              listState.settingsOpen = false;
              renderListsHomeImpl().catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listTypeOpen) {
              openOrCreateTypedList(target.dataset.listTypeOpen).then(function () {
                return renderListsHomeImpl();
              }).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'delete-list' && listState.currentListId) {
              var currentListForDelete = listState.listsById[listState.currentListId];
              if (!currentListForDelete) return;
              if (!await window.appConfirm('Delete list?', 'Delete ' + currentListForDelete.name + '? This can\'t be undone.', true)) return;
              deleteEntireList(listState.currentListId).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'save-template' && listState.currentListId) {
              var currentListForSave = listState.listsById[listState.currentListId];
              saveTemplateForList(currentListForSave).then(function () {
                var phase = runtime();
                if (phase && currentListForSave) {
                  phase.showToast('Saved as template for ' + listTypeMeta(currentListForSave.type).label + '.');
                }
              }).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'reset-template' && listState.currentListId) {
              var currentList = listState.listsById[listState.currentListId];
              if (!currentList) return;
              if (!await window.appConfirm('Reset to default template?', 'This will replace all items in this list with the default template. Any custom items will be lost.', true)) return;
              resetTemplateForType(currentList.type).then(function (count) {
                var phase = runtime();
                if (phase) phase.showToast('Template reset - ' + count + ' items loaded.');
              }).catch(function (error) { console.error(error); });
              return;
            }
            if (target.dataset.listAction === 'add-item' && listState.currentListId) {
              var itemInput = document.getElementById('listItemInput');
              var categoryInput = document.getElementById('listItemCategory');
              var value = itemInput ? String(itemInput.value || '').trim() : '';
              if (!value) return;
              addListItems(listState.currentListId, value, categoryInput ? categoryInput.value : null).then(function () {
                if (itemInput) itemInput.value = '';
                if (categoryInput && (categoryInput.value === 'auto' || !categoryInput.value)) categoryInput.value = 'auto';
              }).catch(function (error) { console.error(error); });
            }
          }, signal ? { signal: signal } : undefined);

          listsContent.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && event.target.id === 'listItemInput') {
              event.preventDefault();
              var addBtn = listsContent.querySelector('[data-list-action="add-item"]');
              if (addBtn) addBtn.click();
            }
          }, signal ? { signal: signal } : undefined);
        }
      }

      window.renderListsHome = function () {
        renderListsHomeImpl().catch(function (error) { console.error(error); });
      };

      window.returnToListsHome = function () {
        if (!listState.currentListId) return false;
        listState.currentListId = null;
        listState.settingsOpen = false;
        renderListsHomeImpl().catch(function (error) { console.error(error); });
        return true;
      };

      window.familyLists = {
        createListNamed: createListNamed,
        addItemsToNamedList: addItemsToNamedList,
        checkOffItemByText: checkOffItemByText,
        getCurrentListContext: function () {
          var current = listState.currentListId ? listState.listsById[listState.currentListId] : null;
          return current ? { id: current.id, name: current.name, type: current.type } : null;
        }
      };

      window.renderListSettingsInHeader = function renderListSettingsInHeader() {
        var panel = document.getElementById('headerSettingsPanel');
        if (!panel) return;
        var phase = runtime();
        if (!listState.currentListId || !phase) {
          panel.innerHTML = '<div class="settings-empty"><strong>Select a list</strong><p class="family-panel-note">Tap a list to see its settings here.</p></div>';
          return;
        }
        var list = listState.listsById[listState.currentListId];
        if (!list) {
          panel.innerHTML = '<div class="settings-empty"><strong>List not found.</strong></div>';
          return;
        }
        var listType = list.type || 'custom';
        var isTemplateType = ['grocery', 'costco', 'lakehouse', 'packing'].indexOf(listType) !== -1;
        panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><h3 class="hub-section-head">' + escapeHtml(list.name) + ' Settings</h3>' +
          (isTemplateType ? '<div class="settings-list"><button type="button" class="btn btn-secondary" data-list-action="save-template" style="width:100%;margin-bottom:8px;">Save as template</button><button type="button" class="btn btn-secondary" data-list-action="reset-template" style="width:100%;margin-bottom:8px;">Reset template</button></div>' : '') +
          '<button type="button" class="btn btn-danger" data-list-action="delete-list" style="width:100%;">Delete list</button></article></div>';
      };

    })();
  </script>
  <script>
    (function () {
      var historyState = {
        kid: 'all',
        date: runtime().toDateString(new Date())
      };
      var choreSelectedKid = null;
      var weeklyPayChecked = false;

      function isChoresViewActive() {
        return appShellState.currentView === 'chores' || location.hash.replace('#', '') === 'chores';
      }

      function isBankViewActive() {
        return appShellState.currentView === 'bank' || location.hash.replace('#', '') === 'bank';
      }

      function getSettingsHost() {
        return document.getElementById('headerSettingsPanel');
      }

      function shouldRenderSettings(viewName) {
        return appShellState.settingsPanelOpen && appShellState.currentView === viewName;
      }

      function selectedChoreKids() {
        return [choreSelectedKid];
      }
      window.getSelectedChoreKids = selectedChoreKids;

      function selectedKidLabel(kidIds, phase) {
        return kidIds.map(function (kidId) {
          return ((phase.currentConfig.kids || {})[kidId] || {}).name || kidId;
        }).join(' and ');
      }
      var choreCooldowns = {};

      function choreAppliesToSelectedKids(chore, kidIds) {
        var allowedKids = Array.isArray(chore.kids) && chore.kids.length ? chore.kids : ['alex', 'louisa'];
        return kidIds.filter(function (kidId) {
          return allowedKids.indexOf(kidId) !== -1;
        });
      }

      function summarizeWeek(entries, phase, kidIds, week) {
        return kidIds.reduce(function (summary, kidId) {
          var kid = (phase.currentConfig.kids && phase.currentConfig.kids[kidId]) || { payTiers: [] };
          var points = entries.filter(function (entry) {
            return entry.kid === kidId && entry.week === week;
          }).reduce(function (sum, entry) {
            return sum + Number(entry.points || 0);
          }, 0);
          summary.points += points;
          if (typeof window.getWeeklyPayBreakdown === 'function') {
            summary.pay += window.getWeeklyPayBreakdown(kid, points, phase.calculateWeeklyPay).totalPay;
          } else {
            summary.pay += phase.calculateWeeklyPay(kid.payTiers || [], points);
          }
          return summary;
        }, { points: 0, pay: 0 });
      }

      function renderTierBar(info) {
        var tiers = info.tiers || [];
        var goalPts = Number(info.goalPts || 0);
        var points = Number(info.points || 0);

        if (!tiers.length || goalPts <= 0) {
          return '<div class="chore-tier-bar"><div class="chore-bar-track"><div class="chore-bar-fill ' + info.kidId + '" style="width:' + info.progressPct + '%;"></div></div></div>';
        }

        var maxPts = Math.max(goalPts, points, 1);
        var fillPct = Math.min(100, Math.round((points / maxPts) * 100));
        var markers = tiers.map(function (tier) {
          var pct = Math.round((Number(tier.minPts || 0) / maxPts) * 100);
          return '<div class="chore-tier-mark" style="left:' + pct + '%"></div>';
        }).join('');

        var labels = '';
        if (tiers.length >= 2) {
          var first = tiers[0];
          var last = tiers[tiers.length - 1];
          var firstPct = Math.round((Number(first.minPts || 0) / maxPts) * 100);
          var lastPct = Math.round((Number(last.minPts || 0) / maxPts) * 100);
          labels = '<div class="chore-tier-labels">' +
            '<span style="left:' + firstPct + '%">$' + Number(first.pay || 0) + '</span>' +
            '<span style="left:' + lastPct + '%">$' + Number(last.pay || 0) + '</span>' +
          '</div>';
        } else if (tiers.length === 1) {
          var only = tiers[0];
          var onlyPct = Math.round((Number(only.minPts || 0) / maxPts) * 100);
          labels = '<div class="chore-tier-labels"><span style="left:' + onlyPct + '%">$' + Number(only.pay || 0) + '</span></div>';
        }

        var bonusZone = '';
        if (points > goalPts && info.payInfo && info.payInfo.bonus > 0) {
          bonusZone = '<div class="chore-bonus-zone" style="left:' + Math.round((goalPts / maxPts) * 100) + '%;width:' + Math.round(((points - goalPts) / maxPts) * 100) + '%"></div>';
        }

        return '<div class="chore-tier-bar">' +
          '<div class="chore-bar-track">' +
            '<div class="chore-bar-fill ' + info.kidId + '" style="width:' + fillPct + '%;"></div>' +
            bonusZone +
            markers +
          '</div>' +
          labels +
        '</div>';
      }

      function renderKidCards(phase, entries, week) {
        var kidIds = Object.keys(phase.currentConfig.kids || {});
        var selectionLabel = (((phase.currentConfig.kids || {})[choreSelectedKid] || {}).name || choreSelectedKid);
        return '<div class="chore-kid-selector"><div class="chore-kid-selector-label">Logging for <strong>' + escapeHtml(selectionLabel) + '</strong></div><div class="chore-kid-cards">' +
          kidIds.map(function (kidId) {
            var info = getWeeklyProgressInfo(phase, kidId, entries, week);
            var isSelected = choreSelectedKid === kidId;
            var isDimmed = choreSelectedKid !== kidId;
            var cardClass = 'chore-kid-card ' + kidId + (isSelected ? ' selected' : '') + (isDimmed ? ' dimmed' : '');
            var barMarkup = renderTierBar(info);
            return '<button type="button" class="' + cardClass + '" data-chore-kid="' + kidId + '">' +
              '<div class="chore-kid-card-name">' + escapeHtml(info.kid.name || info.kidId) + '</div>' +
              '<div class="chore-kid-card-pts">' + escapeHtml(info.pointsLabel) + '</div>' +
              '<div class="chore-kid-card-pay">' + escapeHtml(info.payLabel) + '</div>' +
              barMarkup +
              (info.bonusLabel ? '<div class="chore-kid-card-bonus">' + escapeHtml(info.bonusLabel) + '</div>' : '') +
            '</button>';
          }).join('') +
        '</div></div>';
      }

      function formatLogDayLabel(dateStr) {
        var parts = String(dateStr || '').split('-');
        var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        return days[d.getDay()] + ' ' + (d.getMonth() + 1) + '/' + d.getDate();
      }

      function weekDateRange(isoWeek) {
        var parts = String(isoWeek || '').split('-W');
        var year = Number(parts[0]);
        var weekNum = Number(parts[1]);
        var jan4 = new Date(year, 0, 4);
        var dayOfWeek = jan4.getDay() || 7;
        var monday = new Date(jan4);
        monday.setDate(jan4.getDate() - dayOfWeek + 1 + (weekNum - 1) * 7);
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);

        function fmt(d) {
          var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          return days[d.getDay()] + ' ' + (d.getMonth() + 1) + '/' + d.getDate();
        }

        return fmt(monday) + ' – ' + fmt(sunday);
      }

      function renderWeekLog(entries, phase) {
        if (!entries.length) return '';
        var sorted = entries.slice().sort(function (a, b) { return b.timestamp - a.timestamp; });
        var groups = {};
        sorted.forEach(function (entry) {
          var key = entry.date || 'unknown';
          if (!groups[key]) groups[key] = [];
          groups[key].push(entry);
        });
        var dateKeys = Object.keys(groups).sort().reverse();
        var today = phase.toDateString(new Date());

        return '<div class="chore-section-label">This Week</div><div class="chore-log">' +
          dateKeys.map(function (dateKey) {
            var dayLabel = dateKey === today ? 'Today' : formatLogDayLabel(dateKey);
            return '<div class="chore-log-day-label">' + escapeHtml(dayLabel) + '</div>' +
              groups[dateKey].map(function (entry) {
                var kidName = ((phase.currentConfig.kids || {})[entry.kid] || {}).name || entry.kid;
                var time = new Date(Number(entry.timestamp || 0));
                var h = time.getHours();
                var ampm = h >= 12 ? 'pm' : 'am';
                var h12 = h % 12 || 12;
                var timeStr = h12 + ':' + String(time.getMinutes()).padStart(2, '0') + ampm;
                return '<div class="swipe-wrapper" data-swipe-type="chore-log" data-log-id="' + escapeHtml(entry.id) + '">' +
                  '<div class="swipe-action left">Delete</div>' +
                  '<div class="chore-log-entry swipe-surface ' + escapeHtml(entry.kid) + '" data-swipe-surface="true">' +
                    '<div class="chore-log-main">' +
                      '<span class="chore-log-name">' + escapeHtml(entry.choreLabel || 'Points') + '</span>' +
                      '<span class="chore-log-pts-badge">+' + Number(entry.points || 0) + '</span>' +
                    '</div>' +
                    '<div class="chore-log-aside">' +
                      '<span class="chore-log-who">' + escapeHtml(kidName) + '</span>' +
                      '<span class="chore-log-when">' + escapeHtml(timeStr) + '</span>' +
                    '</div>' +
                  '</div>' +
                '</div>';
              }).join('');
          }).join('') +
        '</div>';
      }

      function getWeeklyProgressInfo(phase, kidId, entries, week) {
        var kid = (phase.currentConfig.kids && phase.currentConfig.kids[kidId]) || { name: kidId, payTiers: [], weeklyBonus: { extraPts: 10, bonus: 2 } };
        var points = entries.filter(function (entry) {
          return entry.kid === kidId && entry.week === week;
        }).reduce(function (sum, entry) {
          return sum + Number(entry.points || 0);
        }, 0);
        var tiers = (kid.payTiers || []).slice().sort(function (a, b) { return a.minPts - b.minPts; });
        var currentTierPay = Number(phase.calculateWeeklyPay(kid.payTiers || [], points) || 0);
        var nextTier = tiers.find(function (tier) { return points < Number(tier.minPts || 0); }) || null;
        var topTier = tiers.length ? tiers[tiers.length - 1] : null;
        var payInfo = typeof window.getWeeklyPayBreakdown === 'function'
          ? window.getWeeklyPayBreakdown(kid, points, phase.calculateWeeklyPay)
          : { totalPay: currentTierPay, bonus: 0, bonusAmount: 2, extraPts: 10, topMinPts: 0, extraPoints: 0 };
        var goalPts = topTier ? Number(topTier.minPts || 0) : 0;
        var goalPay = topTier ? Number(topTier.pay || 0) : 0;
        var progressPct = goalPts > 0
          ? Math.max(0, Math.min(100, Math.round((points / goalPts) * 100)))
          : 100;
        var pointsLabel = goalPts > 0 && points < goalPts
          ? points + ' / ' + goalPts + ' pts'
          : points + ' pts';
        var payLabel = goalPts > 0 && points < goalPts
          ? phase.dollars(currentTierPay) + ' -> ' + phase.dollars(goalPay)
          : phase.dollars(payInfo.totalPay) + ' earned';
        var bonusLabel = '';
        if (progressPct >= 100 && payInfo.bonus > 0) {
          bonusLabel = '+' + phase.dollars(payInfo.bonus) + ' bonus';
        } else if (progressPct >= 100) {
          bonusLabel = 'Goal reached!';
        }
        return {
          kid: kid,
          kidId: kidId,
          points: points,
          progressPct: progressPct,
          pointsLabel: pointsLabel,
          payLabel: payLabel,
          bonusLabel: bonusLabel,
          nextTier: nextTier,
          payInfo: payInfo,
          tiers: tiers,
          goalPts: goalPts
        };
      }

      async function renderChoreProgress() {
        var phase = runtime();
        var container = document.getElementById('choreProgress');
        var kidCardsContainer = document.getElementById('choreKidCards');
        if (!container) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          if (kidCardsContainer) kidCardsContainer.innerHTML = '';
          container.innerHTML = '<div class="chore-board"><p class="chore-list-note">Loading today\'s chores...</p></div>';
          return;
        }
        if (!choreSelectedKid) {
          var kidIds = Object.keys(phase.currentConfig.kids || {});
          choreSelectedKid = kidIds[0] || 'alex';
        }
        if (!weeklyPayChecked && typeof window.maybeRunWeeklyPay === 'function') {
          weeklyPayChecked = true;
          window.maybeRunWeeklyPay().catch(function (error) { console.error(error); });
        }
        try {
          var choresSource = phase.currentConfig.chores || {};
          var chores = Object.keys(choresSource).map(function (choreId) {
            return [choreId, choresSource[choreId]];
          }).sort(function (a, b) {
            return String((a[1] && a[1].label) || a[0]).localeCompare(String((b[1] && b[1].label) || b[0]));
          });
          var entries = await phase.getAllLogEntries();
          var now = new Date();
          var today = phase.toDateString(now);
          var week = phase.toIsoWeek(now);
          var kids = selectedChoreKids();
          var weekEntries = entries.filter(function (entry) {
            return entry.week === week && kids.indexOf(entry.kid) !== -1;
          });
          var todayEntries = entries.filter(function (entry) {
            return entry.date === today && kids.indexOf(entry.kid) !== -1;
          });
          var summary = summarizeWeek(entries, phase, kids, week);
          var kidCardsMarkup = renderKidCards(phase, entries, week);
          var checklistMarkup = '';
          try {
            checklistMarkup = chores.map(function (entry) {
              var choreId = entry[0];
              var chore = entry[1] || {};
              var applicableKids = choreAppliesToSelectedKids(chore, kids);
              if (!applicableKids.length) {
                return '';
              }
              var matches = todayEntries.filter(function (logEntry) {
                return logEntry.choreId === choreId && applicableKids.indexOf(logEntry.kid) !== -1;
              });
              var count = matches.length;
              return '<button type="button" class="chore-tile' + (count > 0 ? ' logged' : '') + '" data-chore-item="' + escapeHtml(choreId) + '">' +
                '<span class="chore-tile-label">' + escapeHtml(chore.label || choreId) + '</span>' +
                '<span class="chore-tile-info">' +
                  '<span class="chore-tile-pts">+' + Number(chore.points || 0) + '</span>' +
                  (count > 0 ? '<span class="chore-tile-count">' + count + '</span>' : '') +
                '</span>' +
              '</button>';
            }).filter(Boolean).join('');
          } catch (checklistError) {
            console.error(checklistError);
            checklistMarkup = '';
          }
          var logMarkup = renderWeekLog(weekEntries, phase);
          if (kidCardsContainer) kidCardsContainer.innerHTML = kidCardsMarkup;
          container.innerHTML = '<div class="chore-board">' +
            '<div class="chore-section-label">Chores</div>' +
            (checklistMarkup ? '<div class="chore-grid">' + checklistMarkup + '</div>' : '<p class="chore-list-note">No chores configured. Use the gear icon to add chores.</p>') +
            '<div class="chore-summary">' + escapeHtml(weekDateRange(week)) + ' · ' + summary.points + 'pts · ' + phase.dollars(summary.pay) + ' earned</div>' +
            logMarkup +
          '</div>';
          if (typeof window.bindSwipeHandlers === 'function') {
            window.bindSwipeHandlers(container);
          }
        } catch (error) {
          console.error(error);
          if (kidCardsContainer) kidCardsContainer.innerHTML = '';
          container.innerHTML = '<div class="chore-board">' +
            '<p class="chore-list-note">The Chores view hit an error. You can still use quick add below.</p>' +
          '</div>';
        }
      }

      async function logChoreItem(choreId) {
        var now = Date.now();
        if (choreCooldowns[choreId] && (now - choreCooldowns[choreId]) < 2000) return;
        choreCooldowns[choreId] = now;
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded || !choreId) return;
        var chore = (phase.currentConfig.chores || {})[choreId];
        if (!chore) return;
        var kids = selectedChoreKids();
        var applicableKids = choreAppliesToSelectedKids(chore, kids);
        if (!applicableKids.length) return;
        var dateNow = new Date();
        var today = phase.toDateString(dateNow);
        var week = phase.toIsoWeek(dateNow);

        await phase.saveLogEntries(applicableKids.map(function (kidId) {
          return {
            kid: kidId,
            choreId: choreId,
            choreLabel: chore.label,
            points: Number(chore.points || 0),
            timestamp: Date.now(),
            date: today,
            week: week,
            note: ''
          };
        }));

        var btn = document.querySelector('[data-chore-item="' + choreId + '"]');
        if (btn) {
          btn.classList.add('cooldown');
          setTimeout(function () { btn.classList.remove('cooldown'); }, 2000);
        }

        var names = selectedKidLabel(applicableKids, phase);
        phase.showToast('+' + Number(chore.points || 0) + ' ' + (chore.label || 'chore') + ' for ' + names, {
          kid: applicableKids.length === 1 ? applicableKids[0] : null,
          onUndo: function () {
            phase.undoLastAction().catch(function (error) { console.error(error); });
          }
        });
        renderChoreProgress().catch(function (error) { console.error(error); });
        if (shouldRenderSettings('bank')) {
          renderBankSettings().catch(function (error) { console.error(error); });
        }
      }

      function renderPayTierEditor(kidId, kid) {
        var phase = runtime();
        var tiers = kid.payTiers || [];
        var bonus = kid.weeklyBonus || { extraPts: 10, bonus: 2 };
        return '<article class="stat-card"><h3>' + (kid.name || kidId) + ' Pay Tiers</h3>' +
          '<div class="settings-list">' +
          tiers.map(function (tier, i) {
            return '<div class="settings-row"><span>Tier ' + (i + 1) + ' (' + tier.minPts + 'pts)</span>' +
              '<input type="number" min="1" value="' + tier.minPts + '" data-bank-setting="pay-tier-pts" data-kid="' + kidId + '" data-index="' + i + '">' +
              '<input type="number" step="0.5" value="' + tier.pay + '" data-bank-setting="pay-tier" data-kid="' + kidId + '" data-index="' + i + '">' +
              '</div>';
          }).join('') +
          '<div class="settings-row"><span>Bonus (' + bonus.extraPts + 'pts)</span>' +
          '<input type="number" min="1" value="' + bonus.extraPts + '" data-bank-setting="bonus-pts" data-kid="' + kidId + '">' +
          '<input type="number" step="0.5" value="' + bonus.bonus + '" data-bank-setting="bonus-pay" data-kid="' + kidId + '">' +
          '</div>' +
          '</div></article>';
      }

      async function renderBankSettings() {
        var phase = runtime();
        var panel = getSettingsHost();
        if (!panel) return;
        if (!shouldRenderSettings('bank')) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading bank settings...</p></article></div>';
          return;
        }
        var kids = phase.currentConfig.kids || {};
        var historyMarkup = await renderHistory();
        var txnMarkup = await renderTransactions();
        
        panel.innerHTML = '<div class="settings-grid">' +
          Object.keys(kids).map(function (kidId) { return renderPayTierEditor(kidId, kids[kidId]); }).join('') +
          '<article class="stat-card"><h3>History</h3>' +
          '<div class="settings-chip-row">' +
          ['all', 'alex', 'louisa'].map(function (k) {
            return '<button type="button" class="settings-chip ' + (historyState.kid === k ? 'active' : '') + '" data-history-kid="' + k + '">' + (k === 'all' ? 'All' : k.charAt(0).toUpperCase() + k.slice(1)) + '</button>';
          }).join('') +
          '</div>' +
          '<div class="settings-row"><span>Date</span><input type="date" value="' + (historyState.date || '') + '" data-bank-setting="history-date"></div>' +
          historyMarkup +
          '</article>' +
          '<article class="stat-card"><h3>Transactions</h3>' + txnMarkup + '</article>' +
          '</div>';
      }

      async function renderHistory() {
        var phase = runtime();
        var date = historyState.date || runtime().toDateString(new Date());
        var entries = await phase.getAllLogEntries();
        var filtered = entries.filter(function (e) {
          return e.date === date && (historyState.kid === 'all' || e.kid === historyState.kid);
        }).sort(function (a, b) { return b.timestamp - a.timestamp; });

        if (!filtered.length) return '<p class="settings-note">No history for this date.</p>';
        return '<div class="settings-list" style="margin-top:12px">' + filtered.map(function (e) {
          var label = e.choreLabel || 'Chore';
          var note = e.note ? ' (' + e.note + ')' : '';
          var deleteButton = '<button type="button" data-bank-action="delete-log" data-log-id="' + e.id + '" title="Delete">X</button>';
          return '<div class="settings-row"><span>' + (phase.currentConfig.kids[e.kid].name || e.kid) + ': ' + label + note + ' (' + e.points + 'pts)</span>' + deleteButton + '</div>';
        }).join('') + '</div>';
      }

      async function renderTransactions() {
        var phase = runtime();
        var txns = await phase.getAllPayments();
        var filtered = txns.sort(function (a, b) { return b.timestamp - a.timestamp; }).slice(0, 15);
        if (!filtered.length) return '<p class="settings-note">No recent transactions.</p>';
        return '<div class="settings-list">' + filtered.map(function (p) {
          var label = p.type === 'spend' ? 'Spent' : p.type === 'weekly' ? 'Weekly Pay' : p.type === 'credit' ? 'Credit' : 'Payment';
          var note = p.note ? ': ' + p.note : '';
          var deleteButton = '<button type="button" data-bank-action="delete-payment" data-payment-id="' + p.id + '" data-payment-kid="' + p.kid + '" data-payment-amount="' + p.amount + '" data-payment-type="' + p.type + '" title="Delete">X</button>';
          return '<div class="settings-row"><span>' + (phase.currentConfig.kids[p.kid].name || p.kid) + ': ' + label + note + ' (' + phase.dollars(p.amount) + ')<div class="settings-note">' + (p.date || '') + '</div></span>' + deleteButton + '</div>';
        }).join('') + '</div>';
      }

      function renderChoreSettings() {
        var phase = runtime();
        var panel = getSettingsHost();
        if (!panel) return;
        if (!shouldRenderSettings('chores')) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading chore settings...</p></article></div>';
          return;
        }
        var chores = phase.currentConfig.chores || {};
        panel.innerHTML = '<div class="settings-grid">' +
          '<article class="stat-card"><h3>Chore Settings</h3><div class="settings-list">' +
          Object.keys(chores).map(function (choreId) {
            var chore = chores[choreId] || {};
            return '<div class="settings-row"><span>' + String(chore.label || choreId).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span><input type="number" min="0" value="' + Number(chore.points || 0) + '" data-chore-setting="points" data-chore="' + choreId + '"><button type="button" data-chore-action="remove" data-chore="' + choreId + '">Remove</button></div>';
          }).join('') +
          '</div><button type="button" class="settings-btn" data-chore-action="add">Add chore</button></article>' +
        '</div>';
      }

      async function addChoreViaPrompt() {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) return;
        var label = await window.appPrompt('New chore name?', 'e.g. Empty dishwasher', '');
        if (!label) return;
        var points = Number(await window.appPrompt('Points for ' + label + '?', 'Points', '1', {
          inputType: 'number'
        }));
        if (!points || Number.isNaN(points)) return;
        var key = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || ('chore_' + Date.now());
        var chore = { label: label, points: points, kids: ['alex', 'louisa'], keywords: [label.toLowerCase()] };
        await phase.dbRef('config/chores/' + key).set(chore);
        phase.currentConfig.chores[key] = chore;
        renderChoreSettings();
        renderChoreProgress().catch(function (error) { console.error(error); });
      }

      async function removeChore(choreId) {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded || !choreId) return;
        if (!await window.appConfirm('Remove chore?', 'Remove this chore?', true)) return;
        await phase.dbRef('config/chores/' + choreId).remove();
        delete phase.currentConfig.chores[choreId];
        renderChoreSettings();
        renderChoreProgress().catch(function (error) { console.error(error); });
      }

      document.addEventListener('click', function (event) {
        var kidCard = event.target.closest('[data-chore-kid]');
        if (kidCard) {
          var kidId = kidCard.dataset.choreKid;
          choreSelectedKid = kidId;
          renderChoreProgress().catch(function (error) { console.error(error); });
          return;
        }
        var choreItem = event.target.closest('[data-chore-item]');
        if (choreItem) {
          logChoreItem(choreItem.dataset.choreItem).catch(function (error) {
            console.error(error);
            var phase = runtime();
            if (phase && typeof phase.showToast === 'function') {
              phase.showToast('Could not update that chore.', { type: 'error' });
            }
          });
          return;
        }
        var historyKidBtn = event.target.closest('[data-history-kid]');
        if (historyKidBtn) {
          historyState.kid = historyKidBtn.dataset.historyKid;
          renderBankSettings().catch(function (error) { console.error(error); });
          return;
        }

        var bankActionBtn = event.target.closest('[data-bank-action]');
        if (bankActionBtn) {
          var action = bankActionBtn.dataset.bankAction;
          var phase = runtime();
          if (action === 'delete-log') {
            var logId = bankActionBtn.dataset.logId;
            if (!phase || !logId) return;
            phase.deleteLogEntry(logId).then(function (deleted) {
              if (!deleted) return;
              phase.showToast('Deleted log entry.', {
                onUndo: function () {
                  phase.undoLastAction().catch(function (error) { console.error(error); });
                }
              });
              renderChoreProgress().catch(function (error) { console.error(error); });
              renderBankSettings().catch(function (error) { console.error(error); });
            }).catch(function (error) { console.error(error); phase.showToast('Failed to delete.', { type: 'error' }); });
            return;
          }
          if (action === 'delete-payment') {
            var paymentId = bankActionBtn.dataset.paymentId;
            var kidId = bankActionBtn.dataset.paymentKid;
            if (!phase || !paymentId) return;
            phase.deletePaymentEntry(paymentId, kidId).then(function (deleted) {
              if (!deleted) return;
              phase.showToast('Deleted transaction.', {
                onUndo: function () {
                  phase.undoLastAction().catch(function (error) { console.error(error); });
                }
              });
              renderBankSettings().catch(function (error) { console.error(error); });
            }).catch(function (error) { console.error(error); phase.showToast('Failed to delete transaction.', { type: 'error' }); });
            return;
          }
        }

        var actionBtn = event.target.closest('[data-chore-action]');
        if (!actionBtn) return;
        if (actionBtn.dataset.choreAction === 'add') {
          addChoreViaPrompt().catch(function (error) { console.error(error); });
          return;
        }
        if (actionBtn.dataset.choreAction === 'remove') {
          removeChore(actionBtn.dataset.chore).catch(function (error) { console.error(error); });
        }
      });

      document.addEventListener('change', function (event) {
        var target = event.target;
        var phase = runtime();
        if (!phase) return;

        if (target.dataset.choreSetting === 'points') {
          var points = Number(target.value);
          if (Number.isNaN(points)) return;
          phase.updateChorePoints(target.dataset.chore, points).catch(function (error) { console.error(error); });
          return;
        }

        if (target.dataset.bankSetting) {
          var setting = target.dataset.bankSetting;
          var kidId = target.dataset.kid;
          var idx = Number(target.dataset.index);
          var val = Number(target.value);

          if (setting === 'pay-tier-pts') {
            if (Number.isNaN(val) || val < 1) return;
            var tiers = (phase.currentConfig.kids[kidId].payTiers || []).slice();
            tiers[idx] = Object.assign({}, tiers[idx], { minPts: val });
            phase.dbRef('config/kids/' + kidId + '/payTiers').set(tiers).then(function () {
              phase.currentConfig.kids[kidId].payTiers = tiers;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'pay-tier') {
            if (Number.isNaN(val)) return;
            var tiers = (phase.currentConfig.kids[kidId].payTiers || []).slice();
            tiers[idx] = Object.assign({}, tiers[idx], { pay: val });
            phase.dbRef('config/kids/' + kidId + '/payTiers').set(tiers).then(function () {
              phase.currentConfig.kids[kidId].payTiers = tiers;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'bonus-pts') {
            if (Number.isNaN(val) || val < 1) return;
            phase.dbRef('config/kids/' + kidId + '/weeklyBonus/extraPts').set(val).then(function () {
              if (!phase.currentConfig.kids[kidId].weeklyBonus) phase.currentConfig.kids[kidId].weeklyBonus = {};
              phase.currentConfig.kids[kidId].weeklyBonus.extraPts = val;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'bonus-pay') {
            if (Number.isNaN(val)) return;
            phase.dbRef('config/kids/' + kidId + '/weeklyBonus/bonus').set(val).then(function () {
              if (!phase.currentConfig.kids[kidId].weeklyBonus) phase.currentConfig.kids[kidId].weeklyBonus = {};
              phase.currentConfig.kids[kidId].weeklyBonus.bonus = val;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'history-date') {
            historyState.date = target.value;
            renderBankSettings().catch(function (error) { console.error(error); });
          }
        }
      });

      document.addEventListener('click', function (event) {
        if (!event.target.closest('[data-qp-pts]')) return;
        setTimeout(function () {
          renderChoreProgress().catch(function (error) { console.error(error); });
        }, 150);
      });

      document.addEventListener('hub:log-changed', function () {
        renderChoreProgress().catch(function (error) { console.error(error); });
        if (isBankViewActive()) {
          renderBankSettings().catch(function (error) { console.error(error); });
        }
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      });

      document.addEventListener('hub:config-changed', function () {
        renderChoreProgress().catch(function (error) { console.error(error); });
        if (appShellState.currentView === 'lists' && typeof window.renderListsHome === 'function') {
          window.renderListsHome();
        }
        if (isBankViewActive()) {
          renderBankSettings().catch(function (error) { console.error(error); });
        }
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      });

      window.addEventListener('hashchange', function () {
        setTimeout(function () {
          if (isChoresViewActive()) {
            renderChoreProgress().catch(function (error) { console.error(error); });
          }
          if (appShellState.settingsPanelOpen) {
            renderHeaderSettingsPanel();
          }
        }, 50);
      });

      async function refreshPhase4() {
        if (isChoresViewActive()) {
          await renderChoreProgress();
        }
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      }

      window.renderBankSettings = renderBankSettings;
      window.renderChoreProgress = renderChoreProgress;
      window.renderChoreSettings = renderChoreSettings;
      window.refreshPhase4 = refreshPhase4;

      var phase4Warmup = setInterval(function () {
        var phase = runtime();
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          return;
        }
        clearInterval(phase4Warmup);
        renderChoreProgress().catch(function (error) { console.error(error); });
        if (typeof window.maybeRunWeeklyPay === 'function') {
          window.maybeRunWeeklyPay().catch(function (error) { console.error(error); });
        }
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      }, 400);
    })();
  </script>
</body>
</html>
