<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Family Hub</title>
  <meta name="theme-color" content="#4a90d9">
  <meta name="description" content="Family hub for chores, lists, and finances.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-alt: #edf4ff;
      --line: #d7e0ee;
      --text: #1f2937;
      --muted: #64748b;
      --alex: #4a90d9;
      --louisa: #8a5bd1;
      --danger: #d64545;
      --shadow: 0 18px 44px rgba(39, 58, 87, 0.12);
      --radius: 20px;
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 144, 217, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(138, 91, 209, 0.14), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(100%, 720px);
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: calc(134px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(215, 224, 238, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      padding: 14px 18px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    .brand small {
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .header-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
      width: 100%;
      min-width: 0;
    }

    .icon-btn {
      min-width: var(--tap);
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 14px;
      background: var(--panel-alt);
      color: var(--text);
      cursor: pointer;
      flex: 0 1 auto;
    }

    .icon-btn:hover {
      background: rgba(74, 144, 217, 0.15);
    }

    .icon-btn:active {
      transform: scale(0.93);
    }

    .icon-btn {
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .header-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sync-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #94a3b8;
      flex: 0 0 auto;
    }

    .sync-dot.online {
      background: #16a34a;
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }

    .family-panel[hidden] {
      display: none;
    }

    .family-panel {
      margin-top: 8px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(247, 250, 255, 0.95);
      border: 1px solid rgba(215, 224, 238, 0.9);
    }

    .family-panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .family-panel-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .family-panel-copy strong {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .family-panel-copy code {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .family-panel-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .family-panel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      min-width: 0;
      gap: 12px;
    }

    .view.active {
      display: flex;
      animation: viewIn 0.2s ease-out;
    }

    @keyframes viewIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .view-content {
      padding: 0 4px;
    }

    .tab-bar {
      display: flex;
      position: fixed;
      left: 50%;
      bottom: 0;
      width: calc(100% - 32px);
      max-width: 720px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      flex-shrink: 0;
      z-index: 100;
    }

    .bulletin-shell {
      display: grid;
      gap: 12px;
    }

    .bulletin-hero {
      display: grid;
      gap: 12px;
      background: linear-gradient(135deg, #fdf6e9, #fffdf8);
      border: 1px solid #f0d9ac;
    }

    .bulletin-hero h2,
    .bulletin-hero p,
    .bulletin-section-head h3,
    .bulletin-section-head p,
    .bulletin-empty h3,
    .bulletin-empty p {
      margin: 0;
    }

    .bulletin-hero p,
    .bulletin-section-head p,
    .bulletin-empty p,
    .bulletin-calendar p,
    .bulletin-note-meta {
      color: var(--muted);
    }

    .bulletin-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bulletin-note-form {
      display: grid;
      gap: 10px;
    }

    .bulletin-note-form textarea,
    .bulletin-note-form select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    .bulletin-note-form textarea {
      min-height: 96px;
      padding: 12px 14px;
      resize: vertical;
    }

    .bulletin-note-form select {
      min-height: 44px;
      padding: 0 12px;
    }

    .bulletin-form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .bulletin-btn,
    .bulletin-note-delete {
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
    }

    .bulletin-btn {
      padding: 0 14px;
      background: var(--alex);
      color: #fff;
      font-weight: 700;
    }

    .bulletin-btn.secondary {
      background: var(--panel-alt);
      color: var(--text);
    }

    .bulletin-notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .bulletin-note-card {
      display: grid;
      gap: 12px;
      align-content: space-between;
      min-height: 170px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      transform: rotate(-1deg);
    }

    .bulletin-note-card:nth-child(even) {
      transform: rotate(1deg);
    }

    .bulletin-note-card.neutral {
      background: linear-gradient(180deg, #fff8b8, #f7ec8a);
    }

    .bulletin-note-card.alex {
      background: linear-gradient(180deg, #dff1ff, #bddfff);
    }

    .bulletin-note-card.louisa {
      background: linear-gradient(180deg, #f3e5ff, #e1c9ff);
    }

    .bulletin-note-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .bulletin-note-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-weight: 600;
      line-height: 1.45;
    }

    .bulletin-note-delete {
      width: 34px;
      min-width: 34px;
      padding: 0;
      background: rgba(255, 255, 255, 0.68);
      color: var(--text);
      font-weight: 700;
    }

    .bulletin-empty {
      display: grid;
      gap: 8px;
      padding: 24px 18px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: var(--panel-alt);
    }

    .bulletin-calendar {
      display: grid;
      gap: 8px;
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: 56px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab.active {
      color: var(--alex);
    }

    .tab-icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    .tab-label {
      line-height: 1;
    }

    .bank-kid-picker {
      display: flex;
      gap: 8px;
      padding: 0 4px;
    }

    .bank-kid-picker button {
      flex: 1;
    }

    .drawer-grid {
      display: grid;
      gap: 12px;
    }

    .chores-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
    }

    .chores-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .chores-progress-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .chores-progress-card {
      display: grid;
      gap: 10px;
    }

    .chores-progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .chores-progress-name {
      font-weight: 700;
    }

    .chores-progress-meta,
    .chores-progress-note,
    .settings-note,
    .history-item .settings-note {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .chores-settings[hidden] {
      display: none;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .settings-list {
      display: grid;
      gap: 8px;
    }

    .settings-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .settings-row span:first-child {
      flex: 1;
      min-width: 0;
    }

    .settings-row input,
    .settings-row select {
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      width: 70px;
      min-width: 0;
      flex-shrink: 1;
      font: inherit;
    }

    .settings-row button,
    .settings-btn {
      min-height: 38px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      background: var(--alex);
      color: #fff;
      cursor: pointer;
      flex-shrink: 1;
      min-width: 0;
      font: inherit;
    }

    .settings-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .settings-chip {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
    }

    .settings-chip.active {
      background: var(--alex);
      border-color: var(--alex);
      color: #fff;
    }

    .history-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .history-item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      word-break: break-word;
    }

    .history-item > div {
      min-width: 0;
      overflow: hidden;
    }
    .stat-card {
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(237, 244, 255, 0.9));
      border: 1px solid var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      word-break: break-word;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(39, 58, 87, 0.1);
    }

    .stat-card h2,
    .stat-card h3,
    .stat-card p {
      margin: 0;
    }

    .stat-card h2,
    .stat-card h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .stat-card p {
      color: var(--muted);
      line-height: 1.4;
    }

    .messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
      min-height: 200px;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-break: break-word;
      animation: msgIn 0.3s ease-out both;
    }

    .message.system {
      align-self: flex-start;
      background: linear-gradient(135deg, #eef5ff 0%, #f0f0ff 100%);
      border: 1px solid #d5e4fb;
      border-bottom-left-radius: 6px;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(74, 144, 217, 0.15), rgba(138, 91, 209, 0.18));
      border: 1px solid rgba(111, 135, 195, 0.22);
      border-bottom-right-radius: 6px;
    }

    .message-meta {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 720px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
    }

    .composer input {
      min-height: var(--tap);
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer input:focus {
      outline: none;
      border-color: var(--alex);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    .composer button {
      width: var(--tap);
      min-height: var(--tap);
      padding: 0;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .composer button:active {
      transform: scale(0.92);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
    }

    .send-btn:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.4);
    }

    .mic-btn {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .mic-btn:hover {
      background: rgba(138, 91, 209, 0.22);
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(214, 69, 69, 0); }
    }

    .mic-btn.listening {
      background: var(--danger);
      color: #fff;
      animation: micPulse 1.2s ease-in-out infinite;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .card-btn.alex {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .card-btn.louisa {
      background: linear-gradient(135deg, var(--louisa), #6b3fa0);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .kid-card {
      position: relative;
      padding: 28px 24px 22px;
      border-radius: 18px;
      color: #fff;
      overflow: hidden;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .kid-card.alex {
      background: linear-gradient(135deg, #4a90d9 0%, #2563a8 50%, #1e4f8a 100%);
      box-shadow: 0 12px 32px rgba(74, 144, 217, 0.35);
    }

    .kid-card.louisa {
      background: linear-gradient(135deg, #8a5bd1 0%, #6b3fa0 50%, #532d80 100%);
      box-shadow: 0 12px 32px rgba(138, 91, 209, 0.35);
    }

    .kid-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .kid-card::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -10%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.75;
    }

    .card-chip {
      width: 36px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e8d5a0, #c9a84c);
      opacity: 0.85;
    }

    .card-balance {
      position: relative;
      z-index: 1;
      margin: 16px 0 8px;
    }

    .card-balance-amount {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card-balance-label {
      font-size: 0.78rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-pts {
      font-size: 0.82rem;
      opacity: 0.8;
      text-align: right;
    }

    .card-statement {
      margin-top: 14px;
    }

    .card-statement h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0 0 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stmt-list {
      display: grid;
      gap: 0;
    }

    .stmt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid var(--line);
      font-size: 0.88rem;
    }

    .stmt-row:last-child {
      border-bottom: 0;
    }

    .stmt-desc {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stmt-note {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .stmt-amount {
      font-weight: 700;
      white-space: nowrap;
    }

    .stmt-amount.credit {
      color: #16a34a;
    }

    .stmt-amount.debit {
      color: var(--danger);
    }

    .stmt-empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 12px 0;
    }

    .quick-points {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .qp-row {
      display: flex;
      gap: 8px;
    }

    .qp-kid, .qp-pts {
      flex: 1;
      min-height: 44px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }

    .qp-kid:active, .qp-pts:active {
      transform: scale(0.94);
    }

    .qp-kid.alex { color: var(--alex); }
    .qp-kid.louisa { color: var(--louisa); }
    .qp-kid.both { color: var(--muted); }

    .qp-kid.active.alex { background: var(--alex); color: #fff; border-color: var(--alex); }
    .qp-kid.active.louisa { background: var(--louisa); color: #fff; border-color: var(--louisa); }
    .qp-kid.active.both { background: var(--muted); color: #fff; border-color: var(--muted); }

    .qp-pts {
      background: var(--panel-alt);
      color: var(--text);
      border-color: transparent;
    }


    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f1f5f9;
      color: var(--muted);
    }

    .badge.alex {
      background: rgba(74, 144, 217, 0.14);
      color: var(--alex);
    }

    .badge.louisa {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(4px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: min(100%, 440px);
      padding: 20px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.28);
      display: grid;
      gap: 14px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.25s ease;
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2,
    .modal p {
      margin: 0;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.45;
    }

    .modal-actions {
      display: grid;
      gap: 10px;
    }

    .modal-actions button,
    .modal-actions input {
      min-height: var(--tap);
      border-radius: 14px;
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.25);
    }

    .primary:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.35);
    }

    .primary:active {
      transform: scale(0.97);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .secondary:hover {
      background: var(--panel-alt);
    }

    .secondary:active {
      transform: scale(0.97);
    }

    .family-join {
      display: grid;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid #e8eef7;
    }

    .family-join input {
      padding: 0 14px;
      border: 1px solid var(--line);
    }

    .status {
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status.error {
      color: var(--danger);
    }

    .toast-container {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
      width: calc(100% - 32px);
      max-width: 400px;
      pointer-events: none;
    }

    .toast {
      padding: 14px 18px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
      pointer-events: auto;
      border-left: 5px solid var(--muted);
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .toast.alex { border-left-color: var(--alex); }
    .toast.louisa { border-left-color: var(--louisa); }
    .toast.system { border-left-color: var(--alex); }
    .toast.error { border-left-color: var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .toast.out {
      animation: toastOut 0.3s ease-in forwards;
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    .toast-undo {
      background: var(--panel-alt);
      border: 0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      flex-shrink: 0;
    }

    .toast-undo:active {
      transform: scale(0.95);
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .app {
        min-height: calc(100vh - 12px);
        padding-bottom: calc(134px + env(safe-area-inset-bottom));
      }

      .tab-bar {
        width: calc(100% - 12px);
      }

      .header {
        padding: 10px 14px;
      }

      .brand small {
        font-size: 0.84rem;
      }

      .quick-points {
        padding: 8px 10px;
      }

      .composer {
        gap: 8px;
        width: calc(100% - 12px);
      }

      .composer input {
        min-width: 0;
      }

      .message {
        max-width: 94%;
      }

      .tab {
        min-height: 52px;
        font-size: 0.68rem;
      }

      .tab-icon {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

  <div class="overlay" id="familyModal" role="dialog" aria-modal="true" aria-labelledby="familyModalTitle">

  <script>

  <script>

    const KIDS = {

    const CHORES = {

      },

      },

        label: 'Wipe bathroom counter',

      },
      wipe_surfaces: {

        keywords: ['wiped surfaces', 'wipe surfaces', 'wiped table', 'wiped counter', 'cleaned surfaces', 'wiped tower']
      },
      help_pack_lunch: {
        label: 'Help pack lunch',
        points: 2,
        kids: ['alex'],
        keywords: ['pack lunch', 'packed lunch', 'lunch for tomorrow']
      },
      fold_laundry: {
        label: 'Fold laundry',
        points: 2,
        kids: ['alex'],
        keywords: ['fold laundry', 'folded laundry', 'folded towels', 'folded clothes']
      },
      match_socks: {
        label: 'Match socks',
        points: 2,
        kids: ['louisa'],
        keywords: ['match socks', 'matched socks', 'sock matching']
      },
      fold_washcloths: {
        label: 'Fold washcloths',
        points: 2,
        kids: ['louisa'],
        keywords: ['fold washcloths', 'folded washcloths']
      },
      bins_in: {
        label: 'Bring bins back in',
        points: 2,
        kids: ['alex', 'louisa'],
        keywords: ['bins in', 'bring bins', 'bins back', 'brought bins in', 'garbage in', 'recycling in']
      },
      bins_curb: {
        label: 'Bins to curb',
        points: 3,
        kids: ['alex', 'louisa'],
        keywords: ['bins to curb', 'bins out', 'took bins out', 'trash out', 'garbage out', 'recycling out', 'took out trash']
      },
      water_plants: {
        label: 'Water plants',
        points: 3,
        kids: ['alex', 'louisa'],
        keywords: ['water plants', 'watered plants', 'watered the plants']
      }
    };

    const elements = {
      messages: document.getElementById('messages'),
      familyLabel: document.getElementById('familyLabel'),
      familyModal: document.getElementById('familyModal'),
      familyModalStatus: document.getElementById('familyModalStatus'),
      headerFamilyButton: document.getElementById('headerFamilyButton'),
      headerFamilyPanel: document.getElementById('headerFamilyPanel'),
      createFamilyButton: document.getElementById('createFamilyButton'),
      joinFamilyButton: document.getElementById('joinFamilyButton'),
      joinFamilyInput: document.getElementById('joinFamilyInput'),
      composer: document.getElementById('composer'),
      messageInput: document.getElementById('messageInput'),
      micButton: document.getElementById('micButton'),
      cardContent: document.getElementById('cardContent'),
      scoreboardPanel: document.getElementById('scoreboardPanel'),
      bulletinContent: document.getElementById('bulletinContent'),
      listsContent: document.getElementById('listsContent'),
      tabBar: document.getElementById('tabBar')
    };

    let auth;
    let database;
    let familyId = null;
    let currentUser = null;
    const appShellState = {
      familyPanelOpen: false,
      online: navigator.onLine !== false
    };

    function buildDefaultConfig() {
      return {
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        kids: KIDS,
        chores: CHORES
      };
    }

    function addMessage(role, text, meta, actions) {
      const message = document.createElement('article');
      message.className = 'message ' + role;
      message.innerHTML = '<div>' + escapeHtml(text) + '</div>';
      if (meta) {
        const metaNode = document.createElement('div');
        metaNode.className = 'message-meta';
        metaNode.textContent = meta;
        message.appendChild(metaNode);
      }
      if (Array.isArray(actions) && actions.length) {
        const row = document.createElement('div');
        row.className = 'badge-row';
        actions.forEach((action) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'icon-btn';
          button.dataset.action = action.action;
          if (action.value) {
            button.dataset.value = action.value;
          }
          button.textContent = action.label;
          row.appendChild(button);
        });
        message.appendChild(row);
      }
      elements.messages.appendChild(message);
      elements.messages.scrollTop = elements.messages.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setModalStatus(text, isError) {
      elements.familyModalStatus.textContent = text || '';
      elements.familyModalStatus.classList.toggle('error', Boolean(isError));
    }

    function openModal() {
      elements.familyModal.classList.add('open');
      elements.joinFamilyInput.focus();
    }

    function closeModal() {
      elements.familyModal.classList.remove('open');
      setModalStatus('', false);
    }

    function generateFamilyCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 8; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    async function createFamily() {
      setModalStatus('Creating family...', false);
      let nextFamilyId = generateFamilyCode();
      let existing = await database.ref('families/' + nextFamilyId + '/config').get();
      while (existing.exists()) {
        nextFamilyId = generateFamilyCode();
        existing = await database.ref('families/' + nextFamilyId + '/config').get();
      }

      await database.ref('families/' + nextFamilyId + '/config').set(buildDefaultConfig());
      localStorage.setItem(STORAGE_KEY, nextFamilyId);
      familyId = nextFamilyId;
      closeModal();
      updateFamilyLabel();
    }

    async function joinFamily() {
      const code = elements.joinFamilyInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      elements.joinFamilyInput.value = code;
      if (code.length !== 8) {
        setModalStatus('Enter the 8-character family code.', true);
        return;
      }

      setModalStatus('Joining family...', false);
      const snapshot = await database.ref('families/' + code + '/config').get();
      if (!snapshot.exists()) {
        setModalStatus('Family code not found. Check the code and try again.', true);
        return;
      }

      localStorage.setItem(STORAGE_KEY, code);
      familyId = code;
      closeModal();
      updateFamilyLabel();
    }

    function updateFamilyLabel() {
      if (!currentUser) {
        elements.familyLabel.textContent = '';
        renderHeaderFamilyPanel();
        return;
      }
      if (!familyId) {
        elements.familyLabel.innerHTML = '<span class="header-meta"><span class="sync-dot"></span><span>Choose a family code to continue</span></span>';
        renderHeaderFamilyPanel();
        return;
      }
      elements.familyLabel.innerHTML = '<span class="header-meta"><span class="sync-dot ' + (appShellState.online ? 'online' : '') + '"></span><span>' + (appShellState.online ? 'Sync ready' : 'Offline mode') + '</span></span>';
      renderHeaderFamilyPanel();
    }

    function getFamilyShareUrl() {
      const url = new URL(window.location.href);
      if (familyId) {
        url.searchParams.set('family', familyId);
      } else {
        url.searchParams.delete('family');
      }
      url.hash = '#bulletin';
      return url.toString();
    }

    function renderHeaderFamilyPanel() {
      const panel = elements.headerFamilyPanel;
      if (!panel) return;
      panel.hidden = !appShellState.familyPanelOpen;
      if (panel.hidden) {
        panel.innerHTML = '';
        return;
      }
      if (!familyId) {
        panel.innerHTML =
          '<div class="family-panel-row">' +
            '<div class="family-panel-copy">' +
              '<strong>Family</strong>' +
              '<p class="family-panel-note">Create or join a family to sync notes, chores, and balances across devices.</p>' +
            '</div>' +
            '<div class="family-panel-actions">' +
              '<button type="button" class="settings-btn" data-family-action="manage">Choose family</button>' +
            '</div>' +
          '</div>';
        return;
      }
      panel.innerHTML =
        '<div class="family-panel-row">' +
          '<div class="family-panel-copy">' +
            '<strong>Family Code</strong>' +
            '<code>' + escapeHtml(familyId) + '</code>' +
            '<p class="family-panel-note">' + (appShellState.online ? 'Online and syncing.' : 'Offline now. Changes sync when you reconnect.') + '</p>' +
          '</div>' +
          '<div class="family-panel-actions">' +
            '<button type="button" class="settings-btn" data-family-action="copy">Copy link</button>' +
            '<button type="button" class="settings-btn" data-family-action="manage">Switch family</button>' +
          '</div>' +
        '</div>';
    }

    async function copyFamilyLink() {
      const shareUrl = getFamilyShareUrl();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(shareUrl);
        return;
      }
      const input = document.createElement('textarea');
      input.value = shareUrl;
      input.setAttribute('readonly', 'readonly');
      input.style.position = 'absolute';
      input.style.left = '-9999px';
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
    }

    function setupRouter() {
      var views = {
        bulletin: document.getElementById('viewBulletin'),
        chores: document.getElementById('viewChores'),
        fun: document.getElementById('viewFun'),
        lists: document.getElementById('viewLists'),
        bank: document.getElementById('viewBank'),
      };
      var tabs = elements.tabBar.querySelectorAll('.tab');
      var currentView = 'bulletin';

      function switchView(name) {
        if (!views[name]) name = 'bulletin';
        currentView = name;
        Object.keys(views).forEach(function (key) {
          views[key].classList.toggle('active', key === name);
        });
        tabs.forEach(function (tab) {
          tab.classList.toggle('active', tab.dataset.tab === name);
        });
        if (name === 'bulletin' && typeof window.renderBulletin === 'function') {
          window.renderBulletin().catch(function (e) { console.error(e); });
        }
        if (name === 'fun' && typeof window.renderFun === 'function') {
          window.renderFun().catch(function (e) { console.error(e); });
        }
        if (name === 'bank') {
          var selectedKid = document.getElementById('bankKidPicker').querySelector('.active');
          var kidId = selectedKid ? selectedKid.dataset.bankKid : 'alex';
          if (typeof window.renderCardView === 'function') {
            window.renderCardView(kidId).catch(function (e) { console.error(e); });
          }
          if (typeof window.refreshPhase4 === 'function') {
            window.refreshPhase4().catch(function (e) { console.error(e); });
          }
        }
        if (name === 'lists' && typeof window.renderListsHome === 'function') {
          window.renderListsHome();
        }

      }

  <script>
    (function () {
      const QUESTION_WORDS = ['how', 'what', 'whats', "what's", 'status', 'score', 'balance', 'owe', 'doing', 'points'];
      const YES_WORDS = ['yes', 'y', 'yeah', 'yep', 'sure', 'ok', 'okay'];
      const NO_WORDS = ['no', 'n', 'nope', 'cancel', 'stop'];

      const KID_ALIASES = {
        alex: ['alex'],

      const originalCreateFamily = createFamily;

      const originalJoinFamily = joinFamily;

      const originalInitFirebase = initFirebase;
      initFirebase = async function () {
        await originalInitFirebase();

          await loadFamilyConfigV2();

      };

      function normalizeText(text) {
        let normalized = String(text || '').toLowerCase();
        FILLER_WORDS.forEach((word) => {
          normalized = normalized.replace(new RegExp('\\b' + word + '\\b', 'g'), ' ');
        });
        return normalized.replace(/[^a-z0-9$.\s']/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function splitClauses(text) {
        return String(text || '').split(/\b(?:and|also|plus)\b/g).map((part) => part.trim()).filter(Boolean);
      }

      function extractKidIds(text) {
        const normalized = normalizeText(text);
        if (KID_ALIASES.both.some((alias) => normalized.includes(alias))) {
          return ['alex', 'louisa'];
        }
        const ids = [];
        if (KID_ALIASES.alex.some((alias) => normalized.includes(alias))) ids.push('alex');
        if (KID_ALIASES.louisa.some((alias) => normalized.includes(alias))) ids.push('louisa');
        return Array.from(new Set(ids));
      }

      function detectDateContext(text) {
        const date = new Date();
        if (normalizeText(text).includes('yesterday')) {
          date.setDate(date.getDate() - 1);
        }
        return date;
      }

      function toDateString(date) {
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
      }

      function toIsoWeek(date) {
        const target = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const day = target.getUTCDay() || 7;
        target.setUTCDate(target.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(target.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil((((target - yearStart) / 86400000) + 1) / 7);
        return target.getUTCFullYear() + '-W' + String(weekNo).padStart(2, '0');
      }

      function dollars(value) {
        return '$' + Number(value || 0).toFixed(2);
      }

      function showToast(text, options) {
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');

        container.appendChild(toast);

        const duration = (options && options.duration) || 5000;
        setTimeout(() => {

      }

      const intentRegistry = [];

      function registerIntent(config) {
        intentRegistry.push(config);
        intentRegistry.sort((a, b) => (b.priority || 0) - (a.priority || 0));
      }

      function routeIntent(text) {
        const normalized = normalizeText(text);
        const kids = extractKidIds(text);

        for (const intentConfig of intentRegistry) {
          const match = intentConfig.patterns(normalized, kids);
          if (match && match.confidence > 0.5) {
            return { intent: intentConfig.id, ...match, kids };
          }
        }
        return null;
      }

      // REGISTER INTENTS
      registerIntent({
        id: 'undo',
        priority: 100,
        patterns: (text) => (/\bundo\b|take that back/.test(text) ? { confidence: 1 } : null)

          }

      registerIntent({

          }

      registerIntent({

      registerIntent({

          if (pts !== null && kids.length && /\b(new chore|something new|something extra)\b/.test(text)) {

          }
          return null;
        }
      });

      registerIntent({
        id: 'create_list',
        priority: 85,
        patterns: (text) => {
          const match = text.match(/\b(?:create|make|start)\s+(?:a\s+|new\s+)?list(?:\s+(?:called|named))?\s+(.+)$/i);
          return match ? { confidence: 0.98, listName: match[1].trim() } : null;

      registerIntent({

        patterns: (text) => {
          const match = text.match(/\b(?:add|put)\s+(.+?)\s+(?:to|on)\s+(.+?)\s+list\b/i);

      registerIntent({

        patterns: (text) => {
          const match = text.match(/\b(?:check(?:\s+off)?|mark(?:\s+off)?|cross\s+off)\s+(.+?)\s+(?:from|on)\s+(.+?)\s+list\b/i);
          return match ? { confidence: 0.95, itemText: match[1].trim(), listName: match[2].trim() } : null;
        }
      });

      registerIntent({
        id: 'log_note',
        priority: 72,
        patterns: (text) => {
          const match = text.match(/^(?:note|add note|post note|bulletin note|remember)\s+(.+)$/i);
          if (!match) return null;
          const noteText = match[1].trim();
          if (!noteText) return null;
          const color = /\balex\b/i.test(noteText) ? 'alex' : /\b(?:louisa|lou)\b/i.test(noteText) ? 'louisa' : 'neutral';
          return { confidence: 0.96, noteText: noteText, color: color };
        }
      });

      registerIntent({
        id: 'remove_note',
        priority: 72,
        patterns: (text) => {
          const match = text.match(/^(?:remove|delete|clear)\s+note\s+(.+)$/i);

      registerIntent({
        id: 'add_to_list',
        priority: 80,
        patterns: (text) => {
          const match = text.match(/\b(?:add|put)\s+(.+?)\s+(?:to|on)\s+(.+?)\s+list\b/i);

        }

      registerIntent({
        id: 'check_off_list',
        priority: 80,
        patterns: (text) => {

      function calculateWeeklyPay(payTiers, weeklyPoints) {
        let earned = 0;
        (payTiers || []).slice().sort((a, b) => a.minPts - b.minPts).forEach((tier) => {
          if (weeklyPoints >= tier.minPts) earned = tier.pay;
        });
        return earned;
      }

      function choreEntries() {
        return Object.entries((currentConfig && currentConfig.chores) || CHORES);
      }

      function scoreChore(text, chore) {
        const tokens = new Set(normalizeText(text).split(' ').filter(Boolean));
        let best = 0;
        (chore.keywords || []).forEach((phrase) => {
          const phraseTokens = normalizeText(phrase).split(' ').filter(Boolean);
          if (!phraseTokens.length) return;
          let matched = 0;
          phraseTokens.forEach((token) => {
            if (tokens.has(token)) matched += 1;
          });
          best = Math.max(best, matched / phraseTokens.length);
        });
        return best;
      }

      function inferChore(text) {
        const normalized = normalizeText(text);
        const currentHour = new Date().getHours();
        const isMorning = normalized.includes('morning') || normalized.includes('am') || (!normalized.includes('tonight') && !normalized.includes('evening') && !normalized.includes('pm') && currentHour < 12);
        const isEvening = normalized.includes('tonight') || normalized.includes('evening') || normalized.includes('pm') || (!normalized.includes('morning') && !normalized.includes('am') && currentHour >= 12);
        let best = null;
        choreEntries().forEach(([choreId, chore]) => {
          let score = scoreChore(text, chore);
          if (choreId === 'feed_dog_am' && isMorning) score += 0.2;
          if (choreId === 'feed_dog_pm' && isEvening) score += 0.2;
          if (!best || score > best.score) best = { choreId, chore, score };
        });
        return best;
      }

      function parseAmount(text) {
        const match = normalizeText(text).match(/\$?\s*(\d+(?:\.\d{1,2})?)/);
        return match ? Number(match[1]) : null;
      }

      function parsePoints(text) {
        const normalized = normalizeText(text);
        const match = normalized.match(/(\d+)\s*points?/);
        return match ? Number(match[1]) : null;
      }

      function extractAdhocLabel(text, kids) {
        let label = normalizeText(text);
        kids.forEach((kidId) => {
          label = label.replace(new RegExp('\\b' + (currentConfig.kids[kidId].name || kidId).toLowerCase() + '\\b', 'g'), ' ');
        });
        label = label.replace(/\b(gets?|earns?|earned|did|new chore|something new|something extra|give|gave|add|him|her|a|an|the|for|to|points?)\b/g, ' ');
        label = label.replace(/\d+/g, ' ').replace(/\s+/g, ' ').trim();
        return label || 'Ad hoc chore';
      }

      function isQuestion(text) {
        const normalized = normalizeText(text);
        return QUESTION_WORDS.some((word) => normalized.includes(word)) || /\?$/.test(String(text || '').trim());
      }

      function parseIntent(text) {
        const normalized = normalizeText(text);
        const kids = extractKidIds(text);
        if (YES_WORDS.includes(normalized)) return { intent: 'confirm_yes' };
        if (NO_WORDS.includes(normalized)) return { intent: 'confirm_no' };
        if (/\bundo\b|take that back/.test(normalized)) return { intent: 'undo' };
        if ((/\b(settle|settled)\b/.test(normalized) || (/\bpaid\b/.test(normalized) && /\bback\b/.test(normalized))) && kids.length >= 2) return { intent: 'settle_debt', kids };
        const debtVerbMatch = normalized.match(/\b(owes|borrowed|lent)\b/);
        if (/\b(i|we|me|us|parent|parents?)\b/.test(normalized) && /\bowe\b/.test(normalized) && kids.length === 1) {
          return { intent: 'parent_owes_kid', kids: [kids[0]], amount: parseAmount(text), note: text };
        }
        if (debtVerbMatch && kids.length >= 2) return { intent: 'record_debt', kids, amount: parseAmount(text), verb: debtVerbMatch[1] };
        if (debtVerbMatch && kids.length === 1 && /\b(me|us|parents?)\b/.test(normalized)) return { intent: 'kid_owes_parent', kids, amount: parseAmount(text) };
        if (/\b(spent|bought|purchased)\b/.test(normalized) && kids.length) return { intent: 'kid_spent', kids: [kids[0]], amount: parseAmount(text), note: text };
        if (/\b(paid|gave|pay)\b/.test(normalized) && kids.length) return { intent: 'record_payment', kids: [kids[0]], amount: parseAmount(text) };
        if (kids.length && parsePoints(text) !== null && /\b(remove|subtract|take away|deduct|lose|lost)\b/.test(normalized)) {
          return { intent: 'freepoints', kids, points: -parsePoints(text) };
        }
        if (kids.length && parsePoints(text) !== null && /\b(gets?|earns?|earned|give|add|award)\b/.test(normalized)) {
          return { intent: 'freepoints', kids, points: parsePoints(text) };
        }
        if (/\bpoints?\s+for\b/.test(normalized) && kids.length && parsePoints(text) !== null) {
          return { intent: 'freepoints', kids, points: parsePoints(text) };
        }
        if (/\b(change|update|should be)\b/.test(normalized) || (/\bmake\b/.test(normalized) && /\bpoints?\b/.test(normalized) && parsePoints(text) !== null)) {
          const choreText = text.replace(/\b(change|make|update|should be)\b/gi, ' ').trim();
          const match = inferChore(choreText);
          return { intent: 'change_points', choreId: match && match.choreId, choreLabel: match && match.chore && match.chore.label, points: parsePoints(text), confidence: match ? match.score : 0 };
        }
        if (/\bpoints?\b/.test(normalized) && parsePoints(text) !== null && kids.length) {
          var explicitPts = parsePoints(text);
          var choreMatch = inferChore(text);
          if (/\b(new chore|something new|something extra)\b/.test(normalized)) {
            return { intent: 'adhoc', kids, points: explicitPts, choreLabel: extractAdhocLabel(text, kids) };
          }
          if (/\b(remove|subtract|take away|deduct|lose|lost)\b/.test(normalized)) {
            return { intent: 'freepoints', kids, points: -explicitPts };
          }
          if (choreMatch && choreMatch.score >= 0.5) {
            return { intent: 'log_chore', kids, choreId: choreMatch.choreId, choreLabel: choreMatch.chore.label, points: explicitPts };
          }
          if (choreMatch && choreMatch.score >= 0.3) {
            return { intent: 'confirm_chore', kids, choreId: choreMatch.choreId, choreLabel: choreMatch.chore.label, points: explicitPts };
          }
          return { intent: 'freepoints', kids, points: explicitPts };
        }
        if (isQuestion(text)) return { intent: 'check_status', kids };

        const clauses = splitClauses(text);
        const actions = [];
        for (const clause of clauses) {
          const clauseKids = extractKidIds(clause).length ? extractKidIds(clause) : kids;
          if (!clauseKids.length) return { intent: 'missing_kid' };
          const match = inferChore(clause);
          if (match && match.score >= 0.5) {
            actions.push({ intent: 'log_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(clause) });
            continue;
          }
          if (match && match.score >= 0.3) {
            return { intent: 'confirm_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(clause) };
          }
        }
        if (actions.length) return { intent: 'log_chore', multi: actions };
        if (kids.length && parsePoints(text) !== null) return { intent: 'adhoc', kids, points: parsePoints(text), choreLabel: extractAdhocLabel(text, kids) };
        if (!kids.length) return { intent: 'missing_kid' };
        return { intent: 'no_match' };
      }

      async function getLogEntriesByDate(dateStr) {
        const snapshot = await database.ref('families/' + familyId + '/log').orderByChild('date').equalTo(dateStr).get();
        return snapshot.exists() ? Object.entries(snapshot.val()).map(([id, value]) => ({ id, ...value })) : [];

      async function getAllLogEntries() {
        const snapshot = await database.ref('families/' + familyId + '/log').get();
        return snapshot.exists() ? Object.entries(snapshot.val()).map(([id, value]) => ({ id, ...value })) : [];

      async function getAllPayments() {
        const snapshot = await database.ref('families/' + familyId + '/payments').get();
        return snapshot.exists() ? Object.entries(snapshot.val()).map(([id, value]) => ({ id, ...value })) : [];
