<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Family Hub</title>
  <meta name="theme-color" content="#4a90d9">
  <meta name="description" content="Family hub for chores, lists, and finances.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-source.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-alt: #edf4ff;
      --line: #d7e0ee;
      --text: #1f2937;
      --muted: #64748b;
      --alex: #4a90d9;
      --louisa: #8a5bd1;
      --danger: #d64545;
      --success: #22c55e;
      --warning: #f59e0b;
      --invest: #2563eb;
      --jamie: #3a8a52;
      --shadow: 0 18px 44px rgba(39, 58, 87, 0.12);
      --radius: 20px;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-pill: 999px;
      --shadow-xs: 0 2px 8px rgba(15, 23, 42, 0.05);
      --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 10px 24px rgba(15, 23, 42, 0.1);
      --shadow-lg: 0 18px 44px rgba(15, 23, 42, 0.14);
      --shadow-xl: 0 24px 56px rgba(15, 23, 42, 0.2);
      --tap: 48px;
      --font-xs: 0.75rem;
      --font-sm: 0.85rem;
      --font-base: 0.95rem;
      --font-md: 1.1rem;
      --font-lg: 1.3rem;
      --font-xl: 1.6rem;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 144, 217, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(138, 91, 209, 0.14), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(100%, 720px);
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: calc(134px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(215, 224, 238, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hub-card {
      background: var(--panel);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.1);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .hub-section-head {
      margin: 0 0 12px;
      padding: 0;
      font-size: var(--font-md);
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .hub-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: var(--font-sm);
    }

    .bulletin-empty,
    .fun-empty,
    .list-empty,
    .settings-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: var(--font-sm);
    }

    .chore-section-label,
    .bulletin-toolbar h2,
    .bulletin-calendar-head h3,
    .lists-section-head h3 {
      margin: 0 0 12px;
      padding: 0;
      font-size: var(--font-md);
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      padding: 0;
      padding-top: calc(8px + env(safe-area-inset-top));
      flex-shrink: 0;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 50%, #3b6fa0 100%);
      border: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 20px rgba(30, 58, 95, 0.25);
      color: #fff;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-md);
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: var(--font-md);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: #fff;
    }

    .brand small {
      color: rgba(255, 255, 255, 0.6);
      font-size: var(--font-sm);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      min-width: var(--tap);
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 14px;
      background: var(--panel-alt);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }

    .icon-btn:active {
      transform: scale(0.93);
    }

    .header .icon-btn {
      min-width: var(--tap);
      min-height: var(--tap);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.9);
    }

    .header .icon-btn:active {
      background: rgba(255, 255, 255, 0.22);
    }

    .header-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.4);
      flex: 0 0 auto;
    }

    .sync-dot.online {
      background: #4ade80;
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.25);
    }

    .family-panel[hidden] {
      display: none;
    }

    .family-panel {
      margin: 0 12px 12px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
      border: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .family-panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .family-panel-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .family-panel-copy strong {
      font-size: var(--font-sm);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .family-panel-copy code {
      font-size: var(--font-base);
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .family-panel-note {
      margin: 0;
      color: var(--muted);
      font-size: var(--font-base);
    }

    .family-panel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .family-calendar-form {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .settings-field {
      display: grid;
      gap: 6px;
    }

    .settings-field label {
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--muted);
    }

    .family-calendar-form input {
      width: 100%;
      min-height: var(--tap);
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    .settings-empty {
      display: grid;
      gap: 8px;
    }

    .settings-empty strong {
      font-size: var(--font-base);
    }

    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      min-width: 0;
      gap: 12px;
    }

    .view.active {
      display: flex;
      animation: viewIn 0.2s ease-out;
    }

    @keyframes viewIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .view-content {
      padding: 0 4px;
    }

    .tab-bar {
      display: flex;
      position: fixed;
      left: 50%;
      bottom: 0;
      width: calc(100% - 32px);
      max-width: 720px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      padding-bottom: env(safe-area-inset-bottom);
      flex-shrink: 0;
      z-index: 110;
    }

    /* -- Home / Bulletin -- */

    /* -- Home / Bulletin Tab -- */

    .bulletin-shell {
      display: grid;
      gap: 0;
    }

    .bulletin-shell h2,
    .bulletin-shell h3,
    .bulletin-shell p {
      margin: 0;
    }

    /* Notes toolbar — minimal, content-first */
    .bulletin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 2px 8px;
    }

    .bulletin-toolbar h2 {
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .bulletin-add-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: var(--font-lg);
      font-weight: 400;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      transition: transform 0.12s ease, background 0.12s ease;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .bulletin-add-btn:active {
      transform: scale(0.9);
      background: var(--panel-alt);
    }

    /* Compose form */
    .bulletin-compose {
      display: grid;
      gap: 10px;
      padding: 14px;
      margin: 0 0 10px;
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
      animation: composeSlide 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes composeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bulletin-compose textarea {
      width: 100%;
      min-height: 72px;
      padding: 12px;
      border: 1.5px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      background: var(--bg);
      font: inherit;
      font-size: var(--font-base);
      color: var(--text);
      resize: vertical;
    }

    .bulletin-compose textarea:focus {
      outline: none;
      border-color: var(--alex);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.12);
    }

    .bulletin-compose-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bulletin-compose select {
      flex: 1;
      min-height: var(--tap);
      padding: 0 10px;
      border: 1.5px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      background: var(--panel);
      font: inherit;
      font-size: var(--font-base);
      color: var(--text);
    }

    .bulletin-compose-pin {
      min-height: var(--tap);
      padding: 0 20px;
      border: 0;
      border-radius: 10px;
      background: var(--text);
      color: var(--panel);
      font: inherit;
      font-size: var(--font-base);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .bulletin-compose-pin:active {
      opacity: 0.75;
    }

    .bulletin-compose-cancel {
      min-height: var(--tap);
      padding: 0 14px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: var(--font-base);
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Sticky notes grid — real sticky note look */
    .bulletin-notes-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 0 12px;
    }

    @media (min-width: 520px) {
      .bulletin-notes-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .bulletin-note-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 120px;
      padding: 16px 14px 12px;
      border-radius: 2px;
      box-shadow:
        1px 2px 4px rgba(0, 0, 0, 0.05),
        3px 5px 14px rgba(0, 0, 0, 0.07);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    /* Tape strip effect at top center */
    .bulletin-note-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
      width: 40px;
      height: 10px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 1px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .bulletin-note-card.neutral {
      background: linear-gradient(165deg, #fff9c4 0%, #fff3a0 100%);
    }

    .bulletin-note-card.alex {
      background: linear-gradient(165deg, #e0effe 0%, #c9e2fc 100%);
    }

    .bulletin-note-card.louisa {
      background: linear-gradient(165deg, #f0e0ff 0%, #e4ccfa 100%);
    }

    .bulletin-note-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: var(--font-base);
      font-weight: 600;
      line-height: 1.45;
      color: rgba(30, 30, 30, 0.82);
      padding-top: 6px;
    }

    .bulletin-note-foot {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 6px;
      padding-top: 8px;
    }

    .bulletin-note-meta {
      font-size: var(--font-xs);
      color: rgba(0, 0, 0, 0.3);
      font-weight: 500;
    }

    .bulletin-note-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      min-width: 30px;
      border: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.05);
      color: rgba(0, 0, 0, 0.35);
      font-size: var(--font-sm);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .bulletin-note-delete:active {
      background: rgba(214, 69, 69, 0.2);
      color: var(--danger);
    }

    .bulletin-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
    }

    .bulletin-empty-icon {
      font-size: var(--font-xl);
      opacity: 0.35;
      margin-bottom: 4px;
    }

    .bulletin-empty p {
      font-size: var(--font-sm);
    }

    /* Section divider — subtle */
    .bulletin-divider {
      height: 1px;
      background: rgba(148, 163, 184, 0.15);
      margin: 6px 0 2px;
    }

    /* Calendar section */
    .bulletin-calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 2px 6px;
    }

    .bulletin-calendar-head h3 {
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .calendar-groups {
      display: grid;
      gap: 0;
    }

    .calendar-day-group {
      display: grid;
      gap: 0;
    }

    .calendar-day-label {
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 12px 0 6px;
    }

    .calendar-day-group:first-child .calendar-day-label {
      padding-top: 4px;
    }

    .calendar-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel);
      margin-bottom: 4px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
      transition: background 0.12s;
    }

    .calendar-item:active {
      background: var(--panel-alt);
    }

    .calendar-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .calendar-item-dot.alex { background: var(--alex); }
    .calendar-item-dot.louisa { background: var(--louisa); }
    .calendar-item-dot.jameson { background: #3a8a52; }
    .calendar-item-dot.both { background: linear-gradient(135deg, var(--alex), var(--louisa)); }

    .calendar-item-body {
      flex: 1;
      min-width: 0;
    }

    .calendar-item-title {
      font-weight: 600;
      font-size: var(--font-base);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .calendar-item-time {
      font-size: var(--font-sm);
      color: var(--muted);
      margin-top: 1px;
    }

    .calendar-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .calendar-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .calendar-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 7px;
      border-radius: var(--radius-sm);
      font-size: var(--font-xs);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .calendar-badge.alex {
      background: rgba(74, 144, 217, 0.12);
      color: var(--alex);
    }

    .calendar-badge.louisa {
      background: rgba(138, 91, 209, 0.12);
      color: var(--louisa);
    }

    .calendar-badge.jameson {
      background: rgba(76, 153, 96, 0.12);
      color: #3a8a52;
    }

    .calendar-badge.both {
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
    }

    .calendar-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
    }

    .calendar-empty strong {
      color: var(--text);
      font-size: var(--font-base);
    }

    .calendar-empty p {
      font-size: var(--font-sm);
      color: var(--muted);
    }

    /* Shared btn used by bulletin + calendar */
    .bulletin-btn {
      min-height: 42px;
      padding: 0 16px;
      border: 0;
      border-radius: 10px;
      background: var(--text);
      color: var(--panel);
      font: inherit;
      font-size: var(--font-base);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .bulletin-btn:active { opacity: 0.75; }

    .bulletin-btn.secondary {
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    /* Shared section styles (used by Fun tab) */
    .bulletin-hero {
      display: grid;
      gap: 12px;
    }

    .bulletin-hero h2,
    .bulletin-hero p,
    .bulletin-section-head h3,
    .bulletin-section-head p {
      margin: 0;
    }

    .bulletin-hero p,
    .bulletin-section-head p {
      color: var(--muted);
    }

    .bulletin-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bulletin-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .bulletin-stat-card {
      display: grid;
      gap: 6px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: var(--panel);
    }

    .bulletin-stat-card.alex { background: rgba(74, 144, 217, 0.06); }
    .bulletin-stat-card.louisa { background: rgba(138, 91, 209, 0.06); }
    .bulletin-stat-label { color: var(--muted); font-size: var(--font-sm); }
    .bulletin-stat-value { font-size: var(--font-xl); font-weight: 800; line-height: 1; }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: 56px;
      text-decoration: none;
      color: var(--muted);
      font-size: var(--font-xs);
      font-weight: 600;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab.active {
      color: var(--alex);
    }

    .tab-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      line-height: 1;
    }

    .tab-icon svg {
      display: block;
    }

    .tab-label {
      line-height: 1;
    }

    .bank-kid-picker {
      display: flex;
      gap: 8px;
      padding: 0 4px;
    }

    .bank-kid-picker button {
      flex: 1;
    }

    .drawer-grid {
      display: grid;
      gap: 12px;
    }

    .chores-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
    }

    .chores-title {
      font-size: var(--font-base);
      font-weight: 700;
    }

    .chores-progress-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .chores-progress-card {
      display: grid;
      gap: 10px;
    }

    .chores-progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .chores-progress-name {
      font-weight: 700;
    }

    .chores-progress-meta,
    .chores-progress-note,
    .settings-note,
    .history-item .settings-note {
      font-size: var(--font-sm);
      color: var(--muted);
    }

    .chores-settings[hidden] {
      display: none;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .settings-list {
      display: grid;
      gap: 8px;
    }

    .settings-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .settings-row span:first-child {
      flex: 1;
      min-width: 0;
    }

    .settings-row input,
    .settings-row select {
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      width: 70px;
      min-width: 0;
      flex-shrink: 1;
      font: inherit;
    }

    .settings-row button,
    .settings-btn {
      min-height: 38px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      background: var(--alex);
      color: #fff;
      cursor: pointer;
      flex-shrink: 1;
      min-width: 0;
      font: inherit;
    }

    .settings-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .settings-chip {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
    }

    .settings-chip.active {
      background: var(--alex);
      border-color: var(--alex);
      color: #fff;
    }

    .history-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .history-item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      word-break: break-word;
    }

    .history-item > div {
      min-width: 0;
      overflow: hidden;
    }
    .stat-card {
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(237, 244, 255, 0.9));
      border: 1px solid var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      word-break: break-word;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(39, 58, 87, 0.1);
    }

    .stat-card h2,
    .stat-card h3,
    .stat-card p {
      margin: 0;
    }

    .stat-card h2,
    .stat-card h3 {
      font-size: var(--font-base);
      margin-bottom: 6px;
    }

    .stat-card p {
      color: var(--muted);
      line-height: 1.4;
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 720px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
    }

    .composer input {
      min-height: var(--tap);
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer input:focus {
      outline: none;
      border-color: var(--alex);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    .composer button {
      width: var(--tap);
      min-height: var(--tap);
      padding: 0;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .composer button:active {
      transform: scale(0.92);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
    }

    .send-btn:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.4);
    }

    .btn {
      min-height: var(--tap);
      padding: 0 16px;
      border: 0;
      border-radius: var(--radius-sm);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.97);
      transition: transform 0.08s ease;
    }

    .btn-primary {
      background: var(--alex);
      color: #fff;
    }

    .btn-secondary {
      background: var(--panel-alt);
      color: var(--text);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
    }

    .mic-btn {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .mic-btn:hover {
      background: rgba(138, 91, 209, 0.22);
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(214, 69, 69, 0); }
    }

    .mic-btn.listening {
      background: var(--danger);
      color: #fff;
      animation: micPulse 1.2s ease-in-out infinite;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .card-btn.alex {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      font-weight: 700;
      font-size: var(--font-base);
    }

    .card-btn.louisa {
      background: linear-gradient(135deg, var(--louisa), #6b3fa0);
      color: #fff;
      font-weight: 700;
      font-size: var(--font-base);
    }

    .kid-card {
      position: relative;
      padding: 28px 24px 22px;
      border-radius: 18px;
      color: #fff;
      overflow: hidden;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .kid-card.alex {
      background: linear-gradient(135deg, #4a90d9 0%, #2563a8 50%, #1e4f8a 100%);
      box-shadow: 0 12px 32px rgba(74, 144, 217, 0.35);
    }

    .kid-card.louisa {
      background: linear-gradient(135deg, #8a5bd1 0%, #6b3fa0 50%, #532d80 100%);
      box-shadow: 0 12px 32px rgba(138, 91, 209, 0.35);
    }

    .kid-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .kid-card::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -10%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.75;
    }

    .card-chip {
      width: 36px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #e8d5a0, #c9a84c);
      opacity: 0.85;
    }

    .card-balance {
      position: relative;
      z-index: 1;
      margin: 16px 0 8px;
    }

    .card-balance-amount {
      font-size: var(--font-xl);
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card-balance-label {
      font-size: var(--font-sm);
      opacity: 0.7;
      margin-top: 2px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-size: var(--font-md);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .ytd-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 16px;
      margin-top: 12px;
      border-radius: 18px;
      background: var(--panel-alt);
    }

    .ytd-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .ytd-label {
      font-size: var(--font-xs);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ytd-value {
      font-size: var(--font-lg);
      font-weight: 800;
    }

    .ytd-item.earned .ytd-value { color: #16a34a; }
    .ytd-item.spent .ytd-value { color: var(--danger); }
    .ytd-item.invested .ytd-value { color: var(--alex); }

    .ytd-bar {
      height: 6px;
      min-width: 4px;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .ytd-item.earned .ytd-bar { background: #16a34a; }
    .ytd-item.spent .ytd-bar { background: var(--danger); }
    .ytd-item.invested .ytd-bar { background: var(--alex); }

    .card-statement {
      margin-top: 14px;
    }

    .card-statement h3 {
      font-size: var(--font-base);
      font-weight: 700;
      margin: 0 0 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stmt-list {
      display: grid;
      gap: 0;
    }

    .stmt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid var(--line);
      font-size: var(--font-base);
    }

    .stmt-row:last-child {
      border-bottom: 0;
    }

    .stmt-list .swipe-wrapper:last-child .stmt-row {
      border-bottom: 0;
    }

    .stmt-desc {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stmt-note {
      color: var(--muted);
      font-size: var(--font-sm);
    }

    .stmt-amount {
      font-weight: 700;
      white-space: nowrap;
    }

    .stmt-amount.credit {
      color: #16a34a;
    }

    .stmt-amount.debit {
      color: var(--danger);
    }

    .stmt-empty {
      color: var(--muted);
      font-size: var(--font-base);
      padding: 12px 0;
    }

    .quick-points {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    /* -- Chores Tab -- */

    .chore-board {
      display: grid;
      gap: 0;
    }

    .chore-list-note {
      color: var(--muted);
      font-size: var(--font-base);
      text-align: center;
      padding: 20px 8px;
    }

    .chore-section-label {
      padding: 14px 2px 6px;
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .chore-summary {
      text-align: center;
      padding: 10px 0 6px;
      font-size: var(--font-sm);
      font-weight: 600;
      color: var(--muted);
    }

    /* Kid progress cards */
    .chore-kid-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 2px 0;
    }

    .chore-kid-card {
      position: relative;
      background: var(--panel);
      border-radius: 14px;
      padding: 12px 12px 10px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
      text-align: left;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .chore-kid-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
      transition: height 0.25s ease, opacity 0.25s ease;
      opacity: 0.7;
    }

    .chore-kid-card.alex::before { background: linear-gradient(90deg, var(--alex), #60a5fa); }
    .chore-kid-card.louisa::before { background: linear-gradient(90deg, var(--louisa), #a78bfa); }

    .chore-kid-card:active {
      transform: scale(0.97);
    }

    /* Default: both active */
    .chore-kid-card.alex { border-color: rgba(74, 144, 217, 0.2); }
    .chore-kid-card.louisa { border-color: rgba(138, 91, 209, 0.2); }

    .chore-kid-selector {
      display: grid;
      gap: 6px;
    }

    .chore-kid-selector-label {
      font-size: var(--font-xs);
      color: var(--muted);
      text-align: center;
      padding: 2px 0 0;
    }

    .chore-kid-selector-label strong {
      color: var(--text);
      font-weight: 700;
    }

    /* Selected state */
    .chore-kid-card.selected {
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
    }

    .chore-kid-card.selected::before {
      height: 4px;
      opacity: 1;
    }

    .chore-kid-card.selected.alex {
      border-color: var(--alex);
      background: linear-gradient(180deg, rgba(74, 144, 217, 0.06) 0%, var(--panel) 100%);
    }

    .chore-kid-card.selected.louisa {
      border-color: var(--louisa);
      background: linear-gradient(180deg, rgba(138, 91, 209, 0.06) 0%, var(--panel) 100%);
    }

    /* Dimmed state */
    .chore-kid-card.dimmed {
      opacity: 0.4;
      border-color: transparent;
      box-shadow: none;
      transform: scale(0.97);
    }

    .chore-kid-card.dimmed::before {
      opacity: 0.3;
    }

    .chore-kid-card-name {
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .chore-kid-card.alex .chore-kid-card-name { color: var(--alex); }
    .chore-kid-card.louisa .chore-kid-card-name { color: var(--louisa); }

    .chore-kid-card-pts {
      font-size: var(--font-lg);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    .chore-kid-card-pay {
      font-size: var(--font-sm);
      color: var(--muted);
      font-weight: 600;
      margin-top: 3px;
      line-height: 1.3;
    }

    .chore-tier-bar {
      margin-top: 8px;
    }

    .chore-bar-track {
      position: relative;
      height: 5px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 999px;
      overflow: visible;
    }

    .chore-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .chore-bar-fill.alex { background: linear-gradient(90deg, var(--alex), #60a5fa); }
    .chore-bar-fill.louisa { background: linear-gradient(90deg, var(--louisa), #a78bfa); }

    .chore-tier-mark {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 9px;
      background: rgba(148, 163, 184, 0.4);
      border-radius: 1px;
      transform: translateX(-1px);
    }

    .chore-bonus-zone {
      position: absolute;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #15803d);
      border-radius: 0 999px 999px 0;
      opacity: 0.7;
    }

    .chore-tier-labels {
      position: relative;
      height: 14px;
      margin-top: 3px;
    }

    .chore-tier-labels span {
      position: absolute;
      transform: translateX(-50%);
      font-size: var(--font-xs);
      font-weight: 700;
      color: var(--muted);
    }

    .chore-kid-card-bonus {
      font-size: var(--font-xs);
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.3;
    }

    /* Quick-add points */
    .chore-quick-add {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 6px 0 4px;
    }

    .chore-quick-add .qp-pts {
      min-height: 36px;
      border: 0;
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: var(--font-base);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
      -webkit-tap-highlight-color: transparent;
    }

    .chore-quick-add .qp-pts:active {
      transform: scale(0.93);
      background: var(--panel-alt);
      box-shadow: none;
    }

    /* Chore tiles */
    .chore-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .chore-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 64px;
      padding: 10px 8px;
      border: 0;
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 1px 6px rgba(15, 23, 42, 0.05);
      color: var(--text);
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    .chore-tile:active {
      transform: scale(0.95);
      box-shadow: none;
    }

    .chore-tile.logged {
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.08) 0%, var(--panel) 100%);
      box-shadow: 0 1px 6px rgba(34, 197, 94, 0.1);
    }

    .chore-tile.cooldown {
      opacity: 0.45;
      pointer-events: none;
    }

    .chore-tile-label {
      font-size: var(--font-sm);
      font-weight: 600;
      line-height: 1.2;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .chore-tile-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chore-tile-pts {
      font-size: var(--font-xs);
      font-weight: 700;
      color: var(--muted);
    }

    .chore-tile.logged .chore-tile-pts {
      color: #16a34a;
    }

    .chore-tile-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #22c55e;
      color: #fff;
      font-size: var(--font-xs);
      font-weight: 800;
    }

    /* Today's log */
    .chore-log {
      display: grid;
      gap: 6px;
    }

    .chore-log-day-label {
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 10px 0 4px;
    }

    .chore-log-day-label:first-child {
      padding-top: 4px;
    }

    .chore-log-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
      border-left: 3px solid var(--muted);
      transition: background 0.12s;
    }

    .chore-log-entry.alex { border-left-color: var(--alex); }
    .chore-log-entry.louisa { border-left-color: var(--louisa); }

    .chore-log-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .chore-log-name {
      font-size: var(--font-sm);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .chore-log-pts-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      font-size: var(--font-xs);
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chore-log-aside {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .chore-log-who {
      font-size: var(--font-xs);
      font-weight: 600;
      color: var(--muted);
    }

    .chore-log-when {
      font-size: var(--font-xs);
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* Lists */
    .lists-shell {
      display: grid;
      gap: 14px;
    }

    .lists-hero {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.16), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
    }

    .lists-hero-head h2,
    .lists-hero-head p,
    .lists-section-head h3,
    .lists-section-head p,
    .list-card-title,
    .list-card-meta,
    .list-detail-title,
    .list-detail-meta,
    .list-group-title,
    .list-empty-title,
    .list-empty-copy {
      margin: 0;
    }

    .lists-hero-head {
      display: grid;
      gap: 4px;
    }

    .lists-hero-head p,
    .lists-section-head p,
    .list-card-meta,
    .list-detail-meta,
    .list-empty-copy {
      color: var(--muted);
    }

    .list-type-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .list-type-tile {
      display: grid;
      gap: 8px;
      justify-items: center;
      min-height: 96px;
      padding: 14px 10px;
      border: 0;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.96));
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .list-type-tile:active {
      transform: scale(0.97);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    }

    .list-type-icon {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: var(--font-lg);
      background: rgba(255,255,255,0.72);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.45);
    }

    .list-type-icon svg,
    .list-card-badge svg,
    .list-detail-icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .list-type-label {
      font-size: var(--font-sm);
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
    }

    .lists-panel {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .lists-section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .list-active-grid {
      display: grid;
      gap: 10px;
    }

    .list-active-card {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .list-active-card:active {
      transform: scale(0.99);
    }

    .list-card-badge {
      width: 42px;
      height: 42px;
      min-width: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      color: #fff;
      font-size: var(--font-lg);
      font-weight: 700;
    }

    .list-card-copy {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .list-card-title {
      font-size: var(--font-base);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-card-meta {
      font-size: var(--font-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-card-count {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
      font-size: var(--font-xs);
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .list-detail-shell {
      display: grid;
      gap: 12px;
    }

    .list-detail-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .list-detail-head {
      display: grid;
      gap: 12px;
    }

    .list-detail-accent {
      height: 5px;
      border-radius: 999px;
    }

    .list-detail-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .list-detail-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      color: #fff;
      font-size: var(--font-lg);
      font-weight: 700;
    }

    .list-detail-copy {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .list-detail-title {
      font-size: var(--font-md);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-detail-meta {
      font-size: var(--font-sm);
    }

    .list-btn,
    .list-action-btn,
    .list-add-btn,
    .list-inline-btn {
      min-height: var(--tap);
      padding: 0 14px;
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .list-btn.secondary,
    .list-action-btn.secondary,
    .list-inline-btn.secondary {
      background: var(--panel-alt);
      color: var(--text);
    }

    .list-settings-btn {
      width: var(--tap);
      min-width: var(--tap);
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
    }

    .list-settings-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .list-settings-panel {
      display: none;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(248, 250, 252, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .list-settings-panel.open {
      display: grid;
    }

    .list-add-row {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .list-add-input {
      flex: 1;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    .list-add-category {
      min-height: 46px;
      max-width: 180px;
      padding: 0 10px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: var(--font-sm);
    }

    .list-groups,
    .list-flat {
      display: grid;
      gap: 12px;
    }

    .list-group {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.94), #ffffff);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .list-group-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 2px 0;
    }

    .list-group-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .list-group-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .list-group-title {
      font-size: var(--font-xs);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .list-group-empty {
      padding: 12px 16px;
      color: var(--muted);
      font-size: var(--font-sm);
      font-style: italic;
    }

    .list-items {
      display: grid;
      gap: 8px;
    }

    .swipe-wrapper,
    .list-item-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }

    .swipe-wrapper.dragging-active .swipe-action,
    .list-item-wrapper.dragging-active .list-swipe-action {
      display: none;
    }

    .swipe-action,
    .list-swipe-action {
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 0;
    }

    .swipe-wrapper.swiping-left .swipe-action.left,
    .swipe-wrapper.swiping-right .swipe-action.right,
    .list-item-wrapper.swiping-left .list-swipe-action.left,
    .list-item-wrapper.swiping-right .list-swipe-action.right {
      opacity: 1;
    }

    .swipe-surface,
    .list-item {
      z-index: 1;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .swipe-action,
    .list-swipe-action {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-xs);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      pointer-events: none;
    }

    .swipe-action.left,
    .list-swipe-action.left {
      right: 0;
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .swipe-action.right,
    .list-swipe-action.right {
      left: 0;
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .list-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
      will-change: transform;
    }

    .list-item.swiping {
      transition: none;
    }

    .list-item.done {
      opacity: 0.82;
    }

    .list-item.dragging {
      opacity: 1;
      z-index: 10;
      background: var(--panel-alt);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
      transition: none;
    }

    .list-item.drag-ghost {
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.22);
    }

    .list-item-text {
      flex: 1;
      min-width: 0;
      font-size: var(--font-base);
      line-height: 1.35;
      word-break: break-word;
    }

    .list-item.done .list-item-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .list-drag-handle {
      width: 28px;
      min-width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: var(--muted);
      background: rgba(148, 163, 184, 0.12);
      touch-action: none;
      cursor: grab;
    }

    .list-drag-handle svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .list-swipe-hint {
      font-size: var(--font-xs);
      color: var(--muted);
      text-align: center;
      padding-top: 2px;
    }

    .list-empty {
      display: grid;
      gap: 6px;
      justify-items: start;
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed rgba(148, 163, 184, 0.22);
      background: rgba(248, 250, 252, 0.9);
    }

    .list-empty-title {
      font-weight: 700;
    }

    .list-swipe-hint {
      font-size: var(--font-xs);
      color: var(--muted);
    }

    .list-tint-grocery { background: linear-gradient(180deg, rgba(34, 197, 94, 0.18), rgba(34, 197, 94, 0.08)); }
    .list-tint-costco { background: linear-gradient(180deg, rgba(232, 93, 4, 0.18), rgba(232, 93, 4, 0.08)); }
    .list-tint-lakehouse { background: linear-gradient(180deg, rgba(14, 165, 233, 0.18), rgba(14, 165, 233, 0.08)); }
    .list-tint-packing { background: linear-gradient(180deg, rgba(139, 92, 246, 0.18), rgba(139, 92, 246, 0.08)); }
    .list-tint-todo { background: linear-gradient(180deg, rgba(148, 163, 184, 0.18), rgba(148, 163, 184, 0.08)); }
    .list-tint-custom { background: linear-gradient(180deg, rgba(15, 23, 42, 0.12), rgba(15, 23, 42, 0.05)); }

    @media (max-width: 640px) {
      .list-type-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .list-add-row {
        flex-wrap: wrap;
      }

      .list-add-category {
        flex: 1 1 180px;
        max-width: none;
      }

      .list-add-btn,
      .list-btn,
      .list-action-btn,
      .list-inline-btn {
        flex: 1 1 140px;
      }

      .list-active-card {
        align-items: flex-start;
      }
    }

    /* Legacy qp styles kept for bank picker */
    .qp-row {
      display: flex;
      gap: 8px;
    }

    .qp-kid {
      min-height: var(--tap);
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: var(--font-base);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }

    .qp-kid:active {
      transform: scale(0.94);
    }

    .qp-kid.alex { color: var(--alex); }
    .qp-kid.louisa { color: var(--louisa); }
    .qp-kid.both { color: var(--muted); }

    .qp-kid.active.alex { background: var(--alex); color: #fff; border-color: var(--alex); }
    .qp-kid.active.louisa { background: var(--louisa); color: #fff; border-color: var(--louisa); }
    .qp-kid.active.both { background: var(--muted); color: #fff; border-color: var(--muted); }


    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: var(--font-sm);
      font-weight: 600;
      background: #f1f5f9;
      color: var(--muted);
    }

    .badge.alex {
      background: rgba(74, 144, 217, 0.14);
      color: var(--alex);
    }

    .badge.louisa {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(4px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: min(100%, 440px);
      padding: 20px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.28);
      display: grid;
      gap: 14px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.25s ease;
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2,
    .modal p {
      margin: 0;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.45;
    }

    .modal-actions {
      display: grid;
      gap: 10px;
    }

    .modal-actions button,
    .modal-actions input {
      min-height: var(--tap);
      border-radius: 14px;
    }

    .app-modal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(4px);
      z-index: 1200;
    }

    .app-modal {
      width: min(92vw, 360px);
      display: grid;
      gap: 14px;
      padding: 22px;
      border-radius: 20px;
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
    }

    .app-modal-title {
      margin: 0;
      font-size: var(--font-md);
      font-weight: 800;
      color: var(--text);
    }

    .app-modal-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .app-modal-input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font: inherit;
      box-sizing: border-box;
    }

    .app-modal-input:focus {
      outline: none;
      border-color: var(--alex);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.14);
    }

    .app-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .app-modal-btn {
      min-height: var(--tap);
      padding: 0 16px;
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app-modal-btn.cancel {
      background: var(--panel-alt);
      color: var(--text);
    }

    .app-modal-btn.confirm {
      background: var(--alex);
      color: #fff;
    }

    .app-modal-btn.confirm.destructive {
      background: #ef4444;
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.25);
    }

    .primary:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.35);
    }

    .primary:active {
      transform: scale(0.97);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .secondary:hover {
      background: var(--panel-alt);
    }

    .secondary:active {
      transform: scale(0.97);
    }

    .family-join {
      display: grid;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid #e8eef7;
    }

    .family-join input {
      padding: 0 14px;
      border: 1px solid var(--line);
    }

    .status {
      min-height: 1.2em;
      color: var(--muted);
      font-size: var(--font-base);
    }

    .status.error {
      color: var(--danger);
    }

    .toast-container {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
      width: calc(100% - 32px);
      max-width: 400px;
      pointer-events: none;
    }

    .toast {
      padding: 14px 18px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
      pointer-events: auto;
      border-left: 5px solid var(--muted);
      line-height: 1.4;
      font-size: var(--font-base);
    }

    .toast.alex { border-left-color: var(--alex); }
    .toast.louisa { border-left-color: var(--louisa); }
    .toast.system { border-left-color: var(--alex); }
    .toast.error { border-left-color: var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .toast.out {
      animation: toastOut 0.3s ease-in forwards;
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    .toast-undo {
      background: var(--panel-alt);
      border: 0;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: var(--font-sm);
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      flex-shrink: 0;
    }

    .toast-undo:active {
      transform: scale(0.95);
    }

    .score-actions {
      display: grid;
      gap: 10px;
    }

    .score-action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel);
    }

    .score-action button {
      min-height: var(--tap);
      padding: 0 12px;
      border: 0;
      border-radius: var(--radius-sm);
      background: var(--alex);
      color: #fff;
      cursor: pointer;
    }

    .score-empty {
      color: var(--muted);
      font-size: var(--font-base);
    }

    .score-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .score-name {
      font-weight: 700;
    }

    .score-pay {
      font-size: var(--font-base);
      color: var(--muted);
    }

    .score-next {
      font-size: var(--font-sm);
      color: var(--muted);
      font-weight: 700;
    }

    .progress {
      height: 10px;
      border-radius: var(--radius-pill);
      background: rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--alex), #2563eb);
    }

    .progress.louisa span {
      background: linear-gradient(90deg, var(--louisa), #9333ea);
    }

    .progress.bonus span {
      background: linear-gradient(90deg, var(--success), #15803d);
    }

    .fun-shell {
      padding: 16px 16px 24px;
      display: grid;
      gap: 14px;
    }

    .fun-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .fun-tile {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 14px 16px;
      border: 0;
      border-radius: var(--radius-lg);
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 42%), linear-gradient(180deg, var(--tile-color), var(--tile-color));
      color: #fff;
      cursor: pointer;
      min-height: var(--tap);
      box-shadow: var(--shadow-sm);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }

    .fun-tile:active {
      transform: scale(0.96);
      box-shadow: var(--shadow-sm);
    }

    .fun-tile-icon {
      font-size: 1.5rem;
      line-height: 1;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .fun-tile-icon svg {
      width: 28px;
      height: 28px;
      display: block;
    }

    .fun-tile-label {
      font-size: var(--font-sm);
      font-weight: 700;
      text-align: left;
    }

    .fun-tile-sub {
      font-size: var(--font-xs);
      opacity: 0.88;
      text-align: left;
    }

    .fun-card {
      padding: 18px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .fun-card,
    .stat-card,
    .list-active-card,
    .list-detail-card,
    .bulletin-note-card,
    .chore-kid-card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.1);
      box-shadow: var(--shadow-sm);
    }

    .fun-card h3,
    .fun-card p,
    .fun-card h4 {
      margin: 0;
    }

    .centered {
      justify-items: center;
      text-align: center;
    }

    .fun-card p {
      color: var(--muted);
    }

    .fun-activity-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }

    .fun-activity-head h2 {
      flex: 1;
      font-size: var(--font-lg);
      font-weight: 800;
      margin: 0;
    }

    .fun-activity-head .hub-section-head {
      flex: 1;
      margin: 0;
    }

    .fun-back-btn {
      min-height: var(--tap);
      padding: 8px 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: var(--radius-sm);
      background: rgba(237, 244, 255, 0.9);
      color: var(--text);
      font: inherit;
      font-size: var(--font-sm);
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .fun-empty {
      color: var(--muted);
    }

    .fun-joke-setup {
      font-size: var(--font-lg);
      font-weight: 700;
      line-height: 1.45;
      text-align: center;
    }

    .joke-punchline {
      font-weight: 800;
      color: var(--alex);
      font-size: var(--font-md);
      text-align: center;
      animation: jokeBounce 0.3s ease-out;
    }

    .fun-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .fun-btn {
      min-height: var(--tap);
      padding: 0 16px;
      border: 0;
      border-radius: var(--radius-sm);
      background: var(--alex);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .fun-btn.secondary {
      background: var(--panel-alt);
      color: var(--text);
    }

    .fun-btn.starred {
      background: var(--warning);
      color: #fff;
    }

    .fun-btn.invest {
      background: var(--invest);
      color: #fff;
    }

    .fun-meta {
      font-size: var(--font-sm);
      color: var(--muted);
    }

    .fun-input {
      width: 100%;
      min-height: var(--tap);
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    .ttt-status,
    .c4-status,
    .bs-status {
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--muted);
    }

    .ttt-status strong,
    .c4-status strong,
    .bs-status strong {
      color: var(--text);
    }

    .ttt-status .alex,
    .c4-status .red,
    .bs-status .alex,
    .game-scoreboard .alex {
      color: var(--alex);
    }

    .ttt-status .louisa,
    .c4-status .yellow,
    .bs-status .louisa,
    .game-scoreboard .louisa {
      color: var(--louisa);
    }

    .ttt-board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .ttt-cell {
      min-height: 84px;
      border: 0;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, #f8fbff, #eef4ff);
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.14);
      font-size: 2rem;
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ttt-cell.x {
      color: var(--alex);
    }

    .ttt-cell.o {
      color: var(--louisa);
    }

    .ttt-cell.win {
      box-shadow: inset 0 0 0 2px rgba(34, 197, 94, 0.3);
      background: linear-gradient(180deg, #f5fff7, #e7f9ec);
    }

    .game-scoreboard {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: var(--font-sm);
      color: var(--muted);
      font-weight: 700;
    }

    .game-scoreboard strong.alex {
      color: var(--alex);
    }

    .game-scoreboard strong.louisa {
      color: var(--louisa);
    }

    .c4-controls {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .c4-column {
      min-height: var(--tap);
      border: 0;
      border-radius: var(--radius-sm);
      background: var(--panel-alt);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .c4-column:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .c4-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      padding: 8px;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #dceafe, #c7ddfb);
    }

    .c4-cell {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      display: grid;
      place-items: center;
      min-height: 34px;
    }

    .c4-piece {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transform: scale(0.9);
    }

    .c4-piece.red {
      background: var(--alex);
    }

    .c4-piece.yellow {
      background: var(--louisa);
    }

    .c4-cell.win {
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.25) inset;
    }

    .bs-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 6px;
    }

    .bs-cell {
      aspect-ratio: 1 / 1;
      min-height: 34px;
      border: 1px solid rgba(100, 140, 180, 0.3);
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, #c7daf0, #a8c4e0);
      color: var(--text);
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .bs-cell.ship {
      background: linear-gradient(180deg, #6b7d94, #4a5c72);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .bs-cell.hit::after,
    .bs-cell.miss::after {
      content: '';
      position: absolute;
      inset: 28%;
      border-radius: 50%;
    }

    .bs-cell.hit::after {
      background: var(--danger);
      inset: 18%;
      box-shadow: 0 0 6px rgba(214, 69, 69, 0.5);
    }

    .bs-cell.miss::after {
      inset: 32%;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(100, 140, 180, 0.4);
    }

    .bs-cell.sunk {
      background: linear-gradient(180deg, #c0392b, #962d22);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    .bs-setup-meta,
    .bs-legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: var(--font-sm);
      color: var(--muted);
    }

    .bs-handoff {
      text-align: center;
      padding: 28px 18px;
      display: grid;
      gap: 12px;
    }

    .bs-handoff-icon {
      font-size: 2rem;
    }

    .fun-story {
      line-height: 1.7;
      font-size: var(--font-base);
    }

    .fun-progress {
      font-size: var(--font-base);
      color: var(--muted);
    }

    .madlib-highlight {
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 4px;
    }

    .madlib-highlight.alex {
      background: rgba(74, 144, 217, 0.15);
      color: var(--alex);
    }

    .madlib-highlight.louisa {
      background: rgba(138, 91, 209, 0.15);
      color: var(--louisa);
    }

    .hangman-figure {
      width: 100%;
      max-width: 180px;
      justify-self: center;
    }

    .hangman-category,
    .hangman-wrong-count {
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }

    .hangman-word {
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.3rem;
      text-align: center;
    }

    .hangman-letters {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .hangman-letter {
      min-height: var(--tap);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .hangman-letter.correct {
      background: #dcfce7;
      border-color: var(--success);
      color: #15803d;
    }

    .hangman-letter.wrong {
      background: #fef2f2;
      border-color: var(--danger);
      color: var(--danger);
    }

    .hangman-result {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      font-weight: 700;
      text-align: center;
    }

    .hangman-result.won {
      background: #dcfce7;
      color: #15803d;
    }

    .hangman-result.lost {
      background: #fef2f2;
      color: var(--danger);
    }

    .wyr-prompt {
      text-align: center;
      font-size: var(--font-lg);
      font-weight: 700;
      color: var(--muted);
      padding: 8px 0;
    }

    .wyr-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .wyr-option {
      width: 100%;
      min-height: 76px;
      padding: 24px 20px;
      border: 2px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      font-size: var(--font-md);
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      color: var(--text);
      line-height: 1.4;
      transition: transform 0.1s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .wyr-option:active {
      transform: scale(0.97);
    }

    .wyr-a:active {
      border-color: var(--alex);
      background: rgba(74, 144, 217, 0.08);
    }

    .wyr-b:active {
      border-color: var(--louisa);
      background: rgba(138, 91, 209, 0.08);
    }

    .wyr-or {
      font-size: var(--font-sm);
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .trivia-question {
      font-size: var(--font-lg);
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      padding: 8px 0;
    }

    .trivia-choices {
      display: grid;
      gap: 10px;
    }

    .trivia-choice {
      width: 100%;
      min-height: 56px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel);
      font: inherit;
      font-size: var(--font-base);
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      transition: transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .trivia-choice:active:not(:disabled) {
      transform: scale(0.97);
    }

    .trivia-choice.correct {
      background: #dcfce7;
      border-color: var(--success);
      color: #15803d;
    }

    .trivia-choice.wrong {
      background: #fef2f2;
      border-color: var(--danger);
      color: var(--danger);
    }

    .trivia-choice.dimmed {
      opacity: 0.45;
    }

    .trivia-score {
      font-size: var(--font-sm);
      color: var(--muted);
      font-weight: 700;
    }

    .fun-card.centered {
      text-align: center;
    }

    .fun-card.centered .fun-actions {
      justify-content: center;
    }

    @keyframes jokeBounce {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 560px) {
      .fun-activity-head {
        flex-wrap: wrap;
      }

      .fun-activity-head h2 {
        width: 100%;
      }

      .hangman-letters {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .app {
        min-height: calc(100vh - 12px);
        padding-bottom: calc(134px + env(safe-area-inset-bottom));
      }

      .tab-bar {
        width: calc(100% - 12px);
      }

      .header-main {
        padding: 10px 14px 14px;
      }

      .brand small {
        font-size: var(--font-sm);
      }

      .quick-points {
        padding: 8px 10px;
      }

      .composer {
        gap: 8px;
        width: calc(100% - 12px);
      }

      .composer input {
        min-width: 0;
      }

      .tab {
        min-height: 52px;
        font-size: var(--font-xs);
      }

      .tab-icon svg {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>
  <main class="app">
    <section class="header" aria-label="App header">
      <div class="header-main">
        <div class="brand">
          <div class="brand-icon">&#127968;</div>
          <div class="brand-text">
            <h1 id="headerTitle">Family Hub</h1>
            <small id="familyLabel"></small>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="headerSettingsButton" aria-label="Open settings"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
        </div>
      </div>
      <section class="family-panel" id="headerSettingsPanel" hidden></section>
    </section>

    <!-- Bulletin View -->
    <div class="view active" id="viewBulletin">
      <div id="bulletinContent" class="view-content"></div>
    </div>

    <!-- Chores View -->
    <div class="view" id="viewChores">
      <div id="choreKidCards"></div>
      <div class="chore-quick-add" id="choreQuickAdd">
        <button type="button" class="qp-pts" data-qp-pts="1">+1</button>
        <button type="button" class="qp-pts" data-qp-pts="2">+2</button>
        <button type="button" class="qp-pts" data-qp-pts="3">+3</button>
        <button type="button" class="qp-pts" data-qp-pts="4">+4</button>
      </div>
      <section id="choreProgress" aria-live="polite"></section>
    </div>

    <!-- Fun View -->
    <div class="view" id="viewFun">
      <div id="funContent" class="view-content"></div>
    </div>

    <!-- Lists View -->
    <div class="view" id="viewLists">
      <div id="listsContent" class="view-content">
        <p style="color:var(--muted);text-align:center;padding:40px 16px">Loading...</p>
      </div>
    </div>

    <!-- Bank View -->
    <div class="view" id="viewBank">
      <div class="bank-kid-picker" id="bankKidPicker">
        <button type="button" class="qp-kid alex active" data-bank-kid="alex">Alex</button>
        <button type="button" class="qp-kid louisa" data-bank-kid="louisa">Louisa</button>
      </div>
      <div id="cardContent"></div>
      <section id="scoreboardPanel" aria-label="Scoreboard">
        <div class="drawer-grid"></div>
      </section>
