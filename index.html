<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Family Hub</title>
  <meta name="theme-color" content="#4a90d9">
  <meta name="description" content="Family hub for chores, lists, and finances.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-alt: #edf4ff;
      --line: #d7e0ee;
      --text: #1f2937;
      --muted: #64748b;
      --alex: #4a90d9;
      --louisa: #8a5bd1;
      --danger: #d64545;
      --shadow: 0 18px 44px rgba(39, 58, 87, 0.12);
      --radius: 20px;
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(74, 144, 217, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(138, 91, 209, 0.14), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(100%, 720px);
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: calc(134px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(215, 224, 238, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      padding: 0;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 50%, #3b6fa0 100%);
      border: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 20px rgba(30, 58, 95, 0.25);
      color: #fff;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: #fff;
    }

    .brand small {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      min-width: var(--tap);
      min-height: var(--tap);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 14px;
      background: var(--panel-alt);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }

    .icon-btn:active {
      transform: scale(0.93);
    }

    .header .icon-btn {
      min-width: 40px;
      min-height: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.9);
    }

    .header .icon-btn:active {
      background: rgba(255, 255, 255, 0.22);
    }

    .header-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.4);
      flex: 0 0 auto;
    }

    .sync-dot.online {
      background: #4ade80;
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.25);
    }

    .family-panel[hidden] {
      display: none;
    }

    .family-panel {
      margin: 0 12px 12px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
      border: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .family-panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .family-panel-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .family-panel-copy strong {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .family-panel-copy code {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .family-panel-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .family-panel-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .family-calendar-form {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .family-calendar-form input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    .settings-empty {
      display: grid;
      gap: 8px;
    }

    .settings-empty strong {
      font-size: 0.95rem;
    }

    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      min-width: 0;
      gap: 12px;
    }

    .view.active {
      display: flex;
      animation: viewIn 0.2s ease-out;
    }

    @keyframes viewIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .view-content {
      padding: 0 4px;
    }

    .tab-bar {
      display: flex;
      position: fixed;
      left: 50%;
      bottom: 0;
      width: calc(100% - 32px);
      max-width: 720px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      flex-shrink: 0;
      z-index: 100;
    }

    /* ── Home / Bulletin ── */

    .bulletin-shell {
      display: grid;
      gap: 0;
    }

    .bulletin-shell h2,
    .bulletin-shell h3,
    .bulletin-shell p {
      margin: 0;
    }

    .bulletin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 2px;
    }

    .bulletin-toolbar h2 {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .bulletin-add-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 50%;
      background: var(--alex);
      color: #fff;
      font-size: 1.5rem;
      font-weight: 300;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(74, 144, 217, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      line-height: 1;
    }

    .bulletin-add-btn:active {
      transform: scale(0.92);
      box-shadow: 0 2px 8px rgba(74, 144, 217, 0.25);
    }

    /* compose */
    .bulletin-compose {
      display: grid;
      gap: 10px;
      padding: 16px;
      margin: 8px 0;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.07);
      animation: composeSlide 0.2s ease-out;
    }

    @keyframes composeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bulletin-compose textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      font: inherit;
      color: var(--text);
      resize: vertical;
    }

    .bulletin-compose textarea:focus {
      outline: 2px solid var(--alex);
      outline-offset: -1px;
      border-color: transparent;
    }

    .bulletin-compose-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bulletin-compose select {
      flex: 1;
      min-height: 44px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      font: inherit;
      color: var(--text);
    }

    .bulletin-compose-pin {
      min-height: 44px;
      padding: 0 20px;
      border: 0;
      border-radius: 10px;
      background: var(--alex);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .bulletin-compose-pin:active {
      opacity: 0.85;
    }

    .bulletin-compose-cancel {
      min-height: 44px;
      padding: 0 14px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    /* notes grid */
    .bulletin-notes-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 8px 0 16px;
    }

    @media (min-width: 520px) {
      .bulletin-notes-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .bulletin-note-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 130px;
      padding: 14px 14px 10px;
      border-radius: 4px;
      box-shadow:
        2px 3px 8px rgba(0, 0, 0, 0.08),
        0 1px 2px rgba(0, 0, 0, 0.06);
      transition: transform 0.15s ease;
    }

    .bulletin-note-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 6px;
      border-radius: 0 0 4px 4px;
      background: rgba(0, 0, 0, 0.08);
    }

    .bulletin-note-card.neutral {
      background: #fff9c4;
    }

    .bulletin-note-card.alex {
      background: #dbeeff;
    }

    .bulletin-note-card.louisa {
      background: #eedcff;
    }

    .bulletin-note-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.4;
      color: rgba(0, 0, 0, 0.78);
      padding-top: 4px;
    }

    .bulletin-note-foot {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 6px;
      padding-top: 6px;
    }

    .bulletin-note-meta {
      font-size: 0.72rem;
      color: rgba(0, 0, 0, 0.35);
      font-weight: 500;
    }

    .bulletin-note-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      border: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.06);
      color: rgba(0, 0, 0, 0.4);
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s;
    }

    .bulletin-note-delete:active {
      background: rgba(214, 69, 69, 0.18);
      color: var(--danger);
    }

    .bulletin-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
    }

    .bulletin-empty-icon {
      font-size: 2rem;
      opacity: 0.4;
      margin-bottom: 4px;
    }

    .bulletin-empty p {
      font-size: 0.88rem;
    }

    /* divider */
    .bulletin-divider {
      height: 1px;
      background: var(--line);
      margin: 4px 0;
    }

    /* calendar section */
    .bulletin-calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 2px 6px;
    }

    .bulletin-calendar-head h3 {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .calendar-groups {
      display: grid;
      gap: 2px;
    }

    .calendar-day-group {
      display: grid;
      gap: 2px;
    }

    .calendar-day-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 10px 0 4px;
    }

    .calendar-day-group:first-child .calendar-day-label {
      padding-top: 4px;
    }

    .calendar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.06);
    }

    .calendar-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .calendar-item-dot.alex { background: var(--alex); }
    .calendar-item-dot.louisa { background: var(--louisa); }
    .calendar-item-dot.jameson { background: #3a8a52; }
    .calendar-item-dot.both { background: linear-gradient(135deg, var(--alex), var(--louisa)); }

    .calendar-item-body {
      flex: 1;
      min-width: 0;
    }

    .calendar-item-title {
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .calendar-item-time {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .calendar-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .calendar-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .calendar-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .calendar-badge.alex {
      background: rgba(74, 144, 217, 0.14);
      color: var(--alex);
    }

    .calendar-badge.louisa {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .calendar-badge.jameson {
      background: rgba(76, 153, 96, 0.14);
      color: #3a8a52;
    }

    .calendar-badge.both {
      background: rgba(15, 23, 42, 0.06);
      color: var(--text);
    }

    .calendar-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
    }

    .calendar-empty strong {
      color: var(--text);
    }

    .calendar-empty p {
      font-size: 0.88rem;
      color: var(--muted);
    }

    /* shared btn used by bulletin + calendar */
    .bulletin-btn {
      min-height: 42px;
      padding: 0 16px;
      border: 0;
      border-radius: 10px;
      background: var(--alex);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .bulletin-btn.secondary {
      background: var(--panel-alt);
      color: var(--text);
    }

    /* shared section styles (used by Fun tab and others) */
    .bulletin-hero {
      display: grid;
      gap: 12px;
    }

    .bulletin-hero h2,
    .bulletin-hero p,
    .bulletin-section-head h3,
    .bulletin-section-head p {
      margin: 0;
    }

    .bulletin-hero p,
    .bulletin-section-head p {
      color: var(--muted);
    }

    .bulletin-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bulletin-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .bulletin-stat-card {
      display: grid;
      gap: 6px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: #fff;
    }

    .bulletin-stat-card.alex { background: #eef7ff; }
    .bulletin-stat-card.louisa { background: #f6ecff; }
    .bulletin-stat-label { color: var(--muted); font-size: 0.85rem; }
    .bulletin-stat-value { font-size: 1.5rem; font-weight: 800; line-height: 1; }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: 56px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .tab.active {
      color: var(--alex);
    }

    .tab-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      line-height: 1;
    }

    .tab-icon svg {
      display: block;
    }

    .tab-label {
      line-height: 1;
    }

    .bank-kid-picker {
      display: flex;
      gap: 8px;
      padding: 0 4px;
    }

    .bank-kid-picker button {
      flex: 1;
    }

    .drawer-grid {
      display: grid;
      gap: 12px;
    }

    .chores-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
    }

    .chores-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .chores-progress-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .chores-progress-card {
      display: grid;
      gap: 10px;
    }

    .chores-progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .chores-progress-name {
      font-weight: 700;
    }

    .chores-progress-meta,
    .chores-progress-note,
    .settings-note,
    .history-item .settings-note {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .chores-settings[hidden] {
      display: none;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .settings-list {
      display: grid;
      gap: 8px;
    }

    .settings-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .settings-row span:first-child {
      flex: 1;
      min-width: 0;
    }

    .settings-row input,
    .settings-row select {
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      width: 70px;
      min-width: 0;
      flex-shrink: 1;
      font: inherit;
    }

    .settings-row button,
    .settings-btn {
      min-height: 38px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      background: var(--alex);
      color: #fff;
      cursor: pointer;
      flex-shrink: 1;
      min-width: 0;
      font: inherit;
    }

    .settings-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .settings-chip {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
    }

    .settings-chip.active {
      background: var(--alex);
      border-color: var(--alex);
      color: #fff;
    }

    .history-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .history-item {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      word-break: break-word;
    }

    .history-item > div {
      min-width: 0;
      overflow: hidden;
    }
    .stat-card {
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(237, 244, 255, 0.9));
      border: 1px solid var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      word-break: break-word;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(39, 58, 87, 0.1);
    }

    .stat-card h2,
    .stat-card h3,
    .stat-card p {
      margin: 0;
    }

    .stat-card h2,
    .stat-card h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .stat-card p {
      color: var(--muted);
      line-height: 1.4;
    }

    .messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
      min-height: 200px;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-break: break-word;
      animation: msgIn 0.3s ease-out both;
    }

    .message.system {
      align-self: flex-start;
      background: linear-gradient(135deg, #eef5ff 0%, #f0f0ff 100%);
      border: 1px solid #d5e4fb;
      border-bottom-left-radius: 6px;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(74, 144, 217, 0.15), rgba(138, 91, 209, 0.18));
      border: 1px solid rgba(111, 135, 195, 0.22);
      border-bottom-right-radius: 6px;
    }

    .message-meta {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 720px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
    }

    .composer input {
      min-height: var(--tap);
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer input:focus {
      outline: none;
      border-color: var(--alex);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    .composer button {
      width: var(--tap);
      min-height: var(--tap);
      padding: 0;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .composer button:active {
      transform: scale(0.92);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
    }

    .send-btn:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.4);
    }

    .mic-btn {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .mic-btn:hover {
      background: rgba(138, 91, 209, 0.22);
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214, 69, 69, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(214, 69, 69, 0); }
    }

    .mic-btn.listening {
      background: var(--danger);
      color: #fff;
      animation: micPulse 1.2s ease-in-out infinite;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .card-btn.alex {
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .card-btn.louisa {
      background: linear-gradient(135deg, var(--louisa), #6b3fa0);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .kid-card {
      position: relative;
      padding: 28px 24px 22px;
      border-radius: 18px;
      color: #fff;
      overflow: hidden;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .kid-card.alex {
      background: linear-gradient(135deg, #4a90d9 0%, #2563a8 50%, #1e4f8a 100%);
      box-shadow: 0 12px 32px rgba(74, 144, 217, 0.35);
    }

    .kid-card.louisa {
      background: linear-gradient(135deg, #8a5bd1 0%, #6b3fa0 50%, #532d80 100%);
      box-shadow: 0 12px 32px rgba(138, 91, 209, 0.35);
    }

    .kid-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .kid-card::after {
      content: '';
      position: absolute;
      bottom: -40%;
      left: -10%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.75;
    }

    .card-chip {
      width: 36px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e8d5a0, #c9a84c);
      opacity: 0.85;
    }

    .card-balance {
      position: relative;
      z-index: 1;
      margin: 16px 0 8px;
    }

    .card-balance-amount {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card-balance-label {
      font-size: 0.78rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-pts {
      font-size: 0.82rem;
      opacity: 0.8;
      text-align: right;
    }

    .card-statement {
      margin-top: 14px;
    }

    .card-statement h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0 0 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stmt-list {
      display: grid;
      gap: 0;
    }

    .stmt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid var(--line);
      font-size: 0.88rem;
    }

    .stmt-row:last-child {
      border-bottom: 0;
    }

    .stmt-desc {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stmt-note {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .stmt-amount {
      font-weight: 700;
      white-space: nowrap;
    }

    .stmt-amount.credit {
      color: #16a34a;
    }

    .stmt-amount.debit {
      color: var(--danger);
    }

    .stmt-empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 12px 0;
    }

    .quick-points {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .chore-board {
      padding: 8px 0 0;
      display: grid;
      gap: 10px;
    }

    .chore-board-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      padding: 0 4px;
    }

    .chore-board-header h2,
    .chore-board-header p {
      margin: 0;
    }

    .chore-board-header h2 {
      font-size: 1rem;
    }

    .chore-board-header p,
    .chore-list-note,
    .chore-summary {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .chore-list {
      display: grid;
      gap: 8px;
    }

    .chore-item {
      min-height: 52px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .chore-item:active {
      transform: scale(0.98);
    }

    .chore-item.done {
      background: rgba(34, 197, 94, 0.08);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .chore-check {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      border-radius: 999px;
      border: 2px solid #b8c5d8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      color: transparent;
      background: #fff;
    }

    .chore-item.done .chore-check {
      border-color: #16a34a;
      background: #16a34a;
      color: #fff;
    }

    .chore-meta {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 2px;
    }

    .chore-label {
      font-weight: 700;
      line-height: 1.2;
    }

    .chore-item.done .chore-label {
      color: var(--muted);
      text-decoration: line-through;
    }

    .chore-note {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .chore-pts {
      flex: 0 0 auto;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--panel-alt);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .qp-row {
      display: flex;
      gap: 8px;
    }

    .qp-kid, .qp-pts {
      flex: 1;
      min-height: 44px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.15s ease;
    }

    .qp-kid:active, .qp-pts:active {
      transform: scale(0.94);
    }

    .qp-kid.alex { color: var(--alex); }
    .qp-kid.louisa { color: var(--louisa); }
    .qp-kid.both { color: var(--muted); }

    .qp-kid.active.alex { background: var(--alex); color: #fff; border-color: var(--alex); }
    .qp-kid.active.louisa { background: var(--louisa); color: #fff; border-color: var(--louisa); }
    .qp-kid.active.both { background: var(--muted); color: #fff; border-color: var(--muted); }

    .qp-pts {
      background: var(--panel-alt);
      color: var(--text);
      border-color: transparent;
    }


    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f1f5f9;
      color: var(--muted);
    }

    .badge.alex {
      background: rgba(74, 144, 217, 0.14);
      color: var(--alex);
    }

    .badge.louisa {
      background: rgba(138, 91, 209, 0.14);
      color: var(--louisa);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.38);
      backdrop-filter: blur(4px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: min(100%, 440px);
      padding: 20px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.28);
      display: grid;
      gap: 14px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.25s ease;
    }

    .overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2,
    .modal p {
      margin: 0;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.45;
    }

    .modal-actions {
      display: grid;
      gap: 10px;
    }

    .modal-actions button,
    .modal-actions input {
      min-height: var(--tap);
      border-radius: 14px;
    }

    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--alex), #3a7bc8);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.25);
    }

    .primary:hover {
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.35);
    }

    .primary:active {
      transform: scale(0.97);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .secondary:hover {
      background: var(--panel-alt);
    }

    .secondary:active {
      transform: scale(0.97);
    }

    .family-join {
      display: grid;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid #e8eef7;
    }

    .family-join input {
      padding: 0 14px;
      border: 1px solid var(--line);
    }

    .status {
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status.error {
      color: var(--danger);
    }

    .toast-container {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
      width: calc(100% - 32px);
      max-width: 400px;
      pointer-events: none;
    }

    .toast {
      padding: 14px 18px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
      pointer-events: auto;
      border-left: 5px solid var(--muted);
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .toast.alex { border-left-color: var(--alex); }
    .toast.louisa { border-left-color: var(--louisa); }
    .toast.system { border-left-color: var(--alex); }
    .toast.error { border-left-color: var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .toast.out {
      animation: toastOut 0.3s ease-in forwards;
    }

    @keyframes toastOut {
      to { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    .toast-undo {
      background: var(--panel-alt);
      border: 0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      flex-shrink: 0;
    }

    .toast-undo:active {
      transform: scale(0.95);
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .app {
        min-height: calc(100vh - 12px);
        padding-bottom: calc(134px + env(safe-area-inset-bottom));
      }

      .tab-bar {
        width: calc(100% - 12px);
      }

      .header {
        padding: 10px 14px;
      }

      .brand small {
        font-size: 0.84rem;
      }

      .quick-points {
        padding: 8px 10px;
      }

      .composer {
        gap: 8px;
        width: calc(100% - 12px);
      }

      .composer input {
        min-width: 0;
      }

      .message {
        max-width: 94%;
      }

      .tab {
        min-height: 52px;
        font-size: 0.68rem;
      }

      .tab-icon svg {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>
  <main class="app">
    <section class="header" aria-label="App header">
      <div class="header-main">
        <div class="brand">
          <div class="brand-icon">&#127968;</div>
          <div class="brand-text">
            <h1>Family Hub</h1>
            <small id="familyLabel"></small>
          </div>
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="headerSettingsButton" aria-label="Open settings"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
        </div>
      </div>
      <section class="family-panel" id="headerSettingsPanel" hidden></section>
    </section>

    <!-- Bulletin View -->
    <div class="view active" id="viewBulletin">
      <div id="bulletinContent" class="view-content"></div>
    </div>

    <!-- Chores View -->
    <div class="view" id="viewChores">
      <div class="panel quick-points" id="quickPoints">
        <div class="qp-row">
          <button type="button" class="qp-kid alex active" data-qp-kid="alex">Alex</button>
          <button type="button" class="qp-kid louisa" data-qp-kid="louisa">Louisa</button>
          <button type="button" class="qp-kid both" data-qp-kid="both">Both</button>
        </div>
        <div class="qp-row">
          <button type="button" class="qp-pts" data-qp-pts="1">+1</button>
          <button type="button" class="qp-pts" data-qp-pts="2">+2</button>
          <button type="button" class="qp-pts" data-qp-pts="3">+3</button>
          <button type="button" class="qp-pts" data-qp-pts="4">+4</button>
        </div>
      </div>
      <section class="panel" id="choreProgress" aria-live="polite"></section>
      <section class="panel messages" id="messages" aria-live="polite" aria-label="Chat history"></section>
    </div>

    <!-- Fun View -->
    <div class="view" id="viewFun">
      <div id="funContent" class="view-content"></div>
    </div>

    <!-- Lists View -->
    <div class="view" id="viewLists">
      <div id="listsContent" class="view-content">
        <p style="color:var(--muted);text-align:center;padding:40px 16px">Loading...</p>
      </div>
    </div>

    <!-- Bank View -->
    <div class="view" id="viewBank">
      <div class="bank-kid-picker" id="bankKidPicker">
        <button type="button" class="qp-kid alex active" data-bank-kid="alex">Alex</button>
        <button type="button" class="qp-kid louisa" data-bank-kid="louisa">Louisa</button>
      </div>
      <div id="cardContent"></div>
      <section id="scoreboardPanel" aria-label="Scoreboard">
        <div class="drawer-grid"></div>
      </section>
    </div>


    <form class="panel composer" id="composer">
      <label class="visually-hidden" for="messageInput">Type a chore update</label>
      <input id="messageInput" type="text" placeholder="Type or speak..." autocomplete="off">
      <button class="send-btn" type="submit">Send</button>
      <button class="mic-btn" type="button" id="micButton" aria-label="Voice input">Mic</button>
    </form>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar" id="tabBar">
      <a class="tab active" href="#bulletin" data-tab="bulletin">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="tab-label">Home</span>
      </a>
      <a class="tab" href="#chores" data-tab="chores">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span>
        <span class="tab-label">Chores</span>
      </a>
      <a class="tab" href="#lists" data-tab="lists">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
        <span class="tab-label">Lists</span>

    let auth;
