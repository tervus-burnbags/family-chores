    function buildDefaultConfig() {
      return {
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        kids: KIDS,
        chores: CHORES
      };
    }

    function keepPathsSynced(nextFamilyId) {
      if (!database || !nextFamilyId || syncedPathState.familyId === nextFamilyId) {
        return;
      }

      syncedPathState.teardown.forEach(function (release) {
        try {
          release();
        } catch (error) {
          console.warn('Failed to release synced path listener.', error);
        }
      });
      syncedPathState.teardown = [];
      syncedPathState.familyId = nextFamilyId;

      ['config', 'balances', 'bulletin/notes'].forEach(function (path) {
        var ref = database.ref('families/' + nextFamilyId + '/' + path);

        // Realtime Database web does not consistently expose keepSynced, so
        // keep a live listener attached as a compatible fallback.
        if (typeof ref.keepSynced === 'function') {
          ref.keepSynced(true);
          syncedPathState.teardown.push(function () {
            ref.keepSynced(false);
          });
          return;
        }

        var noop = function () {};
        ref.on('value', noop);
        syncedPathState.teardown.push(function () {
          ref.off('value', noop);
        });
      });
    }

    function addMessage(role, text, meta, actions) {
      const message = document.createElement('article');
      message.className = 'message ' + role;
      message.innerHTML = '<div>' + escapeHtml(text) + '</div>';
      if (meta) {
        const metaNode = document.createElement('div');
        metaNode.className = 'message-meta';
        metaNode.textContent = meta;
        message.appendChild(metaNode);
      }
      if (Array.isArray(actions) && actions.length) {
        const row = document.createElement('div');
        row.className = 'badge-row';
        actions.forEach((action) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'icon-btn';
          button.dataset.action = action.action;
          if (action.value) {
            button.dataset.value = action.value;
          }
          button.textContent = action.label;
          row.appendChild(button);
        });
        message.appendChild(row);
      }
      elements.messages.appendChild(message);
      elements.messages.scrollTop = elements.messages.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setModalStatus(text, isError) {
      elements.familyModalStatus.textContent = text || '';
      elements.familyModalStatus.classList.toggle('error', Boolean(isError));
    }

    function openModal() {
      elements.familyModal.classList.add('open');
      elements.joinFamilyInput.focus();
    }

    function closeModal() {
      elements.familyModal.classList.remove('open');
      setModalStatus('', false);
    }

    function generateFamilyCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 8; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    async function createFamily() {
      setModalStatus('Creating family...', false);
      let nextFamilyId = generateFamilyCode();
      let existing = await database.ref('families/' + nextFamilyId + '/config').get();
      while (existing.exists()) {
        nextFamilyId = generateFamilyCode();
        existing = await database.ref('families/' + nextFamilyId + '/config').get();
      }

      await database.ref('families/' + nextFamilyId + '/config').set(buildDefaultConfig());
      localStorage.setItem(STORAGE_KEY, nextFamilyId);
      familyId = nextFamilyId;
      closeModal();
      updateFamilyLabel();
    }

    async function joinFamily() {
      const code = elements.joinFamilyInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      elements.joinFamilyInput.value = code;
      if (code.length !== 8) {
        setModalStatus('Enter the 8-character family code.', true);
        return;
      }

      setModalStatus('Joining family...', false);
      const snapshot = await database.ref('families/' + code + '/config').get();
      if (!snapshot.exists()) {
        setModalStatus('Family code not found. Check the code and try again.', true);
        return;
      }

      localStorage.setItem(STORAGE_KEY, code);
      familyId = code;
      closeModal();
      updateFamilyLabel();
    }

    function updateFamilyLabel() {
      if (!currentUser) {
        elements.familyLabel.textContent = '';
        renderHeaderFamilyPanel();
        return;
      }
      if (!familyId) {
        elements.familyLabel.innerHTML = '<span class="header-meta"><span class="sync-dot"></span><span>Choose a family code to continue</span></span>';
        renderHeaderFamilyPanel();
        return;
      }
      elements.familyLabel.innerHTML = '<span class="header-meta"><span class="sync-dot ' + (appShellState.online ? 'online' : '') + '"></span><span>' + (appShellState.online ? 'Sync ready' : 'Offline mode') + '</span></span>';
      renderHeaderFamilyPanel();
    }

    function getFamilyShareUrl() {
      const url = new URL(window.location.href);
      if (familyId) {
        url.searchParams.set('family', familyId);
      } else {
        url.searchParams.delete('family');
      }
      url.hash = '#bulletin';
      return url.toString();
    }

    function buildFamilySettingsMarkup() {
      const runtime = window.phaseRuntime;
      const calendarUrl = runtime && runtime.currentConfig ? String(runtime.currentConfig.calendarUrl || '') : '';
      const calendarDays = runtime && runtime.currentConfig ? Number(runtime.currentConfig.calendarDays || 10) : 10;
      if (!familyId) {
        return '<div class="settings-empty">' +
          '<strong>Family</strong>' +
          '<p class="family-panel-note">Create or join a family to sync notes, chores, and balances across devices.</p>' +
          '<div class="family-panel-actions">' +
            '<button type="button" class="settings-btn" data-family-action="manage">Choose family</button>' +
          '</div>' +
        '</div>';
      }
      return '<div class="family-panel-row">' +
          '<div class="family-panel-copy">' +
            '<strong>Family Code</strong>' +
            '<code>' + escapeHtml(familyId) + '</code>' +
            '<p class="family-panel-note">' + (appShellState.online ? 'Online and syncing.' : 'Offline now. Changes sync when you reconnect.') + '</p>' +
          '</div>' +
          '<div class="family-panel-actions">' +
            '<button type="button" class="settings-btn" data-family-action="copy">Copy link</button>' +
            '<button type="button" class="settings-btn" data-family-action="manage">Switch family</button>' +
          '</div>' +
        '</div>' +
        '<form id="familyCalendarForm" class="family-calendar-form">' +
          '<div class="family-panel-copy">' +
            '<strong>Calendar</strong>' +
          '</div>' +
          '<input type="url" id="familyCalendarUrl" name="familyCalendarUrl" placeholder="https://script.google.com/macros/s/..." value="' + escapeHtml(calendarUrl) + '">' +
          '<div class="family-panel-row" style="margin-top:8px">' +
            '<div class="family-panel-copy"><strong>Days ahead</strong></div>' +
            '<select id="familyCalendarDays" style="min-height:40px;padding:0 10px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff">' +
              [7, 10, 14, 21, 30].map(function (d) {
                return '<option value="' + d + '"' + (d === calendarDays ? ' selected' : '') + '>' + d + ' days</option>';
              }).join('') +
            '</select>' +
          '</div>' +
          '<div class="family-panel-actions">' +
            '<button type="submit" class="settings-btn">Save calendar settings</button>' +
          '</div>' +
        '</form>';
    }

    function renderHeaderFamilyPanel() {
      const panel = elements.headerFamilyPanel;
      if (!panel) return;
      panel.hidden = !appShellState.familyPanelOpen;
      if (panel.hidden) {
        panel.innerHTML = '';
        return;
      }
      panel.innerHTML = buildFamilySettingsMarkup();
    }

    function renderHeaderSettingsPanel() {
      var panel = elements.headerSettingsPanel;
      if (!panel) return;
      panel.hidden = !appShellState.settingsPanelOpen;
      if (panel.hidden) {
        panel.innerHTML = '';
        return;
      }
      if (appShellState.currentView === 'bulletin') {
        panel.innerHTML = buildFamilySettingsMarkup();
        return;
      }
      if (appShellState.currentView === 'chores' && typeof window.renderChoreSettings === 'function') {
        window.renderChoreSettings();
        return;
      }
      if (appShellState.currentView === 'bank' && typeof window.renderBankSettings === 'function') {
        window.renderBankSettings().catch(function (error) { console.error(error); });
        return;
      }
      var label = appShellState.currentView === 'fun' ? 'Fun' : 'Lists';
      panel.innerHTML = '<div class="settings-empty"><strong>No settings for ' + label + '.</strong><p class="family-panel-note">This tab does not have any configurable options yet.</p></div>';
    }

    async function copyFamilyLink() {
      const shareUrl = getFamilyShareUrl();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(shareUrl);
        return;
      }
      const input = document.createElement('textarea');
      input.value = shareUrl;
      input.setAttribute('readonly', 'readonly');
      input.style.position = 'absolute';
      input.style.left = '-9999px';
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
    }

    function setupRouter() {
      var views = {
        bulletin: document.getElementById('viewBulletin'),
        chores: document.getElementById('viewChores'),
        fun: document.getElementById('viewFun'),
        lists: document.getElementById('viewLists'),
        bank: document.getElementById('viewBank')
      };
      var tabs = elements.tabBar.querySelectorAll('.tab');

      function switchView(name) {
        if (!views[name]) name = 'bulletin';
        appShellState.currentView = name;
        Object.keys(views).forEach(function (key) {
          views[key].classList.toggle('active', key === name);
        });
        tabs.forEach(function (tab) {
          tab.classList.toggle('active', tab.dataset.tab === name);
        });
        if (name === 'bulletin' && typeof window.renderBulletin === 'function') {
          window.renderBulletin().catch(function (e) { console.error(e); });
        }
        if (name === 'fun' && typeof window.renderFun === 'function') {
          window.renderFun().catch(function (e) { console.error(e); });
        }
        if (name === 'bank') {
          var selectedKid = document.getElementById('bankKidPicker').querySelector('.active');
          var kidId = selectedKid ? selectedKid.dataset.bankKid : 'alex';
          if (typeof window.renderCardView === 'function') {
            window.renderCardView(kidId).catch(function (e) { console.error(e); });
          }
          if (typeof window.refreshPhase4 === 'function') {
            window.refreshPhase4().catch(function (e) { console.error(e); });
          }
        }
        if (name === 'lists' && typeof window.renderListsHome === 'function') {
          window.renderListsHome();
        }
        if (appShellState.settingsPanelOpen) {
          renderHeaderSettingsPanel();
        }
      }

      window.addEventListener('hashchange', function () {
        switchView(location.hash.replace('#', '') || 'bulletin');
      });

      elements.tabBar.addEventListener('click', function (e) {
        var tab = e.target.closest('.tab');
        if (!tab) return;
        e.preventDefault();
        var name = tab.dataset.tab;
        location.hash = '#' + name;
      });

      elements.headerSettingsButton.addEventListener('click', function () {
        appShellState.settingsPanelOpen = !appShellState.settingsPanelOpen;
        renderHeaderSettingsPanel();
      });

      // Bank kid picker
      document.getElementById('bankKidPicker').addEventListener('click', function (e) {
        var btn = e.target.closest('[data-bank-kid]');
        if (!btn) return;
        document.getElementById('bankKidPicker').querySelectorAll('.qp-kid').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var kidId = btn.dataset.bankKid;
        if (typeof window.renderCardView === 'function') {
          window.renderCardView(kidId).catch(function (e) { console.error(e); });
        }
      });

      // Initialize from hash
      var initial = location.hash.replace('#', '') || 'bulletin';
      switchView(initial);

      window.switchView = switchView;
    }

    async function initFirebase() {
      if (typeof firebaseConfig !== 'object') {
        throw new Error('firebase-config.js is missing a valid firebaseConfig object.');
      }

      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      database = firebase.database();
      updateFamilyLabel();

      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          return;
        }
        currentUser = user;
        updateFamilyLabel();
        const searchParams = new URLSearchParams(window.location.search);
        const familyFromUrl = (searchParams.get('family') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
        familyId = familyFromUrl || localStorage.getItem(STORAGE_KEY);
        if (familyFromUrl) {
          localStorage.setItem(STORAGE_KEY, familyFromUrl);
        }
        if (familyId) {
          const configSnapshot = await database.ref('families/' + familyId + '/config').get();
          if (!configSnapshot.exists()) {
            localStorage.removeItem(STORAGE_KEY);
            familyId = null;
            updateFamilyLabel();
            openModal();
            setModalStatus('Saved family code was not found. Create a new family or join again.', true);
            return;
          }
          if (typeof window.loadFamilyConfigV2 === 'function') {
            await window.loadFamilyConfigV2();
          }
          updateFamilyLabel();
        } else {
          openModal();
        }
      });

      await auth.signInAnonymously();
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch((error) => {
            console.error('Service worker registration failed:', error);
          });
        });
      }
    }

    function bindFamilyActions() {
      elements.createFamilyButton.addEventListener('click', () => {
        createFamily().catch((error) => {
          console.error(error);
          setModalStatus('Unable to create a family right now.', true);
        });
      });

      elements.joinFamilyButton.addEventListener('click', () => {
        joinFamily().catch((error) => {
          console.error(error);
          setModalStatus('Unable to join the family right now.', true);
        });
      });

      elements.joinFamilyInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          elements.joinFamilyButton.click();
        }
      });

      document.addEventListener('click', (event) => {
        const actionButton = event.target.closest('[data-family-action]');
        if (!actionButton) return;
        const action = actionButton.dataset.familyAction;
        if (action === 'manage') {
          appShellState.familyPanelOpen = false;
          appShellState.settingsPanelOpen = false;
          renderHeaderFamilyPanel();
          renderHeaderSettingsPanel();
          openModal();
          return;
        }
        if (action === 'copy') {
          copyFamilyLink().then(() => {
            if (window.phaseRuntime && typeof window.phaseRuntime.showToast === 'function') {
              window.phaseRuntime.showToast('Copied family link.');
            }
          }).catch((error) => {
            console.error(error);
            if (window.phaseRuntime && typeof window.phaseRuntime.showToast === 'function') {
              window.phaseRuntime.showToast('Could not copy the family link.', { type: 'error' });
            }
          });
        }
      });

      document.addEventListener('submit', (event) => {
        if (event.target.id !== 'familyCalendarForm') return;
        event.preventDefault();
        if (!database || !familyId) return;

        const input = document.getElementById('familyCalendarUrl');
        const calendarUrl = input ? String(input.value || '').trim() : '';
        if (calendarUrl) {
          try {
            new URL(calendarUrl);
          } catch (error) {
            if (window.phaseRuntime && typeof window.phaseRuntime.showToast === 'function') {
              window.phaseRuntime.showToast('Enter a valid calendar URL.', { type: 'error' });
            }
            return;
          }
        }

        const daysInput = document.getElementById('familyCalendarDays');
        const calendarDays = daysInput ? Number(daysInput.value) || 10 : 10;

        var updates = {};
        updates['families/' + familyId + '/config/calendarUrl'] = calendarUrl || null;
        updates['families/' + familyId + '/config/calendarDays'] = calendarDays;
        database.ref().update(updates).then(() => {
          if (window.phaseRuntime && window.phaseRuntime.currentConfig) {
            if (calendarUrl) {
              window.phaseRuntime.currentConfig.calendarUrl = calendarUrl;
            } else {
              delete window.phaseRuntime.currentConfig.calendarUrl;
            }
            window.phaseRuntime.currentConfig.calendarDays = calendarDays;
          }
          if (window.familyBulletin && typeof window.familyBulletin.invalidateCalendarCache === 'function') {
            window.familyBulletin.invalidateCalendarCache();
          }
          renderHeaderFamilyPanel();
          renderHeaderSettingsPanel();
          if (typeof window.renderBulletin === 'function') {
            window.renderBulletin().catch((error) => console.error(error));
          }
          if (window.phaseRuntime && typeof window.phaseRuntime.showToast === 'function') {
            window.phaseRuntime.showToast('Saved calendar settings.');
          }
        }).catch((error) => {
          console.error(error);
          if (window.phaseRuntime && typeof window.phaseRuntime.showToast === 'function') {
            window.phaseRuntime.showToast('Could not save the calendar URL.', { type: 'error' });
          }
        });
      });

      window.addEventListener('online', () => {
        appShellState.online = true;
        updateFamilyLabel();
      });

      window.addEventListener('offline', () => {
        appShellState.online = false;
        updateFamilyLabel();
      });
    }

    setupRouter();
    bindFamilyActions();
    registerServiceWorker();
    initFirebase().catch((error) => {
      console.error(error);
      elements.familyLabel.textContent = 'Firebase connection failed';
      renderHeaderFamilyPanel();
      addMessage('system', 'Firebase setup failed. Check your config and project settings.', error.message);
    });
  </script>

  <script>
    (function () {
      const QUESTION_WORDS = ['how', 'what', 'whats', "what's", 'status', 'score', 'balance', 'owe', 'doing', 'points'];
      const YES_WORDS = ['yes', 'y', 'yeah', 'yep', 'sure', 'ok', 'okay'];
      const NO_WORDS = ['no', 'n', 'nope', 'cancel', 'stop'];
      const FILLER_WORDS = ['um', 'uh', 'like', 'so', 'well'];
      const KID_ALIASES = {
        alex: ['alex'],
        louisa: ['louisa', 'lou'],
        both: ['both', 'both kids', 'the kids', 'everyone']
      };

      let currentConfig = buildDefaultConfig();
      let configLoaded = false;
      let pendingAction = null;
      let lastUndoAction = null;

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function resetComposerBindings() {
        const newComposer = elements.composer.cloneNode(true);
        elements.composer.replaceWith(newComposer);
        elements.composer = newComposer;
        elements.messageInput = newComposer.querySelector('#messageInput');
        elements.micButton = newComposer.querySelector('#micButton');
      }

      window.loadFamilyConfigV2 = loadFamilyConfigV2;
      async function loadFamilyConfigV2() {
        if (!familyId) {
          return;
        }
        keepPathsSynced(familyId);
        const snapshot = await database.ref('families/' + familyId + '/config').get();
        currentConfig = snapshot.exists() ? snapshot.val() : buildDefaultConfig();
        configLoaded = true;
      }

      async function seedFamilyV2(nextFamilyId) {
        await database.ref('families/' + nextFamilyId + '/config').set(buildDefaultConfig());
        await database.ref('families/' + nextFamilyId + '/balances').set({ alex: { owed: 0 }, louisa: { owed: 0 } });
      }

      const originalCreateFamily = createFamily;
      createFamily = async function () {
        setModalStatus('Creating family...', false);
        let nextFamilyId = generateFamilyCode();
        let existing = await database.ref('families/' + nextFamilyId + '/config').get();
        while (existing.exists()) {
          nextFamilyId = generateFamilyCode();
          existing = await database.ref('families/' + nextFamilyId + '/config').get();
        }
        await seedFamilyV2(nextFamilyId);
        localStorage.setItem(STORAGE_KEY, nextFamilyId);
        familyId = nextFamilyId;
        await loadFamilyConfigV2();
        closeModal();
        updateFamilyLabel();
      };

      const originalJoinFamily = joinFamily;
      joinFamily = async function () {
        await originalJoinFamily();
        if (familyId) {
          await loadFamilyConfigV2();
        }
      };

      const originalInitFirebase = initFirebase;
      initFirebase = async function () {
        await originalInitFirebase();
        if (familyId) {
          await loadFamilyConfigV2();
        }
      };

      function normalizeText(text) {
        let normalized = String(text || '').toLowerCase();
        FILLER_WORDS.forEach((word) => {
          normalized = normalized.replace(new RegExp('\\b' + word + '\\b', 'g'), ' ');
        });
        return normalized.replace(/[^a-z0-9$.\s']/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function splitClauses(text) {
        return String(text || '').split(/\b(?:and|also|plus)\b/g).map((part) => part.trim()).filter(Boolean);
      }

      function extractKidIds(text) {
        const normalized = normalizeText(text);
        if (KID_ALIASES.both.some((alias) => normalized.includes(alias))) {
          return ['alex', 'louisa'];
        }
        const ids = [];
        if (KID_ALIASES.alex.some((alias) => normalized.includes(alias))) ids.push('alex');
        if (KID_ALIASES.louisa.some((alias) => normalized.includes(alias))) ids.push('louisa');
        return Array.from(new Set(ids));
      }

      function detectDateContext(text) {
        const date = new Date();
        if (normalizeText(text).includes('yesterday')) {
          date.setDate(date.getDate() - 1);
        }
        return date;
      }

      function toDateString(date) {
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
      }

      function toIsoWeek(date) {
        const target = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const day = target.getUTCDay() || 7;
        target.setUTCDate(target.getUTCDate() + 4 - day);
        const yearStart = new Date(Date.UTC(target.getUTCFullYear(), 0, 1));
        const weekNo = Math.ceil((((target - yearStart) / 86400000) + 1) / 7);
        return target.getUTCFullYear() + '-W' + String(weekNo).padStart(2, '0');
      }

      function dollars(value) {
        return '$' + Number(value || 0).toFixed(2);
      }

      function showToast(text, options) {
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast ' + ((options && (options.type || options.kid)) || 'system');

        const content = document.createElement('div');
        content.textContent = text;
        toast.appendChild(content);

        if (options && options.onUndo) {
          const undoBtn = document.createElement('button');
          undoBtn.type = 'button';
          undoBtn.className = 'toast-undo';
          undoBtn.textContent = 'Undo';
          undoBtn.onclick = function (e) {
            e.stopPropagation();
            options.onUndo();
            toast.classList.add('out');
            setTimeout(() => toast.remove(), 300);
          };
          toast.appendChild(undoBtn);
        }

        container.appendChild(toast);

        const duration = (options && options.duration) || 5000;
        setTimeout(() => {
          if (toast.parentNode) {
            toast.classList.add('out');
            setTimeout(() => toast.remove(), 300);
          }
        }, duration);
      }

      const intentRegistry = [];

      function registerIntent(config) {
        intentRegistry.push(config);
        intentRegistry.sort((a, b) => (b.priority || 0) - (a.priority || 0));
      }

      function routeIntent(text) {
        const normalized = normalizeText(text);
        const kids = extractKidIds(text);

        for (const intentConfig of intentRegistry) {
          const match = intentConfig.patterns(normalized, kids);
          if (match && match.confidence > 0.5) {
            return { intent: intentConfig.id, ...match, kids };
          }
        }
        return null;
      }

      // REGISTER INTENTS
      registerIntent({
        id: 'undo',
        priority: 100,
        patterns: (text) => (/\bundo\b|take that back/.test(text) ? { confidence: 1 } : null)
      });

      registerIntent({
        id: 'confirm_yes',
        priority: 90,
        patterns: (text) => (YES_WORDS.includes(text) ? { confidence: 1 } : null)
      });

      registerIntent({
        id: 'confirm_no',
        priority: 90,
        patterns: (text) => (NO_WORDS.includes(text) ? { confidence: 1 } : null)
      });

      registerIntent({
        id: 'check_status',
        priority: 50,
        patterns: (text) => (isQuestion(text) ? { confidence: 0.8 } : null)
      });

      registerIntent({
        id: 'log_chore',
        priority: 40,
        patterns: (text, kids) => {
          const match = inferChore(text);
          if (match && match.score >= 0.5) {
            return { confidence: match.score, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(text) };
          }
          return null;
        }
      });

      registerIntent({
        id: 'confirm_chore',
        priority: 30,
        patterns: (text, kids) => {
          const match = inferChore(text);
          if (match && match.score >= 0.3) {
            return { confidence: 0.6, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(text) };
          }
          return null;
        }
      });

      registerIntent({
        id: 'freepoints',
        priority: 45,
        patterns: (text, kids) => {
          const pts = parsePoints(text);
          if (pts !== null && kids.length) {
            const isLoss = /\b(remove|subtract|take away|deduct|lose|lost)\b/.test(text);
            return { confidence: 0.9, points: isLoss ? -pts : pts };
          }
          return null;
        }
      });

      registerIntent({
        id: 'adhoc',
        priority: 35,
        patterns: (text, kids) => {
          const pts = parsePoints(text);
          if (pts !== null && kids.length && /\b(new chore|something new|something extra)\b/.test(text)) {
            return { confidence: 0.95, points: pts, choreLabel: extractAdhocLabel(text, kids) };
          }
          return null;
        }
      });

      registerIntent({
        id: 'create_list',
        priority: 85,
        patterns: (text) => {
          const match = text.match(/\b(?:create|make|start)\s+(?:a\s+|new\s+)?list(?:\s+(?:called|named))?\s+(.+)$/i);
          return match ? { confidence: 0.98, listName: match[1].trim() } : null;
        }
      });

      registerIntent({
        id: 'add_to_list',
        priority: 80,
        patterns: (text) => {
          const match = text.match(/\b(?:add|put)\s+(.+?)\s+(?:to|on)\s+(.+?)\s+list\b/i);
          return match ? { confidence: 0.95, itemText: match[1].trim(), listName: match[2].trim() } : null;
        }
      });

      registerIntent({
        id: 'check_off_list',
        priority: 80,
        patterns: (text) => {
          const match = text.match(/\b(?:check(?:\s+off)?|mark(?:\s+off)?|cross\s+off)\s+(.+?)\s+(?:from|on)\s+(.+?)\s+list\b/i);
          return match ? { confidence: 0.95, itemText: match[1].trim(), listName: match[2].trim() } : null;
        }
      });

      registerIntent({
        id: 'log_note',
        priority: 72,
        patterns: (text) => {
          const match = text.match(/^(?:note|add note|post note|bulletin note|remember)\s+(.+)$/i);
          if (!match) return null;
          const noteText = match[1].trim();
          if (!noteText) return null;
          const color = /\balex\b/i.test(noteText) ? 'alex' : /\b(?:louisa|lou)\b/i.test(noteText) ? 'louisa' : 'neutral';
          return { confidence: 0.96, noteText: noteText, color: color };
        }
      });

      registerIntent({
        id: 'remove_note',
        priority: 72,
        patterns: (text) => {
          const match = text.match(/^(?:remove|delete|clear)\s+note\s+(.+)$/i);
          return match ? { confidence: 0.96, noteText: match[1].trim() } : null;
        }
      });
      registerIntent({
        id: 'add_to_list',
        priority: 80,
        patterns: (text) => {
          const match = text.match(/\b(?:add|put)\s+(.+?)\s+(?:to|on)\s+(.+?)\s+list\b/i);
          return match ? { confidence: 0.95, itemText: match[1].trim(), listName: match[2].trim() } : null;
        }
      });

      registerIntent({
        id: 'check_off_list',
        priority: 80,
        patterns: (text) => {
          const match = text.match(/\b(?:check(?:\s+off)?|mark(?:\s+off)?|cross\s+off)\s+(.+?)\s+(?:from|on)\s+(.+?)\s+list\b/i);
          return match ? { confidence: 0.95, itemText: match[1].trim(), listName: match[2].trim() } : null;
        }
      });

      function calculateWeeklyPay(payTiers, weeklyPoints) {
        let earned = 0;
        (payTiers || []).slice().sort((a, b) => a.minPts - b.minPts).forEach((tier) => {
          if (weeklyPoints >= tier.minPts) earned = tier.pay;
        });
        return earned;
      }

      function choreEntries() {
        return Object.entries((currentConfig && currentConfig.chores) || CHORES);
      }

      function scoreChore(text, chore) {
        const tokens = new Set(normalizeText(text).split(' ').filter(Boolean));
        let best = 0;
        (chore.keywords || []).forEach((phrase) => {
          const phraseTokens = normalizeText(phrase).split(' ').filter(Boolean);
          if (!phraseTokens.length) return;
          let matched = 0;
          phraseTokens.forEach((token) => {
            if (tokens.has(token)) matched += 1;
          });
          best = Math.max(best, matched / phraseTokens.length);
        });
        return best;
      }

      function inferChore(text) {
        const normalized = normalizeText(text);
        const currentHour = new Date().getHours();
        const isMorning = normalized.includes('morning') || normalized.includes('am') || (!normalized.includes('tonight') && !normalized.includes('evening') && !normalized.includes('pm') && currentHour < 12);
        const isEvening = normalized.includes('tonight') || normalized.includes('evening') || normalized.includes('pm') || (!normalized.includes('morning') && !normalized.includes('am') && currentHour >= 12);
        let best = null;
        choreEntries().forEach(([choreId, chore]) => {
          let score = scoreChore(text, chore);
          if (choreId === 'feed_dog_am' && isMorning) score += 0.2;
          if (choreId === 'feed_dog_pm' && isEvening) score += 0.2;
          if (!best || score > best.score) best = { choreId, chore, score };
        });
        return best;
      }

      function parseAmount(text) {
        const match = normalizeText(text).match(/\$?\s*(\d+(?:\.\d{1,2})?)/);
        return match ? Number(match[1]) : null;
      }

      function parsePoints(text) {
        const normalized = normalizeText(text);
        const match = normalized.match(/(\d+)\s*points?/);
        return match ? Number(match[1]) : null;
      }

      function extractAdhocLabel(text, kids) {
        let label = normalizeText(text);
        kids.forEach((kidId) => {
          label = label.replace(new RegExp('\\b' + (currentConfig.kids[kidId].name || kidId).toLowerCase() + '\\b', 'g'), ' ');
        });
        label = label.replace(/\b(gets?|earns?|earned|did|new chore|something new|something extra|give|gave|add|him|her|a|an|the|for|to|points?)\b/g, ' ');
        label = label.replace(/\d+/g, ' ').replace(/\s+/g, ' ').trim();
        return label || 'Ad hoc chore';
      }

      function isQuestion(text) {
        const normalized = normalizeText(text);
        return QUESTION_WORDS.some((word) => normalized.includes(word)) || /\?$/.test(String(text || '').trim());
      }

      function parseIntent(text) {
        const normalized = normalizeText(text);
        const kids = extractKidIds(text);
        if (YES_WORDS.includes(normalized)) return { intent: 'confirm_yes' };
        if (NO_WORDS.includes(normalized)) return { intent: 'confirm_no' };
        if (/\bundo\b|take that back/.test(normalized)) return { intent: 'undo' };
        if ((/\b(settle|settled)\b/.test(normalized) || (/\bpaid\b/.test(normalized) && /\bback\b/.test(normalized))) && kids.length >= 2) return { intent: 'settle_debt', kids };
        const debtVerbMatch = normalized.match(/\b(owes|borrowed|lent)\b/);
        if (/\b(i|we|me|us|parent|parents?)\b/.test(normalized) && /\bowe\b/.test(normalized) && kids.length === 1) {
          return { intent: 'parent_owes_kid', kids: [kids[0]], amount: parseAmount(text), note: text };
        }
        if (debtVerbMatch && kids.length >= 2) return { intent: 'record_debt', kids, amount: parseAmount(text), verb: debtVerbMatch[1] };
        if (debtVerbMatch && kids.length === 1 && /\b(me|us|parents?)\b/.test(normalized)) return { intent: 'kid_owes_parent', kids, amount: parseAmount(text) };
        if (/\b(spent|bought|purchased)\b/.test(normalized) && kids.length) return { intent: 'kid_spent', kids: [kids[0]], amount: parseAmount(text), note: text };
        if (/\b(paid|gave|pay)\b/.test(normalized) && kids.length) return { intent: 'record_payment', kids: [kids[0]], amount: parseAmount(text) };
        if (kids.length && parsePoints(text) !== null && /\b(remove|subtract|take away|deduct|lose|lost)\b/.test(normalized)) {
          return { intent: 'freepoints', kids, points: -parsePoints(text) };
        }
        if (kids.length && parsePoints(text) !== null && /\b(gets?|earns?|earned|give|add|award)\b/.test(normalized)) {
          return { intent: 'freepoints', kids, points: parsePoints(text) };
        }
        if (/\bpoints?\s+for\b/.test(normalized) && kids.length && parsePoints(text) !== null) {
          return { intent: 'freepoints', kids, points: parsePoints(text) };
        }
        if (/\b(change|update|should be)\b/.test(normalized) || (/\bmake\b/.test(normalized) && /\bpoints?\b/.test(normalized) && parsePoints(text) !== null)) {
          const choreText = text.replace(/\b(change|make|update|should be)\b/gi, ' ').trim();
          const match = inferChore(choreText);
          return { intent: 'change_points', choreId: match && match.choreId, choreLabel: match && match.chore && match.chore.label, points: parsePoints(text), confidence: match ? match.score : 0 };
        }
        if (/\bpoints?\b/.test(normalized) && parsePoints(text) !== null && kids.length) {
          var explicitPts = parsePoints(text);
          var choreMatch = inferChore(text);
          if (/\b(new chore|something new|something extra)\b/.test(normalized)) {
            return { intent: 'adhoc', kids, points: explicitPts, choreLabel: extractAdhocLabel(text, kids) };
          }
          if (/\b(remove|subtract|take away|deduct|lose|lost)\b/.test(normalized)) {
            return { intent: 'freepoints', kids, points: -explicitPts };
          }
          if (choreMatch && choreMatch.score >= 0.5) {
            return { intent: 'log_chore', kids, choreId: choreMatch.choreId, choreLabel: choreMatch.chore.label, points: explicitPts };
          }
          if (choreMatch && choreMatch.score >= 0.3) {
            return { intent: 'confirm_chore', kids, choreId: choreMatch.choreId, choreLabel: choreMatch.chore.label, points: explicitPts };
          }
          return { intent: 'freepoints', kids, points: explicitPts };
        }
        if (isQuestion(text)) return { intent: 'check_status', kids };

        const clauses = splitClauses(text);
        const actions = [];
        for (const clause of clauses) {
          const clauseKids = extractKidIds(clause).length ? extractKidIds(clause) : kids;
          if (!clauseKids.length) return { intent: 'missing_kid' };
          const match = inferChore(clause);
          if (match && match.score >= 0.5) {
            actions.push({ intent: 'log_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(clause) });
            continue;
          }
          if (match && match.score >= 0.3) {
            return { intent: 'confirm_chore', kids: clauseKids, choreId: match.choreId, choreLabel: match.chore.label, points: Number(match.chore.points || 0), dateContext: detectDateContext(clause) };
          }
        }
        if (actions.length) return { intent: 'log_chore', multi: actions };
        if (kids.length && parsePoints(text) !== null) return { intent: 'adhoc', kids, points: parsePoints(text), choreLabel: extractAdhocLabel(text, kids) };
        if (!kids.length) return { intent: 'missing_kid' };
        return { intent: 'no_match' };
      }

      async function getLogEntriesByDate(dateStr) {
        const snapshot = await database.ref('families/' + familyId + '/log').orderByChild('date').equalTo(dateStr).get();
        return snapshot.exists() ? Object.entries(snapshot.val()).map(([id, value]) => ({ id, ...value })) : [];
      }

      async function getAllLogEntries() {
        const snapshot = await database.ref('families/' + familyId + '/log').get();
        return snapshot.exists() ? Object.entries(snapshot.val()).map(([id, value]) => ({ id, ...value })) : [];
      }

      async function getAllPayments() {
        const snapshot = await database.ref('families/' + familyId + '/payments').get();
        return snapshot.exists() ? Object.entries(snapshot.val()).map(([id, value]) => ({ id, ...value })) : [];
      }

      async function getBalances() {
        const snapshot = await database.ref('families/' + familyId + '/balances').get();
        return snapshot.exists() ? snapshot.val() : { alex: { owed: 0 }, louisa: { owed: 0 } };
      }

      async function setOwed(kidId, amount) {
        await database.ref('families/' + familyId + '/balances/' + kidId + '/owed').set(Number(amount.toFixed(2)));
      }

      async function adjustBalance(kidId, delta) {
        const balances = await getBalances();
        const current = Number(((balances[kidId] && balances[kidId].owed) || 0));
        const next = Number((current + delta).toFixed(2));
        await setOwed(kidId, next);
        return next;
      }

      function paymentBalanceDelta(payment) {
        if (payment && typeof payment.balanceDelta === 'number') {
          return Number(payment.balanceDelta || 0);
        }
        const amount = Number((payment && payment.amount) || 0);
        if (!payment) return 0;
        if (payment.type === 'credit' || payment.type === 'weekly') return amount;
        return -amount;
      }

      async function findDuplicate(kidId, choreId, dateStr) {
        const entries = await getLogEntriesByDate(dateStr);
        return entries.find((entry) => entry.kid === kidId && entry.choreId === choreId) || null;
      }

      async function saveLogEntries(entries) {
        const saved = [];
        for (const entry of entries) {
          const ref = database.ref('families/' + familyId + '/log').push();
          await ref.set(entry);
          saved.push({ id: ref.key, ...entry });
        }
        lastUndoAction = { type: 'log', entries: saved };
        return saved;
      }

      async function writePayment(kidId, amount, type, note) {
        const entry = { kid: kidId, amount: Number(amount.toFixed(2)), type, timestamp: Date.now(), date: toDateString(new Date()), note: note || '', balanceDelta: Number((-Number(amount.toFixed(2))).toFixed(2)) };
        const ref = database.ref('families/' + familyId + '/payments').push();
        await ref.set(entry);
        const nextBalance = await adjustBalance(kidId, entry.balanceDelta);
        lastUndoAction = { type: 'payment', paymentId: ref.key, kidId, amount: entry.amount, balanceDelta: entry.balanceDelta };
        return nextBalance;
      }

      async function writeDebt(from, to, amount) {
        const entry = { from, to, amount: Number(amount.toFixed(2)), reason: 'Recorded from chat', timestamp: Date.now(), settled: false };
        const ref = database.ref('families/' + familyId + '/debts').push();
        await ref.set(entry);
        lastUndoAction = { type: 'debt', debtId: ref.key };
      }

      async function settleDebt(kids) {
        const snapshot = await database.ref('families/' + familyId + '/debts').get();
        if (!snapshot.exists()) return null;
        const match = Object.entries(snapshot.val()).find(([, debt]) => !debt.settled && kids.includes(debt.from) && kids.includes(debt.to));
        if (!match) return null;
        const [debtId, debt] = match;
        await database.ref('families/' + familyId + '/debts/' + debtId + '/settled').set(true);
        lastUndoAction = { type: 'settle_debt', debtId };
        return debt;
      }

      async function updateChorePoints(choreId, points) {
        const previous = Number(currentConfig.chores[choreId].points || 0);
        await database.ref('families/' + familyId + '/config/chores/' + choreId + '/points').set(points);
        currentConfig.chores[choreId].points = points;
        lastUndoAction = { type: 'change_points', choreId, previous };
      }

      async function undoLastAction() {
        if (!lastUndoAction) {
          addMessage('system', 'Nothing to undo yet.');
          showToast('Nothing to undo yet.');
          return;
        }
        if (lastUndoAction.type === 'log') {
          for (const entry of lastUndoAction.entries) {
            await database.ref('families/' + familyId + '/log/' + entry.id).remove();
          }
          addMessage('system', 'Removed the most recent log entry.');
          showToast('Removed the most recent log entry.');
        } else if (lastUndoAction.type === 'payment') {
          await database.ref('families/' + familyId + '/payments/' + lastUndoAction.paymentId).remove();
          const undoDelta = Number((-(lastUndoAction.balanceDelta != null ? lastUndoAction.balanceDelta : lastUndoAction.amount)).toFixed(2));
          await adjustBalance(lastUndoAction.kidId, undoDelta);
          addMessage('system', 'Removed the most recent payment.');
          showToast('Removed the most recent payment.');
        } else if (lastUndoAction.type === 'debt') {
          await database.ref('families/' + familyId + '/debts/' + lastUndoAction.debtId).remove();
          addMessage('system', 'Removed the most recent debt record.');
          showToast('Removed the most recent debt record.');
        } else if (lastUndoAction.type === 'settle_debt') {
          await database.ref('families/' + familyId + '/debts/' + lastUndoAction.debtId + '/settled').set(false);
          addMessage('system', 'Reopened the settled debt.');
          showToast('Reopened the settled debt.');
        } else if (lastUndoAction.type === 'change_points') {
          await database.ref('families/' + familyId + '/config/chores/' + lastUndoAction.choreId + '/points').set(lastUndoAction.previous);
          currentConfig.chores[lastUndoAction.choreId].points = lastUndoAction.previous;
          addMessage('system', 'Restored the previous point value.');
          showToast('Restored the previous point value.');
        }
        lastUndoAction = null;
      }

      async function renderStatus(kids) {
        const entries = await getAllLogEntries();
        const balances = await getBalances();
        const week = toIsoWeek(new Date());
        const targetKids = kids.length ? kids : Object.keys(currentConfig.kids || KIDS);
        const lines = targetKids.map((kidId) => {
          const points = entries.filter((entry) => entry.kid === kidId && entry.week === week).reduce((sum, entry) => sum + Number(entry.points || 0), 0);
          const pay = calculateWeeklyPay(currentConfig.kids[kidId].payTiers, points);
          const owed = Number(((balances[kidId] && balances[kidId].owed) || 0));
          return currentConfig.kids[kidId].name + ': ' + points + 'pts, ' + dollars(pay) + ' earned, ' + (owed >= 0 ? dollars(owed) + ' owed to them' : 'owes you ' + dollars(Math.abs(owed)));
        });
        const message = lines.join(' | ');
        addMessage('system', message);
        showToast(message, { duration: 7000 });
      }

      async function executeLogAction(action, options) {
        const entries = [];
        const date = action.dateContext || new Date();
        const dateStr = toDateString(date);
        const week = toIsoWeek(date);
        for (const kidId of action.kids) {
          if (!options || !options.skipDuplicateCheck) {
            const duplicate = await findDuplicate(kidId, action.choreId, dateStr);
            if (duplicate) {
              pendingAction = { type: 'duplicate', action };
              const prompt = currentConfig.kids[kidId].name + ' already logged ' + action.choreLabel + ' today. Log again?';
              addMessage('system', prompt);
              showToast(prompt, { duration: 10000 });
              return;
            }
          }
          entries.push({ kid: kidId, choreId: action.choreId, choreLabel: action.choreLabel, points: action.points, timestamp: Date.now(), date: dateStr, week, note: action.note || '' });
        }
        const saved = await saveLogEntries(entries);
        const message = 'Got it! ' + saved.map((entry) => currentConfig.kids[entry.kid].name + ' - ' + entry.choreLabel + ' ' + entry.points + 'pt').join(' | ') + '. Use Undo if needed.';
        addMessage('system', message);
        showToast(message, { onUndo: () => undoLastAction() });
      }

      async function executeIntent(result) {
        if (!familyId || !configLoaded) {
          showToast('Connect to a family first.', { type: 'error' });
          return;
        }

        if (result.intent === 'confirm_yes') {
          if (!pendingAction) {
            showToast('Nothing to confirm.');
            return;
          }
          const pending = pendingAction;
          pendingAction = null;
          if (pending.type === 'duplicate' || pending.type === 'confirm_chore') {
            await executeLogAction(pending.action, { skipDuplicateCheck: true });
          }
          return;
        }

        if (result.intent === 'confirm_no') {
          pendingAction = null;
          showToast('Cancelled.');
          return;
        }

        if (result.intent === 'undo') return undoLastAction();

        if (result.intent === 'missing_kid') {
          showToast('Which kid? (Alex, Louisa, or both)', {
            duration: 8000
          });
          return;
        }

        if (result.intent === 'no_match') {
          showToast("I didn't catch that. Try again?", { type: 'error' });
          return;
        }

        if (result.intent === 'check_status') return renderStatus(result.kids || []);

        if (result.intent === 'record_payment') {
          if (result.amount === null) {
            showToast('How much was the payment?');
            return;
          }
          const kidId = result.kids[0];
          const balance = await writePayment(kidId, result.amount, 'manual', 'Recorded from chat');
          showToast('Paid ' + currentConfig.kids[kidId].name + ' ' + dollars(result.amount) + '. Balance: ' + dollars(balance), { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'kid_spent') {
          if (result.amount === null) {
            showToast('How much did they spend?');
            return;
          }
          const kidId = result.kids[0];
          const spendNote = (result.note || '').replace(/\b(spent|bought|purchased)\b/gi, '').replace(/\$?\d+(\.\d+)?/g, '').trim() || 'Purchase';
          const balance = await writePayment(kidId, result.amount, 'spend', spendNote);
          showToast(currentConfig.kids[kidId].name + ' spent ' + dollars(result.amount) + ' on ' + spendNote, { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'parent_owes_kid' || result.intent === 'kid_owes_parent') {
          if (result.amount === null) {
            showToast('How much?');
            return;
          }
          const kidId = result.kids[0];
          const isParentOwes = result.intent === 'parent_owes_kid';
          const balance = await adjustBalance(kidId, isParentOwes ? result.amount : -result.amount);
          const entry = {
            kid: kidId,
            amount: Number(result.amount.toFixed(2)),
            type: isParentOwes ? 'credit' : 'owed',
            timestamp: Date.now(),
            date: toDateString(new Date()),
            note: isParentOwes ? 'Parent owes' : 'Owes parent',
            balanceDelta: isParentOwes ? result.amount : -result.amount
          };
          const ref = database.ref('families/' + familyId + '/payments').push();
          await ref.set(entry);
          lastUndoAction = { type: 'payment', paymentId: ref.key, kidId, amount: entry.amount, balanceDelta: entry.balanceDelta };
          showToast(isParentOwes ? 'You now owe ' + currentConfig.kids[kidId].name + ' ' + dollars(result.amount) : currentConfig.kids[kidId].name + ' now owes you ' + dollars(result.amount), { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'record_debt') {
          if (result.amount === null) {
            showToast('How much is owed?');

          }
          const fromKid = result.verb === 'lent' ? result.kids[1] : result.kids[0];

          await writeDebt(fromKid, toKid, result.amount);

        if (result.intent === 'freepoints') {
          const now = new Date();
          await saveLogEntries(result.kids.map((kidId) => ({
            kid: kidId,
            choreId: 'freepoints',

        if (result.intent === 'adhoc') {
          if (result.points === null) {
            showToast('How many points?');

          }
          const now = new Date();
          await saveLogEntries(result.kids.map((kidId) => ({
            kid: kidId,
            choreId: 'adhoc',
            choreLabel: result.choreLabel,
            points: result.points,
            timestamp: Date.now(),
            date: toDateString(now),
            week: toIsoWeek(now),
            note: result.choreLabel
          })));
          showToast('Logged: ' + result.choreLabel + ' (' + result.points + 'pts)', { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'confirm_chore') {
          pendingAction = { type: 'confirm_chore', action: result };
          showToast('Did you mean ' + result.choreLabel + '? (Yes/No)', { duration: 10000 });
          return;
        }

        if (result.intent === 'create_list') {
          if (!window.familyLists) {
            showToast('Lists are not ready yet.', { type: 'error' });
            return;
          }
          const created = await window.familyLists.createListNamed(result.listName);

        if (result.intent === 'add_to_list') {

            showToast('Lists are not ready yet.', { type: 'error' });

          showToast('Added ' + result.itemText + ' to ' + added.meta.name + '.');

        if (result.intent === 'check_off_list') {

          }
          if (checked.status === 'missing_item') {
            showToast('Could not find ' + result.itemText + ' on ' + checked.list.meta.name + '.', { type: 'error' });
            return;
          }
          showToast('Checked off ' + checked.item.text + ' from ' + checked.list.meta.name + '.');
          return;
        }

        if (result.intent === 'log_note') {
          if (!window.familyBulletin) {
            showToast('Bulletin is not ready yet.', { type: 'error' });

          showToast('Pinned note: ' + note.text, { kid: note.color !== 'neutral' ? note.color : null });

        }

        if (result.intent === 'remove_note') {
          if (!window.familyBulletin) {

          }
          showToast('Removed note: ' + removed.text);

        if (result.intent === 'log_chore') {
          if (Array.isArray(result.multi)) {
            for (const action of result.multi) {
              await executeLogAction(action, {});
              if (pendingAction) break;
            }
            return;
          }
          await executeLogAction(result, {});
        }
      }

      const GEMINI_KEY = typeof GEMINI_API_KEY === 'string' ? GEMINI_API_KEY.trim() : '';
      const GEMINI_ENABLED = typeof AI_PARSER_ENABLED === 'boolean' ? AI_PARSER_ENABLED : false;
      const GEMINI_URL = GEMINI_KEY ? 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY : '';

      async function askGemini(text) {
        if (!GEMINI_ENABLED || !GEMINI_URL) {
          return null;
        }
        const choreList = choreEntries().map(([id, c]) => id + ': ' + c.label + ' (' + c.points + 'pts)').join(', ');
        const prompt = 'You are a chore tracker assistant for a family with two kids: Alex and Louisa. ' +
          'Available chores: ' + choreList + '. ' +
          'The user said: "' + text + '"\n\n' +
          'Determine the intent. Respond with ONLY valid JSON, no markdown, no explanation. Use one of these formats:\n' +
          '{"intent":"log_chore","kids":["alex"],"choreId":"feed_dog_am","choreLabel":"Feed dog (AM)","points":1}\n' +
          '{"intent":"freepoints","kids":["alex"],"points":3}\n' +
          '{"intent":"adhoc","kids":["alex"],"points":2,"choreLabel":"description of chore"}\n' +
          '{"intent":"record_payment","kids":["alex"],"amount":6}\n' +
          '{"intent":"kid_spent","kids":["alex"],"amount":5}\n' +
          '{"intent":"record_debt","kids":["louisa","alex"],"amount":2,"verb":"owes"}\n' +
          '{"intent":"settle_debt","kids":["louisa","alex"]}\n' +
          '{"intent":"change_points","choreId":"feed_dog_am","choreLabel":"Feed dog (AM)","points":2}\n' +
          '{"intent":"check_status","kids":["alex"]}\n' +
          '{"intent":"no_match"}\n' +
          'For log_chore with multiple actions use: {"intent":"log_chore","multi":[...array of log_chore objects...]}\n' +
          'Kid IDs are "alex" and "louisa" (lowercase). Use "both" as ["alex","louisa"].';

        const response = await fetch(GEMINI_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        if (!response.ok) {
          console.warn('Gemini API returned status ' + response.status);
          return null;
        }
        const data = await response.json();
        const raw = ((data.candidates || [])[0] || {}).content;
        const resultText = (((raw || {}).parts || [])[0] || {}).text || '';
        if (!resultText) return null;
        const cleaned = resultText.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
        return JSON.parse(cleaned);
      }

      async function handleUserInput(text) {
        if (familyId && !configLoaded) {
          await loadFamilyConfigV2();
        }
        
        // Show in Chores history if active
        const router = elements.tabBar.querySelector('.active');
        if (router && router.dataset.tab === 'chores') {
          addMessage('user', text);
        }

        let result = routeIntent(text) || parseIntent(text);
        
        const GEMINI_KEY = typeof GEMINI_API_KEY === 'string' ? GEMINI_API_KEY.trim() : '';
        const GEMINI_ENABLED = typeof AI_PARSER_ENABLED === 'boolean' ? AI_PARSER_ENABLED : false;
        const GEMINI_URL = GEMINI_KEY ? 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY : '';

        var shouldTryGemini = GEMINI_ENABLED && GEMINI_URL && (result.intent === 'no_match' || result.intent === 'missing_kid' ||
          (result.intent === 'check_status' && parsePoints(text) !== null));
        var geminiTriedAndFailed = false;
        
        if (shouldTryGemini) {
          try {
            const geminiResult = await askGemini(text);
            if (geminiResult && geminiResult.intent && geminiResult.intent !== 'no_match') {
              result = geminiResult;
            } else {
              geminiTriedAndFailed = true;
            }
          } catch (e) {
            console.error('Gemini fallback failed:', e);
            geminiTriedAndFailed = true;
          }
        }

        if (result.intent === 'no_match' && geminiTriedAndFailed) {
          showToast("I didn't understand that. Try rephrasing?", { type: 'error' });
          return;
        }

        await executeIntent(result);
      }

      async function waitForRuntimeReady(getRuntime, timeoutMs) {
        const startedAt = Date.now();
        return new Promise(function (resolve, reject) {
          const poll = setInterval(function () {
            const runtime = getRuntime();
            if (runtime && runtime.familyId && runtime.configLoaded) {
              clearInterval(poll);
              resolve(runtime);
              return;
            }
            if (Date.now() - startedAt >= timeoutMs) {
              clearInterval(poll);
              reject(new Error('Timed out while loading family data.'));
            }
          }, 300);
        });
      }
      let recognition = null;
      let isListening = false;
      let speechFinalText = '';
      let speechInterimText = '';
      let speechSubmitTimer = null;
      let speechManualStop = false;

      function ensureSpeechStyles() {
        if (document.getElementById('speechStyles')) {
          return;
        }
        // mic pulse styles now in main <style> block
      }

      function setListeningState(listening) {
        isListening = listening;
        elements.micButton.classList.toggle('listening', listening);
        elements.micButton.textContent = listening ? 'Stop' : 'Mic';
        elements.micButton.setAttribute('aria-label', listening ? 'Stop voice input' : 'Voice input');
        if (listening) {
          elements.messageInput.placeholder = 'Listening...';
        } else {
          elements.messageInput.placeholder = 'Type or speak...';
        }
      }

      function clearSpeechSubmitTimer() {
        if (speechSubmitTimer) {
          clearTimeout(speechSubmitTimer);
          speechSubmitTimer = null;
        }
      }

      function getSpeechDraft() {
        return [speechFinalText.trim(), speechInterimText.trim()].filter(Boolean).join(' ').trim();
      }

      function collapseRepeatedSpeech(text) {
        const parts = String(text || '').split(/\s+/).filter(Boolean);
        if (!parts.length) return '';
        const deduped = [];
        for (let i = 0; i < parts.length; i += 1) {
          const word = parts[i];
          if (!deduped.length || deduped[deduped.length - 1].toLowerCase() !== word.toLowerCase()) {
            deduped.push(word);
          }
        }
        return deduped.join(' ');
      }

      function normalizeSpeechWords(text) {
        return collapseRepeatedSpeech(String(text || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').trim());
      }

      function mergeSpeechFinal(existingText, incomingText) {
        const existing = collapseRepeatedSpeech(existingText);
        const incoming = collapseRepeatedSpeech(incomingText);
        if (!incoming) {
          return existing;
        }
        if (!existing) {
          return incoming;
        }
        const existingWords = normalizeSpeechWords(existing).split(/\s+/).filter(Boolean);
        const incomingWords = normalizeSpeechWords(incoming).split(/\s+/).filter(Boolean);
        let overlap = 0;
        const limit = Math.min(existingWords.length, incomingWords.length);
        for (let size = limit; size > 0; size -= 1) {
          const existingTail = existingWords.slice(existingWords.length - size).join(' ');
          const incomingHead = incomingWords.slice(0, size).join(' ');
          if (existingTail === incomingHead) {
            overlap = size;
            break;
          }
        }
        if (!overlap && normalizeSpeechWords(existing).includes(normalizeSpeechWords(incoming))) {
          return existing;
        }
        const incomingOriginalWords = incoming.split(/\s+/).filter(Boolean);
        const suffix = incomingOriginalWords.slice(overlap).join(' ');
        return collapseRepeatedSpeech([existing, suffix].filter(Boolean).join(' ').trim());
      }

      function resetSpeechDraft() {
        speechFinalText = '';
        speechInterimText = '';
        clearSpeechSubmitTimer();
      }

      function flushSpeechDraft(submit) {
        const draft = getSpeechDraft();
        clearSpeechSubmitTimer();
        if (!draft) {
          resetSpeechDraft();
          return;
        }
        elements.messageInput.value = draft;
        resetSpeechDraft();
        if (!submit) {
          return;
        }
        elements.messageInput.value = '';
        handleUserInput(draft).catch((error) => {
          console.error(error);
          addMessage('system', 'Something went wrong while handling that request.', error.message);
        });
      }

      function scheduleSpeechSubmit(delayMs) {
        clearSpeechSubmitTimer();
        speechSubmitTimer = setTimeout(() => {
          flushSpeechDraft(true);
        }, delayMs);
      }

      function initSpeechRecognition() {
        ensureSpeechStyles();
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          elements.micButton.style.display = 'none';
          return null;
        }
        const nextRecognition = new SpeechRecognition();
        nextRecognition.lang = 'en-US';
        nextRecognition.interimResults = true;
        nextRecognition.continuous = true;
        nextRecognition.maxAlternatives = 1;
        nextRecognition.onstart = () => {
          speechManualStop = false;
          resetSpeechDraft();
          setListeningState(true);
        };
        nextRecognition.onresult = (event) => {
          let sawFinal = false;
          let latestInterim = '';
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const transcript = collapseRepeatedSpeech(String(event.results[i][0].transcript || '').trim());
            if (!transcript) continue;
            if (event.results[i].isFinal) {
              speechFinalText = mergeSpeechFinal(speechFinalText, transcript);
              sawFinal = true;
              latestInterim = '';
            } else {
              latestInterim = transcript;
            }
          }
          speechInterimText = latestInterim;
          const shown = getSpeechDraft();
          if (shown) {
            elements.messageInput.value = shown;
          }
          if (sawFinal) {
            scheduleSpeechSubmit(1400);
          } else {
            clearSpeechSubmitTimer();
          }
        };
        nextRecognition.onerror = (event) => {
          setListeningState(false);
          if (event && event.error !== 'aborted' && getSpeechDraft()) {
            scheduleSpeechSubmit(300);
          }
        };
        nextRecognition.onend = () => {
          setListeningState(false);
          if (speechManualStop) {
            flushSpeechDraft(true);
            return;
          }
          if (getSpeechDraft()) {
            scheduleSpeechSubmit(500);
          }
        };
        return nextRecognition;
      }

      function toggleSpeechRecognition() {
        if (!recognition) {
          recognition = initSpeechRecognition();
        }
        if (!recognition) {
          addMessage('system', 'Speech recognition is not available in this browser.', 'Use text entry for now.');
          return;
        }
        if (isListening) {
          speechManualStop = true;
          recognition.stop();
          return;
        }
        try {
          recognition.start();
        } catch (error) {
          console.error(error);
          setListeningState(false);
          addMessage('system', 'Unable to start speech recognition.', error.message || 'Try tapping the mic again.');
        }
      }

        elements.micButton.addEventListener('click', () => {

          templateIndex: templateIndex,

      function normalizeCalendarEvents(payload) {
        var events = payload && Array.isArray(payload.events) ? payload.events : [];
        return events.map(function (event) {
          return {
            title: String(event && event.title ? event.title : 'Untitled event'),

      function invalidateCalendarCache() {

      function fetchCalendarEvents(phase, options) {
        var url = String(phase && phase.currentConfig && phase.currentConfig.calendarUrl || '').trim();
        if (!url) {
          return Promise.resolve({ status: 'missing-url', events: [] });
        }

        var forceRefresh = Boolean(options && options.force);
        var sameSource = calendarCache.familyId === phase.familyId && calendarCache.url === url;
        var fresh = sameSource && calendarCache.events && (Date.now() - calendarCache.fetchedAt) < 15 * 60 * 1000;
        if (!forceRefresh && fresh) {
          return Promise.resolve({ status: 'ready', events: calendarCache.events });
        }
        if (!forceRefresh && sameSource && calendarCache.pending) {
          return calendarCache.pending;
        }

        calendarCache.familyId = phase.familyId;
        calendarCache.url = url;
        var calendarDays = Number(phase.currentConfig && phase.currentConfig.calendarDays) || 10;
        var fetchUrl = url + (url.indexOf('?') === -1 ? '?' : '&') + 'days=' + calendarDays;
        calendarCache.pending = fetch(fetchUrl, { cache: 'no-store' })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Calendar request failed with status ' + response.status + '.');
            }
            return response.json();
          })
          .then(function (payload) {
            var events = normalizeCalendarEvents(payload);
            calendarCache.events = events;
            calendarCache.fetchedAt = Date.now();
            calendarCache.error = '';
            return { status: 'ready', events: events };
          })
          .catch(function (error) {
            console.error(error);
            calendarCache.error = error.message || 'Calendar unavailable.';
            if (sameSource && calendarCache.events) {
              return { status: 'ready', events: calendarCache.events, stale: true, error: calendarCache.error };
            }
            return { status: 'error', events: [], error: calendarCache.error };
          })
          .finally(function () {
            calendarCache.pending = null;
          });

        return calendarCache.pending;

      function formatCalendarDayLabel(date) {

        tomorrow.setDate(today.getDate() + 1);
        if (target.getTime() === today.getTime()) return 'Today - ' + formatBulletinDate(date);
        if (target.getTime() === tomorrow.getTime()) return 'Tomorrow - ' + formatBulletinDate(date);
        return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      }

      function formatCalendarTime(event) {
        var start = new Date(event.start);
        var end = event.end ? new Date(event.end) : null;
        if (event.allDay) return 'All day';
        if (Number.isNaN(start.getTime())) return '';
        var startText = start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (!end || Number.isNaN(end.getTime())) return startText;
        return startText + ' - ' + end.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }

      function renderCalendarSection(calendarState) {
        if (calendarState.status === 'missing-url') {
          return '<div class="calendar-empty"><strong>Set up calendar in settings.</strong><p>Tap the gear icon in the header to add your Google Calendar URL.</p><div class="family-panel-actions"><button type="button" class="bulletin-btn secondary" data-calendar-action="open-settings">Open settings</button></div></div>';
        }

        }

          return '<div class="calendar-empty"><strong>No upcoming events.</strong><p>Nothing in the next ' + daysAhead + ' days.</p></div>';
        }

        var groups = {};
        calendarState.events.forEach(function (event) {
          var startDate = new Date(event.start);
          if (Number.isNaN(startDate.getTime())) return;
          var key = startDate.getFullYear() + '-' + String(startDate.getMonth() + 1).padStart(2, '0') + '-' + String(startDate.getDate()).padStart(2, '0');
          if (!groups[key]) groups[key] = [];

        return '<div class="calendar-groups">' + Object.keys(groups).sort().map(function (key) {

            '<div class="calendar-day-label">' + escapeBulletinHtml(formatCalendarDayLabel(date)) + '</div>' +

              '</article>';

      async function addNote(text, color) {

        var note = {
          text: String(text || '').trim(),
          timestamp: Date.now(),
          color: color || 'neutral'
        };
        if (!note.text) throw new Error('Note text is required.');
        if (note.text.length > 240) {
          note.text = note.text.slice(0, 240).trim();
