      async function getBalances() {
        const snapshot = await database.ref('families/' + familyId + '/balances').get();
        return snapshot.exists() ? snapshot.val() : { alex: { owed: 0 }, louisa: { owed: 0 } };
      }

      async function setOwed(kidId, amount) {
        await database.ref('families/' + familyId + '/balances/' + kidId + '/owed').set(Number(amount.toFixed(2)));
      }

      async function adjustBalance(kidId, delta) {
        const balances = await getBalances();
        const current = Number(((balances[kidId] && balances[kidId].owed) || 0));
        const next = Number((current + delta).toFixed(2));
        await setOwed(kidId, next);
        return next;
      }

      function paymentBalanceDelta(payment) {
        if (payment && typeof payment.balanceDelta === 'number') {
          return Number(payment.balanceDelta || 0);
        }
        const amount = Number((payment && payment.amount) || 0);
        if (!payment) return 0;
        if (payment.type === 'credit' || payment.type === 'weekly') return amount;
        return -amount;
      }

      async function findDuplicate(kidId, choreId, dateStr) {
        const entries = await getLogEntriesByDate(dateStr);
        return entries.find((entry) => entry.kid === kidId && entry.choreId === choreId) || null;
      }

      async function saveLogEntries(entries) {
        const saved = [];
        for (const entry of entries) {
          const ref = database.ref('families/' + familyId + '/log').push();
          await ref.set(entry);
          saved.push({ id: ref.key, ...entry });
        }
        lastUndoAction = { type: 'log', entries: saved };
        return saved;
      }

      async function writePayment(kidId, amount, type, note) {
        const entry = { kid: kidId, amount: Number(amount.toFixed(2)), type, timestamp: Date.now(), date: toDateString(new Date()), note: note || '', balanceDelta: Number((-Number(amount.toFixed(2))).toFixed(2)) };
        const ref = database.ref('families/' + familyId + '/payments').push();
        await ref.set(entry);
        const nextBalance = await adjustBalance(kidId, entry.balanceDelta);
        lastUndoAction = { type: 'payment', paymentId: ref.key, kidId, amount: entry.amount, balanceDelta: entry.balanceDelta };
        return nextBalance;
      }

      async function writeDebt(from, to, amount) {
        const entry = { from, to, amount: Number(amount.toFixed(2)), reason: 'Recorded from chat', timestamp: Date.now(), settled: false };
        const ref = database.ref('families/' + familyId + '/debts').push();
        await ref.set(entry);
        lastUndoAction = { type: 'debt', debtId: ref.key };
      }

      async function settleDebt(kids) {
        const snapshot = await database.ref('families/' + familyId + '/debts').get();
        if (!snapshot.exists()) return null;
        const match = Object.entries(snapshot.val()).find(([, debt]) => !debt.settled && kids.includes(debt.from) && kids.includes(debt.to));
        if (!match) return null;
        const [debtId, debt] = match;
        await database.ref('families/' + familyId + '/debts/' + debtId + '/settled').set(true);
        lastUndoAction = { type: 'settle_debt', debtId };
        return debt;
      }

      async function updateChorePoints(choreId, points) {
        const previous = Number(currentConfig.chores[choreId].points || 0);
        await database.ref('families/' + familyId + '/config/chores/' + choreId + '/points').set(points);
        currentConfig.chores[choreId].points = points;
        lastUndoAction = { type: 'change_points', choreId, previous };
      }

      async function undoLastAction() {
        if (!lastUndoAction) {
          addMessage('system', 'Nothing to undo yet.');
          showToast('Nothing to undo yet.');
          return;
        }
        if (lastUndoAction.type === 'log') {
          for (const entry of lastUndoAction.entries) {
            await database.ref('families/' + familyId + '/log/' + entry.id).remove();
          }
          addMessage('system', 'Removed the most recent log entry.');
          showToast('Removed the most recent log entry.');
        } else if (lastUndoAction.type === 'payment') {
          await database.ref('families/' + familyId + '/payments/' + lastUndoAction.paymentId).remove();
          const undoDelta = Number((-(lastUndoAction.balanceDelta != null ? lastUndoAction.balanceDelta : lastUndoAction.amount)).toFixed(2));
          await adjustBalance(lastUndoAction.kidId, undoDelta);
          addMessage('system', 'Removed the most recent payment.');
          showToast('Removed the most recent payment.');
        } else if (lastUndoAction.type === 'debt') {
          await database.ref('families/' + familyId + '/debts/' + lastUndoAction.debtId).remove();
          addMessage('system', 'Removed the most recent debt record.');
          showToast('Removed the most recent debt record.');
        } else if (lastUndoAction.type === 'settle_debt') {
          await database.ref('families/' + familyId + '/debts/' + lastUndoAction.debtId + '/settled').set(false);
          addMessage('system', 'Reopened the settled debt.');
          showToast('Reopened the settled debt.');
        } else if (lastUndoAction.type === 'change_points') {
          await database.ref('families/' + familyId + '/config/chores/' + lastUndoAction.choreId + '/points').set(lastUndoAction.previous);
          currentConfig.chores[lastUndoAction.choreId].points = lastUndoAction.previous;
          addMessage('system', 'Restored the previous point value.');
          showToast('Restored the previous point value.');
        }
        lastUndoAction = null;
      }

      async function renderStatus(kids) {
        const entries = await getAllLogEntries();
        const balances = await getBalances();
        const week = toIsoWeek(new Date());
        const targetKids = kids.length ? kids : Object.keys(currentConfig.kids || KIDS);
        const lines = targetKids.map((kidId) => {
          const points = entries.filter((entry) => entry.kid === kidId && entry.week === week).reduce((sum, entry) => sum + Number(entry.points || 0), 0);
          const pay = calculateWeeklyPay(currentConfig.kids[kidId].payTiers, points);
          const owed = Number(((balances[kidId] && balances[kidId].owed) || 0));
          return currentConfig.kids[kidId].name + ': ' + points + 'pts, ' + dollars(pay) + ' earned, ' + (owed >= 0 ? dollars(owed) + ' owed to them' : 'owes you ' + dollars(Math.abs(owed)));
        });
        const message = lines.join(' | ');
        addMessage('system', message);
        showToast(message, { duration: 7000 });
      }

      async function executeLogAction(action, options) {
        const entries = [];
        const date = action.dateContext || new Date();
        const dateStr = toDateString(date);
        const week = toIsoWeek(date);
        for (const kidId of action.kids) {
          if (!options || !options.skipDuplicateCheck) {
            const duplicate = await findDuplicate(kidId, action.choreId, dateStr);
            if (duplicate) {
              pendingAction = { type: 'duplicate', action };
              const prompt = currentConfig.kids[kidId].name + ' already logged ' + action.choreLabel + ' today. Log again?';
              addMessage('system', prompt);
              showToast(prompt, { duration: 10000 });
              return;
            }
          }
          entries.push({ kid: kidId, choreId: action.choreId, choreLabel: action.choreLabel, points: action.points, timestamp: Date.now(), date: dateStr, week, note: action.note || '' });
        }
        const saved = await saveLogEntries(entries);
        const message = 'Got it! ' + saved.map((entry) => currentConfig.kids[entry.kid].name + ' - ' + entry.choreLabel + ' ' + entry.points + 'pt').join(' | ') + '. Use Undo if needed.';
        addMessage('system', message);
        showToast(message, { onUndo: () => undoLastAction() });
      }

      async function executeIntent(result) {
        if (!familyId || !configLoaded) {
          showToast('Connect to a family first.', { type: 'error' });
          return;
        }

        if (result.intent === 'confirm_yes') {
          if (!pendingAction) {
            showToast('Nothing to confirm.');
            return;
          }
          const pending = pendingAction;
          pendingAction = null;
          if (pending.type === 'duplicate' || pending.type === 'confirm_chore') {
            await executeLogAction(pending.action, { skipDuplicateCheck: true });
          }
          return;
        }

        if (result.intent === 'confirm_no') {
          pendingAction = null;
          showToast('Cancelled.');
          return;
        }

        if (result.intent === 'undo') return undoLastAction();

        if (result.intent === 'missing_kid') {
          showToast('Which kid? (Alex, Louisa, or both)', {
            duration: 8000
          });
          return;
        }

        if (result.intent === 'no_match') {
          showToast("I didn't catch that. Try again?", { type: 'error' });
          return;
        }

        if (result.intent === 'check_status') return renderStatus(result.kids || []);

        if (result.intent === 'record_payment') {
          if (result.amount === null) {
            showToast('How much was the payment?');
            return;
          }
          const kidId = result.kids[0];
          const balance = await writePayment(kidId, result.amount, 'manual', 'Recorded from chat');
          showToast('Paid ' + currentConfig.kids[kidId].name + ' ' + dollars(result.amount) + '. Balance: ' + dollars(balance), { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'kid_spent') {
          if (result.amount === null) {
            showToast('How much did they spend?');
            return;
          }
          const kidId = result.kids[0];
          const spendNote = (result.note || '').replace(/\b(spent|bought|purchased)\b/gi, '').replace(/\$?\d+(\.\d+)?/g, '').trim() || 'Purchase';
          const balance = await writePayment(kidId, result.amount, 'spend', spendNote);
          showToast(currentConfig.kids[kidId].name + ' spent ' + dollars(result.amount) + ' on ' + spendNote, { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'parent_owes_kid' || result.intent === 'kid_owes_parent') {
          if (result.amount === null) {
            showToast('How much?');
            return;
          }
          const kidId = result.kids[0];
          const isParentOwes = result.intent === 'parent_owes_kid';
          const balance = await adjustBalance(kidId, isParentOwes ? result.amount : -result.amount);
          const entry = {
            kid: kidId,
            amount: Number(result.amount.toFixed(2)),
            type: isParentOwes ? 'credit' : 'owed',
            timestamp: Date.now(),
            date: toDateString(new Date()),
            note: isParentOwes ? 'Parent owes' : 'Owes parent',
            balanceDelta: isParentOwes ? result.amount : -result.amount
          };
          const ref = database.ref('families/' + familyId + '/payments').push();
          await ref.set(entry);
          lastUndoAction = { type: 'payment', paymentId: ref.key, kidId, amount: entry.amount, balanceDelta: entry.balanceDelta };
          showToast(isParentOwes ? 'You now owe ' + currentConfig.kids[kidId].name + ' ' + dollars(result.amount) : currentConfig.kids[kidId].name + ' now owes you ' + dollars(result.amount), { kid: kidId, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'record_debt') {
          if (result.amount === null) {
            showToast('How much is owed?');
            return;
          }
          const fromKid = result.verb === 'lent' ? result.kids[1] : result.kids[0];
          const toKid = result.verb === 'lent' ? result.kids[0] : result.kids[1];
          await writeDebt(fromKid, toKid, result.amount);
          showToast(currentConfig.kids[fromKid].name + ' owes ' + currentConfig.kids[toKid].name + ' ' + dollars(result.amount), { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'settle_debt') {
          const debt = await settleDebt(result.kids);
          if (!debt) {
            showToast('No active debt found between them.', { type: 'error' });
            return;
          }
          showToast('Settled debt: ' + dollars(debt.amount), { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'change_points') {
          if (!result.choreId || result.points === null) {
            showToast('Which chore and how many points?');
            return;
          }
          await updateChorePoints(result.choreId, result.points);
          showToast('Updated ' + result.choreLabel + ' to ' + result.points + 'pts', { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'freepoints') {
          const now = new Date();
          await saveLogEntries(result.kids.map((kidId) => ({
            kid: kidId,
            choreId: 'freepoints',
            choreLabel: 'Quick points',
            points: result.points,
            timestamp: Date.now(),
            date: toDateString(now),
            week: toIsoWeek(now),
            note: ''
          })));
          const names = result.kids.map(id => currentConfig.kids[id].name).join(' & ');
          showToast((result.points > 0 ? '+' : '') + result.points + 'pts for ' + names, { kid: result.kids.length === 1 ? result.kids[0] : null, onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'adhoc') {
          if (result.points === null) {
            showToast('How many points?');
            return;
          }
          const now = new Date();
          await saveLogEntries(result.kids.map((kidId) => ({
            kid: kidId,
            choreId: 'adhoc',
            choreLabel: result.choreLabel,
            points: result.points,
            timestamp: Date.now(),
            date: toDateString(now),
            week: toIsoWeek(now),
            note: result.choreLabel
          })));
          showToast('Logged: ' + result.choreLabel + ' (' + result.points + 'pts)', { onUndo: () => undoLastAction() });
          return;
        }

        if (result.intent === 'confirm_chore') {
          pendingAction = { type: 'confirm_chore', action: result };
          showToast('Did you mean ' + result.choreLabel + '? (Yes/No)', { duration: 10000 });
          return;
        }

        if (result.intent === 'create_list') {
          if (!window.familyLists) {
            showToast('Lists are not ready yet.', { type: 'error' });
            return;
          }
          const created = await window.familyLists.createListNamed(result.listName);
          if (!created) {
            showToast('Could not create that list.', { type: 'error' });
            return;
          }
          showToast('Created ' + created.meta.name + ' list.');
          return;
        }

        if (result.intent === 'add_to_list') {
          if (!window.familyLists) {
            showToast('Lists are not ready yet.', { type: 'error' });
            return;
          }
          const added = await window.familyLists.addItemsToNamedList(result.listName, result.itemText);
          if (!added) {
            showToast('Could not find the ' + result.listName + ' list.', { type: 'error' });
            return;
          }
          showToast('Added ' + result.itemText + ' to ' + added.meta.name + '.');
          return;
        }

        if (result.intent === 'check_off_list') {
          if (!window.familyLists) {
            showToast('Lists are not ready yet.', { type: 'error' });
            return;
          }
          const checked = await window.familyLists.checkOffItemByText(result.listName, result.itemText);
          if (!checked || checked.status === 'missing_list') {
            showToast('Could not find the ' + result.listName + ' list.', { type: 'error' });
            return;
          }
          if (checked.status === 'missing_item') {
            showToast('Could not find ' + result.itemText + ' on ' + checked.list.meta.name + '.', { type: 'error' });
            return;
          }
          showToast('Checked off ' + checked.item.text + ' from ' + checked.list.meta.name + '.');
          return;
        }

        if (result.intent === 'log_note') {
          if (!window.familyBulletin) {
            showToast('Bulletin is not ready yet.', { type: 'error' });
            return;
          }
          const note = await window.familyBulletin.addNote(result.noteText, result.color);
          showToast('Pinned note: ' + note.text, { kid: note.color !== 'neutral' ? note.color : null });
          return;
        }

        if (result.intent === 'remove_note') {
          if (!window.familyBulletin) {
            showToast('Bulletin is not ready yet.', { type: 'error' });
            return;
          }
          const removed = await window.familyBulletin.removeNoteByText(result.noteText);
          if (!removed) {
            showToast('Could not find that note on the Bulletin.', { type: 'error' });
            return;
          }
          showToast('Removed note: ' + removed.text);
          return;
        }

        if (result.intent === 'log_chore') {
          if (Array.isArray(result.multi)) {
            for (const action of result.multi) {
              await executeLogAction(action, {});
              if (pendingAction) break;
            }
            return;
          }
          await executeLogAction(result, {});
        }
      }

      const GEMINI_KEY = typeof GEMINI_API_KEY === 'string' ? GEMINI_API_KEY.trim() : '';
      const GEMINI_ENABLED = typeof AI_PARSER_ENABLED === 'boolean' ? AI_PARSER_ENABLED : false;
      const GEMINI_URL = GEMINI_KEY ? 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY : '';

      async function askGemini(text) {
        if (!GEMINI_ENABLED || !GEMINI_URL) {
          return null;
        }
        const choreList = choreEntries().map(([id, c]) => id + ': ' + c.label + ' (' + c.points + 'pts)').join(', ');
        const prompt = 'You are a chore tracker assistant for a family with two kids: Alex and Louisa. ' +
          'Available chores: ' + choreList + '. ' +
          'The user said: "' + text + '"\n\n' +
          'Determine the intent. Respond with ONLY valid JSON, no markdown, no explanation. Use one of these formats:\n' +
          '{"intent":"log_chore","kids":["alex"],"choreId":"feed_dog_am","choreLabel":"Feed dog (AM)","points":1}\n' +
          '{"intent":"freepoints","kids":["alex"],"points":3}\n' +
          '{"intent":"adhoc","kids":["alex"],"points":2,"choreLabel":"description of chore"}\n' +
          '{"intent":"record_payment","kids":["alex"],"amount":6}\n' +
          '{"intent":"kid_spent","kids":["alex"],"amount":5}\n' +
          '{"intent":"record_debt","kids":["louisa","alex"],"amount":2,"verb":"owes"}\n' +
          '{"intent":"settle_debt","kids":["louisa","alex"]}\n' +
          '{"intent":"change_points","choreId":"feed_dog_am","choreLabel":"Feed dog (AM)","points":2}\n' +
          '{"intent":"check_status","kids":["alex"]}\n' +
          '{"intent":"no_match"}\n' +
          'For log_chore with multiple actions use: {"intent":"log_chore","multi":[...array of log_chore objects...]}\n' +
          'Kid IDs are "alex" and "louisa" (lowercase). Use "both" as ["alex","louisa"].';

        const response = await fetch(GEMINI_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        if (!response.ok) {
          console.warn('Gemini API returned status ' + response.status);
          return null;
        }
        const data = await response.json();
        const raw = ((data.candidates || [])[0] || {}).content;
        const resultText = (((raw || {}).parts || [])[0] || {}).text || '';
        if (!resultText) return null;
        const cleaned = resultText.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
        return JSON.parse(cleaned);
      }

      async function handleUserInput(text) {
        if (familyId && !configLoaded) {
          await loadFamilyConfigV2();
        }
        
        // Show in Chores history if active
        const router = elements.tabBar.querySelector('.active');
        if (router && router.dataset.tab === 'chores') {
          addMessage('user', text);
        }

        let result = routeIntent(text) || parseIntent(text);
        
        const GEMINI_KEY = typeof GEMINI_API_KEY === 'string' ? GEMINI_API_KEY.trim() : '';
        const GEMINI_ENABLED = typeof AI_PARSER_ENABLED === 'boolean' ? AI_PARSER_ENABLED : false;
        const GEMINI_URL = GEMINI_KEY ? 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY : '';

        var shouldTryGemini = GEMINI_ENABLED && GEMINI_URL && (result.intent === 'no_match' || result.intent === 'missing_kid' ||
          (result.intent === 'check_status' && parsePoints(text) !== null));
        var geminiTriedAndFailed = false;
        
        if (shouldTryGemini) {
          try {
            const geminiResult = await askGemini(text);
            if (geminiResult && geminiResult.intent && geminiResult.intent !== 'no_match') {
              result = geminiResult;
            } else {
              geminiTriedAndFailed = true;
            }
          } catch (e) {
            console.error('Gemini fallback failed:', e);
            geminiTriedAndFailed = true;
          }
        }

        if (result.intent === 'no_match' && geminiTriedAndFailed) {
          showToast("I didn't understand that. Try rephrasing?", { type: 'error' });
          return;
        }

        await executeIntent(result);
      }

      async function waitForRuntimeReady(getRuntime, timeoutMs) {
        const startedAt = Date.now();
        return new Promise(function (resolve, reject) {
          const poll = setInterval(function () {
            const runtime = getRuntime();
            if (runtime && runtime.familyId && runtime.configLoaded) {
              clearInterval(poll);
              resolve(runtime);
              return;
            }
            if (Date.now() - startedAt >= timeoutMs) {
              clearInterval(poll);
              reject(new Error('Timed out while loading family data.'));
            }
          }, 300);
        });
      }
      let recognition = null;
      let isListening = false;
      let speechFinalText = '';
      let speechInterimText = '';
      let speechSubmitTimer = null;
      let speechManualStop = false;

      function ensureSpeechStyles() {
        if (document.getElementById('speechStyles')) {
          return;
        }
        // mic pulse styles now in main <style> block
      }

      function setListeningState(listening) {
        isListening = listening;
        elements.micButton.classList.toggle('listening', listening);
        elements.micButton.textContent = listening ? 'Stop' : 'Mic';
        elements.micButton.setAttribute('aria-label', listening ? 'Stop voice input' : 'Voice input');
        if (listening) {
          elements.messageInput.placeholder = 'Listening...';
        } else {
          elements.messageInput.placeholder = 'Type or speak...';
        }
      }

      function clearSpeechSubmitTimer() {
        if (speechSubmitTimer) {
          clearTimeout(speechSubmitTimer);
          speechSubmitTimer = null;
        }
      }

      function getSpeechDraft() {
        return [speechFinalText.trim(), speechInterimText.trim()].filter(Boolean).join(' ').trim();
      }

      function collapseRepeatedSpeech(text) {
        const parts = String(text || '').split(/\s+/).filter(Boolean);
        if (!parts.length) return '';
        const deduped = [];
        for (let i = 0; i < parts.length; i += 1) {
          const word = parts[i];
          if (!deduped.length || deduped[deduped.length - 1].toLowerCase() !== word.toLowerCase()) {
            deduped.push(word);
          }
        }
        return deduped.join(' ');
      }

      function normalizeSpeechWords(text) {
        return collapseRepeatedSpeech(String(text || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').trim());
      }

      function mergeSpeechFinal(existingText, incomingText) {
        const existing = collapseRepeatedSpeech(existingText);
        const incoming = collapseRepeatedSpeech(incomingText);
        if (!incoming) {
          return existing;
        }
        if (!existing) {
          return incoming;
        }
        const existingWords = normalizeSpeechWords(existing).split(/\s+/).filter(Boolean);
        const incomingWords = normalizeSpeechWords(incoming).split(/\s+/).filter(Boolean);
        let overlap = 0;
        const limit = Math.min(existingWords.length, incomingWords.length);
        for (let size = limit; size > 0; size -= 1) {
          const existingTail = existingWords.slice(existingWords.length - size).join(' ');
          const incomingHead = incomingWords.slice(0, size).join(' ');
          if (existingTail === incomingHead) {
            overlap = size;
            break;
          }
        }
        if (!overlap && normalizeSpeechWords(existing).includes(normalizeSpeechWords(incoming))) {
          return existing;
        }
        const incomingOriginalWords = incoming.split(/\s+/).filter(Boolean);
        const suffix = incomingOriginalWords.slice(overlap).join(' ');
        return collapseRepeatedSpeech([existing, suffix].filter(Boolean).join(' ').trim());
      }

      function resetSpeechDraft() {
        speechFinalText = '';
        speechInterimText = '';
        clearSpeechSubmitTimer();
      }

      function flushSpeechDraft(submit) {
        const draft = getSpeechDraft();
        clearSpeechSubmitTimer();
        if (!draft) {
          resetSpeechDraft();
          return;
        }
        elements.messageInput.value = draft;
        resetSpeechDraft();
        if (!submit) {
          return;
        }
        elements.messageInput.value = '';
        handleUserInput(draft).catch((error) => {
          console.error(error);
          addMessage('system', 'Something went wrong while handling that request.', error.message);
        });
      }

      function scheduleSpeechSubmit(delayMs) {
        clearSpeechSubmitTimer();
        speechSubmitTimer = setTimeout(() => {
          flushSpeechDraft(true);
        }, delayMs);
      }

      function initSpeechRecognition() {
        ensureSpeechStyles();
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          elements.micButton.style.display = 'none';
          return null;
        }
        const nextRecognition = new SpeechRecognition();
        nextRecognition.lang = 'en-US';
        nextRecognition.interimResults = true;
        nextRecognition.continuous = true;
        nextRecognition.maxAlternatives = 1;
        nextRecognition.onstart = () => {
          speechManualStop = false;
          resetSpeechDraft();
          setListeningState(true);
        };
        nextRecognition.onresult = (event) => {
          let sawFinal = false;
          let latestInterim = '';
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const transcript = collapseRepeatedSpeech(String(event.results[i][0].transcript || '').trim());
            if (!transcript) continue;
            if (event.results[i].isFinal) {
              speechFinalText = mergeSpeechFinal(speechFinalText, transcript);
              sawFinal = true;
              latestInterim = '';
            } else {
              latestInterim = transcript;
            }
          }
          speechInterimText = latestInterim;
          const shown = getSpeechDraft();
          if (shown) {
            elements.messageInput.value = shown;
          }
          if (sawFinal) {
            scheduleSpeechSubmit(1400);
          } else {
            clearSpeechSubmitTimer();
          }
        };
        nextRecognition.onerror = (event) => {
          setListeningState(false);
          if (event && event.error !== 'aborted' && getSpeechDraft()) {
            scheduleSpeechSubmit(300);
          }
        };
        nextRecognition.onend = () => {
          setListeningState(false);
          if (speechManualStop) {
            flushSpeechDraft(true);
            return;
          }
          if (getSpeechDraft()) {
            scheduleSpeechSubmit(500);
          }
        };
        return nextRecognition;
      }

      function toggleSpeechRecognition() {
        if (!recognition) {
          recognition = initSpeechRecognition();
        }
        if (!recognition) {
          addMessage('system', 'Speech recognition is not available in this browser.', 'Use text entry for now.');
          return;
        }
        if (isListening) {
          speechManualStop = true;
          recognition.stop();
          return;
        }
        try {
          recognition.start();
        } catch (error) {
          console.error(error);
          setListeningState(false);
          addMessage('system', 'Unable to start speech recognition.', error.message || 'Try tapping the mic again.');
        }
      }

      function bindPhase2Composer() {
        resetComposerBindings();
        elements.composer.addEventListener('submit', (event) => {
          event.preventDefault();
          const text = elements.messageInput.value.trim();
          if (!text) return;
          elements.messageInput.value = '';
          handleUserInput(text).catch((error) => {
            console.error(error);
            addMessage('system', 'Something went wrong while handling that request.', error.message);
          });
        });
        elements.messages.addEventListener('click', (event) => {
          const button = event.target.closest('button[data-action]');
          if (!button) return;
          const action = button.dataset.action;
          if (action === 'prefill') {
            elements.messageInput.value = button.dataset.value || '';
            elements.messageInput.focus();
            return;
          }
          if (action === 'undo') {
            undoLastAction().catch((error) => {
              console.error(error);
              addMessage('system', 'Undo failed.', error.message);
            });
            return;
          }
          if (action === 'pending_yes') {
            executeIntent({ intent: 'confirm_yes' }).catch((error) => {
              console.error(error);
              addMessage('system', 'Confirmation failed.', error.message);
            });
            return;
          }
          if (action === 'pending_no') {
            executeIntent({ intent: 'confirm_no' }).catch((error) => {
              console.error(error);
              addMessage('system', 'Cancellation failed.', error.message);
            });
          }
        });
        elements.micButton.textContent = 'Mic';
        elements.micButton.addEventListener('click', () => {
          toggleSpeechRecognition();
        });
      }

      function escapeBulletinHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalizeNoteText(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function bulletinNotesRef(phase) {
        if (!phase || !phase.database || !phase.familyId) return null;
        return phase.database.ref('families/' + phase.familyId + '/bulletin/notes');
      }

      function funStorageKey(name) {
        var phase = runtime();
        var familyPart = phase && phase.familyId ? phase.familyId : 'global';
        return 'familyChores.fun.' + familyPart + '.' + name;
      }

      function readFunState(name, fallback) {
        try {
          var raw = localStorage.getItem(funStorageKey(name));
          if (!raw) return fallback;
          var parsed = JSON.parse(raw);
          return parsed == null ? fallback : parsed;
        } catch (error) {
          return fallback;
        }
      }

      function writeFunState(name, value) {
        try {
          localStorage.setItem(funStorageKey(name), JSON.stringify(value));
        } catch (error) {
          console.error('Kid Fun storage write failed:', error);
        }
      }

      function validateMadLibProgress(progress) {
        if (!progress || typeof progress !== 'object') return null;
        var templateIndex = Number(progress.templateIndex);
        if (!Number.isInteger(templateIndex) || templateIndex < 0 || templateIndex >= KID_MADLIBS.length) return null;
        var template = KID_MADLIBS[templateIndex];
        var answers = Array.isArray(progress.answers) ? progress.answers.slice(0, template.blanks.length) : [];
        while (answers.length < template.blanks.length) answers.push('');
        var currentBlank = Number(progress.currentBlank);
        if (!Number.isInteger(currentBlank) || currentBlank < 0) currentBlank = 0;
        if (currentBlank > template.blanks.length) currentBlank = template.blanks.length;
        return {
          templateIndex: templateIndex,
          currentBlank: currentBlank,
          answers: answers,
          started: Boolean(progress.started),
          completed: Boolean(progress.completed)
        };
      }

      function loadFunState() {
        var phase = runtime();
        var familyId = phase && phase.familyId ? phase.familyId : 'global';
        if (state.funLoadedFor === familyId) return;
        state.funLoadedFor = familyId;
        state.jokeIndex = Number(readFunState('jokeIndex', 0)) || 0;
        if (state.jokeIndex < 0) state.jokeIndex = 0;
        state.jokeIndex = state.jokeIndex % KID_JOKES.length;
        state.jokeRevealed = Boolean(readFunState('jokeRevealed', false));
        state.madLibIndex = Number(readFunState('madLibIndex', 0)) || 0;
        if (state.madLibIndex < 0) state.madLibIndex = 0;
        state.madLibIndex = state.madLibIndex % KID_MADLIBS.length;
        var savedProgress = validateMadLibProgress(readFunState('madLibProgress', null));
        if (savedProgress && savedProgress.templateIndex === state.madLibIndex) {
          state.madLibProgress = savedProgress;
        } else {
          state.madLibProgress = null;
        }
      }

      function saveJokeState() {
        writeFunState('jokeIndex', state.jokeIndex);
        writeFunState('jokeRevealed', state.jokeRevealed);
      }

      function saveMadLibState() {
        writeFunState('madLibIndex', state.madLibIndex);
        writeFunState('madLibProgress', state.madLibProgress);
      }

      function getCurrentJoke() {
        return KID_JOKES[state.jokeIndex % KID_JOKES.length] || { setup: 'No joke loaded.', punchline: 'Try again.' };
      }

      function getCurrentMadLibTemplate() {
        return KID_MADLIBS[state.madLibIndex % KID_MADLIBS.length] || { title: 'Mad Lib', blanks: [], story: '' };
      }

      function ensureMadLibProgress() {
        var template = getCurrentMadLibTemplate();
        if (!state.madLibProgress || state.madLibProgress.templateIndex !== state.madLibIndex) {
          state.madLibProgress = {
            templateIndex: state.madLibIndex,
            currentBlank: 0,
            answers: template.blanks.map(function () { return ''; }),
            started: false,
            completed: false
          };
        }
        return state.madLibProgress;
      }

      function startMadLib() {
        var template = getCurrentMadLibTemplate();
        state.madLibProgress = {
          templateIndex: state.madLibIndex,
          currentBlank: 0,
          answers: template.blanks.map(function () { return ''; }),
          started: true,
          completed: false
        };
        saveMadLibState();
      }

      function restartMadLib() {
        startMadLib();
      }

      function randomIndex(length, previousIndex) {
        if (!length) return 0;
        if (length === 1) return 0;
        var next = Math.floor(Math.random() * length);
        while (next === previousIndex) {
          next = Math.floor(Math.random() * length);
        }
        return next;
      }

      function nextRandomJoke() {
        state.jokeIndex = randomIndex(KID_JOKES.length, state.jokeIndex);
        state.jokeRevealed = false;
        saveJokeState();
      }

      function nextMadLibTemplate() {
        state.madLibIndex = randomIndex(KID_MADLIBS.length, state.madLibIndex);
        state.madLibProgress = null;
        saveMadLibState();
      }

      function updateMadLibAnswer(value) {
        var progress = ensureMadLibProgress();
        progress.started = true;
        progress.answers[progress.currentBlank] = String(value || '');
        saveMadLibState();
      }

      function advanceMadLib() {
        var progress = ensureMadLibProgress();
        var answer = String(progress.answers[progress.currentBlank] || '').trim();
        if (!answer) return false;
        progress.answers[progress.currentBlank] = answer;
        if (progress.currentBlank >= progress.answers.length - 1) {
          progress.currentBlank = progress.answers.length;
          progress.completed = true;
        } else {
          progress.currentBlank += 1;
        }
        progress.started = true;
        saveMadLibState();
        return true;
      }

      function explainBlank(blank) {
        var map = {
          noun: 'A noun (a person, place, or thing)',
          adjective: 'An adjective (a describing word)',
          verb: 'A verb (an action word)',
          verb_past: 'A past-tense verb (something already done)',
          animal: 'An animal',
          color: 'A color',
          number: 'A number',
          food: 'A food',
          name: 'A name',
          place: 'A place',
          body_part: 'A body part',
          sound: 'A sound',
          clothing: 'A clothing item'
        };
        return map[blank.label] || blank.label;
      }

      function renderMadLibStory(template, answers) {
        return template.story.replace(/\{(\d+)\}/g, function (_, indexText) {
          var index = Number(indexText);
          var value = escapeBulletinHtml(answers[index] || '');
          var accent = index % 2 === 0 ? 'alex' : 'louisa';
          return '<span class="madlib-highlight ' + accent + '">' + value + '</span>';
        });
      }

      async function getNotes() {
        var phase = runtime();
        var ref = bulletinNotesRef(phase);
        if (!ref) return [];
        var snapshot = await ref.get();
        if (!snapshot.exists()) return [];
        return Object.entries(snapshot.val()).map(function (entry) {
          var value = entry[1] || {};
          return {
            id: entry[0],
            text: String(value.text || '').trim(),
            timestamp: Number(value.timestamp || 0),
            color: value.color || 'neutral'
          };
        }).filter(function (note) {
          return Boolean(note.text);
        }).sort(function (a, b) {
          return b.timestamp - a.timestamp;
        });
      }

      function formatTimestamp(timestamp) {
        if (!timestamp) return 'Just now';
        return new Date(timestamp).toLocaleString(undefined, {
          month: 'short',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit'
        });
      }

      async function addNote(text, color) {
        var phase = runtime();
        var ref = bulletinNotesRef(phase);
        if (!ref) throw new Error('Bulletin is not ready.');
        var note = {
          text: String(text || '').trim(),
          timestamp: Date.now(),
          color: color || 'neutral'
        };
        if (!note.text) throw new Error('Note text is required.');
        if (note.text.length > 240) {
          note.text = note.text.slice(0, 240).trim();
        }
        var pushed = ref.push();
        await pushed.set(note);
        state.composeOpen = false;
        state.draftText = '';
        await renderBulletin();
        return { id: pushed.key, text: note.text, color: note.color, timestamp: note.timestamp };
      }

      async function removeNoteById(noteId) {
        var phase = runtime();
        var ref = bulletinNotesRef(phase);
        if (!ref || !noteId) return null;
        var noteList = await getNotes();
        var match = noteList.find(function (note) { return note.id === noteId; }) || null;
        await ref.child(noteId).remove();
        await renderBulletin();
        return match;
      }

      async function removeNoteByText(text) {
        var target = normalizeNoteText(text);
        if (!target) return null;
        var noteList = await getNotes();
        var match = noteList.find(function (note) {
          var normalized = normalizeNoteText(note.text);
          return normalized === target || normalized.indexOf(target) !== -1 || target.indexOf(normalized) !== -1;
        });
        if (!match) return null;
        await removeNoteById(match.id);
        return match;
      }

            '</section>' +

              '<div class="bulletin-section-head"><div><h3>Jokes and stories</h3><p>Tap to reveal punchlines and build silly stories together.</p></div></div>' +
              '<div class="fun-section">' + renderJokeCard() + renderMadLibCard() + '</div>' +
            '</section>' +
          '</div>';

        var madLibInput = document.getElementById('funMadLibAnswer');
        if (madLibInput) {
          madLibInput.focus();
          madLibInput.setSelectionRange(madLibInput.value.length, madLibInput.value.length);
        }
      }

      async function renderBulletin() {
        var phase = runtime();
        var container = document.getElementById('bulletinContent');
        if (!container) return;
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<div class="bulletin-shell"><section class="panel bulletin-hero"><h2>Bulletin</h2><p>Connect to a family to load notes and the shared home view.</p></section></div>';
          return;
        }

        var notes = await getNotes();
        var visibleNotes = notes.slice(0, 10);
        var extraCount = Math.max(0, notes.length - visibleNotes.length);
        var notesMarkup = visibleNotes.length ? '<div class="bulletin-notes-grid">' + visibleNotes.map(function (note) {
          return '<article class="bulletin-note-card ' + escapeBulletinHtml(note.color || 'neutral') + '">' +
            '<div class="bulletin-note-top">' +
            '<div class="bulletin-note-meta">Pinned ' + escapeBulletinHtml(formatTimestamp(note.timestamp)) + '</div>' +
            '<button type="button" class="bulletin-note-delete" data-note-delete="' + escapeBulletinHtml(note.id) + '" aria-label="Delete note">X</button>' +
            '</div>' +
            '<div class="bulletin-note-text">' + escapeBulletinHtml(note.text) + '</div>' +
            '</article>';
        }).join('') + '</div>' : '<div class="bulletin-empty"><h3>No notes yet</h3><p>Pin reminders, school updates, or anything the whole family should see.</p></div>';

        var composeMarkup = state.composeOpen ?
          '<section class="panel"><div class="bulletin-section-head"><div><h3>New note</h3><p>Use neutral for family-wide reminders or pick a kid color.</p></div></div><form id="bulletinNoteForm" class="bulletin-note-form"><textarea id="bulletinNoteInput" placeholder="Picture day Tuesday. Return library books. Alex needs cleats." maxlength="240">' + escapeBulletinHtml(state.draftText) + '</textarea><select id="bulletinNoteColor"><option value="neutral"' + (state.draftColor === 'neutral' ? ' selected' : '') + '>Family</option><option value="alex"' + (state.draftColor === 'alex' ? ' selected' : '') + '>Alex</option><option value="louisa"' + (state.draftColor === 'louisa' ? ' selected' : '') + '>Louisa</option></select><div class="bulletin-form-actions"><button type="submit" class="bulletin-btn">Pin note</button><button type="button" class="bulletin-btn secondary" id="bulletinCancelNoteBtn">Cancel</button></div></form></section>' : '';

        container.innerHTML =
          '<div class="bulletin-shell">' +
            '<section class="panel bulletin-hero">' +
              '<div class="bulletin-section-head"><div><h2>Bulletin</h2><p>The family landing page for notes now, calendar next.</p></div><button type="button" class="bulletin-btn" id="bulletinNewNoteBtn">New note</button></div>' +
              '<p>Use the global input for commands like <strong>note picture day Tuesday</strong> or pin notes directly here.</p>' +
            '</section>' +
            composeMarkup +
            '<section class="panel">' +
              '<div class="bulletin-section-head"><div><h3>Sticky Notes</h3><p>' + notes.length + ' total note' + (notes.length === 1 ? '' : 's') + (extraCount ? ' - showing newest 10' : '') + '</p></div></div>' +
              notesMarkup +
            '</section>' +
            '<section class="panel bulletin-calendar">' +
              '<div class="bulletin-section-head"><div><h3>Calendar</h3><p>Google Calendar integration is still queued for Phase 7.</p></div></div>' +
              '<p>Once that lands, upcoming kid-filtered events will render here.</p>' +
            '</section>' +
          '</div>';

        var noteInput = document.getElementById('bulletinNoteInput');
        if (noteInput && state.composeOpen) {
          noteInput.focus();
          noteInput.setSelectionRange(noteInput.value.length, noteInput.value.length);
          return;
        }
      }

      document.addEventListener('click', function (event) {
        var newBtn = event.target.closest('#bulletinNewNoteBtn');
        if (newBtn) {
          state.composeOpen = true;
          renderBulletin().catch(function (error) { console.error(error); });
          return;
        }

        var cancelBtn = event.target.closest('#bulletinCancelNoteBtn');
        if (cancelBtn) {
          state.composeOpen = false;
          state.draftText = '';
          renderBulletin().catch(function (error) { console.error(error); });
          return;
        }

        var deleteBtn = event.target.closest('[data-note-delete]');
        if (deleteBtn) {
          removeNoteById(deleteBtn.dataset.noteDelete).then(function (removed) {
            var phase = runtime();
            if (phase && phase.showToast && removed) {
              phase.showToast('Removed note: ' + removed.text);
            }
          }).catch(function (error) {
            console.error(error);
            var phase = runtime();
            if (phase && phase.showToast) {
              phase.showToast('Could not remove that note.', { type: 'error' });
            }
          });
          return;
        }

        if (event.target.closest('#funRevealJokeBtn')) {
          state.jokeRevealed = true;
          saveJokeState();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funNextJokeBtn')) {
          nextRandomJoke();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibStartBtn')) {
          startMadLib();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibNextBtn')) {
          if (!advanceMadLib()) {
            var phase = runtime();
            if (phase && phase.showToast) {
              phase.showToast('Add a word before moving on.', { type: 'error' });
            }
            return;
          }
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibCycleBtn')) {
          nextMadLibTemplate();
          renderFun().catch(function (error) { console.error(error); });
          return;
        }

        if (event.target.closest('#funMadLibRestartBtn')) {
          restartMadLib();
          renderFun().catch(function (error) { console.error(error); });
        }
      });

      document.addEventListener('submit', function (event) {
        if (event.target.id !== 'bulletinNoteForm') return;
        event.preventDefault();
        var textInput = document.getElementById('bulletinNoteInput');
        var colorInput = document.getElementById('bulletinNoteColor');
        var text = textInput ? textInput.value.trim() : '';
        var color = colorInput ? colorInput.value : 'neutral';
        state.draftText = text;
        state.draftColor = color;
        addNote(text, color).then(function (note) {
          var phase = runtime();
          if (phase && phase.showToast) {
            phase.showToast('Pinned note: ' + note.text, { kid: note.color !== 'neutral' ? note.color : null });
          }
        }).catch(function (error) {
          console.error(error);
          var phase = runtime();
          if (phase && phase.showToast) {
            phase.showToast(error.message || 'Could not add that note.', { type: 'error' });
          }
        });
      });

      document.addEventListener('change', function (event) {
        if (event.target.id === 'bulletinNoteColor') {
          state.draftColor = event.target.value || 'neutral';
          return;
        }
        if (event.target.id === 'funMadLibAnswer') {
          updateMadLibAnswer(event.target.value || '');
        }
      });

      document.addEventListener('input', function (event) {
        if (event.target.id === 'bulletinNoteInput') {
          state.draftText = event.target.value || '';
          return;
        }
        if (event.target.id === 'funMadLibAnswer') {
          updateMadLibAnswer(event.target.value || '');
        }
      });

      window.renderFun = renderFun;
      window.renderBulletin = renderBulletin;
      window.familyBulletin = {
        addNote: addNote,
        removeNoteById: removeNoteById,
        removeNoteByText: removeNoteByText,
        getNotes: getNotes,
        renderBulletin: renderBulletin
      };

      var bulletinWarmup = setInterval(function () {
        var phase = runtime();
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          return;
        }
        clearInterval(bulletinWarmup);
        renderBulletin().catch(function (error) { console.error(error); });
      }, 400);
    })();
  </script>
  <script>
    (function () {
      var phase4State = {
        choresSettingsOpen: false,
        bankSettingsOpen: false
      };

      var historyState = {
        kid: 'all',
        date: toDateString(new Date())
      };

      function runtime() {
        return window.phaseRuntime;
      }

      function isChoresViewActive() {
        return location.hash.replace('#', '') === 'chores';
      }

      function selectedChoreKids() {
        var active = document.querySelector('#quickPoints [data-qp-kid].active');
        var kid = active ? active.dataset.qpKid : 'alex';
        return kid === 'both' ? ['alex', 'louisa'] : [kid];
      }

      function thresholdInfoLocal(phase, kidId, points) {
        var kid = (phase.currentConfig.kids && phase.currentConfig.kids[kidId]) || {};
        var tiers = (kid.payTiers || []).slice().sort(function (a, b) { return a.minPts - b.minPts; });
        var topTier = tiers[tiers.length - 1] || { minPts: Math.max(points, 1), pay: 0 };
        var nextTier = tiers.find(function (tier) { return points < tier.minPts; });
        if (nextTier) {
          return {
            mode: 'tier',
            next: nextTier,
            targetPoints: Math.max(nextTier.minPts, 1),
            width: Math.min(100, Math.round((points / Math.max(nextTier.minPts, 1)) * 100))
          };
        }
        var weeklyBonus = kid.weeklyBonus || {};
        var extraPts = Math.max(1, Number(weeklyBonus.extraPts || 10));
        var bonusPoints = Math.max(0, points - Number(topTier.minPts || 0));
        var completedBonusSteps = Math.floor(bonusPoints / extraPts);
        var targetBonusPoints = (completedBonusSteps + 1) * extraPts;
        return {
          mode: 'bonus',
          next: { minPts: Number(topTier.minPts || 0) + targetBonusPoints, pay: topTier.pay || 0 },
          targetPoints: targetBonusPoints,
          bonusPoints: bonusPoints,
          width: Math.min(100, Math.round((bonusPoints / targetBonusPoints) * 100))
        };
      }

      async function renderChoreProgress() {
        var phase = runtime();
        var container = document.getElementById('choreProgress');
        if (!container) return;
        if (!phase || !phase.familyId || !phase.configLoaded) {
          container.innerHTML = '<p class="chores-progress-note">Loading weekly progress...</p>';
          return;
        }
        var entries = await phase.getAllLogEntries();
        var now = new Date();
        var week = phase.toIsoWeek(now);
        var kids = selectedChoreKids();
        container.innerHTML = '<div class="chores-progress-grid">' + kids.map(function (kidId) {
          var kid = (phase.currentConfig.kids && phase.currentConfig.kids[kidId]) || { name: kidId, payTiers: [], weeklyBonus: { extraPts: 10, bonus: 2 } };
          var points = entries.filter(function (entry) { return entry.kid === kidId && entry.week === week; }).reduce(function (sum, entry) { return sum + Number(entry.points || 0); }, 0);
          var pay = phase.calculateWeeklyPay(kid.payTiers || [], points);
          var threshold = thresholdInfoLocal(phase, kidId, points);
          var wb = kid.weeklyBonus || { extraPts: 10, bonus: 2 };
          var topTier = (kid.payTiers || []).slice().sort(function (a, b) { return a.minPts - b.minPts; });
          var topMinPts = topTier.length ? Number(topTier[topTier.length - 1].minPts || 0) : 0;
          var progressClass = threshold.mode === 'bonus' ? 'bonus' : kidId;
          var progressStyle = threshold.mode === 'bonus' ? 'background:linear-gradient(90deg,#22c55e,#15803d)' : '';
          var progressLabel = threshold.mode === 'bonus' ? 'Bonus track: ' + (threshold.bonusPoints || 0) + '/' + threshold.targetPoints + 'pts' : 'Next: ' + threshold.next.minPts + 'pts';
          return '<article class="stat-card chores-progress-card">' +
            '<div class="chores-progress-top"><div><div class="chores-progress-name">' + kid.name + '</div><div class="chores-progress-meta">' + points + 'pts this week - ' + phase.dollars(pay) + ' earned</div></div><div class="score-next">' + progressLabel + '</div></div>' +
            '<div class="progress ' + progressClass + '"><span style="width:' + threshold.width + '%;' + progressStyle + '"></span></div>' +
            '<div class="chores-progress-note">Bonus: ' + phase.dollars(wb.bonus || 2) + ' per ' + (wb.extraPts || 10) + 'pts over ' + topMinPts + '</div>' +
          '</article>';
        }).join('') + '</div>';
      }

      function renderPayTierEditor(kidId, kid) {
        var phase = runtime();
        var tiers = kid.payTiers || [];
        var bonus = kid.weeklyBonus || { extraPts: 10, bonus: 2 };
        return '<article class="stat-card"><h3>' + (kid.name || kidId) + ' Pay Tiers</h3>' +
          '<div class="settings-list">' +
          tiers.map(function (tier, i) {
            return '<div class="settings-row"><span>Tier ' + (i + 1) + ' (' + tier.minPts + 'pts)</span>' +
              '<input type="number" min="1" value="' + tier.minPts + '" data-bank-setting="pay-tier-pts" data-kid="' + kidId + '" data-index="' + i + '">' +
              '<input type="number" step="0.5" value="' + tier.pay + '" data-bank-setting="pay-tier" data-kid="' + kidId + '" data-index="' + i + '">' +
              '</div>';
          }).join('') +
          '<div class="settings-row"><span>Bonus (' + bonus.extraPts + 'pts)</span>' +
          '<input type="number" min="1" value="' + bonus.extraPts + '" data-bank-setting="bonus-pts" data-kid="' + kidId + '">' +
          '<input type="number" step="0.5" value="' + bonus.bonus + '" data-bank-setting="bonus-pay" data-kid="' + kidId + '">' +
          '</div>' +
          '</div></article>';
      }

      async function renderBankSettings() {
        var phase = runtime();
        var panel = document.getElementById('bankSettings');
        if (!panel) return;
        panel.hidden = !phase4State.bankSettingsOpen;
        if (!phase4State.bankSettingsOpen) {
          panel.innerHTML = '';
          return;
        }
        if (!phase || !phase.familyId || !phase.configLoaded) {
          panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading bank settings...</p></article></div>';
          return;
        }
        var kids = phase.currentConfig.kids || {};
        var historyMarkup = await renderHistory();
        var txnMarkup = await renderTransactions();
        
        panel.innerHTML = '<div class="settings-grid">' +
          Object.entries(kids).map(function (entry) { return renderPayTierEditor(entry[0], entry[1]); }).join('') +
          '<article class="stat-card"><h3>History</h3>' +
          '<div class="settings-chip-row">' +
          ['all', 'alex', 'louisa'].map(function (k) {
            return '<button type="button" class="settings-chip ' + (historyState.kid === k ? 'active' : '') + '" data-history-kid="' + k + '">' + (k === 'all' ? 'All' : k.charAt(0).toUpperCase() + k.slice(1)) + '</button>';
          }).join('') +
          '</div>' +
          '<div class="settings-row"><span>Date</span><input type="date" value="' + (historyState.date || '') + '" data-bank-setting="history-date"></div>' +
          historyMarkup +
          '</article>' +
          '<article class="stat-card"><h3>Transactions</h3>' + txnMarkup + '</article>' +
          '</div>';
      }

      async function renderHistory() {
        var phase = runtime();
        var date = historyState.date || toDateString(new Date());
        var entries = await phase.getAllLogEntries();
        var filtered = entries.filter(function (e) {
          return e.date === date && (historyState.kid === 'all' || e.kid === historyState.kid);
        }).sort(function (a, b) { return b.timestamp - a.timestamp; });

        if (!filtered.length) return '<p class="settings-note">No history for this date.</p>';
        return '<div class="settings-list" style="margin-top:12px">' + filtered.map(function (e) {
          var label = e.choreLabel || 'Chore';
          var note = e.note ? ' (' + e.note + ')' : '';
          var deleteButton = '<button type="button" data-bank-action="delete-log" data-log-id="' + e.id + '" title="Delete">X</button>';
          return '<div class="settings-row"><span>' + (phase.currentConfig.kids[e.kid].name || e.kid) + ': ' + label + note + ' (' + e.points + 'pts)</span>' + deleteButton + '</div>';
        }).join('') + '</div>';
      }

      async function renderTransactions() {
        var phase = runtime();
        var txns = await phase.getAllPayments();
        var filtered = txns.sort(function (a, b) { return b.timestamp - a.timestamp; }).slice(0, 15);
        if (!filtered.length) return '<p class="settings-note">No recent transactions.</p>';
        return '<div class="settings-list">' + filtered.map(function (p) {
          var label = p.type === 'spend' ? 'Spent' : p.type === 'weekly' ? 'Weekly Pay' : p.type === 'credit' ? 'Credit' : 'Payment';
          var note = p.note ? ': ' + p.note : '';
          var deleteButton = '<button type="button" data-bank-action="delete-payment" data-payment-id="' + p.id + '" data-payment-kid="' + p.kid + '" data-payment-amount="' + p.amount + '" data-payment-type="' + p.type + '" title="Delete">X</button>';
          return '<div class="settings-row"><span>' + (phase.currentConfig.kids[p.kid].name || p.kid) + ': ' + label + note + ' (' + phase.dollars(p.amount) + ')<div class="settings-note">' + (p.date || '') + '</div></span>' + deleteButton + '</div>';
        }).join('') + '</div>';
      }

      function renderChoreSettings() {
        var phase = runtime();
        var panel = document.getElementById('choresSettings');
        if (!panel) return;
        panel.hidden = !phase4State.choresSettingsOpen;
        if (!phase4State.choresSettingsOpen) {
          panel.innerHTML = '';
          return;
        }
        if (!phase || !phase.familyId || !phase.configLoaded) {
          panel.innerHTML = '<div class="settings-grid"><article class="stat-card"><p>Loading chore settings...</p></article></div>';
          return;
        }
        var chores = phase.currentConfig.chores || {};
        panel.innerHTML = '<div class="settings-grid">' +
          '<article class="stat-card"><h3>Chore Settings</h3><div class="settings-list">' +
          Object.keys(chores).map(function (choreId) {
            var chore = chores[choreId] || {};
            return '<div class="settings-row"><span>' + String(chore.label || choreId).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span><input type="number" min="0" value="' + Number(chore.points || 0) + '" data-chore-setting="points" data-chore="' + choreId + '"><button type="button" data-chore-action="remove" data-chore="' + choreId + '">Remove</button></div>';
          }).join('') +
          '</div><button type="button" class="settings-btn" data-chore-action="add">Add chore</button></article>' +
        '</div>';
      }

      async function addChoreViaPrompt() {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded) return;
        var label = window.prompt('New chore name?');
        if (!label) return;
        var points = Number(window.prompt('Points for ' + label + '?', '1'));
        if (!points || Number.isNaN(points)) return;
        var key = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || ('chore_' + Date.now());
        var chore = { label: label, points: points, kids: ['alex', 'louisa'], keywords: [label.toLowerCase()] };
        await phase.database.ref('families/' + phase.familyId + '/config/chores/' + key).set(chore);
        phase.currentConfig.chores[key] = chore;
        renderChoreSettings();
      }

      async function removeChore(choreId) {
        var phase = runtime();
        if (!phase || !phase.familyId || !phase.configLoaded || !choreId) return;
        if (!window.confirm('Remove this chore?')) return;
        await phase.database.ref('families/' + phase.familyId + '/config/chores/' + choreId).remove();
        delete phase.currentConfig.chores[choreId];
        renderChoreSettings();
      }

      function stripWeeklyCard() {
        var cardContent = document.getElementById('cardContent');
        if (!cardContent) return;
        Array.prototype.slice.call(cardContent.querySelectorAll('.stat-card')).forEach(function (card) {
          var heading = card.querySelector('h3');
          if (heading && /^This Week/.test(heading.textContent || '')) {
            card.remove();
          }
        });
      }

      function patchBankRender() {
        if (!window.renderCardView || window.renderCardView.__phase4Patched) return;
        var original = window.renderCardView;
        var wrapped = async function (kidId) {
          var result = await original(kidId);
          stripWeeklyCard();
          return result;
        };
        wrapped.__phase4Patched = true;
        window.renderCardView = wrapped;
      }

      function patchRuntimeHooks() {
        var phase = runtime();
        if (!phase || phase.__phase4Patched) return;
        var originalSaveLogEntries = phase.saveLogEntries;
        phase.saveLogEntries = async function (entries) {
          var result = await originalSaveLogEntries(entries);
          renderChoreProgress().catch(function (error) { console.error(error); });
          return result;
        };
        var originalUpdateChorePoints = phase.updateChorePoints;
        phase.updateChorePoints = async function (choreId, points) {
          var result = await originalUpdateChorePoints(choreId, points);
          renderChoreProgress().catch(function (error) { console.error(error); });
          renderChoreSettings();
          return result;
        };
        phase.__phase4Patched = true;
      }

      document.addEventListener('click', function (event) {
        var toggle = event.target.closest('#choresSettingsToggle');
        if (toggle) {
          phase4State.choresSettingsOpen = !phase4State.choresSettingsOpen;
          renderChoreSettings();
          return;
        }
        var bankToggle = event.target.closest('#bankSettingsToggle');
        if (bankToggle) {
          phase4State.bankSettingsOpen = !phase4State.bankSettingsOpen;
          renderBankSettings().catch(function (error) { console.error(error); });
          return;
        }
        var historyKidBtn = event.target.closest('[data-history-kid]');
        if (historyKidBtn) {
          historyState.kid = historyKidBtn.dataset.historyKid;
          renderBankSettings().catch(function (error) { console.error(error); });
          return;
        }

        var bankActionBtn = event.target.closest('[data-bank-action]');
        if (bankActionBtn) {
          var action = bankActionBtn.dataset.bankAction;
          var phase = runtime();
          if (action === 'delete-log') {
            var logId = bankActionBtn.dataset.logId;
            if (!phase || !logId) return;
            phase.database.ref('families/' + phase.familyId + '/log/' + logId).remove().then(function () {
              phase.showToast('Deleted log entry.');
              renderBankSettings().catch(function (error) { console.error(error); });
            }).catch(function (error) { console.error(error); phase.showToast('Failed to delete.', { type: 'error' }); });
            return;
          }
          if (action === 'delete-payment') {
            var paymentId = bankActionBtn.dataset.paymentId;
            var kidId = bankActionBtn.dataset.paymentKid;
            var amount = Number(bankActionBtn.dataset.paymentAmount || 0);
            var type = bankActionBtn.dataset.paymentType || 'payment';
            if (!phase || !paymentId) return;
            phase.database.ref('families/' + phase.familyId + '/payments/' + paymentId).get().then(function (snap) {
              var p = snap.exists() ? snap.val() : null;
              return phase.database.ref('families/' + phase.familyId + '/payments/' + paymentId).remove().then(function () { return p; });
            }).then(function (p) {
              var delta = p && typeof p.balanceDelta === 'number' ? Number(p.balanceDelta) : (type === 'credit' ? amount : -amount);
              return phase.adjustBalance(kidId, Number((-delta).toFixed(2)));
            }).then(function () {
              phase.showToast('Deleted transaction and reversed ' + phase.dollars(amount) + '.');
              renderBankSettings().catch(function (error) { console.error(error); });
            }).catch(function (error) { console.error(error); phase.showToast('Failed to delete transaction.', { type: 'error' }); });
            return;
          }
        }

        var actionBtn = event.target.closest('[data-chore-action]');
        if (!actionBtn) return;
        if (actionBtn.dataset.choreAction === 'add') {
          addChoreViaPrompt().catch(function (error) { console.error(error); });
          return;
        }
        if (actionBtn.dataset.choreAction === 'remove') {
          removeChore(actionBtn.dataset.chore).catch(function (error) { console.error(error); });
        }
      });

      document.addEventListener('change', function (event) {
        var target = event.target;
        var phase = runtime();
        if (!phase) return;

        if (target.dataset.choreSetting === 'points') {
          var points = Number(target.value);
          if (Number.isNaN(points)) return;
          phase.updateChorePoints(target.dataset.chore, points).catch(function (error) { console.error(error); });
          return;
        }

        if (target.dataset.bankSetting) {
          var setting = target.dataset.bankSetting;
          var kidId = target.dataset.kid;
          var idx = Number(target.dataset.index);
          var val = Number(target.value);

          if (setting === 'pay-tier-pts') {
            if (Number.isNaN(val) || val < 1) return;
            var tiers = (phase.currentConfig.kids[kidId].payTiers || []).slice();
            tiers[idx] = { ...tiers[idx], minPts: val };
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/payTiers').set(tiers).then(function () {
              phase.currentConfig.kids[kidId].payTiers = tiers;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'pay-tier') {
            if (Number.isNaN(val)) return;
            var tiers = (phase.currentConfig.kids[kidId].payTiers || []).slice();
            tiers[idx] = { ...tiers[idx], pay: val };
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/payTiers').set(tiers).then(function () {
              phase.currentConfig.kids[kidId].payTiers = tiers;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'bonus-pts') {
            if (Number.isNaN(val) || val < 1) return;
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/weeklyBonus/extraPts').set(val).then(function () {
              if (!phase.currentConfig.kids[kidId].weeklyBonus) phase.currentConfig.kids[kidId].weeklyBonus = {};
              phase.currentConfig.kids[kidId].weeklyBonus.extraPts = val;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'bonus-pay') {
            if (Number.isNaN(val)) return;
            phase.database.ref('families/' + phase.familyId + '/config/kids/' + kidId + '/weeklyBonus/bonus').set(val).then(function () {
              if (!phase.currentConfig.kids[kidId].weeklyBonus) phase.currentConfig.kids[kidId].weeklyBonus = {};
              phase.currentConfig.kids[kidId].weeklyBonus.bonus = val;
              renderBankSettings().catch(function (error) { console.error(error); });
            });
            return;
          }
          if (setting === 'history-date') {
            historyState.date = target.value;
            renderBankSettings().catch(function (error) { console.error(error); });
          }
        }
      });

      document.getElementById('quickPoints').addEventListener('click', function () {
        setTimeout(function () {
          renderChoreProgress().catch(function (error) { console.error(error); });
        }, 150);
      });

      function isBankViewActive() {
        return location.hash.replace('#', '') === 'bank';
      }

      window.addEventListener('hashchange', function () {
        setTimeout(function () {
          if (isChoresViewActive()) {
            renderChoreProgress().catch(function (error) { console.error(error); });
            renderChoreSettings();
          }
          if (isBankViewActive()) {
            renderBankSettings().catch(function (error) { console.error(error); });
          }
        }, 50);
      });

      var phase4Warmup = setInterval(function () {
        var phase = runtime();
        if (!phase || !phase.database || !phase.familyId || !phase.configLoaded) {
          return;
        }
        patchRuntimeHooks();
        patchBankRender();
        clearInterval(phase4Warmup);
        stripWeeklyCard();
        renderChoreProgress().catch(function (error) { console.error(error); });
        renderChoreSettings();
        if (isBankViewActive()) {
          renderBankSettings().catch(function (error) { console.error(error); });
        }
      }, 400);
    })();
  </script>
</body>
</html>
